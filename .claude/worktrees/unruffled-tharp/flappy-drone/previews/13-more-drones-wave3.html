<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a18; color: #e0e0e0; font-family: 'SF Mono', 'Menlo', monospace; padding: 20px; }
  h1 { color: #fff; font-size: 20px; margin-bottom: 4px; }
  .sub { color: #888; font-size: 12px; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
  .card { background: #111122; border: 1px solid #222; border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color 0.2s; }
  .card:hover { border-color: #00c8f0; }
  .card.selected { border-color: #00c8f0; box-shadow: 0 0 12px rgba(0,200,240,0.3); }
  .card canvas { display: block; width: 100%; }
  .card .label { padding: 10px; }
  .card .label h3 { font-size: 13px; color: #fff; margin-bottom: 3px; }
  .card .label p { font-size: 11px; color: #666; line-height: 1.4; }
</style>
</head>
<body>

<h1>More Drone Designs — Wave 3</h1>
<p class="sub">New concepts at 3.5x scale. All animated. Click to select.</p>

<div class="grid" id="drones"></div>

<script>
let tick = 0;
const S = 3.5;
const canvases = [];

function addCard(name, desc, drawFn) {
  const grid = document.getElementById('drones');
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => { grid.querySelectorAll('.card').forEach(c => c.classList.remove('selected')); card.classList.add('selected'); };
  const canvas = document.createElement('canvas');
  canvas.width = 290; canvas.height = 140;
  card.appendChild(canvas);
  const label = document.createElement('div');
  label.className = 'label';
  label.innerHTML = `<h3>${name}</h3><p>${desc}</p>`;
  card.appendChild(label);
  grid.appendChild(card);
  canvases.push({ canvas, draw: drawFn });
}

function skyBg(ctx, w, h) {
  const g = ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#050510'); g.addColorStop(1,'#101030');
  ctx.fillStyle = g; ctx.fillRect(0,0,w,h);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i = 0; i < 6; i++) ctx.fillRect(15+i*45+(i*13%9), 6+(i*17%25), 1, 1);
}

// === L: Jet Wing ===
addCard('L: Jet Wing — "SKYKNIFE"', 'Fixed-wing VTOL. Swept delta wings, twin jet nacelles on wingtips. Fast, angular, fighter-jet vibe.', (ctx, w, h) => {
  skyBg(ctx, w, h);
  const x = w/2, y = h/2;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.beginPath(); ctx.ellipse(x, y+10*S, 14*S, 2*S, 0, 0, Math.PI*2); ctx.fill();
  // Fuselage — narrow, pointed
  ctx.fillStyle = '#2a2a3a';
  ctx.beginPath(); ctx.moveTo(x+12*S, y); ctx.lineTo(x-4*S, y-2*S); ctx.lineTo(x-8*S, y); ctx.lineTo(x-4*S, y+2*S); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#353548'; ctx.beginPath(); ctx.moveTo(x+10*S, y); ctx.lineTo(x-3*S, y-1.5*S); ctx.lineTo(x-6*S, y); ctx.lineTo(x-3*S, y+1.5*S); ctx.closePath(); ctx.fill();
  // Swept wings
  ctx.fillStyle = '#222235';
  ctx.beginPath(); ctx.moveTo(x+2*S, y-1*S); ctx.lineTo(x-6*S, y-8*S); ctx.lineTo(x-10*S, y-7*S); ctx.lineTo(x-3*S, y); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+2*S, y+1*S); ctx.lineTo(x-6*S, y+8*S); ctx.lineTo(x-10*S, y+7*S); ctx.lineTo(x-3*S, y); ctx.closePath(); ctx.fill();
  // Jet nacelles on wingtips
  ctx.fillStyle = '#333348';
  ctx.fillRect(x-10*S, y-8*S, 3*S, 2*S); ctx.fillRect(x-10*S, y+6*S, 3*S, 2*S);
  // Jet glow
  const jGlow = 0.4 + Math.sin(tick * 0.1) * 0.2;
  ctx.fillStyle = `rgba(100,180,255,${jGlow})`; ctx.fillRect(x-11*S, y-7.5*S, 1*S, 1*S); ctx.fillRect(x-11*S, y+6.5*S, 1*S, 1*S);
  // Canopy
  ctx.fillStyle = '#446688'; ctx.fillRect(x+4*S, y-1*S, 3*S, 2*S);
  // Blinker
  ctx.fillStyle = tick % 35 < 17 ? '#ff2255' : '#551122'; ctx.fillRect(x-8*S, y-0.5*S, 1*S, 1*S);
  // VTOL props (subtle, on wing roots)
  const spin = Math.abs(Math.sin(tick * 0.18));
  const pw = spin * 8 * S;
  ctx.globalAlpha = 0.4; ctx.fillStyle = '#99a';
  ctx.fillRect(x - 2*S - pw/2, y-4*S, pw, 1*S);
  ctx.fillRect(x - 2*S - pw/2, y+3*S, pw, 1*S);
  ctx.globalAlpha = 1;
});

// === M: Balloon Drone ===
addCard('M: Balloon Drone — "FLOATER"', 'Spherical balloon body with tiny prop underneath. Bobbing motion. Cute, round, helpless-looking.', (ctx, w, h) => {
  skyBg(ctx, w, h);
  const x = w/2, y = h/2 - 2*S;
  const bob = Math.sin(tick * 0.03) * 3;
  // Balloon glow
  const glow = ctx.createRadialGradient(x, y+bob, 0, x, y+bob, 10*S);
  glow.addColorStop(0, 'rgba(80,60,120,0.08)'); glow.addColorStop(1, 'rgba(80,60,120,0)');
  ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(x, y+bob, 10*S, 0, Math.PI*2); ctx.fill();
  // Balloon body
  ctx.fillStyle = '#3a2a4a';
  ctx.beginPath(); ctx.arc(x, y+bob, 7*S, 0, Math.PI*2); ctx.fill();
  // Highlight
  ctx.fillStyle = '#4a3a5a';
  ctx.beginPath(); ctx.arc(x-2*S, y-2*S+bob, 4*S, 0, Math.PI*2); ctx.fill();
  // Shine
  ctx.fillStyle = 'rgba(200,180,240,0.15)';
  ctx.beginPath(); ctx.arc(x-3*S, y-3*S+bob, 2*S, 0, Math.PI*2); ctx.fill();
  // Tether
  ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x, y+7*S+bob); ctx.quadraticCurveTo(x+1*S, y+9*S+bob, x, y+11*S+bob); ctx.stroke();
  // Tiny gondola
  ctx.fillStyle = '#333345'; ctx.fillRect(x-3*S, y+11*S+bob, 6*S, 3*S);
  // Tiny prop
  const spin = Math.abs(Math.sin(tick * 0.15));
  const pw = spin * 6 * S;
  ctx.globalAlpha = 0.5; ctx.fillStyle = '#99a';
  ctx.fillRect(x - pw/2, y+14*S+bob, pw, 1*S);
  ctx.globalAlpha = 1;
  // Eyes on balloon
  ctx.fillStyle = '#222';
  ctx.fillRect(x-2*S, y-1*S+bob, 1.5*S, 2*S); ctx.fillRect(x+1*S, y-1*S+bob, 1.5*S, 2*S);
  // Blinker on gondola
  ctx.fillStyle = tick % 40 < 20 ? '#ff8844' : '#442200'; ctx.fillRect(x-1*S, y+11*S+bob, 2*S, 1*S);
});

// === N: Battle Drone ===
addCard('N: Battle Drone — "WARBIRD"', 'Armoured quad with gun barrel, thick plating, ammo belt detail. Dark military green/grey.', (ctx, w, h) => {
  skyBg(ctx, w, h);
  const x = w/2, y = h/2;
  ctx.fillStyle = 'rgba(0,0,0,0.12)'; ctx.fillRect(x-12*S, y+12*S, 24*S, 2*S);
  // Armoured body
  ctx.fillStyle = '#2a2e28'; ctx.fillRect(x-11*S, y-4*S, 22*S, 8*S);
  ctx.fillStyle = '#343830'; ctx.fillRect(x-10*S, y-3*S, 20*S, 6*S);
  // Armour plates (angled detail lines)
  ctx.fillStyle = '#252820'; ctx.fillRect(x-10*S, y-1*S, 20*S, 1*S);
  ctx.fillRect(x-10*S, y+2*S, 20*S, 1*S);
  // Gun barrel (front)
  ctx.fillStyle = '#222'; ctx.fillRect(x+10*S, y-1*S, 6*S, 2*S);
  ctx.fillStyle = '#1a1a1a'; ctx.fillRect(x+14*S, y-0.5*S, 2*S, 1*S);
  // Scope/sensor
  ctx.fillStyle = `rgba(255,50,50,${0.5+Math.sin(tick*0.08)*0.3})`; ctx.fillRect(x+9*S, y-3*S, 2*S, 1*S);
  // Motor mounts — heavy
  ctx.fillStyle = '#252820'; ctx.fillRect(x-18*S, y-2*S, 8*S, 4*S); ctx.fillRect(x+10*S, y-2*S, 8*S, 4*S);
  // Props
  const spin = Math.abs(Math.sin(tick * 0.14));
  const pw = spin * 12 * S;
  ctx.globalAlpha = 0.6; ctx.fillStyle = '#8a8';
  ctx.fillRect(x-14*S - pw/2, y-4*S, pw, 2*S);
  ctx.fillRect(x+14*S - pw/2, y-4*S, pw, 2*S);
  ctx.globalAlpha = 1;
  // Landing gear (sturdy)
  ctx.fillStyle = '#2a2e28';
  ctx.fillRect(x-8*S, y+4*S, 2*S, 5*S); ctx.fillRect(x+6*S, y+4*S, 2*S, 5*S);
  ctx.fillRect(x-10*S, y+8*S, 6*S, 2*S); ctx.fillRect(x+4*S, y+8*S, 6*S, 2*S);
  // Blinkers
  ctx.fillStyle = tick % 30 < 15 ? '#00ff44' : '#003311';
  ctx.fillRect(x-10*S, y-4*S, 2*S, 1*S); ctx.fillRect(x+8*S, y-4*S, 2*S, 1*S);
});

// === O: Paper Plane ===
addCard('O: Paper Plane — "ORIGAMI"', 'Simple folded paper plane shape. White/light grey. Minimal, clean, elegant. No motors visible.', (ctx, w, h) => {
  skyBg(ctx, w, h);
  const x = w/2, y = h/2;
  const glide = Math.sin(tick * 0.025) * 2;
  // Main body — white paper
  ctx.fillStyle = '#c8c8d8';
  ctx.beginPath(); ctx.moveTo(x+14*S, y+glide); ctx.lineTo(x-8*S, y-5*S+glide); ctx.lineTo(x-6*S, y+glide); ctx.closePath(); ctx.fill();
  // Bottom fold
  ctx.fillStyle = '#a8a8b8';
  ctx.beginPath(); ctx.moveTo(x+14*S, y+glide); ctx.lineTo(x-8*S, y+5*S+glide); ctx.lineTo(x-6*S, y+glide); ctx.closePath(); ctx.fill();
  // Fold crease
  ctx.strokeStyle = '#9898a8'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(x+14*S, y+glide); ctx.lineTo(x-6*S, y+glide); ctx.stroke();
  // Subtle shadow
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  ctx.beginPath(); ctx.ellipse(x, y+8*S, 10*S, 1.5*S, 0, 0, Math.PI*2); ctx.fill();
  // Trailing sparkle (magic)
  for (let i = 0; i < 3; i++) {
    const sx = x - 10*S - i*5*S + Math.sin(tick*0.05+i)*2*S;
    const sy = y + Math.sin(tick*0.03+i*1.5)*3*S + glide;
    const sa = Math.max(0, 0.4 - i*0.12);
    ctx.fillStyle = `rgba(200,220,255,${sa})`;
    ctx.beginPath(); ctx.arc(sx, sy, 1*S, 0, Math.PI*2); ctx.fill();
  }
});

// === P: Coaxial Heli ===
addCard('P: Coaxial Heli — "CHOPPER"', 'Classic coaxial helicopter. Single rotor mast, two counter-rotating blades, tail boom with stabiliser.', (ctx, w, h) => {
  skyBg(ctx, w, h);
  const x = w/2, y = h/2 + 2*S;
  ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(x-8*S, y+10*S, 16*S, 2*S);
  // Body — rounded fuselage
  ctx.fillStyle = '#2e3038';
  ctx.beginPath(); ctx.ellipse(x, y, 8*S, 5*S, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#383e48';
  ctx.beginPath(); ctx.ellipse(x, y-1*S, 6*S, 3.5*S, 0, 0, Math.PI*2); ctx.fill();
  // Cockpit
  ctx.fillStyle = '#446688'; ctx.beginPath(); ctx.ellipse(x+4*S, y-1*S, 3*S, 2.5*S, 0.2, 0, Math.PI*2); ctx.fill();
  // Rotor mast
  ctx.fillStyle = '#444'; ctx.fillRect(x-0.5*S, y-7*S, 1*S, 3*S);
  // Main rotor (top)
  const spin1 = Math.abs(Math.sin(tick * 0.15));
  const pw1 = spin1 * 20 * S;
  ctx.globalAlpha = 0.55; ctx.fillStyle = '#aab';
  ctx.fillRect(x - pw1/2, y-7*S, pw1, 1.5*S);
  // Counter-rotating (offset phase)
  const spin2 = Math.abs(Math.sin(tick * 0.15 + 1.0));
  const pw2 = spin2 * 18 * S;
  ctx.globalAlpha = 0.35; ctx.fillStyle = '#99a';
  ctx.fillRect(x - pw2/2, y-5.5*S, pw2, 1*S);
  ctx.globalAlpha = 1;
  // Tail boom
  ctx.fillStyle = '#2e3038'; ctx.fillRect(x-12*S, y-1*S, 5*S, 2*S);
  // Tail stabiliser (vertical)
  ctx.fillStyle = '#333'; ctx.fillRect(x-13*S, y-4*S, 1.5*S, 5*S);
  // Tail rotor
  const tailSpin = Math.abs(Math.sin(tick * 0.2));
  ctx.globalAlpha = 0.5; ctx.fillStyle = '#99a';
  ctx.fillRect(x-13.5*S, y-4*S - tailSpin*3*S, 1*S, tailSpin*6*S);
  ctx.globalAlpha = 1;
  // Skids
  ctx.fillStyle = '#444';
  ctx.fillRect(x-5*S, y+4*S, 1*S, 4*S); ctx.fillRect(x+4*S, y+4*S, 1*S, 4*S);
  ctx.fillRect(x-7*S, y+7*S, 6*S, 1*S); ctx.fillRect(x+1*S, y+7*S, 6*S, 1*S);
  // Blinker
  ctx.fillStyle = tick % 40 < 20 ? '#ff2255' : '#551122'; ctx.fillRect(x-0.5*S, y-8*S, 1*S, 1*S);
});

// === Q: Firefly ===
addCard('Q: Firefly — "GLOWBUG"', 'Bioluminescent drone. Organic rounded shape, glowing abdomen that pulses. Ethereal, magical.', (ctx, w, h) => {
  skyBg(ctx, w, h);
  const x = w/2, y = h/2;
  const bob = Math.sin(tick * 0.03) * 2;
  // Glow aura
  const pulse = 0.5 + Math.sin(tick * 0.06) * 0.3;
  const aura = ctx.createRadialGradient(x-2*S, y+3*S+bob, 0, x-2*S, y+3*S+bob, 14*S);
  aura.addColorStop(0, `rgba(180,255,100,${pulse*0.12})`); aura.addColorStop(0.4, `rgba(120,255,60,${pulse*0.04})`); aura.addColorStop(1, 'rgba(100,200,50,0)');
  ctx.fillStyle = aura; ctx.beginPath(); ctx.arc(x-2*S, y+3*S+bob, 14*S, 0, Math.PI*2); ctx.fill();
  // Body — organic rounded
  ctx.fillStyle = '#1e2818';
  ctx.beginPath(); ctx.ellipse(x, y+bob, 7*S, 4*S, 0, 0, Math.PI*2); ctx.fill();
  // Head
  ctx.fillStyle = '#2a3420';
  ctx.beginPath(); ctx.arc(x+6*S, y-1*S+bob, 3*S, 0, Math.PI*2); ctx.fill();
  // Eyes
  ctx.fillStyle = `rgba(200,255,150,${0.6+Math.sin(tick*0.08)*0.2})`;
  ctx.fillRect(x+6*S, y-2*S+bob, 1.5*S, 1.5*S); ctx.fillRect(x+8*S, y-2*S+bob, 1.5*S, 1.5*S);
  // Glowing abdomen
  ctx.fillStyle = `rgba(180,255,80,${pulse})`;
  ctx.beginPath(); ctx.ellipse(x-3*S, y+1*S+bob, 4*S, 3*S, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = `rgba(220,255,150,${pulse*0.6})`;
  ctx.beginPath(); ctx.ellipse(x-3*S, y+1*S+bob, 2.5*S, 2*S, 0, 0, Math.PI*2); ctx.fill();
  // Wings (translucent)
  const wingFlap = Math.sin(tick * 0.12);
  ctx.globalAlpha = 0.2 + Math.abs(wingFlap) * 0.1;
  ctx.fillStyle = '#aaddaa';
  ctx.beginPath(); ctx.ellipse(x+1*S, y-4*S+bob+wingFlap*2, 5*S, 2*S, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+1*S, y+4*S+bob-wingFlap*2, 5*S, 2*S, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  // Legs (tiny)
  ctx.fillStyle = '#334';
  for (let i = 0; i < 3; i++) {
    ctx.fillRect(x-1*S+i*3*S, y+3*S+bob, 0.5*S, 3*S);
  }
});

function renderAll() {
  tick++;
  canvases.forEach(({ canvas, draw }) => {
    const ctx = canvas.getContext('2d');
    draw(ctx, canvas.width, canvas.height);
  });
  requestAnimationFrame(renderAll);
}
renderAll();
</script>
</body>
</html>
