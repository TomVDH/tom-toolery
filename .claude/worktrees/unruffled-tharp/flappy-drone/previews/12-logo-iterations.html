<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #060610; color: #e0e0e0; font-family: 'SF Mono', 'Menlo', monospace; padding: 20px; }
  h1 { color: #fff; font-size: 20px; margin-bottom: 4px; }
  .sub { color: #888; font-size: 12px; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 16px; max-width: 660px; margin: 0 auto; }
  .card { background: #0a0a1a; border: 2px solid #1a1a3a; border-radius: 14px; overflow: hidden; cursor: pointer; transition: border-color 0.2s; padding: 0; }
  .card:hover { border-color: #00c8f0; }
  .card.selected { border-color: #00c8f0; box-shadow: 0 0 20px rgba(0,200,240,0.2); }
  .card canvas { display: block; width: 100%; }
  .card .label { padding: 10px 14px; }
  .card .label h3 { font-size: 13px; color: #fff; margin-bottom: 2px; }
  .card .label p { font-size: 11px; color: #555; }
</style>
</head>
<body>

<h1>Logo & Title Iterations</h1>
<p class="sub">Game title screen mockups. Click to select. All animated.</p>

<div class="grid" id="logos"></div>

<script>
let tick = 0;
const W = 620, H = 320;
const canvases = [];

function addCard(name, desc, drawFn) {
  const grid = document.getElementById('logos');
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => { grid.querySelectorAll('.card').forEach(c => c.classList.remove('selected')); card.classList.add('selected'); };
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  card.appendChild(canvas);
  const label = document.createElement('div');
  label.className = 'label';
  label.innerHTML = `<h3>${name}</h3><p>${desc}</p>`;
  card.appendChild(label);
  grid.appendChild(card);
  canvases.push({ canvas, draw: drawFn });
}

function skyBg(ctx) {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#050510'); g.addColorStop(0.5, '#0a0a22'); g.addColorStop(1, '#101030');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i = 0; i < 12; i++) ctx.fillRect(15 + i * 50 + (i*13%9), 6 + (i*17%40), 1, 1);
  // Skyline
  ctx.fillStyle = '#080818';
  [20,70,130,200,270,340,400,460,520,580].forEach((bx,i) => {
    ctx.fillRect(bx, H - 30 - (15+(i*11)%40), 18+(i%3)*5, 15+(i*11)%40);
  });
  ctx.fillStyle = '#0c0c20';
  [10,50,100,160,220,290,350,410,470,530,590].forEach((bx,i) => {
    ctx.fillRect(bx, H - 30 - (8+(i*7)%20), 14+(i%3)*4, 8+(i*7)%20);
  });
  ctx.fillStyle = '#0a0a18'; ctx.fillRect(0, H-30, W, 30);
}

function drawTitle(ctx, text, y, opts) {
  opts = opts || {};
  const font = opts.font || "'Courier New', monospace";
  const size = opts.size || 42;
  const stroke = opts.stroke || 'rgba(160, 180, 220, 0.8)';
  const glow = opts.glow || '#00d4ff22';
  const fill = opts.fill || 'transparent';

  ctx.font = `700 ${size}px ${font}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if (opts.filled) {
    ctx.fillStyle = opts.fillColor || '#c0c8e0';
    ctx.globalAlpha = 0.9;
    ctx.fillText(text, W/2, y);
    ctx.globalAlpha = 1;
  } else {
    ctx.fillStyle = fill;
    ctx.strokeStyle = stroke;
    ctx.lineWidth = opts.strokeWidth || 1.5;
    ctx.strokeText(text, W/2, y);
  }

  // Glow
  if (opts.shadowGlow) {
    ctx.shadowColor = opts.shadowGlow;
    ctx.shadowBlur = opts.shadowBlur || 30;
    ctx.strokeText(text, W/2, y);
    ctx.shadowBlur = 0;
    ctx.shadowColor = 'transparent';
  }
}

// === CURRENT ===
addCard('Current — FLAPPY DRONE', 'The existing title. Outline Courier, subtle glow, jitter on hover.', (ctx) => {
  skyBg(ctx);
  ctx.font = "700 42px 'Courier New', monospace";
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'transparent';
  ctx.strokeStyle = 'rgba(160, 180, 220, 0.8)';
  ctx.lineWidth = 1.5;
  ctx.strokeText('FLAPPY DRONE', W/2, 90);
  ctx.shadowColor = '#00d4ff22'; ctx.shadowBlur = 30;
  ctx.strokeText('FLAPPY DRONE', W/2, 90);
  ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
  // Slogan
  ctx.font = "italic 18px 'Courier New', monospace";
  ctx.fillStyle = '#556'; ctx.globalAlpha = 0.7;
  ctx.fillText("Building the drone as we're flying it", W/2, 130);
  ctx.globalAlpha = 1;
  // Drone picker mock
  ctx.font = "10px 'Courier New', monospace";
  ctx.fillStyle = '#00c8f0'; ctx.globalAlpha = 0.7;
  ctx.fillText('◀  PIXEL QUAD  ▶', W/2, 158);
  ctx.globalAlpha = 1;
});

// === FLAP HAPPY ===
addCard('FLAP HAPPY', 'Silly, fun. "Flap" is the action, "Happy" is the vibe. Filled text with bounce.', (ctx) => {
  skyBg(ctx);
  const bounce = Math.sin(tick * 0.04) * 4;
  ctx.font = "900 48px 'Courier New', monospace";
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#c0d0f0'; ctx.globalAlpha = 0.9;
  ctx.fillText('FLAP HAPPY', W/2, 85 + bounce);
  ctx.shadowColor = '#00d4ff44'; ctx.shadowBlur = 25;
  ctx.fillText('FLAP HAPPY', W/2, 85 + bounce);
  ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
  ctx.globalAlpha = 1;
  ctx.font = "italic 16px 'Courier New', monospace";
  ctx.fillStyle = '#445'; ctx.globalAlpha = 0.6;
  ctx.fillText('tap tap tap tap tap', W/2, 128);
  ctx.globalAlpha = 1;
  ctx.font = "10px 'Courier New', monospace";
  ctx.fillStyle = '#00c8f0'; ctx.globalAlpha = 0.7;
  ctx.fillText('◀  PIXEL QUAD  ▶', W/2, 155);
  ctx.globalAlpha = 1;
});

// === BUZZED ===
addCard('BUZZED', 'Short, punchy. Double meaning: drone buzz + being buzzed. Glitchy neon style.', (ctx) => {
  skyBg(ctx);
  ctx.font = "900 56px 'Courier New', monospace";
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  // Glitch offset
  const glitch = Math.random() > 0.92;
  const gx = glitch ? (Math.random() - 0.5) * 4 : 0;
  const gy = glitch ? (Math.random() - 0.5) * 2 : 0;
  // Cyan channel
  ctx.fillStyle = 'rgba(0,200,255,0.15)';
  ctx.fillText('BUZZED', W/2 - 2 + gx, 82 + gy);
  // Main
  ctx.strokeStyle = 'rgba(0,212,255,0.9)';
  ctx.lineWidth = 2;
  ctx.strokeText('BUZZED', W/2, 82);
  ctx.shadowColor = '#00d4ff88'; ctx.shadowBlur = 20;
  ctx.strokeText('BUZZED', W/2, 82);
  ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
  // Subtitle
  ctx.font = "italic 14px 'Courier New', monospace";
  ctx.fillStyle = '#445'; ctx.globalAlpha = 0.6;
  ctx.fillText('a drone thing', W/2, 120);
  ctx.globalAlpha = 1;
  ctx.font = "10px 'Courier New', monospace";
  ctx.fillStyle = '#00c8f0'; ctx.globalAlpha = 0.7;
  ctx.fillText('◀  PIXEL QUAD  ▶', W/2, 150);
  ctx.globalAlpha = 1;
});

// === PROP DROP ===
addCard('PROP DROP', 'Propeller + drop (falling). Rhymes. Retro arcade feel with thicker outline.', (ctx) => {
  skyBg(ctx);
  ctx.font = "900 50px 'Courier New', monospace";
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.strokeStyle = 'rgba(180,190,220,0.85)';
  ctx.lineWidth = 2.5;
  ctx.strokeText('PROP DROP', W/2, 85);
  // Inner fill very faint
  ctx.fillStyle = 'rgba(100,120,180,0.08)';
  ctx.fillText('PROP DROP', W/2, 85);
  ctx.shadowColor = '#4466aa33'; ctx.shadowBlur = 40;
  ctx.strokeText('PROP DROP', W/2, 85);
  ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
  ctx.font = "italic 15px 'Courier New', monospace";
  ctx.fillStyle = '#445'; ctx.globalAlpha = 0.6;
  ctx.fillText("don't look down", W/2, 126);
  ctx.globalAlpha = 1;
  ctx.font = "10px 'Courier New', monospace";
  ctx.fillStyle = '#00c8f0'; ctx.globalAlpha = 0.7;
  ctx.fillText('◀  PIXEL QUAD  ▶', W/2, 155);
  ctx.globalAlpha = 1;
});

// === HOVER BOTHER ===
addCard('HOVER BOTHER', 'Hovering is what drones do. Bothering is what the buildings do. British humour.', (ctx) => {
  skyBg(ctx);
  ctx.font = "700 44px 'Courier New', monospace";
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.strokeStyle = 'rgba(160,180,220,0.75)';
  ctx.lineWidth = 1.5;
  ctx.strokeText('HOVER BOTHER', W/2, 82);
  ctx.shadowColor = '#00d4ff22'; ctx.shadowBlur = 30;
  ctx.strokeText('HOVER BOTHER', W/2, 82);
  ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
  // Subtitle with personality
  ctx.font = "italic 14px 'Courier New', monospace";
  ctx.fillStyle = '#556'; ctx.globalAlpha = 0.6;
  ctx.fillText('an irritating flying game', W/2, 122);
  ctx.globalAlpha = 1;
  ctx.font = "10px 'Courier New', monospace";
  ctx.fillStyle = '#00c8f0'; ctx.globalAlpha = 0.7;
  ctx.fillText('◀  PIXEL QUAD  ▶', W/2, 152);
  ctx.globalAlpha = 1;
});

// === ROTORHEAD ===
addCard('ROTORHEAD', 'Single word, aggressive. Military slang for helicopter pilot. Bold filled style.', (ctx) => {
  skyBg(ctx);
  const pulse = 0.85 + Math.sin(tick * 0.03) * 0.1;
  ctx.font = "900 52px 'Courier New', monospace";
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = `rgba(200,210,240,${pulse})`;
  ctx.fillText('ROTORHEAD', W/2, 85);
  ctx.strokeStyle = 'rgba(100,120,180,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeText('ROTORHEAD', W/2, 85);
  ctx.shadowColor = '#6688cc33'; ctx.shadowBlur = 35;
  ctx.fillText('ROTORHEAD', W/2, 85);
  ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
  ctx.font = "italic 13px 'Courier New', monospace";
  ctx.fillStyle = '#445'; ctx.globalAlpha = 0.5;
  ctx.fillText('fly. crash. repeat.', W/2, 125);
  ctx.globalAlpha = 1;
  ctx.font = "10px 'Courier New', monospace";
  ctx.fillStyle = '#00c8f0'; ctx.globalAlpha = 0.7;
  ctx.fillText('◀  PIXEL QUAD  ▶', W/2, 155);
  ctx.globalAlpha = 1;
});

// === FLAPPY DRONE (refreshed) ===
addCard('FLAPPY DRONE — Refreshed', 'Same name, new style. Thicker stroke, warmer glow, slightly larger. More presence.', (ctx) => {
  skyBg(ctx);
  ctx.font = "900 46px 'Courier New', monospace";
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.strokeStyle = 'rgba(180,195,230,0.85)';
  ctx.lineWidth = 2;
  ctx.strokeText('FLAPPY DRONE', W/2, 85);
  // Warm inner glow
  ctx.shadowColor = 'rgba(100,180,255,0.15)';
  ctx.shadowBlur = 50;
  ctx.strokeText('FLAPPY DRONE', W/2, 85);
  ctx.shadowColor = 'rgba(0,212,255,0.12)';
  ctx.shadowBlur = 20;
  ctx.strokeText('FLAPPY DRONE', W/2, 85);
  ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
  ctx.font = "700 18px 'Courier New', monospace";
  ctx.fillStyle = '#445'; ctx.globalAlpha = 0.7; ctx.letterSpacing = '10px';
  ctx.fillText("Building the drone as we're flying it", W/2, 128);
  ctx.globalAlpha = 1;
  ctx.font = "10px 'Courier New', monospace";
  ctx.fillStyle = '#00c8f0'; ctx.globalAlpha = 0.7;
  ctx.fillText('◀  PIXEL QUAD  ▶', W/2, 158);
  ctx.globalAlpha = 1;
});

// === SKY RAT ===
addCard('SKY RAT', 'What people call pigeons… and drones. Cheeky, memorable. Tight neon outline.', (ctx) => {
  skyBg(ctx);
  ctx.font = "900 58px 'Courier New', monospace";
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.strokeStyle = 'rgba(0,212,255,0.8)';
  ctx.lineWidth = 1.8;
  ctx.strokeText('SKY RAT', W/2, 82);
  ctx.shadowColor = '#00d4ff55'; ctx.shadowBlur = 15;
  ctx.strokeText('SKY RAT', W/2, 82);
  ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
  ctx.font = "italic 15px 'Courier New', monospace";
  ctx.fillStyle = '#556'; ctx.globalAlpha = 0.6;
  ctx.fillText('the city is your obstacle course', W/2, 125);
  ctx.globalAlpha = 1;
  ctx.font = "10px 'Courier New', monospace";
  ctx.fillStyle = '#00c8f0'; ctx.globalAlpha = 0.7;
  ctx.fillText('◀  PIXEL QUAD  ▶', W/2, 155);
  ctx.globalAlpha = 1;
});

function renderAll() {
  tick++;
  canvases.forEach(({ canvas, draw }) => {
    const ctx = canvas.getContext('2d');
    draw(ctx);
  });
  requestAnimationFrame(renderAll);
}
renderAll();
</script>
</body>
</html>
