<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; color: #e0e0e0; font-family: 'SF Mono', 'Menlo', monospace; padding: 20px; }
  h1 { color: #fff; font-size: 20px; margin-bottom: 4px; }
  .sub { color: #888; font-size: 12px; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; max-width: 620px; }
  .card { background: #111122; border: 1px solid #222; border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color 0.2s; }
  .card:hover { border-color: #00c8f0; }
  .card.selected { border-color: #00c8f0; box-shadow: 0 0 12px rgba(0,200,240,0.3); }
  .card canvas { display: block; width: 100%; }
  .card .label { padding: 10px; }
  .card .label h3 { font-size: 13px; color: #fff; margin-bottom: 3px; }
  .card .label p { font-size: 11px; color: #666; line-height: 1.4; }
</style>
</head>
<body>

<h1>WAVE 4 — MORE DRONES</h1>
<p class="sub">4 new concepts at 3x scale. All animated. Click to select.</p>

<div class="grid" id="drones"></div>

<script>
let tick = 0;
const S = 3;
const canvases = [];

function addCard(name, desc, drawFn) {
  const grid = document.getElementById('drones');
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => { grid.querySelectorAll('.card').forEach(c => c.classList.remove('selected')); card.classList.add('selected'); };
  const canvas = document.createElement('canvas');
  canvas.width = 200; canvas.height = 200;
  card.appendChild(canvas);
  const label = document.createElement('div');
  label.className = 'label';
  label.innerHTML = `<h3>${name}</h3><p>${desc}</p>`;
  card.appendChild(label);
  grid.appendChild(card);
  canvases.push({ canvas, draw: drawFn });
}

function skyBg(ctx, w, h) {
  const g = ctx.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0, '#050510'); g.addColorStop(1, '#101030');
  ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i = 0; i < 8; i++) ctx.fillRect(10 + i * 22 + (i * 13 % 9), 8 + (i * 17 % 35), 1, 1);
}

// === Q: BLIMP ===
addCard('Q: Blimp — "ZEPHYR"', 'Small rigid airship. Elongated envelope, gondola underneath, pusher prop, lit windows, gentle bob.', (ctx, w, h) => {
  skyBg(ctx, w, h);
  const bob = Math.sin(tick * 0.03) * 2 * S;
  const x = w / 2, y = h / 2 + bob;

  // Ambient glow underneath
  const glow = ctx.createRadialGradient(x, y + 6 * S, 0, x, y + 6 * S, 12 * S);
  glow.addColorStop(0, 'rgba(255,220,100,0.08)');
  glow.addColorStop(1, 'rgba(255,220,100,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, w, h);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath(); ctx.ellipse(x, y + 14 * S, 10 * S, 1.5 * S, 0, 0, Math.PI * 2); ctx.fill();

  // Main envelope — elongated ellipse
  ctx.fillStyle = '#3a3048';
  ctx.beginPath(); ctx.ellipse(x, y, 16 * S, 6 * S, 0, 0, Math.PI * 2); ctx.fill();

  // Highlight on top
  ctx.fillStyle = '#4a4060';
  ctx.beginPath(); ctx.ellipse(x, y - 1.5 * S, 13 * S, 3.5 * S, 0, 0, Math.PI * 2); ctx.fill();

  // Tail fins
  ctx.fillStyle = '#2a2038';
  // Top fin
  ctx.beginPath();
  ctx.moveTo(x - 14 * S, y - 1 * S);
  ctx.lineTo(x - 18 * S, y - 5 * S);
  ctx.lineTo(x - 16 * S, y - 0.5 * S);
  ctx.closePath(); ctx.fill();
  // Bottom fin
  ctx.beginPath();
  ctx.moveTo(x - 14 * S, y + 1 * S);
  ctx.lineTo(x - 18 * S, y + 5 * S);
  ctx.lineTo(x - 16 * S, y + 0.5 * S);
  ctx.closePath(); ctx.fill();

  // Window row — lit rectangles
  ctx.fillStyle = '#aaccff';
  for (let i = 0; i < 4; i++) {
    ctx.globalAlpha = 0.7 + Math.sin(tick * 0.05 + i) * 0.15;
    ctx.fillRect(x - 4 * S + i * 3 * S, y + 2.5 * S, 1.5 * S, 1 * S);
  }
  ctx.globalAlpha = 1;

  // Tether lines
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x - 2 * S, y + 5.8 * S); ctx.lineTo(x - 2 * S, y + 9 * S);
  ctx.moveTo(x + 3 * S, y + 5.8 * S); ctx.lineTo(x + 3 * S, y + 9 * S);
  ctx.stroke();

  // Gondola
  ctx.fillStyle = '#2a2038';
  ctx.fillRect(x - 3.5 * S, y + 9 * S, 8 * S, 2.5 * S);
  ctx.fillStyle = '#353050';
  ctx.fillRect(x - 3 * S, y + 9.2 * S, 7 * S, 1.8 * S);

  // Pusher prop at rear
  const propAngle = tick * 0.2;
  ctx.save();
  ctx.translate(x - 16.5 * S, y);
  ctx.rotate(propAngle);
  ctx.fillStyle = '#888';
  ctx.fillRect(-0.3 * S, -2.5 * S, 0.6 * S, 5 * S);
  ctx.restore();

  // Nav light on nose
  ctx.fillStyle = tick % 50 < 25 ? '#ff3355' : '#661122';
  ctx.beginPath(); ctx.arc(x + 15.5 * S, y, 0.7 * S, 0, Math.PI * 2); ctx.fill();
});

// === R: MANTIS ===
addCard('R: Mantis — "MANTIS"', 'Insect predator drone. Articulated legs, translucent flutter wings, red compound eyes.', (ctx, w, h) => {
  skyBg(ctx, w, h);
  const x = w / 2, y = h / 2;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath(); ctx.ellipse(x, y + 16 * S, 6 * S, 1.5 * S, 0, 0, Math.PI * 2); ctx.fill();

  // Wings (behind body) — translucent, rapid flutter
  const flutter = Math.sin(tick * 0.35) * 0.3;
  ctx.save();
  ctx.globalAlpha = 0.18 + Math.abs(Math.sin(tick * 0.35)) * 0.1;
  // Left wing
  ctx.fillStyle = '#88cc88';
  ctx.beginPath();
  ctx.moveTo(x - 1 * S, y - 2 * S);
  ctx.quadraticCurveTo(x - 12 * S, y - 12 * S - flutter * 15, x - 8 * S, y - 3 * S);
  ctx.closePath(); ctx.fill();
  // Right wing
  ctx.beginPath();
  ctx.moveTo(x + 1 * S, y - 2 * S);
  ctx.quadraticCurveTo(x + 12 * S, y - 12 * S + flutter * 15, x + 8 * S, y - 3 * S);
  ctx.closePath(); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.restore();

  // Wing veins
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = '#66aa66';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(x - 1 * S, y - 2 * S); ctx.lineTo(x - 10 * S, y - 10 * S);
  ctx.moveTo(x + 1 * S, y - 2 * S); ctx.lineTo(x + 10 * S, y - 10 * S);
  ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.restore();

  // Abdomen — tapering behind
  ctx.fillStyle = '#2a3a2a';
  ctx.beginPath();
  ctx.moveTo(x - 2 * S, y + 2 * S);
  ctx.lineTo(x + 2 * S, y + 2 * S);
  ctx.lineTo(x + 1 * S, y + 9 * S);
  ctx.lineTo(x - 1 * S, y + 9 * S);
  ctx.closePath(); ctx.fill();
  // Abdomen tip
  ctx.fillStyle = '#1a2a1a';
  ctx.beginPath();
  ctx.moveTo(x - 1 * S, y + 9 * S);
  ctx.lineTo(x + 1 * S, y + 9 * S);
  ctx.lineTo(x, y + 12 * S);
  ctx.closePath(); ctx.fill();

  // Thorax body
  ctx.fillStyle = '#2a3a2a';
  ctx.beginPath(); ctx.ellipse(x, y, 3 * S, 3.5 * S, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#4a5a3a';
  ctx.beginPath(); ctx.ellipse(x, y - 0.5 * S, 2.2 * S, 2.5 * S, 0, 0, Math.PI * 2); ctx.fill();

  // Head — angular
  ctx.fillStyle = '#2a3a2a';
  ctx.beginPath();
  ctx.moveTo(x - 2.5 * S, y - 3 * S);
  ctx.lineTo(x + 2.5 * S, y - 3 * S);
  ctx.lineTo(x + 1.5 * S, y - 6 * S);
  ctx.lineTo(x - 1.5 * S, y - 6 * S);
  ctx.closePath(); ctx.fill();

  // Red eyes
  ctx.fillStyle = '#ff2233';
  ctx.beginPath(); ctx.arc(x - 1.2 * S, y - 4.5 * S, 0.6 * S, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 1.2 * S, y - 4.5 * S, 0.6 * S, 0, Math.PI * 2); ctx.fill();
  // Eye glow
  ctx.fillStyle = 'rgba(255,34,51,0.3)';
  ctx.beginPath(); ctx.arc(x - 1.2 * S, y - 4.5 * S, 1.2 * S, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 1.2 * S, y - 4.5 * S, 1.2 * S, 0, Math.PI * 2); ctx.fill();

  // 4 articulated legs hanging down with sway
  ctx.strokeStyle = '#4a5a3a';
  ctx.lineWidth = 1.2;
  for (let side = -1; side <= 1; side += 2) {
    for (let pair = 0; pair < 2; pair++) {
      const legX = x + side * (1.5 + pair * 2) * S;
      const sway = Math.sin(tick * 0.06 + pair * 1.5 + side) * 1.5 * S;
      const jointY = y + 4 * S;
      const footY = y + 10 * S + pair * S;

      ctx.beginPath();
      ctx.moveTo(legX, y + 1 * S);
      ctx.lineTo(legX + sway * 0.5, jointY);
      ctx.stroke();

      // Joint dot
      ctx.fillStyle = '#5a6a4a';
      ctx.beginPath(); ctx.arc(legX + sway * 0.5, jointY, 0.5 * S, 0, Math.PI * 2); ctx.fill();

      ctx.beginPath();
      ctx.moveTo(legX + sway * 0.5, jointY);
      ctx.lineTo(legX + sway, footY);
      ctx.strokeStyle = '#4a5a3a';
      ctx.stroke();
    }
  }
});

// === S: TANDEM ===
addCard('S: Tandem — "WARHORSE"', 'Twin-rotor tandem helicopter. Chinook-style, cargo door, military olive drab, red blinker.', (ctx, w, h) => {
  skyBg(ctx, w, h);
  const x = w / 2, y = h / 2;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath(); ctx.ellipse(x, y + 16 * S, 12 * S, 2 * S, 0, 0, Math.PI * 2); ctx.fill();

  // Landing skids
  ctx.strokeStyle = '#3a3a2a';
  ctx.lineWidth = 1.5;
  // Left skid
  ctx.beginPath();
  ctx.moveTo(x - 10 * S, y + 6 * S); ctx.lineTo(x - 10 * S, y + 9 * S);
  ctx.lineTo(x + 10 * S, y + 9 * S); ctx.lineTo(x + 10 * S, y + 6 * S);
  ctx.stroke();
  // Right skid
  ctx.beginPath();
  ctx.moveTo(x - 8 * S, y + 6 * S); ctx.lineTo(x - 8 * S, y + 9 * S);
  ctx.lineTo(x + 8 * S, y + 9 * S); ctx.lineTo(x + 8 * S, y + 6 * S);
  ctx.stroke();
  // Skid rails
  ctx.fillStyle = '#2a2a1a';
  ctx.fillRect(x - 11 * S, y + 8.5 * S, 22 * S, 1 * S);
  ctx.fillRect(x - 9 * S, y + 8.5 * S, 18 * S, 1 * S);

  // Body — elongated rect with rounded ends
  ctx.fillStyle = '#3a3a2a';
  ctx.beginPath();
  ctx.moveTo(x - 11 * S, y - 1 * S);
  ctx.lineTo(x + 11 * S, y - 1 * S);
  ctx.quadraticCurveTo(x + 13 * S, y + 2.5 * S, x + 11 * S, y + 6 * S);
  ctx.lineTo(x - 11 * S, y + 6 * S);
  ctx.quadraticCurveTo(x - 13 * S, y + 2.5 * S, x - 11 * S, y - 1 * S);
  ctx.closePath(); ctx.fill();

  // Body highlight
  ctx.fillStyle = '#4a4a3a';
  ctx.fillRect(x - 10 * S, y, 20 * S, 3 * S);

  // Rotor masts
  ctx.fillStyle = '#2a2a1a';
  ctx.fillRect(x + 7 * S, y - 4 * S, 1.5 * S, 3.5 * S);
  ctx.fillRect(x - 8.5 * S, y - 4 * S, 1.5 * S, 3.5 * S);

  // Front rotor disc (right side in our view)
  const spin1 = tick * 0.15;
  ctx.save();
  ctx.translate(x + 8 * S, y - 4 * S);
  ctx.rotate(spin1);
  ctx.fillStyle = 'rgba(120,120,100,0.6)';
  ctx.fillRect(-10 * S, -0.4 * S, 20 * S, 0.8 * S);
  ctx.rotate(Math.PI / 2);
  ctx.fillRect(-10 * S, -0.4 * S, 20 * S, 0.8 * S);
  ctx.restore();

  // Rear rotor disc (left side, offset phase)
  const spin2 = tick * 0.15 + Math.PI / 4;
  ctx.save();
  ctx.translate(x - 8 * S, y - 4 * S);
  ctx.rotate(spin2);
  ctx.fillStyle = 'rgba(120,120,100,0.6)';
  ctx.fillRect(-10 * S, -0.4 * S, 20 * S, 0.8 * S);
  ctx.rotate(Math.PI / 2);
  ctx.fillRect(-10 * S, -0.4 * S, 20 * S, 0.8 * S);
  ctx.restore();

  // Rotor hubs
  ctx.fillStyle = '#555';
  ctx.beginPath(); ctx.arc(x + 8 * S, y - 4 * S, 1 * S, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x - 8 * S, y - 4 * S, 1 * S, 0, Math.PI * 2); ctx.fill();

  // Cargo door marking at rear (left side)
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 0.8;
  ctx.strokeRect(x - 11 * S, y + 1 * S, 3 * S, 4 * S);
  // Door hinge lines
  ctx.beginPath();
  ctx.moveTo(x - 11 * S, y + 3 * S); ctx.lineTo(x - 8 * S, y + 3 * S);
  ctx.stroke();

  // Windows
  ctx.fillStyle = '#556655';
  ctx.fillRect(x - 3 * S, y + 0.2 * S, 1.5 * S, 1.2 * S);
  ctx.fillRect(x + 1 * S, y + 0.2 * S, 1.5 * S, 1.2 * S);
  ctx.fillRect(x + 5 * S, y + 0.2 * S, 1.5 * S, 1.2 * S);

  // Red blinker on top
  const blink = tick % 40 < 20;
  ctx.fillStyle = blink ? '#ff2233' : '#551111';
  ctx.beginPath(); ctx.arc(x, y - 1.5 * S, 0.8 * S, 0, Math.PI * 2); ctx.fill();
  if (blink) {
    ctx.fillStyle = 'rgba(255,34,51,0.2)';
    ctx.beginPath(); ctx.arc(x, y - 1.5 * S, 2.5 * S, 0, Math.PI * 2); ctx.fill();
  }
});

// === T: GYRO ===
addCard('T: Gyro — "WHIRLYBIRD"', 'Autogyro with overhead rotor on mast, pusher prop, tail boom, blue canopy, wheel gear.', (ctx, w, h) => {
  skyBg(ctx, w, h);
  const x = w / 2, y = h / 2 + 2 * S;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath(); ctx.ellipse(x, y + 14 * S, 8 * S, 1.5 * S, 0, 0, Math.PI * 2); ctx.fill();

  // Tail boom
  ctx.fillStyle = '#3a3a4a';
  ctx.fillRect(x - 14 * S, y - 0.5 * S, 11 * S, 1.2 * S);

  // Vertical stabilizer at tail
  ctx.fillStyle = '#2a2a3a';
  ctx.beginPath();
  ctx.moveTo(x - 14 * S, y - 0.5 * S);
  ctx.lineTo(x - 15 * S, y - 4 * S);
  ctx.lineTo(x - 12.5 * S, y - 0.5 * S);
  ctx.closePath(); ctx.fill();

  // Horizontal stabilizer
  ctx.fillStyle = '#2a2a3a';
  ctx.beginPath();
  ctx.moveTo(x - 14.5 * S, y + 0.3 * S);
  ctx.lineTo(x - 16 * S, y + 2 * S);
  ctx.lineTo(x - 12 * S, y + 0.3 * S);
  ctx.closePath(); ctx.fill();

  // Fuselage pod — rounded rect
  ctx.fillStyle = '#3a3a4a';
  ctx.beginPath();
  ctx.moveTo(x - 3 * S, y - 3 * S);
  ctx.quadraticCurveTo(x + 6 * S, y - 4 * S, x + 6 * S, y);
  ctx.quadraticCurveTo(x + 6 * S, y + 4 * S, x - 3 * S, y + 3.5 * S);
  ctx.lineTo(x - 3 * S, y - 3 * S);
  ctx.closePath(); ctx.fill();

  // Body highlight
  ctx.fillStyle = '#4a4a5a';
  ctx.beginPath();
  ctx.moveTo(x - 2 * S, y - 2 * S);
  ctx.quadraticCurveTo(x + 5 * S, y - 3 * S, x + 5 * S, y);
  ctx.quadraticCurveTo(x + 5 * S, y + 3 * S, x - 2 * S, y + 2.5 * S);
  ctx.lineTo(x - 2 * S, y - 2 * S);
  ctx.closePath(); ctx.fill();

  // Blue canopy
  ctx.fillStyle = '#3366aa';
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.moveTo(x + 1 * S, y - 2.5 * S);
  ctx.quadraticCurveTo(x + 5.5 * S, y - 3 * S, x + 5.5 * S, y - 0.5 * S);
  ctx.lineTo(x + 1 * S, y - 0.5 * S);
  ctx.closePath(); ctx.fill();
  ctx.globalAlpha = 1;

  // Canopy glint
  ctx.fillStyle = 'rgba(100,180,255,0.3)';
  ctx.fillRect(x + 3 * S, y - 2.2 * S, 1 * S, 0.5 * S);

  // Rotor mast
  ctx.fillStyle = '#555';
  ctx.fillRect(x + 0.5 * S, y - 9 * S, 0.8 * S, 6 * S);

  // Overhead rotor — spinning slower, slightly skewed
  const rotorAngle = tick * 0.08;
  ctx.save();
  ctx.translate(x + 1 * S, y - 9 * S);
  ctx.transform(1, 0, -0.15, 1, 0, 0); // slight skew
  ctx.rotate(rotorAngle);
  ctx.fillStyle = 'rgba(150,150,160,0.5)';
  ctx.fillRect(-12 * S, -0.4 * S, 24 * S, 0.8 * S);
  ctx.rotate(Math.PI / 3);
  ctx.fillRect(-12 * S, -0.4 * S, 24 * S, 0.8 * S);
  ctx.rotate(Math.PI / 3);
  ctx.fillRect(-12 * S, -0.4 * S, 24 * S, 0.8 * S);
  ctx.restore();

  // Rotor hub
  ctx.fillStyle = '#777';
  ctx.beginPath(); ctx.arc(x + 1 * S, y - 9 * S, 0.8 * S, 0, Math.PI * 2); ctx.fill();

  // Pusher prop at rear
  const pushSpin = tick * 0.3;
  ctx.save();
  ctx.translate(x - 3.5 * S, y);
  ctx.rotate(pushSpin);
  ctx.fillStyle = '#999';
  ctx.fillRect(-0.3 * S, -2 * S, 0.6 * S, 4 * S);
  ctx.restore();

  // Wheel landing gear
  ctx.fillStyle = '#222';
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  // Wheel struts
  ctx.beginPath();
  ctx.moveTo(x + 1 * S, y + 3 * S); ctx.lineTo(x - 1 * S, y + 7 * S);
  ctx.moveTo(x + 1 * S, y + 3 * S); ctx.lineTo(x + 4 * S, y + 7 * S);
  ctx.stroke();
  // Wheels
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(x - 1 * S, y + 7.5 * S, 1.2 * S, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 4 * S, y + 7.5 * S, 1.2 * S, 0, Math.PI * 2); ctx.fill();
  // Wheel hubs
  ctx.fillStyle = '#555';
  ctx.beginPath(); ctx.arc(x - 1 * S, y + 7.5 * S, 0.4 * S, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 4 * S, y + 7.5 * S, 0.4 * S, 0, Math.PI * 2); ctx.fill();

  // Nav light
  ctx.fillStyle = tick % 45 < 22 ? '#ff3355' : '#661122';
  ctx.beginPath(); ctx.arc(x - 14.5 * S, y - 3 * S, 0.5 * S, 0, Math.PI * 2); ctx.fill();
});

// === Animation Loop ===
function animate() {
  tick++;
  canvases.forEach(({ canvas, draw }) => {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    draw(ctx, canvas.width, canvas.height);
  });
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
