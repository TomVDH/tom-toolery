<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a18; color: #e0e0e0; font-family: 'SF Mono', 'Menlo', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
  h1 { color: #fff; font-size: 20px; margin-bottom: 4px; }
  .sub { color: #888; font-size: 12px; margin-bottom: 16px; }
  canvas { border: 2px solid #1a1a3a; border-radius: 14px; box-shadow: 0 0 80px #00d4ff08, 0 8px 40px #00000090; }
  .controls { margin-top: 16px; display: flex; gap: 10px; }
  button { background: #151528; border: 1px solid #ff4400; color: #ff8844; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; font-family: inherit; }
  button:hover { background: #1a0800; }
  .timer { color: #666; font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>

<h1>Tsar Bomba — Stacked Disc Cap</h1>
<p class="sub">Mushroom cap built from stacked tapering discs. Full 620x640. 11s timeline.</p>

<canvas id="c" width="620" height="640"></canvas>
<div class="controls">
  <button onclick="detonate()">DETONATE</button>
  <button onclick="detonate()" style="border-color:#334; color:#aab;">RESTART</button>
</div>
<div class="timer" id="timer">Ready</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 620, H = 640, TOTAL = 11000;
const GX = W/2, GY = H * 0.78;
const timerEl = document.getElementById('timer');

let nukeActive = false, nukeStart = 0;

// Stars
const stars = [];
for (let i = 0; i < 40; i++) stars.push({ x: Math.random()*W, y: Math.random()*H*0.5, r: 0.4+Math.random()*1.3, tw: Math.random()*6.28, sp: 0.5+Math.random()*2 });

// Clouds
const skyClouds = [];
for (let i = 0; i < 5; i++) skyClouds.push({ x: 50+Math.random()*(W-100), y: 70+Math.random()*110, w: 50+Math.random()*70, h: 7+Math.random()*9 });

// City
const city = [];
for (let x = 0; x < W; x += 14+Math.random()*12) city.push({ x, w: 12+Math.random()*16, h: 35+Math.random()*80 });

// Embers + ash
const embers = [], ash = [], shrapnel = [];

function lerp(a,b,t){ return a+(b-a)*t; }
function clamp(v,mn,mx){ return Math.max(mn,Math.min(mx,v)); }
function easeOut(t){ return 1-Math.pow(1-t,3); }

function detonate(){
  nukeActive = true;
  nukeStart = performance.now();
  embers.length = 0; ash.length = 0; shrapnel.length = 0;
  for (let i = 0; i < 35; i++) {
    const a = Math.random()*Math.PI*2, sp = 3+Math.random()*6;
    shrapnel.push({ x:GX, y:GY, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-2, life:20+Math.random()*20, maxLife:40 });
  }
}

function frame(now) {
  requestAnimationFrame(frame);
  const el = nukeActive ? now - nukeStart : -1;
  if (nukeActive && el > TOTAL) { nukeActive = false; timerEl.textContent = 'Complete'; }
  if (nukeActive) timerEl.textContent = (el/1000).toFixed(1) + 's / 11.0s';

  // Shake
  let shX = 0, shY = 0;
  if (nukeActive) {
    let amp = 0;
    if (el < 3000) amp = 12*(1-el/3000);
    if (el > 1500 && el < 2200) amp += 8*(1-(el-1500)/700);
    shX = (Math.random()-0.5)*2*Math.min(10, amp);
    shY = (Math.random()-0.5)*2*Math.min(10, amp);
  }

  ctx.save();
  ctx.translate(shX, shY);

  // === SKY ===
  let sb = 0;
  if (nukeActive) {
    if (el < 300) sb = 1;
    else if (el < 2000) sb = 0.85*(1-(el-300)/1700);
    else if (el < 6000) sb = 0.2*(1-(el-2000)/4000);
  }
  ctx.fillStyle = `rgb(${10+sb*245|0},${10+sb*230|0},${20+sb*180|0})`;
  ctx.fillRect(-20,-20,W+40,H+40);

  // Stars
  const sa = clamp(1-sb*4,0,1);
  if (sa > 0.01) {
    stars.forEach(s => {
      ctx.globalAlpha = sa*(0.5+0.5*Math.sin(now*0.001*s.sp+s.tw))*0.8;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  // Sky clouds
  skyClouds.forEach(c => {
    ctx.globalAlpha = 0.12; ctx.fillStyle = '#556';
    ctx.beginPath(); ctx.ellipse(c.x,c.y,c.w/2,c.h/2,0,0,Math.PI*2); ctx.fill();
    if (nukeActive && el < 6000) {
      const lt = el<500 ? el/500 : (el<4000 ? 1 : 1-(el-4000)/2000);
      const la = clamp(lt,0,1)*0.5;
      if (la > 0.01) { ctx.globalAlpha = la; ctx.fillStyle = 'rgba(255,180,60,0.6)'; ctx.beginPath(); ctx.ellipse(c.x,c.y+c.h*0.2,c.w/2,c.h/2,0,0,Math.PI*2); ctx.fill(); }
    }
    ctx.globalAlpha = 1;
  });

  // =============================================
  // === TSAR BOMBA — STACKED DISC MUSHROOM CAP
  // =============================================
  if (nukeActive && el > 100) {
    const cloudT = Math.min(1, (el-100)/3000);
    const fadeT = el > 9000 ? Math.min(1,(el-9000)/2000) : 0;
    const darkT = el > 2000 ? Math.min(1,(el-2000)/2500) : 0;
    const outerDarkT = el > 3500 ? Math.min(1,(el-3500)/2500) : 0;
    const alpha = (1-fadeT)*0.9;

    if (alpha > 0.01) {
      ctx.globalAlpha = alpha;
      const rise = easeOut(Math.min(1, cloudT*1.5));
      const drift = Math.min(1, el/TOTAL)*H*0.06;
      const cy = GY - rise*(H*0.42) - drift;
      const cg = Math.min(1, cloudT*2);

      // Tsar scale
      const maxCapR = 95 * cg;          // max vertical radius of dome
      const maxCapRx = maxCapR * 1.7;   // max horizontal radius
      const stemTopW = 16 + cg*14;
      const stemBaseW = 30 + cg*35;
      const hS = darkT*18, lD = darkT*35;
      const outerHS = outerDarkT*18, outerLD = outerDarkT*35;

      // === Ground debris cloud ===
      const debR = stemBaseW*1.8*cg, debA = alpha*Math.max(0,1-darkT*0.5);
      if (debA > 0.01) {
        const dg = ctx.createRadialGradient(GX,GY,0,GX,GY,debR);
        dg.addColorStop(0,`hsla(25,80%,${Math.max(8,35-lD)}%,${debA*0.6})`);
        dg.addColorStop(0.5,`hsla(18,60%,${Math.max(5,20-lD)}%,${debA*0.3})`);
        dg.addColorStop(1,'hsla(15,50%,15%,0)');
        ctx.fillStyle = dg; ctx.beginPath(); ctx.ellipse(GX,GY,debR,debR*0.25,0,0,Math.PI*2); ctx.fill();
      }

      // === Base glow ===
      const bgR = maxCapRx*2.5, bgA = alpha*Math.max(0,1-darkT*0.6);
      const bg = ctx.createRadialGradient(GX,GY,0,GX,GY,bgR);
      bg.addColorStop(0,`hsla(38,100%,75%,${bgA*0.85})`);
      bg.addColorStop(0.12,`hsla(30,100%,55%,${bgA*0.45})`);
      bg.addColorStop(0.35,`hsla(22,100%,35%,${bgA*0.12})`);
      bg.addColorStop(1,'hsla(15,100%,20%,0)');
      ctx.fillStyle = bg; ctx.beginPath(); ctx.arc(GX,GY,bgR,0,Math.PI*2); ctx.fill();

      // === Turbulent stem ===
      const stemTop = cy + maxCapR*0.25;
      const stemGrad = ctx.createLinearGradient(GX,stemTop,GX,GY);
      stemGrad.addColorStop(0,`hsla(${25-hS},90%,${Math.max(10,45-lD)}%,${alpha})`);
      stemGrad.addColorStop(0.4,`hsla(${20-hS},85%,${Math.max(8,35-lD)}%,${alpha})`);
      stemGrad.addColorStop(1,`hsla(${15-hS},70%,${Math.max(5,25-lD)}%,${alpha})`);
      ctx.fillStyle = stemGrad;
      ctx.beginPath();
      const segs = 18;
      ctx.moveTo(GX-stemTopW/2, stemTop);
      for (let s=0;s<=segs;s++) {
        const t=s/segs, y=stemTop+(GY-stemTop)*t;
        const bw=stemTopW/2+(stemBaseW/2-stemTopW/2)*t;
        ctx.lineTo(GX-bw-Math.sin(t*12+el*0.003)*2.5-Math.sin(t*7+el*0.005)*1.5, y);
      }
      for (let s=segs;s>=0;s--) {
        const t=s/segs, y=stemTop+(GY-stemTop)*t;
        const bw=stemTopW/2+(stemBaseW/2-stemTopW/2)*t;
        ctx.lineTo(GX+bw+Math.sin(t*12+el*0.003+3)*2.5+Math.sin(t*7+el*0.005+2)*1.5, y);
      }
      ctx.closePath(); ctx.fill();

      // Hot stem center line
      const scA = alpha*Math.max(0,0.4-darkT*0.3);
      if (scA > 0.01) {
        const sc = ctx.createLinearGradient(GX,stemTop,GX,GY);
        sc.addColorStop(0,`hsla(35,100%,60%,${scA})`);
        sc.addColorStop(1,`hsla(20,100%,40%,${scA*0.3})`);
        ctx.fillStyle = sc;
        ctx.beginPath();
        ctx.moveTo(GX-stemTopW*0.15,stemTop); ctx.lineTo(GX-stemBaseW*0.1,GY);
        ctx.lineTo(GX+stemBaseW*0.1,GY); ctx.lineTo(GX+stemTopW*0.15,stemTop);
        ctx.closePath(); ctx.fill();
      }

      // === Cap glow halo ===
      const glR = maxCapRx*3;
      const gg = ctx.createRadialGradient(GX,cy,maxCapR*0.15,GX,cy,glR);
      gg.addColorStop(0,`hsla(32,100%,${Math.max(18,65-lD*2)}%,${alpha*0.5})`);
      gg.addColorStop(0.3,`hsla(26,100%,${Math.max(12,50-lD*2)}%,${alpha*0.25})`);
      gg.addColorStop(0.6,`hsla(20,100%,${Math.max(8,35-lD*2)}%,${alpha*0.08})`);
      gg.addColorStop(1,'hsla(15,100%,25%,0)');
      ctx.fillStyle = gg; ctx.beginPath(); ctx.arc(GX,cy,glR,0,Math.PI*2); ctx.fill();

      // ======================================================
      // === STACKED DISC CAP — the key innovation ===
      // Build the dome from ~20 thin disc ellipses stacked vertically
      // Each disc gets narrower as we go up, forming a dome profile
      // ======================================================
      const numDiscs = 22;
      const capAlpha = Math.min(1, alpha * 1.1);

      for (let d = 0; d < numDiscs; d++) {
        const t = d / (numDiscs - 1); // 0 = bottom, 1 = top

        // Dome profile: width tapers following a circular arc
        // At bottom (t=0): full width. At top (t=1): 0 width
        const domeShape = Math.sqrt(1 - t*t); // circular cross-section
        const discRx = maxCapRx * 1.15 * domeShape;
        const discRy = maxCapR / numDiscs * 1.3; // slight overlap between discs

        // Y position: bottom of dome to top
        const discY = cy + maxCapR*0.5 - t * maxCapR * 1.1;

        if (discRx < 2) continue; // skip tiny top discs

        // Colour: bottom discs are darker/redder, top discs brighter/yellower
        // Use delayed darkening for outer (bottom) discs
        const isOuter = t < 0.4;
        const dH = isOuter ? outerHS : hS;
        const dL = isOuter ? outerLD : lD;

        // Hue: 12 (red-orange) at bottom → 42 (yellow-orange) at top
        const hue = lerp(15, 42, t) - dH;
        // Luminance: bright throughout — 35% at bottom → 70% at top
        const baseLum = lerp(38, 72, t);
        const lum = Math.max(10, baseLum - dL * (isOuter ? 0.5 : 0.7));
        // Saturation: high throughout
        const sat = lerp(85, 100, t);

        ctx.fillStyle = `hsla(${hue},${sat}%,${lum}%,${capAlpha})`;
        ctx.beginPath();
        ctx.ellipse(GX, discY, discRx, discRy, 0, 0, Math.PI*2);
        ctx.fill();
      }

      // === Hot core glow at center of dome ===
      const coreDark = el > 6500 ? Math.min(1,(el-6500)/2500) : 0;
      const coreA = capAlpha * Math.max(0.15, 1-coreDark);
      ctx.fillStyle = `hsla(45,100%,${Math.max(30,80-lD)}%,${coreA})`;
      ctx.beginPath(); ctx.ellipse(GX, cy-maxCapR*0.05, maxCapRx*0.3, maxCapR*0.3, 0, 0, Math.PI*2); ctx.fill();

      // White-hot inner fireball
      if (el < 3500) {
        const wa = Math.min(1,(1-Math.max(0,el-500)/3000))*capAlpha;
        ctx.fillStyle = `rgba(255,255,230,${wa*0.85})`;
        ctx.beginPath(); ctx.ellipse(GX, cy-maxCapR*0.03, maxCapRx*0.18, maxCapR*0.18, 0, 0, Math.PI*2); ctx.fill();
        if (el < 1200) {
          const iwa = (1-el/1200)*capAlpha;
          ctx.fillStyle = `rgba(255,255,255,${iwa})`;
          ctx.beginPath(); ctx.ellipse(GX, cy-maxCapR*0.03, maxCapRx*0.1, maxCapR*0.1, 0, 0, Math.PI*2); ctx.fill();
        }
      }

      // === Base ring disc — OVER everything ===
      ctx.fillStyle = `hsla(${20-hS},80%,${Math.max(8,35-lD)}%,${alpha*0.7})`;
      ctx.beginPath(); ctx.ellipse(GX, cy+maxCapR*0.55, maxCapRx*1.2, maxCapR*0.2, 0, 0, Math.PI*2); ctx.fill();

      // === Rolling side clouds — over cap, hugging stem ===
      if (cg > 0.2) {
        const rollT = Math.min(1,(cg-0.2)/0.8);
        const rollR = maxCapR*0.28*rollT;
        const rollY = cy + maxCapR*0.4;
        const rollSpread = stemTopW*0.8 + rollR*0.5;
        const rDH = hS, rDL = lD*0.7;
        for (let side = -1; side <= 1; side += 2) {
          const rx = GX + side*rollSpread;
          ctx.fillStyle = `hsla(${20-rDH},75%,${Math.max(8,30-rDL)}%,${alpha*0.55})`;
          ctx.beginPath(); ctx.ellipse(rx, rollY, rollR*1.1, rollR*0.7, 0, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = `hsla(${26-rDH},90%,${Math.max(12,40-rDL)}%,${alpha*0.4})`;
          ctx.beginPath(); ctx.ellipse(rx, rollY-rollR*0.1, rollR*0.65, rollR*0.45, 0, 0, Math.PI*2); ctx.fill();
        }
      }

      // === Concentric cloud bands — wide, wrapping around dome ===
      const bn = el/1000;
      for (let i = 0; i < 6; i++) {
        const eT = 0.12+i*0.12;
        if (cloudT < eT) continue;
        const bA = Math.min(1,(cloudT-eT)/0.35), t01 = i/5;
        const fY = cy - maxCapR*(0.6-t01*1.1);
        const sY = cy + maxCapR*0.5;
        const bY = sY+(fY-sY)*bA + Math.sin(bn*(0.4+i*0.2)+i*2.3)*maxCapR*0.025;
        // Width matches dome profile at this Y level
        const bandDomeT = clamp((cy+maxCapR*0.5-bY)/(maxCapR*1.1), 0, 1);
        const bandDome = Math.sqrt(1-bandDomeT*bandDomeT);
        const wY = maxCapRx*1.15*bandDome*bA;
        const fd = (0.6+t01*0.4)*bA;
        const pl = 0.3+0.1*Math.sin(bn*(1.2+i*0.4)+i*1.7);
        const bandAlpha = alpha*pl*fd;
        const bandL = Math.max(8,(40-i*3)-lD);
        const bandH = 22-hS+i*3;
        const s1 = maxCapR*0.04*Math.sin(bn*(0.6+i*0.3)+i);
        const s2 = maxCapR*0.03*Math.sin(bn*(0.5+i*0.2)+i+1.5);
        ctx.strokeStyle = `hsla(${bandH},75%,${bandL}%,${bandAlpha})`;
        ctx.lineWidth = (3+t01*2.5)*bA;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(GX-wY, bY);
        ctx.quadraticCurveTo(GX-wY*0.35, bY+s1, GX, bY+s2);
        ctx.quadraticCurveTo(GX+wY*0.35, bY-s1, GX+wY, bY);
        ctx.stroke();
      }

      ctx.globalAlpha = 1;
    }
  }

  // === Shockwave ===
  if (nukeActive && el>200 && el<2000) {
    const st=(el-200)/1800, r=st*Math.max(W,H)*0.9;
    ctx.globalAlpha=(1-st)*0.35; ctx.strokeStyle='rgba(255,200,100,0.6)'; ctx.lineWidth=3+(1-st)*10;
    ctx.beginPath(); ctx.arc(GX,GY,r,0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1;
  }

  // === City ===
  ctx.fillStyle='#0a0a18'; ctx.fillRect(0,GY,W,H-GY);
  city.forEach(b => {
    ctx.fillStyle='#0c0c1a'; ctx.fillRect(b.x,GY-b.h,b.w,b.h);
    for (let wy=GY-b.h+5;wy<GY-6;wy+=10)
      for (let wx=b.x+2;wx<b.x+b.w-4;wx+=6) {
        const on=Math.sin(b.x*3.7+wy*2.1+wx)>0.2;
        ctx.fillStyle=on?'rgba(255,200,60,0.5)':'rgba(255,200,60,0.04)';
        ctx.fillRect(wx,wy,4,5);
      }
  });
  // Rim light
  if (nukeActive && el<7000) {
    const rt=el<500?el/500:(el<5000?1:1-(el-5000)/2000), ra=clamp(rt,0,1)*0.5;
    if (ra>0.01) {
      ctx.strokeStyle=`rgba(255,160,40,${ra})`; ctx.lineWidth=1;
      city.forEach(b => { ctx.beginPath(); ctx.moveTo(b.x,GY-b.h); ctx.lineTo(b.x+b.w,GY-b.h); ctx.stroke(); });
    }
  }

  // === Particles ===
  // Spawn embers from base ring
  if (nukeActive && el>600 && el<6000 && embers.length<80) {
    const eCloudT=Math.min(1,(el-100)/3000), eRise=easeOut(Math.min(1,eCloudT*1.5));
    const eDrift=Math.min(1,el/TOTAL)*H*0.06, eCY=GY-eRise*(H*0.42)-eDrift;
    const eCG=Math.min(1,eCloudT*2), eCapR=95*eCG, eCapRx=eCapR*1.7;
    const ringY=eCY+eCapR*0.55, ringW=eCapRx*1.2;
    for (let i=0;i<2;i++) {
      embers.push({ x:GX+(Math.random()-0.5)*2*ringW, y:ringY+Math.random()*8,
        vx:(Math.random()-0.5)*0.8, vy:0.3+Math.random()*0.6,
        life:120+Math.random()*180, maxLife:300, r:1+Math.random()*2, hue:15+Math.random()*30 });
    }
  }
  // Ash
  if (nukeActive && el>3000 && el<8000 && ash.length<40 && Math.random()<0.15) {
    ash.push({ x:Math.random()*W, y:-10, vx:(Math.random()-0.5)*0.5, vy:0.3+Math.random()*0.8,
      life:200+Math.random()*200, maxLife:400, r:0.5+Math.random()*1.5 });
  }

  // Draw shrapnel
  shrapnel.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.05; p.life--;
    if (p.life>0) { const a=p.life/p.maxLife; ctx.globalAlpha=a; ctx.strokeStyle=`rgba(255,180,60,${a})`;
      ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x-p.vx*2,p.y-p.vy*2); ctx.stroke(); }
  });
  // Draw embers
  embers.forEach(p => {
    p.x+=p.vx+Math.sin(p.life*0.02+p.x*0.01)*0.15; p.y+=p.vy; p.life--;
    if (p.life>0) { const a=p.life/p.maxLife*0.8; ctx.globalAlpha=a;
      ctx.fillStyle=`hsl(${p.hue},100%,${50+a*20}%)`; ctx.shadowColor=`hsl(${p.hue},100%,50%)`; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*(0.5+a*0.5),0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0; }
  });
  // Draw ash
  ash.forEach(p => {
    p.x+=p.vx+Math.sin(p.life*0.02)*0.3; p.y+=p.vy; p.life--;
    if (p.life>0) { ctx.globalAlpha=Math.min(1,p.life/p.maxLife)*0.4; ctx.fillStyle='#888';
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); }
  });
  ctx.globalAlpha=1;

  // Cleanup
  for (const arr of [shrapnel,embers,ash]) for (let i=arr.length-1;i>=0;i--) if(arr[i].life<=0) arr.splice(i,1);

  // === Overlays ===
  // White flash
  if (nukeActive && el<300) { ctx.globalAlpha=(1-(el/300)**2)*0.95; ctx.fillStyle='#fff'; ctx.fillRect(-20,-20,W+40,H+40); ctx.globalAlpha=1; }

  // Warm glow overlay
  if (nukeActive && el<8000) {
    const lt=el/8000, int=(1-lt*lt)*0.55;
    const cT2=Math.min(1,(el-100)/3000), re2=easeOut(Math.min(1,cT2*1.5)), dr2=Math.min(1,el/TOTAL)*H*0.06;
    const ccy=GY-re2*(H*0.42)-dr2;
    const rg=ctx.createRadialGradient(GX,ccy,0,GX,ccy,Math.max(W,H)*1.4);
    rg.addColorStop(0,`hsla(38,100%,70%,${int})`); rg.addColorStop(0.25,`hsla(28,100%,50%,${int*0.55})`);
    rg.addColorStop(0.6,`hsla(20,95%,30%,${int*0.18})`); rg.addColorStop(1,'hsla(15,80%,15%,0)');
    ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);
  }

  // Shockwave hit pulse
  if (nukeActive && el>1500 && el<2200) { ctx.globalAlpha=(1-(el-1500)/700)*0.15; ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1; }

  // Vignette
  const vg=ctx.createRadialGradient(W/2,H/2,H*0.35,W/2,H/2,H*0.75);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.35)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

  ctx.restore();
}

requestAnimationFrame(frame);
</script>
</body>
</html>
