<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuke Styles - Visual Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    color: #eee;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    min-height: 100vh;
  }
  h1 {
    font-size: 36px;
    letter-spacing: 12px;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #ff4500, #ffcc00, #ff4500);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-transform: uppercase;
  }
  .subtitle {
    color: #666;
    font-size: 13px;
    letter-spacing: 4px;
    margin-bottom: 40px;
  }
  .row {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  canvas {
    border: 1px solid #1a1a2e;
    border-radius: 6px;
  }
  .label {
    font-size: 16px;
    letter-spacing: 6px;
    text-transform: uppercase;
    padding: 4px 16px;
    border: 1px solid #333;
    border-radius: 3px;
    background: #0d0d1f;
  }
  .label-a { color: #ff6622; border-color: #ff6622; }
  .label-b { color: #66ccff; border-color: #66ccff; }
  .label-c { color: #bb77ff; border-color: #bb77ff; }
  .desc {
    color: #555;
    font-size: 11px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<h1>Nuke Styles</h1>
<p class="subtitle">3 alternate explosion concepts &mdash; static peak snapshots</p>

<div class="row">
  <div class="card">
    <canvas id="tsarBomba" width="300" height="250"></canvas>
    <div class="label label-a">TSAR BOMBA</div>
    <div class="desc">Massive &bull; Overwhelming</div>
  </div>
  <div class="card">
    <canvas id="tactical" width="300" height="250"></canvas>
    <div class="label label-b">TACTICAL</div>
    <div class="desc">Compact &bull; Precise</div>
  </div>
  <div class="card">
    <canvas id="neutronStar" width="300" height="250"></canvas>
    <div class="label label-c">NEUTRON STAR</div>
    <div class="desc">Sci-fi &bull; Energy Burst</div>
  </div>
</div>

<script>
// ── Helpers ──
function drawStars(ctx, w, h) {
  ctx.fillStyle = '#ffffff';
  const stars = [[w*0.1, h*0.08], [w*0.85, h*0.12], [w*0.5, h*0.05], [w*0.7, h*0.03]];
  stars.forEach(([x, y]) => {
    ctx.globalAlpha = 0.4 + Math.random() * 0.5;
    ctx.beginPath();
    ctx.arc(x, y, 0.8 + Math.random(), 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function fillBg(ctx, w, h) {
  const bg = ctx.createLinearGradient(0, 0, 0, h);
  bg.addColorStop(0, '#050510');
  bg.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);
}

// ────────────────────────────────────
// STYLE A: TSAR BOMBA
// ────────────────────────────────────
(function() {
  const c = document.getElementById('tsarBomba');
  const ctx = c.getContext('2d');
  const W = 300, H = 250;
  fillBg(ctx, W, H);
  drawStars(ctx, W, H);

  const cx = W / 2;
  const groundY = H - 30;

  // Ground-level debris cloud
  ctx.save();
  ctx.shadowColor = '#ff4400';
  ctx.shadowBlur = 20;
  const debrisGrad = ctx.createRadialGradient(cx, groundY, 10, cx, groundY, 140);
  debrisGrad.addColorStop(0, 'rgba(255,100,0,0.7)');
  debrisGrad.addColorStop(0.5, 'rgba(180,60,0,0.4)');
  debrisGrad.addColorStop(1, 'rgba(80,20,0,0)');
  ctx.fillStyle = debrisGrad;
  ctx.beginPath();
  ctx.ellipse(cx, groundY + 5, 140, 25, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Stem
  ctx.save();
  ctx.shadowColor = '#ff6600';
  ctx.shadowBlur = 15;
  const stemGrad = ctx.createLinearGradient(cx - 30, groundY, cx + 30, groundY);
  stemGrad.addColorStop(0, 'rgba(200,80,0,0.3)');
  stemGrad.addColorStop(0.3, 'rgba(255,140,30,0.8)');
  stemGrad.addColorStop(0.5, 'rgba(255,200,80,0.9)');
  stemGrad.addColorStop(0.7, 'rgba(255,140,30,0.8)');
  stemGrad.addColorStop(1, 'rgba(200,80,0,0.3)');
  ctx.fillStyle = stemGrad;
  ctx.beginPath();
  ctx.moveTo(cx - 40, groundY);
  ctx.quadraticCurveTo(cx - 28, groundY - 50, cx - 22, 110);
  ctx.lineTo(cx + 22, 110);
  ctx.quadraticCurveTo(cx + 28, groundY - 50, cx + 40, groundY);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Mushroom cap — massive ellipse
  const capCx = cx, capCy = 70;
  const capRx = 120, capRy = 55;
  ctx.save();
  ctx.shadowColor = '#ff4400';
  ctx.shadowBlur = 40;
  const capGrad = ctx.createRadialGradient(capCx, capCy, 10, capCx, capCy, capRx);
  capGrad.addColorStop(0, '#ffffff');
  capGrad.addColorStop(0.15, '#ffffaa');
  capGrad.addColorStop(0.3, '#ffaa33');
  capGrad.addColorStop(0.6, '#dd5500');
  capGrad.addColorStop(0.85, '#882200');
  capGrad.addColorStop(1, 'rgba(60,10,0,0.3)');
  ctx.fillStyle = capGrad;
  ctx.beginPath();
  ctx.ellipse(capCx, capCy, capRx, capRy, 0, 0, Math.PI * 2);
  ctx.fill();

  // Double fireball — white core
  const coreGrad = ctx.createRadialGradient(capCx, capCy, 0, capCx, capCy, 30);
  coreGrad.addColorStop(0, '#ffffff');
  coreGrad.addColorStop(0.5, 'rgba(255,255,200,0.9)');
  coreGrad.addColorStop(1, 'rgba(255,180,50,0)');
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.ellipse(capCx, capCy, 30, 22, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Concentric cloud bands across cap (5-6 wavy lines)
  ctx.save();
  ctx.strokeStyle = 'rgba(255,200,100,0.3)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 6; i++) {
    const bandY = capCy - capRy + 12 + i * (capRy * 2 - 24) / 5;
    // calculate width at this y on the ellipse
    const dy = (bandY - capCy) / capRy;
    if (Math.abs(dy) >= 1) continue;
    const halfW = capRx * Math.sqrt(1 - dy * dy);
    ctx.beginPath();
    const startX = capCx - halfW + 5;
    const endX = capCx + halfW - 5;
    ctx.moveTo(startX, bandY);
    for (let x = startX; x <= endX; x += 4) {
      ctx.lineTo(x, bandY + Math.sin((x - startX) * 0.15 + i) * 3);
    }
    ctx.stroke();
  }
  ctx.restore();

  // Tiny city silhouette at bottom for scale
  ctx.save();
  ctx.fillStyle = '#0a0a12';
  const buildings = [
    [20, 8], [28, 14], [36, 10], [44, 18], [52, 12], [58, 9],
    [66, 16], [74, 11], [82, 7], [90, 13], [98, 20], [104, 14],
    [112, 10], [120, 8], [128, 12], [136, 6], [144, 9],
    [155, 14], [163, 10], [171, 16], [179, 8], [187, 11],
    [195, 18], [203, 12], [211, 9], [219, 15], [227, 7],
    [235, 11], [243, 13], [251, 8], [259, 10], [267, 6], [275, 9]
  ];
  buildings.forEach(([bx, bh]) => {
    ctx.fillRect(bx, groundY + 8 - bh, 6, bh);
  });
  // ground line
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(0, groundY + 8, W, 2);
  ctx.restore();

  // Orange tint glow over whole scene
  ctx.save();
  const sceneGlow = ctx.createRadialGradient(cx, 80, 20, cx, 80, 200);
  sceneGlow.addColorStop(0, 'rgba(255,120,0,0.08)');
  sceneGlow.addColorStop(1, 'rgba(255,60,0,0)');
  ctx.fillStyle = sceneGlow;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
})();

// ────────────────────────────────────
// STYLE B: TACTICAL
// ────────────────────────────────────
(function() {
  const c = document.getElementById('tactical');
  const ctx = c.getContext('2d');
  const W = 300, H = 250;
  fillBg(ctx, W, H);
  drawStars(ctx, W, H);

  const cx = W / 2;
  const groundY = H - 35;

  // Ground crater
  ctx.save();
  ctx.fillStyle = '#050508';
  ctx.beginPath();
  ctx.ellipse(cx, groundY + 8, 35, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(100,80,60,0.5)';
  ctx.lineWidth = 1;
  ctx.stroke();
  // crater rim
  ctx.strokeStyle = 'rgba(150,120,80,0.3)';
  ctx.beginPath();
  ctx.ellipse(cx, groundY + 8, 42, 10, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();

  // Ground line
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(0, groundY + 12, W, 2);

  // Fat short stem
  const stemTop = 100;
  ctx.save();
  ctx.shadowColor = '#4499ff';
  ctx.shadowBlur = 10;
  const stemGrad = ctx.createLinearGradient(cx - 25, stemTop, cx + 25, stemTop);
  stemGrad.addColorStop(0, 'rgba(50,100,180,0.2)');
  stemGrad.addColorStop(0.3, 'rgba(150,200,255,0.7)');
  stemGrad.addColorStop(0.5, 'rgba(220,240,255,0.9)');
  stemGrad.addColorStop(0.7, 'rgba(150,200,255,0.7)');
  stemGrad.addColorStop(1, 'rgba(50,100,180,0.2)');
  ctx.fillStyle = stemGrad;
  ctx.beginPath();
  ctx.moveTo(cx - 30, groundY);
  ctx.quadraticCurveTo(cx - 20, groundY - 30, cx - 18, stemTop);
  ctx.lineTo(cx + 18, stemTop);
  ctx.quadraticCurveTo(cx + 20, groundY - 30, cx + 30, groundY);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Compact mushroom cap
  const capCy = 72, capRx = 55, capRy = 35;
  ctx.save();
  ctx.shadowColor = '#66bbff';
  ctx.shadowBlur = 30;
  const capGrad = ctx.createRadialGradient(cx, capCy, 5, cx, capCy, capRx);
  capGrad.addColorStop(0, '#ffffff');
  capGrad.addColorStop(0.2, '#eeffff');
  capGrad.addColorStop(0.4, '#88ccff');
  capGrad.addColorStop(0.65, '#3388cc');
  capGrad.addColorStop(0.85, '#cc6622');
  capGrad.addColorStop(1, 'rgba(180,80,20,0.2)');
  ctx.fillStyle = capGrad;
  ctx.beginPath();
  ctx.ellipse(cx, capCy, capRx, capRy, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // White-hot core dominating center
  ctx.save();
  ctx.shadowColor = '#ffffff';
  ctx.shadowBlur = 25;
  const hotCore = ctx.createRadialGradient(cx, capCy, 0, cx, capCy, 25);
  hotCore.addColorStop(0, '#ffffff');
  hotCore.addColorStop(0.4, 'rgba(255,255,255,0.95)');
  hotCore.addColorStop(0.7, 'rgba(200,230,255,0.6)');
  hotCore.addColorStop(1, 'rgba(100,180,255,0)');
  ctx.fillStyle = hotCore;
  ctx.beginPath();
  ctx.arc(cx, capCy, 25, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Shockwave ring
  ctx.save();
  ctx.shadowColor = 'rgba(200,230,255,0.6)';
  ctx.shadowBlur = 8;
  ctx.strokeStyle = 'rgba(220,240,255,0.5)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(cx, capCy + 15, 90, 28, 0, 0, Math.PI * 2);
  ctx.stroke();
  // Second thinner ring
  ctx.strokeStyle = 'rgba(200,220,255,0.25)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.ellipse(cx, capCy + 20, 110, 32, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();

  // Blue-white ambient glow
  ctx.save();
  const glow = ctx.createRadialGradient(cx, capCy, 10, cx, capCy, 160);
  glow.addColorStop(0, 'rgba(100,180,255,0.1)');
  glow.addColorStop(1, 'rgba(50,100,200,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
})();

// ────────────────────────────────────
// STYLE C: NEUTRON STAR
// ────────────────────────────────────
(function() {
  const c = document.getElementById('neutronStar');
  const ctx = c.getContext('2d');
  const W = 300, H = 250;
  fillBg(ctx, W, H);
  drawStars(ctx, W, H);

  const cx = W / 2, cy = 95;
  const groundY = H - 35;

  // Ground line
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(0, groundY + 5, W, 2);

  // Downward beam of light hitting ground
  ctx.save();
  ctx.shadowColor = '#8844ff';
  ctx.shadowBlur = 15;
  const beamGrad = ctx.createLinearGradient(0, cy + 30, 0, groundY + 5);
  beamGrad.addColorStop(0, 'rgba(150,100,255,0.6)');
  beamGrad.addColorStop(0.5, 'rgba(120,80,220,0.3)');
  beamGrad.addColorStop(1, 'rgba(80,50,180,0.1)');
  ctx.fillStyle = beamGrad;
  ctx.beginPath();
  ctx.moveTo(cx - 15, cy + 30);
  ctx.lineTo(cx - 40, groundY + 5);
  ctx.lineTo(cx + 40, groundY + 5);
  ctx.lineTo(cx + 15, cy + 30);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Ground impact glow
  ctx.save();
  const impactGlow = ctx.createRadialGradient(cx, groundY + 5, 5, cx, groundY + 5, 60);
  impactGlow.addColorStop(0, 'rgba(150,100,255,0.5)');
  impactGlow.addColorStop(0.5, 'rgba(100,60,200,0.2)');
  impactGlow.addColorStop(1, 'rgba(60,30,150,0)');
  ctx.fillStyle = impactGlow;
  ctx.beginPath();
  ctx.ellipse(cx, groundY + 5, 60, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Pulsing halo effect (outer glow)
  ctx.save();
  const haloGrad = ctx.createRadialGradient(cx, cy, 50, cx, cy, 120);
  haloGrad.addColorStop(0, 'rgba(130,80,255,0.12)');
  haloGrad.addColorStop(0.5, 'rgba(100,50,220,0.06)');
  haloGrad.addColorStop(1, 'rgba(60,20,150,0)');
  ctx.fillStyle = haloGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, 120, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Concentric energy rings (4 rings radiating outward)
  ctx.save();
  const ringRadii = [35, 52, 70, 90];
  ringRadii.forEach((r, i) => {
    const alpha = 0.5 - i * 0.1;
    ctx.shadowColor = '#9966ff';
    ctx.shadowBlur = 6;
    ctx.strokeStyle = `rgba(160,120,255,${alpha})`;
    ctx.lineWidth = 2 - i * 0.3;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();
  });
  ctx.restore();

  // Spherical energy burst core
  ctx.save();
  ctx.shadowColor = '#aa77ff';
  ctx.shadowBlur = 40;
  const sphereGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 32);
  sphereGrad.addColorStop(0, '#ffffff');
  sphereGrad.addColorStop(0.2, '#eeddff');
  sphereGrad.addColorStop(0.45, '#9966ff');
  sphereGrad.addColorStop(0.7, '#6633cc');
  sphereGrad.addColorStop(1, 'rgba(60,20,150,0.3)');
  ctx.fillStyle = sphereGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, 32, 0, Math.PI * 2);
  ctx.fill();

  // White center
  const whiteCore = ctx.createRadialGradient(cx, cy, 0, cx, cy, 12);
  whiteCore.addColorStop(0, '#ffffff');
  whiteCore.addColorStop(0.6, 'rgba(255,255,255,0.8)');
  whiteCore.addColorStop(1, 'rgba(200,180,255,0)');
  ctx.fillStyle = whiteCore;
  ctx.beginPath();
  ctx.arc(cx, cy, 12, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Lightning tendrils (6 jagged lines arcing from sphere)
  ctx.save();
  ctx.shadowColor = '#bb99ff';
  ctx.shadowBlur = 8;
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';

  const tendrilAngles = [
    -0.4, -1.2, -2.0,   // upper tendrils
    0.6, 1.8, 2.8        // lower/side tendrils
  ];

  tendrilAngles.forEach((angle, idx) => {
    const length = 45 + (idx % 3) * 15;
    const segments = 6;
    const segLen = length / segments;

    ctx.strokeStyle = idx < 3
      ? 'rgba(180,150,255,0.7)'
      : 'rgba(130,100,255,0.5)';

    ctx.beginPath();
    let px = cx + Math.cos(angle) * 30;
    let py = cy + Math.sin(angle) * 30;
    ctx.moveTo(px, py);

    for (let s = 0; s < segments; s++) {
      const jitterX = (Math.random() - 0.5) * 18;
      const jitterY = (Math.random() - 0.5) * 18;
      px += Math.cos(angle) * segLen + jitterX;
      py += Math.sin(angle) * segLen + jitterY;
      ctx.lineTo(px, py);
    }
    ctx.stroke();

    // small fork at end of some tendrils
    if (idx % 2 === 0) {
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(px + Math.cos(angle + 0.5) * 12, py + Math.sin(angle + 0.5) * 12);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(px + Math.cos(angle - 0.5) * 10, py + Math.sin(angle - 0.5) * 10);
      ctx.stroke();
    }
  });
  ctx.restore();

  // Overall purple ambient
  ctx.save();
  const ambGlow = ctx.createRadialGradient(cx, cy, 10, cx, cy, 160);
  ambGlow.addColorStop(0, 'rgba(100,60,220,0.08)');
  ambGlow.addColorStop(1, 'rgba(60,20,150,0)');
  ctx.fillStyle = ambGlow;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
})();
</script>
</body>
</html>
