<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SIGN DESIGNS v3</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a12; color: #eee; font-family: monospace; padding: 20px; }
  h1 { text-align: center; font-size: 22px; margin-bottom: 18px; color: #0ff; text-shadow: 0 0 10px #0ff; letter-spacing: 4px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; max-width: 820px; margin: 0 auto; }
  .cell { text-align: center; }
  .cell canvas { border: 1px solid #222; border-radius: 4px; }
  .label { font-size: 10px; color: #666; margin-top: 4px; }
</style>
</head>
<body>
<h1>SIGN DESIGNS v3</h1>
<div class="grid" id="grid"></div>
<script>
// Pixel font: 5x7 grid per character
const FONT = {
  A:['01110','10001','10001','11111','10001','10001','10001'],
  B:['11110','10001','10001','11110','10001','10001','11110'],
  C:['01111','10000','10000','10000','10000','10000','01111'],
  D:['11110','10001','10001','10001','10001','10001','11110'],
  E:['11111','10000','10000','11110','10000','10000','11111'],
  F:['11111','10000','10000','11110','10000','10000','10000'],
  G:['01111','10000','10000','10011','10001','10001','01110'],
  H:['10001','10001','10001','11111','10001','10001','10001'],
  I:['11111','00100','00100','00100','00100','00100','11111'],
  J:['00111','00010','00010','00010','00010','10010','01100'],
  K:['10001','10010','10100','11000','10100','10010','10001'],
  L:['10000','10000','10000','10000','10000','10000','11111'],
  M:['10001','11011','10101','10101','10001','10001','10001'],
  N:['10001','11001','10101','10011','10001','10001','10001'],
  O:['01110','10001','10001','10001','10001','10001','01110'],
  P:['11110','10001','10001','11110','10000','10000','10000'],
  Q:['01110','10001','10001','10001','10101','10010','01101'],
  R:['11110','10001','10001','11110','10100','10010','10001'],
  S:['01111','10000','10000','01110','00001','00001','11110'],
  T:['11111','00100','00100','00100','00100','00100','00100'],
  U:['10001','10001','10001','10001','10001','10001','01110'],
  V:['10001','10001','10001','10001','01010','01010','00100'],
  W:['10001','10001','10001','10101','10101','11011','10001'],
  X:['10001','10001','01010','00100','01010','10001','10001'],
  Y:['10001','10001','01010','00100','00100','00100','00100'],
  Z:['11111','00001','00010','00100','01000','10000','11111'],
  ' ':['00000','00000','00000','00000','00000','00000','00000'],
};

const COLORS = {
  cyan:'#0ff', magenta:'#f0f', lime:'#0f0', orange:'#f80',
  pink:'#f5a', yellow:'#ff0', 'electric blue':'#4af', red:'#f22'
};
const colorKeys = Object.keys(COLORS);

const signs = [
  {name:'ZENATECH', mount:'rooftop'},
  {name:'SKYNET', mount:'hanging'},
  {name:'DRONE CO', mount:'vertical'},
  {name:'APEX', mount:'window'},
  {name:'VOLT', mount:'rooftop'},
  {name:'NIMBUS', mount:'hanging'},
  {name:'HOVER', mount:'vertical'},
  {name:'NEXUS', mount:'window'},
  {name:'ORBITAL', mount:'rooftop'},
  {name:'PULSE', mount:'hanging'},
  {name:'HELIX', mount:'vertical'},
  {name:'SPECTRA', mount:'window'},
];

const grid = document.getElementById('grid');

function drawPixelText(ctx, text, x, y, px, color) {
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 6;
  for (let ci = 0; ci < text.length; ci++) {
    const ch = FONT[text[ci]];
    if (!ch) continue;
    for (let row = 0; row < 7; row++) {
      for (let col = 0; col < 5; col++) {
        if (ch[row][col] === '1') {
          ctx.fillRect(x + ci * (5 * px + px) + col * px, y + row * px, px, px);
        }
      }
    }
  }
  ctx.shadowBlur = 0;
}

function measureText(text, px) {
  return text.length * (5 * px + px) - px;
}

signs.forEach((sign, i) => {
  const cell = document.createElement('div');
  cell.className = 'cell';
  const canvas = document.createElement('canvas');
  canvas.width = 180; canvas.height = 120;
  const ctx = canvas.getContext('2d');

  const colorName = colorKeys[i % colorKeys.length];
  const color = COLORS[colorName];

  // dark background
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, 180, 120);

  const px = sign.name.length > 7 ? 2 : (sign.name.length > 5 ? 2 : 3);
  const tw = measureText(sign.name, px);
  const th = 7 * px;

  if (sign.mount === 'rooftop') {
    // Building silhouette
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(20, 55, 140, 65);
    ctx.fillStyle = '#151525';
    ctx.fillRect(30, 60, 12, 12);
    ctx.fillRect(50, 60, 12, 12);
    ctx.fillRect(70, 60, 12, 12);
    ctx.fillRect(90, 60, 12, 12);
    ctx.fillRect(110, 60, 12, 12);
    ctx.fillRect(130, 60, 12, 12);
    ctx.fillRect(30, 80, 12, 12);
    ctx.fillRect(50, 80, 12, 12);
    ctx.fillRect(70, 80, 12, 12);
    ctx.fillRect(90, 80, 12, 12);
    ctx.fillRect(110, 80, 12, 12);
    ctx.fillRect(130, 80, 12, 12);
    // Dark panel behind sign
    const panelW = tw + 12;
    const panelX = 90 - panelW / 2;
    ctx.fillStyle = '#111';
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.shadowColor = color;
    ctx.shadowBlur = 4;
    ctx.fillRect(panelX, 30, panelW, th + 8);
    ctx.strokeRect(panelX, 30, panelW, th + 8);
    ctx.shadowBlur = 0;
    // Sign supports
    ctx.fillStyle = '#333';
    ctx.fillRect(panelX + 6, 30 + th + 8, 3, 55 - (30 + th + 8));
    ctx.fillRect(panelX + panelW - 9, 30 + th + 8, 3, 55 - (30 + th + 8));
    // Text
    drawPixelText(ctx, sign.name, 90 - tw / 2, 34, px, color);

  } else if (sign.mount === 'vertical') {
    // Building side
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, 50, 120);
    // Some windows
    for (let wy = 10; wy < 110; wy += 20) {
      ctx.fillStyle = '#252540';
      ctx.fillRect(8, wy, 10, 8);
      ctx.fillRect(26, wy, 10, 8);
    }
    // Vertical sign panel on building edge
    const vpx = 1;
    const vtw = measureText(sign.name, vpx);
    const vth = 7 * vpx;
    // We draw text rotated 90deg
    ctx.save();
    ctx.translate(55, 10);
    ctx.rotate(Math.PI / 2);
    // Panel
    const panelW2 = sign.name.length * (5 * 2 + 2) - 2 + 10;
    const panelH2 = 7 * 2 + 8;
    ctx.fillStyle = '#111';
    ctx.shadowColor = color;
    ctx.shadowBlur = 4;
    ctx.fillRect(-2, -panelH2 / 2 - 2, panelW2, panelH2);
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.strokeRect(-2, -panelH2 / 2 - 2, panelW2, panelH2);
    ctx.shadowBlur = 0;
    drawPixelText(ctx, sign.name, 3, -panelH2 / 2 + 2, 2, color);
    ctx.restore();
    // Mounting bracket
    ctx.fillStyle = '#444';
    ctx.fillRect(48, 8, 8, 3);
    ctx.fillRect(48, 108, 8, 3);

  } else if (sign.mount === 'window') {
    // Building face
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(15, 10, 150, 100);
    // Grid of windows — unlit
    const wSize = 6;
    const wGap = 3;
    const gridCols = 15;
    const gridRows = 10;
    const gridStartX = 22;
    const gridStartY = 18;
    for (let r = 0; r < gridRows; r++) {
      for (let c = 0; c < gridCols; c++) {
        ctx.fillStyle = '#151525';
        ctx.fillRect(gridStartX + c * (wSize + wGap), gridStartY + r * (wSize + wGap), wSize, wSize);
      }
    }
    // Now light up windows to form text using pixel font
    const textPx = 1; // each font pixel = 1 window
    const totalCharW = sign.name.length * 6 - 1; // 5 + 1gap per char
    const startCol = Math.floor((gridCols - totalCharW) / 2);
    const startRow = Math.floor((gridRows - 7) / 2);
    for (let ci = 0; ci < sign.name.length; ci++) {
      const ch = FONT[sign.name[ci]];
      if (!ch) continue;
      for (let row = 0; row < 7; row++) {
        for (let col = 0; col < 5; col++) {
          if (ch[row][col] === '1') {
            const gc = startCol + ci * 6 + col;
            const gr = startRow + row;
            if (gc >= 0 && gc < gridCols && gr >= 0 && gr < gridRows) {
              ctx.fillStyle = color;
              ctx.shadowColor = color;
              ctx.shadowBlur = 5;
              ctx.fillRect(gridStartX + gc * (wSize + wGap), gridStartY + gr * (wSize + wGap), wSize, wSize);
              ctx.shadowBlur = 0;
            }
          }
        }
      }
    }

  } else if (sign.mount === 'hanging') {
    // Horizontal bracket at top
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, 60, 120); // building wall
    ctx.fillStyle = '#444';
    ctx.fillRect(50, 15, 80, 3); // bracket arm
    ctx.fillRect(48, 10, 4, 10); // bracket mount
    // Chains/wires
    const panelW3 = tw + 14;
    const panelX3 = 90 - panelW3 / 2;
    const panelY3 = 40;
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    // Left chain
    ctx.beginPath();
    ctx.moveTo(panelX3 + 8, 18);
    ctx.lineTo(panelX3 + 8, panelY3);
    ctx.stroke();
    // Right chain
    ctx.beginPath();
    ctx.moveTo(panelX3 + panelW3 - 8, 18);
    ctx.lineTo(panelX3 + panelW3 - 8, panelY3);
    ctx.stroke();
    // Chain links (dashes)
    for (let cy = 20; cy < panelY3; cy += 4) {
      ctx.fillStyle = '#666';
      ctx.fillRect(panelX3 + 7, cy, 2, 2);
      ctx.fillRect(panelX3 + panelW3 - 9, cy, 2, 2);
    }
    // Sign panel
    ctx.fillStyle = '#111';
    ctx.shadowColor = color;
    ctx.shadowBlur = 5;
    ctx.fillRect(panelX3, panelY3, panelW3, th + 10);
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.strokeRect(panelX3, panelY3, panelW3, th + 10);
    ctx.shadowBlur = 0;
    drawPixelText(ctx, sign.name, 90 - tw / 2, panelY3 + 5, px, color);
    // Glow underneath
    const grd = ctx.createLinearGradient(panelX3, panelY3 + th + 10, panelX3, panelY3 + th + 30);
    // Parse color to rgba with alpha
    const tc = document.createElement('canvas').getContext('2d');
    tc.fillStyle = color;
    const parsed = tc.fillStyle; // normalised to #rrggbb
    const r = parseInt(parsed.slice(1,3),16), g = parseInt(parsed.slice(3,5),16), b = parseInt(parsed.slice(5,7),16);
    grd.addColorStop(0, `rgba(${r},${g},${b},0.25)`);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(panelX3, panelY3 + th + 10, panelW3, 20);
  }

  cell.appendChild(canvas);
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = `${sign.name} — ${sign.mount}`;
  cell.appendChild(label);
  grid.appendChild(cell);
});
</script>
</body>
</html>
