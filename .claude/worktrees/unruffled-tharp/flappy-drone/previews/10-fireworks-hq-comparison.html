<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a18; color: #e0e0e0; font-family: 'SF Mono', 'Menlo', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
  h1 { color: #fff; font-size: 20px; margin-bottom: 4px; }
  .sub { color: #888; font-size: 12px; margin-bottom: 16px; }
  canvas { border: 2px solid #1a1a3a; border-radius: 14px; box-shadow: 0 0 80px #00d4ff08, 0 8px 40px #00000090; margin-bottom: 12px; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px; }
  button { background: #151528; border: 1px solid #334; color: #aab; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: inherit; }
  button:hover { background: #1e1e38; border-color: #556; color: #dde; }
  .active { border-color: #00c8f0; color: #00c8f0; }
  .info { color: #556; font-size: 11px; text-align: center; max-width: 620px; line-height: 1.5; }
</style>
</head>
<body>

<h1>Firework Styles — Full Quality</h1>
<p class="sub">Using the actual game particle physics. Click buttons to launch. "Current" is the baseline.</p>

<canvas id="game" width="620" height="500"></canvas>
<div class="controls">
  <button onclick="launch('current')" class="active" id="btn-current">Current (Baseline)</button>
  <button onclick="launch('streaks')" id="btn-streaks">Streak Trails</button>
  <button onclick="launch('ring')" id="btn-ring">Double Ring</button>
  <button onclick="launch('willow')" id="btn-willow">Willow Cascade</button>
  <button onclick="launch('crackle')" id="btn-crackle">Crackle Burst</button>
  <button onclick="launch('auto')" id="btn-auto">Auto (random)</button>
</div>
<p class="info">All styles use identical physics (damping 0.98, gravity 0.02). Differences are in particle count, velocity patterns, trail rendering, and glow intensity.</p>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 620, H = 500, GROUND_H = 28;
let tick = 0;
let particles = [];
let fireworks = [];
let activeStyle = 'current';
let autoMode = false;
let autoTimer = 0;

const bgStars = Array.from({length:40}, () => ({
  x: Math.random()*W, y: Math.random()*(H*0.55), r: Math.random()*1.1+0.3, phase: Math.random()*Math.PI*2
}));

// ===== PARTICLE SYSTEM (exact game copy) =====
function drawParticles() {
  particles.forEach(p => {
    const t = p.life / p.maxLife;
    if (p.glow) {
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * t);
      grad.addColorStop(0, `hsla(${p.hue}, ${p.sat}%, ${p.lum}%, ${t * 0.8})`);
      grad.addColorStop(0.25, `hsla(${p.hue}, ${p.sat}%, ${p.lum - 10}%, ${t * 0.4})`);
      grad.addColorStop(0.6, `hsla(${p.hue}, ${p.sat}%, ${p.lum - 25}%, ${t * 0.1})`);
      grad.addColorStop(1, `hsla(${p.hue}, ${p.sat}%, ${p.lum - 30}%, 0)`);
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * t, 0, Math.PI * 2); ctx.fill();
    } else if (p.streak) {
      // Streak particle — line from previous position
      const t2 = t * 0.7;
      ctx.globalAlpha = t2;
      ctx.strokeStyle = `hsl(${p.hue}, ${p.sat || 100}%, ${(p.lum || 60) + (1-t)*20}%)`;
      ctx.lineWidth = p.r * t * 0.8;
      ctx.beginPath();
      ctx.moveTo(p.x - p.vx * 3, p.y - p.vy * 3);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      ctx.fillStyle = `hsl(${p.hue}, ${p.sat || 100}%, ${(p.lum || 60) + (1-t)*25}%)`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * t * 0.6, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
    } else {
      ctx.globalAlpha = t * 0.75;
      ctx.fillStyle = `hsl(${p.hue}, ${p.sat || 100}%, ${(p.lum || 55) + (1-t)*20}%)`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * t, 0, Math.PI * 2); ctx.fill();
    }
  });
  ctx.globalAlpha = 1;
}

function updateParticles() {
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= (p.damping || 0.98);
    p.vy *= (p.damping || 0.98);
    p.vy += (p.gravity || 0.02);
    p.life--;
  });
  particles = particles.filter(p => p.life > 0);
}

// ===== FIREWORK STYLES =====
const styles = {
  current: {
    name: 'Current',
    burst(fw) {
      const burstHues = [fw.hue, (fw.hue+40)%360, (fw.hue+80)%360, (fw.hue+120)%360];
      const count = [18, 32, 55][fw.size || 0];
      const spdMul = [1, 1.4, 2.2][fw.size || 0];
      const rMul = [1, 1.5, 2.5][fw.size || 0];
      const lifeMul = [1, 1.3, 1.8][fw.size || 0];
      for (let i = 0; i < count; i++) {
        const a = (Math.PI*2/count)*i + Math.random()*0.4;
        const spd = (Math.random()*3+1) * spdMul;
        particles.push({
          x: fw.x, y: fw.y,
          vx: Math.cos(a)*spd, vy: Math.sin(a)*spd - 0.5,
          life: (25+Math.random()*20)*lifeMul, maxLife: 45*lifeMul,
          r: (Math.random()*3+1.5)*rMul,
          hue: burstHues[i%burstHues.length], sat: 100, lum: 60
        });
      }
      // Glow flash
      particles.push({ x:fw.x, y:fw.y, vx:0, vy:0, life:6, maxLife:6,
        r: 50+(fw.size||0)*25, hue:fw.hue, sat:100, lum:95, glow:true });
    }
  },

  streaks: {
    name: 'Streak Trails',
    burst(fw) {
      const burstHues = [fw.hue, (fw.hue+60)%360, (fw.hue+180)%360];
      const count = [22, 38, 60][fw.size || 0];
      const spdMul = [1.2, 1.6, 2.4][fw.size || 0];
      const rMul = [1, 1.3, 2.0][fw.size || 0];
      const lifeMul = [1.2, 1.5, 2.0][fw.size || 0];
      for (let i = 0; i < count; i++) {
        const a = (Math.PI*2/count)*i + Math.random()*0.3;
        const spd = (Math.random()*3.5+1.5) * spdMul;
        particles.push({
          x: fw.x, y: fw.y,
          vx: Math.cos(a)*spd, vy: Math.sin(a)*spd - 0.8,
          life: (30+Math.random()*25)*lifeMul, maxLife: 55*lifeMul,
          r: (Math.random()*2.5+1)*rMul,
          hue: burstHues[i%burstHues.length], sat: 100, lum: 65,
          streak: true
        });
      }
      // Brighter flash — streaks need the contrast
      particles.push({ x:fw.x, y:fw.y, vx:0, vy:0, life:5, maxLife:5,
        r: 60+(fw.size||0)*30, hue:fw.hue, sat:100, lum:97, glow:true });
    }
  },

  ring: {
    name: 'Double Ring',
    burst(fw) {
      const hue1 = fw.hue, hue2 = (fw.hue + 150) % 360;
      const spdMul = [1, 1.4, 2.0][fw.size || 0];
      const rMul = [1, 1.4, 2.2][fw.size || 0];
      const lifeMul = [1, 1.3, 1.7][fw.size || 0];
      // Outer ring
      const outerCount = [16, 28, 45][fw.size || 0];
      for (let i = 0; i < outerCount; i++) {
        const a = (Math.PI*2/outerCount)*i + Math.random()*0.2;
        const spd = (Math.random()*2+2.5) * spdMul;
        particles.push({
          x: fw.x, y: fw.y,
          vx: Math.cos(a)*spd, vy: Math.sin(a)*spd - 0.5,
          life: (28+Math.random()*18)*lifeMul, maxLife: 46*lifeMul,
          r: (Math.random()*3+1.5)*rMul,
          hue: hue1, sat: 100, lum: 60
        });
      }
      // Inner ring — delayed feel via slower speed, different colour
      const innerCount = [10, 18, 30][fw.size || 0];
      for (let i = 0; i < innerCount; i++) {
        const a = (Math.PI*2/innerCount)*i + Math.random()*0.3 + 0.15;
        const spd = (Math.random()*1.5+0.8) * spdMul;
        particles.push({
          x: fw.x, y: fw.y,
          vx: Math.cos(a)*spd, vy: Math.sin(a)*spd - 0.3,
          life: (20+Math.random()*15)*lifeMul, maxLife: 35*lifeMul,
          r: (Math.random()*2+2)*rMul,
          hue: hue2, sat: 100, lum: 70
        });
      }
      // Double flash — big then small
      particles.push({ x:fw.x, y:fw.y, vx:0, vy:0, life:5, maxLife:5,
        r: 55+(fw.size||0)*25, hue:hue1, sat:100, lum:95, glow:true });
      particles.push({ x:fw.x, y:fw.y, vx:0, vy:-0.3, life:8, maxLife:8,
        r: 30+(fw.size||0)*15, hue:hue2, sat:100, lum:90, glow:true });
    }
  },

  willow: {
    name: 'Willow Cascade',
    burst(fw) {
      const burstHues = [fw.hue, (fw.hue+30)%360, (fw.hue+60)%360];
      const count = [24, 40, 65][fw.size || 0];
      const spdMul = [0.9, 1.2, 1.8][fw.size || 0];
      const rMul = [1, 1.3, 2.0][fw.size || 0];
      const lifeMul = [1.5, 2.0, 2.8][fw.size || 0]; // much longer lived
      for (let i = 0; i < count; i++) {
        const a = (Math.PI*2/count)*i + Math.random()*0.35;
        const spd = (Math.random()*2.5+1) * spdMul;
        particles.push({
          x: fw.x, y: fw.y,
          vx: Math.cos(a)*spd, vy: Math.sin(a)*spd - 0.3,
          life: (35+Math.random()*30)*lifeMul, maxLife: 65*lifeMul,
          r: (Math.random()*2+1)*rMul,
          hue: burstHues[i%burstHues.length], sat: 100, lum: 55,
          damping: 0.97, // slightly less damping — trails longer
          gravity: 0.04,  // heavier gravity — droop effect
          streak: true
        });
      }
      // Soft warm glow — not harsh
      particles.push({ x:fw.x, y:fw.y, vx:0, vy:0, life:10, maxLife:10,
        r: 40+(fw.size||0)*20, hue:fw.hue, sat:80, lum:85, glow:true });
    }
  },

  crackle: {
    name: 'Crackle Burst',
    burst(fw) {
      const hue = fw.hue;
      const spdMul = [1, 1.3, 1.8][fw.size || 0];
      const rMul = [1, 1.4, 2.0][fw.size || 0];
      // Initial fast burst — small bright particles
      const burstCount = [14, 24, 40][fw.size || 0];
      for (let i = 0; i < burstCount; i++) {
        const a = (Math.PI*2/burstCount)*i + Math.random()*0.5;
        const spd = (Math.random()*4+2) * spdMul;
        particles.push({
          x: fw.x, y: fw.y,
          vx: Math.cos(a)*spd, vy: Math.sin(a)*spd - 0.6,
          life: 15+Math.random()*10, maxLife: 25,
          r: (Math.random()*2+1)*rMul,
          hue: hue, sat: 100, lum: 75
        });
      }
      // Delayed crackle — secondary pops that appear later
      const crackleCount = [8, 14, 22][fw.size || 0];
      for (let i = 0; i < crackleCount; i++) {
        const a = Math.random()*Math.PI*2;
        const dist = (Math.random()*15+10) * spdMul;
        const delay = Math.floor(Math.random()*20+8); // spawn "in the future" via high initial life offset
        particles.push({
          x: fw.x + Math.cos(a)*dist, y: fw.y + Math.sin(a)*dist,
          vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2,
          life: 12+Math.random()*8, maxLife: 20,
          r: (Math.random()*3+2)*rMul,
          hue: (hue+Math.random()*40)%360, sat: 100, lum: 80,
          glow: true
        });
      }
      // Sharp bright flash
      particles.push({ x:fw.x, y:fw.y, vx:0, vy:0, life:4, maxLife:4,
        r: 45+(fw.size||0)*20, hue:hue, sat:100, lum:98, glow:true });
    }
  }
};

function launch(style) {
  if (style === 'auto') {
    autoMode = !autoMode;
    document.getElementById('btn-auto').classList.toggle('active', autoMode);
    return;
  }
  autoMode = false;
  document.getElementById('btn-auto').classList.remove('active');
  // Update active button
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + style).classList.add('active');
  activeStyle = style;
  spawnFirework(style);
}

function spawnFirework(style) {
  const fx = 100 + Math.random() * (W - 200);
  const sizeRoll = Math.random();
  const size = sizeRoll < 0.3 ? 2 : sizeRoll < 0.6 ? 1 : 0;
  fireworks.push({
    x: fx, y: H - GROUND_H,
    vy: -(2.5 + Math.random() * 2.5),
    hue: Math.random() * 360,
    targetY: 60 + Math.random() * 200,
    trail: [], exploded: false, size,
    style: style
  });
}

function updateFireworks() {
  fireworks.forEach(fw => {
    if (!fw.exploded) {
      fw.y += fw.vy;
      fw.trail.push({ x: fw.x + (Math.random()-0.5)*2, y: fw.y });
      if (fw.trail.length > 12) fw.trail.shift();
      if (fw.y <= fw.targetY) {
        fw.exploded = true;
        const burstStyle = styles[fw.style] || styles.current;
        burstStyle.burst(fw);
      }
    }
  });
  fireworks = fireworks.filter(fw => !fw.exploded);
}

function drawFireworks() {
  fireworks.forEach(fw => {
    if (fw.exploded) return;
    fw.trail.forEach((pt, i) => {
      ctx.globalAlpha = (i / fw.trail.length) * 0.6;
      ctx.fillStyle = `hsl(${fw.hue}, 80%, 70%)`;
      ctx.fillRect(pt.x, pt.y, 2, 2);
    });
    ctx.globalAlpha = 1;
    ctx.fillStyle = `hsl(${fw.hue}, 90%, 85%)`;
    ctx.fillRect(fw.x-1, fw.y-1, 3, 3);
  });
}

// ===== SCENE =====
function render() {
  tick++;

  // Auto mode — random style every 80-150 frames
  if (autoMode) {
    autoTimer--;
    if (autoTimer <= 0) {
      const styleNames = ['current', 'streaks', 'ring', 'willow', 'crackle'];
      spawnFirework(styleNames[Math.floor(Math.random() * styleNames.length)]);
      autoTimer = 80 + Math.floor(Math.random() * 70);
    }
  }

  // Sky
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#050510'); g.addColorStop(0.5,'#0a0a22'); g.addColorStop(1,'#101030');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  // Stars
  bgStars.forEach(s => {
    ctx.globalAlpha = (Math.sin(s.phase+tick*0.012)+1)/2*0.55+0.15;
    ctx.fillStyle='#b0b8d0'; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }); ctx.globalAlpha=1;

  // City silhouette
  ctx.fillStyle = '#080818';
  [20,80,150,230,310,380,450,530].forEach((bx,i) => {
    const bh = 35+(i*17+5)%55;
    ctx.fillRect(bx, H-GROUND_H-bh, 20+(i*5)%10, bh);
  });
  ctx.fillStyle = '#0c0c20';
  [10,50,95,140,190,240,295,345,400,445,500,545,590].forEach((bx,i) => {
    const bh = 12+(i*11+3)%25;
    ctx.fillRect(bx, H-GROUND_H-bh, 16+(i*7)%8, bh);
  });

  // Ground
  ctx.fillStyle = '#0a0a18'; ctx.fillRect(0,H-GROUND_H,W,GROUND_H);
  ctx.fillStyle = '#181830'; ctx.fillRect(0,H-GROUND_H,W,2);

  // Fireworks + particles
  drawFireworks();
  drawParticles();

  // Vignette
  const vg = ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.7);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.3)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

  // Update
  updateFireworks();
  updateParticles();

  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
