<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a18; color: #e0e0e0; font-family: 'SF Mono', 'Menlo', monospace; padding: 20px; }
  h1 { color: #fff; font-size: 22px; margin-bottom: 6px; }
  .subtitle { color: #888; font-size: 13px; margin-bottom: 30px; }
  .section { margin-bottom: 40px; }
  .section h2 { color: #aaa; font-size: 15px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; border-bottom: 1px solid #222; padding-bottom: 6px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
  .card { background: #111122; border: 1px solid #222; border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color 0.2s; }
  .card:hover { border-color: #00c8f0; }
  .card.selected { border-color: #00c8f0; box-shadow: 0 0 12px rgba(0,200,240,0.3); }
  .card canvas { display: block; width: 100%; }
  .card .label { padding: 12px; }
  .card .label h3 { font-size: 14px; color: #fff; margin-bottom: 4px; }
  .card .label p { font-size: 12px; color: #777; line-height: 1.5; }
  .tag { display: inline-block; background: #1a1a2e; border: 1px solid #333; padding: 2px 8px; border-radius: 3px; font-size: 10px; color: #00c8f0; margin-top: 6px; }
</style>
</head>
<body>

<h1>Drone & Skyline Designs</h1>
<p class="subtitle">Click to select favourites. Drone designs at 4x scale, skylines shown at actual render size.</p>

<div class="section">
  <h2>Drone Designs</h2>
  <div class="grid" id="drones"></div>
</div>

<div class="section">
  <h2>Skyline Density</h2>
  <div class="grid" id="skylines"></div>
</div>

<script>
const S = 4; // drone scale

const drones = [
  {
    id: 'current',
    name: 'Current — Pixel Quad',
    desc: 'The existing design. Blocky quadcopter with cyan cabin, blinking LED, landing skids.',
    tags: ['current'],
    draw(ctx, cx, cy, tick) {
      const x = cx, y = cy;
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.fillRect(x-10*S, y+13*S, 20*S, 3*S);
      // Body
      ctx.fillStyle = '#3a3a4a';
      ctx.fillRect(x-14*S, y-3*S, 28*S, 7*S);
      ctx.fillStyle = '#4a4a5a';
      ctx.fillRect(x-12*S, y-2*S, 24*S, 5*S);
      // Cabin
      ctx.fillStyle = '#00c8f0';
      ctx.fillRect(x-4*S, y-5*S, 8*S, 11*S);
      ctx.fillStyle = '#009abb';
      ctx.fillRect(x-3*S, y-4*S, 6*S, 9*S);
      // LED
      ctx.fillStyle = tick % 40 < 20 ? '#ff2255' : '#551122';
      ctx.fillRect(x-1*S, y-7*S, 2*S, 2*S);
      // Motor mounts
      ctx.fillStyle = '#505060';
      ctx.fillRect(x-18*S, y-1*S, 7*S, 3*S);
      ctx.fillRect(x+11*S, y-1*S, 7*S, 3*S);
      // Props
      const spin = Math.abs(Math.sin(tick * 0.15));
      ctx.globalAlpha = 0.55;
      ctx.fillStyle = '#99a';
      ctx.fillRect(x-18*S - spin*6*S, y-4*S, spin*12*S, 2*S);
      ctx.fillRect(x+14*S - spin*6*S, y-4*S, spin*12*S, 2*S);
      ctx.globalAlpha = 1;
      // Landing gear
      ctx.fillStyle = '#555565';
      ctx.fillRect(x-10*S, y+5*S, 2*S, 4*S);
      ctx.fillRect(x+8*S, y+5*S, 2*S, 4*S);
      ctx.fillRect(x-12*S, y+8*S, 8*S, 2*S);
      ctx.fillRect(x+4*S, y+8*S, 8*S, 2*S);
    }
  },
  {
    id: 'stealth',
    name: 'Stealth — Angular',
    desc: 'Low-profile angular drone. Sharper lines, darker tones, green sensor eye. Military vibe.',
    tags: ['new'],
    draw(ctx, cx, cy, tick) {
      const x = cx, y = cy;
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(x-12*S, y+11*S, 24*S, 2*S);
      // Main body — angular hexagonal shape
      ctx.fillStyle = '#2a2a35';
      ctx.beginPath();
      ctx.moveTo(x-16*S, y);
      ctx.lineTo(x-8*S, y-4*S);
      ctx.lineTo(x+8*S, y-4*S);
      ctx.lineTo(x+16*S, y);
      ctx.lineTo(x+8*S, y+3*S);
      ctx.lineTo(x-8*S, y+3*S);
      ctx.closePath();
      ctx.fill();
      // Top panel highlight
      ctx.fillStyle = '#35354a';
      ctx.beginPath();
      ctx.moveTo(x-7*S, y-3*S);
      ctx.lineTo(x+7*S, y-3*S);
      ctx.lineTo(x+12*S, y);
      ctx.lineTo(x-12*S, y);
      ctx.closePath();
      ctx.fill();
      // Sensor eye
      const glow = 0.6 + Math.sin(tick * 0.08) * 0.3;
      ctx.fillStyle = `rgba(0, 255, 120, ${glow})`;
      ctx.fillRect(x-2*S, y-2*S, 4*S, 2*S);
      ctx.fillStyle = `rgba(0, 255, 120, ${glow * 0.3})`;
      ctx.fillRect(x-4*S, y-2*S, 8*S, 2*S);
      // Wing-mounted engines
      ctx.fillStyle = '#222230';
      ctx.fillRect(x-20*S, y-2*S, 6*S, 4*S);
      ctx.fillRect(x+14*S, y-2*S, 6*S, 4*S);
      // Engine glow
      ctx.fillStyle = `rgba(0, 200, 255, ${0.3 + Math.sin(tick * 0.12) * 0.15})`;
      ctx.fillRect(x-19*S, y+1*S, 4*S, 1*S);
      ctx.fillRect(x+15*S, y+1*S, 4*S, 1*S);
      // Props (thin, fast)
      const spin = Math.abs(Math.sin(tick * 0.2));
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = '#88a';
      ctx.fillRect(x-22*S - spin*5*S, y-3*S, spin*10*S, 1*S);
      ctx.fillRect(x+16*S - spin*5*S, y-3*S, spin*10*S, 1*S);
      ctx.globalAlpha = 1;
      // Antenna
      ctx.fillStyle = '#444';
      ctx.fillRect(x, y-6*S, 1*S, 3*S);
      ctx.fillStyle = '#ff3344';
      ctx.fillRect(x, y-7*S, 1*S, 1*S);
    }
  },
  {
    id: 'heavy',
    name: 'Heavy Lift — Industrial',
    desc: 'Chunky cargo drone. Thick frame, four visible rotors, orange warning stripes, heavy landing gear.',
    tags: ['new'],
    draw(ctx, cx, cy, tick) {
      const x = cx, y = cy;
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(x-14*S, y+14*S, 28*S, 3*S);
      // Main body — thick rectangle
      ctx.fillStyle = '#3d3530';
      ctx.fillRect(x-10*S, y-4*S, 20*S, 10*S);
      ctx.fillStyle = '#4a4238';
      ctx.fillRect(x-9*S, y-3*S, 18*S, 8*S);
      // Warning stripes
      ctx.fillStyle = '#cc8800';
      ctx.fillRect(x-9*S, y+2*S, 18*S, 2*S);
      ctx.fillStyle = '#3d3530';
      for (let i = 0; i < 6; i++) {
        ctx.fillRect(x-9*S + i*6*S, y+2*S, 3*S, 2*S);
      }
      // Cabin window
      ctx.fillStyle = '#335577';
      ctx.fillRect(x-3*S, y-3*S, 6*S, 4*S);
      ctx.fillStyle = '#4477aa';
      ctx.fillRect(x-2*S, y-2*S, 4*S, 2*S);
      // Rotor arms — thick
      ctx.fillStyle = '#332e28';
      ctx.fillRect(x-20*S, y-2*S, 12*S, 4*S);
      ctx.fillRect(x+8*S, y-2*S, 12*S, 4*S);
      // Rotor housings
      ctx.fillStyle = '#444038';
      ctx.fillRect(x-22*S, y-4*S, 5*S, 8*S);
      ctx.fillRect(x+17*S, y-4*S, 5*S, 8*S);
      // Props
      const spin = Math.abs(Math.sin(tick * 0.13));
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = '#998';
      ctx.fillRect(x-24*S - spin*5*S, y-5*S, spin*14*S, 2*S);
      ctx.fillRect(x+15*S - spin*5*S, y-5*S, spin*14*S, 2*S);
      ctx.globalAlpha = 1;
      // Heavy landing gear
      ctx.fillStyle = '#555045';
      ctx.fillRect(x-12*S, y+6*S, 3*S, 6*S);
      ctx.fillRect(x+9*S, y+6*S, 3*S, 6*S);
      ctx.fillRect(x-14*S, y+11*S, 7*S, 2*S);
      ctx.fillRect(x+7*S, y+11*S, 7*S, 2*S);
      // Cargo hook
      ctx.fillStyle = '#666';
      ctx.fillRect(x-1*S, y+6*S, 2*S, 3*S);
      ctx.fillStyle = '#888';
      ctx.fillRect(x-2*S, y+8*S, 4*S, 2*S);
      // Status LEDs
      ctx.fillStyle = tick % 30 < 15 ? '#ff8800' : '#553300';
      ctx.fillRect(x-9*S, y-4*S, 2*S, 1*S);
      ctx.fillRect(x+7*S, y-4*S, 2*S, 1*S);
    }
  },
  {
    id: 'racer',
    name: 'Racer — FPV Speed',
    desc: 'Compact racing drone. Tilted forward stance, exposed electronics, bright accent colour, aggressive.',
    tags: ['new'],
    draw(ctx, cx, cy, tick) {
      const x = cx, y = cy;
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.fillRect(x-10*S, y+10*S, 20*S, 2*S);
      // Body — compact, angular
      ctx.fillStyle = '#1a1a2a';
      ctx.fillRect(x-8*S, y-2*S, 16*S, 6*S);
      // Carbon fibre top
      ctx.fillStyle = '#252535';
      ctx.fillRect(x-7*S, y-2*S, 14*S, 2*S);
      // Accent stripe (hot pink)
      ctx.fillStyle = '#ff0066';
      ctx.fillRect(x-7*S, y, 14*S, 1*S);
      // FPV camera
      ctx.fillStyle = '#333';
      ctx.fillRect(x+5*S, y-4*S, 4*S, 3*S);
      ctx.fillStyle = '#111';
      ctx.fillRect(x+6*S, y-3*S, 2*S, 1*S);
      // Camera lens glow
      ctx.fillStyle = `rgba(255, 0, 80, ${0.4 + Math.sin(tick * 0.1) * 0.2})`;
      ctx.fillRect(x+6*S, y-3*S, 2*S, 1*S);
      // Arms — X config, thin
      ctx.fillStyle = '#222233';
      // Front arms (angled forward)
      ctx.fillRect(x-18*S, y-1*S, 11*S, 2*S);
      ctx.fillRect(x+7*S, y-1*S, 11*S, 2*S);
      // Motor bells
      ctx.fillStyle = '#2a2a3a';
      ctx.fillRect(x-20*S, y-3*S, 4*S, 6*S);
      ctx.fillRect(x+16*S, y-3*S, 4*S, 6*S);
      // Motor accent rings
      ctx.fillStyle = '#ff0066';
      ctx.fillRect(x-20*S, y-3*S, 4*S, 1*S);
      ctx.fillRect(x+16*S, y-3*S, 4*S, 1*S);
      // Props — fast spin
      const spin = Math.abs(Math.sin(tick * 0.25));
      ctx.globalAlpha = 0.45;
      ctx.fillStyle = '#aab';
      ctx.fillRect(x-22*S - spin*5*S, y-4*S, spin*12*S, 1*S);
      ctx.fillRect(x+14*S - spin*5*S, y-4*S, spin*12*S, 1*S);
      ctx.globalAlpha = 1;
      // Battery pack (bottom)
      ctx.fillStyle = '#ff0066';
      ctx.fillRect(x-3*S, y+4*S, 6*S, 2*S);
      ctx.fillStyle = '#cc0055';
      ctx.fillRect(x-2*S, y+4*S, 4*S, 2*S);
      // Minimal legs
      ctx.fillStyle = '#444';
      ctx.fillRect(x-6*S, y+4*S, 1*S, 4*S);
      ctx.fillRect(x+5*S, y+4*S, 1*S, 4*S);
      ctx.fillRect(x-8*S, y+7*S, 5*S, 1*S);
      ctx.fillRect(x+3*S, y+7*S, 5*S, 1*S);
    }
  }
];

// Skyline configs
const skylines = [
  {
    id: 'current',
    name: 'Current — Sparse',
    desc: '10 buildings, 32px spacing, heights 17-65px.',
    tags: ['current'],
    buildings: Array.from({ length: 10 }, (_, i) => ({
      x: i * 32,
      h: 20 + Math.sin(i * 2.7 + 1.3) * 18 + Math.cos(i * 4.1) * 12 + 15,
      w: 20 + ((i * 7 + 3) % 5) * 2
    })),
    tileW: 320
  },
  {
    id: 'dense',
    name: 'Dense Metro',
    desc: '18 buildings, tight overlap, heights up to 120px. Feels like Manhattan.',
    tags: ['new'],
    buildings: Array.from({ length: 18 }, (_, i) => ({
      x: i * 18 - 2 + ((i * 7) % 5),
      h: 30 + Math.sin(i * 1.8 + 0.7) * 35 + Math.cos(i * 3.2) * 25 + Math.sin(i * 0.5) * 20,
      w: 14 + ((i * 11 + 3) % 8) * 2
    })),
    tileW: 320
  },
  {
    id: 'layered',
    name: 'Layered Depth',
    desc: 'Two layers: short dense foreground + tall spaced towers behind. Parallax-ready.',
    tags: ['new'],
    buildings: [
      // Back layer — tall towers
      ...Array.from({ length: 8 }, (_, i) => ({
        x: i * 40 + 5,
        h: 70 + Math.sin(i * 2.1 + 0.5) * 40 + Math.cos(i * 3.7) * 20,
        w: 16 + ((i * 5 + 2) % 4) * 3,
        layer: 'back'
      })),
      // Front layer — shorter, denser
      ...Array.from({ length: 14 }, (_, i) => ({
        x: i * 23 + ((i * 3) % 7),
        h: 20 + Math.sin(i * 2.9 + 1.1) * 15 + Math.cos(i * 4.3) * 10,
        w: 16 + ((i * 7 + 1) % 6) * 2,
        layer: 'front'
      }))
    ],
    tileW: 320
  }
];

// Render drones
const droneGrid = document.getElementById('drones');
let tick = 0;
const droneCanvases = [];

drones.forEach(d => {
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => card.classList.toggle('selected');

  const canvas = document.createElement('canvas');
  canvas.width = 260;
  canvas.height = 140;
  card.appendChild(canvas);

  const label = document.createElement('div');
  label.className = 'label';
  label.innerHTML = '<h3>' + d.name + '</h3><p>' + d.desc + '</p>' +
    d.tags.map(t => '<span class="tag">' + t + '</span>').join(' ');
  card.appendChild(label);

  droneGrid.appendChild(card);
  droneCanvases.push({ canvas, drone: d });
});

// Render skylines
const skyGrid = document.getElementById('skylines');
const skyCanvases = [];
const GROUND_H = 28;

skylines.forEach(s => {
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => card.classList.toggle('selected');

  const canvas = document.createElement('canvas');
  canvas.width = 340;
  canvas.height = 180;
  card.appendChild(canvas);

  const label = document.createElement('div');
  label.className = 'label';
  label.innerHTML = '<h3>' + s.name + '</h3><p>' + s.desc + '</p>' +
    s.tags.map(t => '<span class="tag">' + t + '</span>').join(' ');
  card.appendChild(label);

  skyGrid.appendChild(card);
  skyCanvases.push({ canvas, skyline: s });
});

function renderAll() {
  tick++;

  // Drones
  droneCanvases.forEach(({ canvas, drone }) => {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // Dark sky bg
    const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
    g.addColorStop(0, '#050510');
    g.addColorStop(1, '#101030');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // Stars
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    for (let i = 0; i < 8; i++) {
      ctx.fillRect(30 + i * 28 + (i*17%11), 10 + (i*23%40), 1, 1);
    }
    drone.draw(ctx, canvas.width / 2, canvas.height / 2, tick);
  });

  // Skylines
  skyCanvases.forEach(({ canvas, skyline }) => {
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    // Sky
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#050510');
    g.addColorStop(0.5, '#0a0a22');
    g.addColorStop(1, '#101030');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    // Stars
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    for (let i = 0; i < 12; i++) {
      ctx.fillRect(15 + i * 26 + (i*13%9), 8 + (i*19%35), 1, 1);
    }
    // Ground
    ctx.fillStyle = '#0c0c1a';
    ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
    ctx.fillStyle = '#181830';
    ctx.fillRect(0, H - GROUND_H, W, 2);

    // Buildings
    const groundY = H - GROUND_H;

    if (skyline.buildings[0] && skyline.buildings[0].layer) {
      // Layered: back first (darker), then front
      const back = skyline.buildings.filter(b => b.layer === 'back');
      const front = skyline.buildings.filter(b => b.layer === 'front');

      ctx.fillStyle = '#080818';
      back.forEach(b => {
        ctx.fillRect(b.x, groundY - b.h, b.w, b.h);
      });
      ctx.fillStyle = '#0c0c20';
      front.forEach(b => {
        ctx.fillRect(b.x, groundY - b.h, b.w, b.h);
      });
    } else {
      ctx.fillStyle = '#0c0c20';
      skyline.buildings.forEach(b => {
        ctx.fillRect(b.x, groundY - b.h, b.w, b.h);
      });
    }
  });

  requestAnimationFrame(renderAll);
}

renderAll();
</script>
</body>
</html>
