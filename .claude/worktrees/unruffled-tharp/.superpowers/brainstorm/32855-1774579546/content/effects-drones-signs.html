<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a18; color: #e0e0e0; font-family: 'SF Mono', 'Menlo', monospace; padding: 20px; }
  h1 { color: #fff; font-size: 20px; margin-bottom: 4px; }
  .sub { color: #888; font-size: 12px; margin-bottom: 24px; }
  .section { margin-bottom: 36px; }
  .section h2 { color: #aaa; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 4px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
  .wide { grid-template-columns: 1fr; }
  .card { background: #111122; border: 1px solid #222; border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color 0.2s; }
  .card:hover { border-color: #00c8f0; }
  .card.selected { border-color: #00c8f0; box-shadow: 0 0 12px rgba(0,200,240,0.3); }
  .card canvas { display: block; width: 100%; }
  .card .label { padding: 10px; }
  .card .label h3 { font-size: 13px; color: #fff; margin-bottom: 3px; }
  .card .label p { font-size: 11px; color: #666; line-height: 1.4; }
</style>
</head>
<body>

<h1>Effects, Drones & Signs — Full Iteration</h1>
<p class="sub">All animated using actual game physics. Click to select.</p>

<div class="section">
  <h2>1. New Drone Designs</h2>
  <div class="grid" id="drones"></div>
</div>

<div class="section">
  <h2>2. Explosion Styles (click card to detonate)</h2>
  <div class="grid" id="explosions"></div>
</div>

<div class="section">
  <h2>3. Thrust Burst Variations (auto-looping)</h2>
  <div class="grid" id="thrust"></div>
</div>

<div class="section">
  <h2>4. Sign & Logo Designs</h2>
  <div class="grid wide" id="signs"></div>
</div>

<script>
let tick = 0;
const allCanvases = [];
const S = 3.5; // drone scale

function addCard(id, name, desc, w, h, drawFn, clickFn) {
  const grid = document.getElementById(id);
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => {
    grid.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    if (clickFn) clickFn();
  };
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  card.appendChild(canvas);
  const label = document.createElement('div');
  label.className = 'label';
  label.innerHTML = `<h3>${name}</h3><p>${desc}</p>`;
  card.appendChild(label);
  grid.appendChild(card);
  allCanvases.push({ canvas, draw: drawFn });
}

function skyBg(ctx, w, h) {
  const g = ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#050510'); g.addColorStop(1,'#101030');
  ctx.fillStyle = g; ctx.fillRect(0,0,w,h);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i = 0; i < 5; i++) ctx.fillRect(15+i*52+(i*13%9), 6+(i*17%25), 1, 1);
}

// ========== DRONES ==========

function droneCard(name, desc, drawFn) {
  addCard('drones', name, desc, 280, 130, (ctx, w, h) => {
    skyBg(ctx, w, h);
    drawFn(ctx, w/2, h/2, tick);
  });
}

droneCard('H: Osprey V-Tilt', 'Tiltrotor design. Two large nacelles that angle forward. Hybrid helicopter/plane look.', (ctx, x, y, t) => {
  ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(x-12*S, y+10*S, 24*S, 2*S);
  // Fuselage
  ctx.fillStyle = '#2a2a3a'; ctx.fillRect(x-10*S, y-2*S, 20*S, 5*S);
  ctx.fillStyle = '#353548'; ctx.fillRect(x-8*S, y-1*S, 16*S, 3*S);
  // Nacelles (tilted forward slightly)
  ctx.fillStyle = '#222235';
  ctx.save(); ctx.translate(x-14*S, y-1*S); ctx.rotate(-0.2);
  ctx.fillRect(0, -2*S, 5*S, 6*S); ctx.restore();
  ctx.save(); ctx.translate(x+9*S, y-1*S); ctx.rotate(0.2);
  ctx.fillRect(0, -2*S, 5*S, 6*S); ctx.restore();
  // Large props on nacelles
  const spin = Math.abs(Math.sin(t * 0.12));
  const pw = spin * 16 * S;
  ctx.globalAlpha = 0.65; ctx.fillStyle = '#bbc';
  ctx.fillRect(x - 14*S - pw/2 + 2.5*S, y-4*S, pw, 2*S);
  ctx.fillRect(x + 11.5*S - pw/2, y-4*S, pw, 2*S);
  ctx.globalAlpha = 1;
  // Tail
  ctx.fillStyle = '#2a2a3a'; ctx.fillRect(x-3*S, y+2*S, 6*S, 1*S);
  ctx.fillStyle = '#333'; ctx.fillRect(x-1*S, y-4*S, 2*S, 3*S);
  // Cockpit
  ctx.fillStyle = '#446688'; ctx.fillRect(x+6*S, y-1*S, 3*S, 2*S);
  ctx.fillStyle = t % 40 < 20 ? '#ff2255' : '#551122'; ctx.fillRect(x-1*S, y-5*S, 2*S, 1*S);
  // Landing skids
  ctx.fillStyle = '#444'; ctx.fillRect(x-8*S, y+3*S, 1*S, 3*S); ctx.fillRect(x+7*S, y+3*S, 1*S, 3*S);
  ctx.fillRect(x-10*S, y+5*S, 6*S, 1*S); ctx.fillRect(x+4*S, y+5*S, 6*S, 1*S);
});

droneCard('I: Dragonfly', 'Four thin tandem wings in X-config. Insect-like. Transparent wing surfaces with iridescent shimmer.', (ctx, x, y, t) => {
  ctx.fillStyle = 'rgba(0,0,0,0.08)'; ctx.fillRect(x-8*S, y+8*S, 16*S, 2*S);
  // Slim body
  ctx.fillStyle = '#2a3040'; ctx.fillRect(x-6*S, y-1*S, 12*S, 3*S);
  ctx.fillStyle = '#354050'; ctx.fillRect(x-5*S, y, 10*S, 1*S);
  // Head
  ctx.fillStyle = '#3a4a5a'; ctx.fillRect(x+5*S, y-2*S, 4*S, 4*S);
  // Eye
  const glow = 0.5 + Math.sin(t * 0.1) * 0.3;
  ctx.fillStyle = `rgba(100,255,200,${glow})`; ctx.fillRect(x+7*S, y-1*S, 2*S, 2*S);
  // Four tandem wings — iridescent shimmer
  const wingPhase = t * 0.18;
  const shimmer = (Math.sin(t * 0.05) + 1) / 2;
  const wingAlpha = 0.25 + shimmer * 0.15;
  ctx.globalAlpha = wingAlpha;
  // Top-front wing
  const w1 = Math.abs(Math.sin(wingPhase)) * 14 * S;
  ctx.fillStyle = `hsl(${180 + shimmer * 40}, 60%, 65%)`;
  ctx.fillRect(x - 2*S - w1/2, y - 3*S, w1, 1.5*S);
  // Top-rear wing
  const w2 = Math.abs(Math.sin(wingPhase + 0.8)) * 12 * S;
  ctx.fillStyle = `hsl(${200 + shimmer * 30}, 55%, 60%)`;
  ctx.fillRect(x - 4*S - w2/2, y - 2*S, w2, 1.5*S);
  // Bottom-front
  const w3 = Math.abs(Math.sin(wingPhase + 0.4)) * 14 * S;
  ctx.fillStyle = `hsl(${190 + shimmer * 35}, 58%, 62%)`;
  ctx.fillRect(x - 2*S - w3/2, y + 2*S, w3, 1.5*S);
  // Bottom-rear
  const w4 = Math.abs(Math.sin(wingPhase + 1.2)) * 12 * S;
  ctx.fillStyle = `hsl(${210 + shimmer * 25}, 50%, 58%)`;
  ctx.fillRect(x - 4*S - w4/2, y + 3*S, w4, 1.5*S);
  ctx.globalAlpha = 1;
  // Tail segment
  ctx.fillStyle = '#2a3040'; ctx.fillRect(x-8*S, y, 3*S, 1*S);
  ctx.fillStyle = t % 50 < 25 ? '#00ffaa' : '#004422'; ctx.fillRect(x-8*S, y-1*S, 1*S, 1*S);
});

droneCard('J: Disc / UFO', 'Flat circular disc drone. Smooth edges, ring of lights underneath. Sci-fi aesthetic.', (ctx, x, y, t) => {
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.beginPath(); ctx.ellipse(x, y+10*S, 12*S, 2*S, 0, 0, Math.PI*2); ctx.fill();
  // Disc body
  ctx.fillStyle = '#2a2a3e';
  ctx.beginPath(); ctx.ellipse(x, y, 16*S, 5*S, 0, 0, Math.PI*2); ctx.fill();
  // Upper dome
  ctx.fillStyle = '#353550';
  ctx.beginPath(); ctx.ellipse(x, y-2*S, 10*S, 4*S, 0, 0, Math.PI); ctx.fill();
  // Top highlight
  ctx.fillStyle = '#404060';
  ctx.beginPath(); ctx.ellipse(x, y-3*S, 6*S, 2*S, 0, 0, Math.PI); ctx.fill();
  // Ring of lights underneath
  const lightCount = 8;
  for (let i = 0; i < lightCount; i++) {
    const a = (Math.PI*2/lightCount)*i + t*0.03;
    const lx = x + Math.cos(a)*12*S;
    const ly = y + 2*S + Math.sin(a)*3*S;
    const on = ((i + Math.floor(t/8)) % 3) === 0;
    ctx.fillStyle = on ? 'rgba(0,200,255,0.6)' : 'rgba(0,200,255,0.1)';
    ctx.beginPath(); ctx.arc(lx, ly, 1.5*S, 0, Math.PI*2); ctx.fill();
  }
  // Centre light
  ctx.fillStyle = `rgba(0,200,255,${0.3+Math.sin(t*0.08)*0.15})`;
  ctx.beginPath(); ctx.arc(x, y+3*S, 3*S, 0, Math.PI*2); ctx.fill();
  // Cockpit window
  ctx.fillStyle = '#446688'; ctx.beginPath(); ctx.ellipse(x, y-2*S, 3*S, 1.5*S, 0, 0, Math.PI*2); ctx.fill();
});

droneCard('K: Spider Hex', 'Six-arm hexacopter. Spindly legs, central sensor pod. Aggressive, industrial.', (ctx, x, y, t) => {
  ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(x-14*S, y+10*S, 28*S, 2*S);
  // Central pod
  ctx.fillStyle = '#2e2e3e';
  ctx.beginPath(); ctx.arc(x, y, 5*S, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#3a3a4e';
  ctx.beginPath(); ctx.arc(x, y, 3.5*S, 0, Math.PI*2); ctx.fill();
  // Sensor eye
  ctx.fillStyle = `rgba(255,50,50,${0.5+Math.sin(t*0.1)*0.2})`;
  ctx.beginPath(); ctx.arc(x, y, 1.5*S, 0, Math.PI*2); ctx.fill();
  // 6 arms
  const armAngles = [0, Math.PI/3, Math.PI*2/3, Math.PI, Math.PI*4/3, Math.PI*5/3];
  const armLen = 13*S;
  ctx.strokeStyle = '#2a2a3a'; ctx.lineWidth = 2;
  armAngles.forEach((a, i) => {
    const ax = x + Math.cos(a)*armLen, ay = y + Math.sin(a)*armLen*0.4;
    ctx.beginPath(); ctx.moveTo(x+Math.cos(a)*4*S, y+Math.sin(a)*4*S*0.4);
    ctx.lineTo(ax, ay); ctx.stroke();
    // Motor housing
    ctx.fillStyle = '#333345'; ctx.beginPath(); ctx.arc(ax, ay, 2.5*S, 0, Math.PI*2); ctx.fill();
    // Prop
    const spin = Math.abs(Math.sin(t*0.15 + i*0.5));
    const pw = spin * 8 * S;
    ctx.globalAlpha = 0.55; ctx.fillStyle = '#99a';
    ctx.fillRect(ax - pw/2, ay - 1*S, pw, 1.5*S);
    ctx.globalAlpha = 1;
  });
  // Legs
  ctx.fillStyle = '#444';
  ctx.fillRect(x-4*S, y+3*S, 1*S, 5*S); ctx.fillRect(x+3*S, y+3*S, 1*S, 5*S);
  ctx.fillRect(x-6*S, y+7*S, 5*S, 1*S); ctx.fillRect(x+1*S, y+7*S, 5*S, 1*S);
});

// ========== EXPLOSIONS ==========
const explData = {};

function makeExplosion(id, x, y) {
  explData[id] = { particles: [], born: tick };
}

function addExplosionCard(name, desc, spawnFn) {
  const id = 'expl_' + Math.random().toString(36).slice(2);
  explData[id] = { particles: [], born: 0 };
  addCard('explosions', name, desc, 280, 160, (ctx, w, h) => {
    skyBg(ctx, w, h);
    const d = explData[id];
    d.particles.forEach(p => {
      const t = p.life / p.maxLife;
      if (p.glow) {
        const grad = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*t);
        grad.addColorStop(0,`hsla(${p.hue},${p.sat}%,${p.lum}%,${t*0.8})`);
        grad.addColorStop(0.3,`hsla(${p.hue},${p.sat}%,${p.lum-15}%,${t*0.3})`);
        grad.addColorStop(1,`hsla(${p.hue},${p.sat}%,${p.lum-30}%,0)`);
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(p.x,p.y,p.r*t,0,Math.PI*2); ctx.fill();
      } else if (p.streak) {
        ctx.globalAlpha = t*0.7;
        ctx.strokeStyle = `hsl(${p.hue},100%,${55+(1-t)*20}%)`; ctx.lineWidth = p.r*t*0.8;
        ctx.beginPath(); ctx.moveTo(p.x-p.vx*3,p.y-p.vy*3); ctx.lineTo(p.x,p.y); ctx.stroke();
        ctx.fillStyle = ctx.strokeStyle; ctx.beginPath(); ctx.arc(p.x,p.y,p.r*t*0.5,0,Math.PI*2); ctx.fill();
      } else {
        ctx.globalAlpha = t*0.75;
        ctx.fillStyle = `hsl(${p.hue},${p.sat||100}%,${(p.lum||55)+(1-t)*20}%)`;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r*t,0,Math.PI*2); ctx.fill();
      }
    });
    ctx.globalAlpha = 1;
    // Physics
    d.particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vx*=(p.damping||0.98); p.vy*=(p.damping||0.98); p.vy+=(p.gravity||0.02); p.life--; });
    d.particles = d.particles.filter(p => p.life > 0);
    // Prompt
    if (d.particles.length === 0) {
      ctx.globalAlpha = 0.3; ctx.font = '11px monospace'; ctx.fillStyle = '#aaa'; ctx.textAlign = 'center';
      ctx.fillText('click to detonate', w/2, h-15); ctx.globalAlpha = 1; ctx.textAlign = 'left';
    }
  }, () => {
    explData[id].particles = [];
    spawnFn(explData[id].particles, 140, 65);
  });
}

// ========== THRUST ==========
const thrustData = {};

function addThrustCard(name, desc, spawnFn) {
  const id = 'thr_' + Math.random().toString(36).slice(2);
  thrustData[id] = { particles: [], lastSpawn: 0 };
  addCard('thrust', name, desc, 280, 160, (ctx, w, h) => {
    skyBg(ctx, w, h);
    const d = thrustData[id];
    const dx = w/2, dy = h/2 - 10;
    // Draw a simple drone silhouette
    ctx.fillStyle = '#3a3a4a'; ctx.fillRect(dx-12,dy-3,24,6);
    ctx.fillStyle = '#00c8f0'; ctx.fillRect(dx-3,dy-4,6,9);
    ctx.fillStyle = '#505060'; ctx.fillRect(dx-16,dy-1,6,3); ctx.fillRect(dx+10,dy-1,6,3);
    // Spawn thrust every 20 ticks
    if (tick - d.lastSpawn > 20) {
      spawnFn(d.particles, dx, dy + 6);
      d.lastSpawn = tick;
    }
    // Draw particles
    d.particles.forEach(p => {
      const t = p.life / p.maxLife;
      if (p.glow) {
        const grad = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*t);
        grad.addColorStop(0,`hsla(${p.hue},${p.sat}%,${p.lum}%,${t*0.8})`);
        grad.addColorStop(0.4,`hsla(${p.hue},${p.sat}%,${p.lum-20}%,${t*0.2})`);
        grad.addColorStop(1,`hsla(${p.hue},${p.sat}%,${p.lum-30}%,0)`);
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(p.x,p.y,p.r*t,0,Math.PI*2); ctx.fill();
      } else {
        ctx.globalAlpha = t*0.75;
        ctx.fillStyle = `hsl(${p.hue},${p.sat||100}%,${(p.lum||55)+(1-t)*20}%)`;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r*t,0,Math.PI*2); ctx.fill();
      }
    });
    ctx.globalAlpha = 1;
    d.particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vx*=0.98; p.vy*=0.98; p.vy+=0.02; p.life--; });
    d.particles = d.particles.filter(p => p.life > 0);
  });
}

// ========== SIGNS ==========
const PX = {
  A:[0b01110,0b10001,0b11111,0b10001,0b10001], C:[0b01111,0b10000,0b10000,0b10000,0b01111],
  D:[0b11110,0b10001,0b10001,0b10001,0b11110], E:[0b11111,0b10000,0b11110,0b10000,0b11111],
  G:[0b01111,0b10000,0b10011,0b10001,0b01111], H:[0b10001,0b10001,0b11111,0b10001,0b10001],
  I:[0b11111,0b00100,0b00100,0b00100,0b11111], K:[0b10001,0b10010,0b11100,0b10010,0b10001],
  L:[0b10000,0b10000,0b10000,0b10000,0b11111], N:[0b10001,0b11001,0b10101,0b10011,0b10001],
  O:[0b01110,0b10001,0b10001,0b10001,0b01110], P:[0b11110,0b10001,0b11110,0b10000,0b10000],
  Q:[0b01110,0b10001,0b10101,0b10010,0b01101], R:[0b11110,0b10001,0b11110,0b10010,0b10001],
  S:[0b01111,0b10000,0b01110,0b00001,0b11110], T:[0b11111,0b00100,0b00100,0b00100,0b00100],
  U:[0b10001,0b10001,0b10001,0b10001,0b01110], V:[0b10001,0b10001,0b10001,0b01010,0b00100],
  X:[0b10001,0b01010,0b00100,0b01010,0b10001], Z:[0b11111,0b00010,0b00100,0b01000,0b11111],
  a:[0b00000,0b01110,0b00001,0b01111,0b01111], e:[0b00000,0b01110,0b11111,0b10000,0b01110],
  n:[0b00000,0b10110,0b11001,0b10001,0b10001], s:[0b00000,0b01111,0b01000,0b00110,0b11110],
  '0':[0b01110,0b10011,0b10101,0b11001,0b01110], '1':[0b00110,0b10100,0b00100,0b00100,0b11111],
  '-':[0b00000,0b00000,0b11111,0b00000,0b00000], ' ':[0b00000,0b00000,0b00000,0b00000,0b00000],
};

function drawPxSign(ctx, text, sx, sy, color, scale, flicker) {
  ctx.fillStyle = color;
  for (let ci = 0; ci < text.length; ci++) {
    const rows = PX[text[ci]]; if (!rows) continue;
    const cx = sx + ci * 6 * scale;
    for (let r = 0; r < 5; r++)
      for (let c = 0; c < 5; c++)
        if ((rows[r] >> (4 - c)) & 1)
          ctx.fillRect(cx + c * scale, sy + r * scale, scale, scale);
  }
}

addCard('signs', 'Logo Collection — All Signs', 'Every sign text rendered in neon pixel font with random colours. These are the available logos for buildings.', 620, 200, (ctx, w, h) => {
  ctx.fillStyle = '#0a0a18'; ctx.fillRect(0, 0, w, h);
  const cols = 4, rowH = 24, scale = 1.3;
  const colW = w / cols;
  signLogos.forEach((s, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    const sx = col * colW + 10;
    const sy = 10 + row * (rowH + 14);
    const hue = (i * 137 + 43) % 360;
    const color = `hsl(${hue}, 100%, 65%)`;
    const flk = Math.sin(tick * 0.06 + i * 3.7) > -0.85 ? 0.85 : 0.2;
    // Glow backdrop
    const tw = s.text.length * 6 * scale;
    ctx.globalAlpha = 0.12 * flk; ctx.fillStyle = color;
    ctx.fillRect(sx - 2, sy - 1, tw + 4, 10);
    // Text
    ctx.globalAlpha = flk;
    drawPxSign(ctx, s.text, sx, sy, color, scale, flk);
    // Label
    ctx.globalAlpha = 0.4; ctx.font = '9px monospace'; ctx.fillStyle = '#888';
    ctx.fillText(s.desc, sx, sy + 16);
    ctx.globalAlpha = 1;
  });
});

// ========== RENDER ==========
function renderAll() {
  tick++;
  allCanvases.forEach(({ canvas, draw }) => draw(canvas.getContext('2d'), canvas.width, canvas.height));
  requestAnimationFrame(renderAll);
}
renderAll();
