<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUKE VARIATIONS — ANIMATED</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    min-height: 100vh;
  }
  h1 {
    font-size: 28px;
    letter-spacing: 6px;
    color: #ff6600;
    text-shadow: 0 0 20px rgba(255,102,0,0.5);
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 12px;
    color: #666;
    margin-bottom: 20px;
    letter-spacing: 2px;
  }
  .canvases {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 20px;
  }
  .canvas-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .canvas-wrap canvas {
    border: 1px solid #333;
    border-radius: 4px;
  }
  .label {
    font-size: 14px;
    letter-spacing: 3px;
    color: #aaa;
  }
  .label span {
    color: #ff6600;
  }
  #restartBtn {
    background: #222;
    color: #ff6600;
    border: 1px solid #ff6600;
    padding: 10px 30px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  #restartBtn:hover {
    background: #ff6600;
    color: #0a0a1a;
  }
  .timer {
    font-size: 12px;
    color: #555;
    margin-top: 10px;
  }
</style>
</head>
<body>

<h1>NUKE VARIATIONS — ANIMATED</h1>
<div class="subtitle">11-SECOND LOOP &bull; requestAnimationFrame &bull; CANVAS 2D</div>

<div class="canvases">
  <div class="canvas-wrap">
    <canvas id="cvA" width="300" height="400"></canvas>
    <div class="label">A: <span>CLASSIC</span></div>
  </div>
  <div class="canvas-wrap">
    <canvas id="cvB" width="300" height="400"></canvas>
    <div class="label">B: <span>TSAR BOMBA</span></div>
  </div>
  <div class="canvas-wrap">
    <canvas id="cvC" width="300" height="400"></canvas>
    <div class="label">C: <span>NEUTRON STAR</span></div>
  </div>
</div>

<button id="restartBtn" onclick="restart()">RESTART ALL</button>
<div class="timer" id="timerDisplay">0.00s / 11.00s</div>

<script>
const W = 300, H = 400;
const DURATION = 11000; // ms
const cvA = document.getElementById('cvA');
const cvB = document.getElementById('cvB');
const cvC = document.getElementById('cvC');
const ctxA = cvA.getContext('2d');
const ctxB = cvB.getContext('2d');
const ctxC = cvC.getContext('2d');
const timerDisplay = document.getElementById('timerDisplay');

let startTime = 0;
let stars = [];
let cityA = [], cityB = [], cityC = [];
let embersA = [], embersB = [], embersC = [];

// --- Utility ---
function lerp(a, b, t) { return a + (b - a) * Math.max(0, Math.min(1, t)); }
function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function rand(a, b) { return a + Math.random() * (b - a); }
function progress(t, start, end) { return clamp((t - start) / (end - start), 0, 1); }

// --- Init stars (shared positions, generated once) ---
function initStars() {
  stars = [];
  for (let i = 0; i < 60; i++) {
    stars.push({ x: rand(0, W), y: rand(0, H * 0.7), r: rand(0.5, 1.5), brightness: rand(0.3, 1) });
  }
}

// --- Init city silhouette ---
function initCity(arr) {
  arr.length = 0;
  let x = 0;
  while (x < W) {
    const bw = rand(12, 35);
    const bh = rand(20, 70);
    arr.push({ x, w: bw, h: bh });
    x += bw + rand(2, 8);
  }
}

// --- Init ember particles ---
function initEmbers(arr, count, spread) {
  arr.length = 0;
  for (let i = 0; i < count; i++) {
    arr.push({
      x: rand(W * 0.2, W * 0.8),
      y: rand(H * 0.2, H * 0.6),
      vx: rand(-spread, spread),
      vy: rand(-2, 1),
      size: rand(1, 3),
      life: rand(0.5, 4),
      born: rand(0.6, 3),
      color: `hsl(${rand(15, 45)}, 100%, ${rand(50, 80)}%)`
    });
  }
}

function initEmbersBlue(arr, count) {
  arr.length = 0;
  for (let i = 0; i < count; i++) {
    arr.push({
      x: rand(W * 0.1, W * 0.9),
      y: rand(H * 0.15, H * 0.65),
      vx: rand(-1.5, 1.5),
      vy: rand(-1.5, 0.5),
      size: rand(1, 2.5),
      life: rand(0.5, 3.5),
      born: rand(0.6, 3),
      color: `hsl(${rand(220, 280)}, 100%, ${rand(60, 90)}%)`
    });
  }
}

// --- Draw background (sky + stars + city) ---
function drawBackground(ctx, skyColor, starAlpha, cityColor) {
  // Sky
  ctx.fillStyle = skyColor;
  ctx.fillRect(0, 0, W, H);

  // Stars
  if (starAlpha > 0.01) {
    for (const s of stars) {
      ctx.globalAlpha = s.brightness * starAlpha;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

function drawCity(ctx, cityArr, color, glowColor, glowAlpha) {
  const groundY = H - 10;
  // Ground
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, groundY, W, 10);

  // Glow on city from blast
  if (glowAlpha > 0.01) {
    ctx.save();
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = 30 * glowAlpha;
    ctx.fillStyle = `rgba(0,0,0,0)`;
    ctx.fillRect(0, groundY - 80, W, 80);
    ctx.restore();
  }

  // Buildings
  ctx.fillStyle = color;
  for (const b of cityArr) {
    ctx.fillRect(b.x, groundY - b.h, b.w, b.h);
    // Window dots
    for (let wy = groundY - b.h + 5; wy < groundY - 3; wy += 8) {
      for (let wx = b.x + 3; wx < b.x + b.w - 3; wx += 6) {
        ctx.fillStyle = 'rgba(255,255,200,0.15)';
        ctx.fillRect(wx, wy, 2, 2);
      }
    }
    ctx.fillStyle = color;
  }
}

// --- Draw embers ---
function drawEmbers(ctx, embers, t) {
  for (const e of embers) {
    const age = t - e.born;
    if (age < 0 || age > e.life) continue;
    const fade = 1 - (age / e.life);
    const px = e.x + e.vx * age * 30;
    const py = e.y + e.vy * age * 30 + 0.5 * 15 * age * age; // gravity
    ctx.globalAlpha = fade * 0.8;
    ctx.fillStyle = e.color;
    ctx.shadowColor = e.color;
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(px, py, e.size * fade, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

// ==========================
// STYLE A: CLASSIC
// ==========================
function drawClassic(t) {
  const ctx = ctxA;
  const ts = t / 1000; // seconds

  // Sky color
  const flashP = progress(ts, 0, 0.3);
  const glowP = progress(ts, 0.3, 5);
  const returnP = progress(ts, 6.5, 10);
  let skyR = lerp(10, 40, (1 - glowP) * (1 - returnP));
  let skyG = lerp(10, 20, (1 - glowP) * (1 - returnP));
  let skyB = lerp(26, 10, (1 - glowP) * (1 - returnP));
  if (flashP < 1) {
    const fl = flashP < 0.5 ? flashP * 2 : 2 - flashP * 2;
    skyR = lerp(skyR, 255, fl * 0.6);
    skyG = lerp(skyG, 200, fl * 0.6);
    skyB = lerp(skyB, 150, fl * 0.4);
  }
  if (glowP > 0 && glowP < 1) {
    skyR = lerp(skyR, 80, (1 - glowP) * 0.5);
    skyG = lerp(skyG, 30, (1 - glowP) * 0.3);
  }

  const starAlpha = lerp(0, 1, returnP) * (flashP >= 1 ? 1 : 0);
  drawBackground(ctx, `rgb(${Math.round(skyR)},${Math.round(skyG)},${Math.round(skyB)})`, returnP > 0.5 ? returnP : 0);

  // Shockwave ring
  const shockP = progress(ts, 0.2, 2);
  if (shockP > 0 && shockP < 1) {
    const radius = shockP * 200;
    ctx.strokeStyle = `rgba(255,180,80,${(1 - shockP) * 0.6})`;
    ctx.lineWidth = 3 * (1 - shockP);
    ctx.shadowColor = 'rgba(255,150,50,0.5)';
    ctx.shadowBlur = 10 * (1 - shockP);
    ctx.beginPath();
    ctx.arc(W / 2, H * 0.45, radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Mushroom cloud
  const riseP = progress(ts, 0.1, 3);
  const darkenP = progress(ts, 2, 4.5);
  const fadeP = progress(ts, 6.5, 8);
  const cloudAlpha = 1 - fadeP;

  if (riseP > 0 && cloudAlpha > 0.01) {
    const cx = W / 2;
    const capY = lerp(H * 0.7, H * 0.25, ease(riseP));
    const capW = lerp(20, 100, ease(riseP));
    const capH = lerp(10, 45, ease(riseP));
    const stemW = lerp(8, 30, ease(riseP));
    const baseY = H * 0.78;

    // Color transition: orange -> dark
    const r = Math.round(lerp(255, 30, darkenP));
    const g = Math.round(lerp(120, 15, darkenP));
    const b = Math.round(lerp(30, 10, darkenP));

    ctx.globalAlpha = cloudAlpha;

    // Stem
    const stemGrad = ctx.createLinearGradient(cx - stemW, capY, cx + stemW, capY);
    stemGrad.addColorStop(0, `rgba(${r-30},${g-20},${b},${cloudAlpha})`);
    stemGrad.addColorStop(0.5, `rgba(${r},${g},${b},${cloudAlpha})`);
    stemGrad.addColorStop(1, `rgba(${r-30},${g-20},${b},${cloudAlpha})`);
    ctx.fillStyle = stemGrad;
    ctx.beginPath();
    ctx.moveTo(cx - stemW * 0.6, baseY);
    ctx.lineTo(cx - stemW * 0.4, capY + capH * 0.5);
    ctx.lineTo(cx + stemW * 0.4, capY + capH * 0.5);
    ctx.lineTo(cx + stemW * 0.6, baseY);
    ctx.closePath();
    ctx.fill();

    // Cap glow
    if (darkenP < 0.8) {
      ctx.shadowColor = `rgba(255,120,20,${(1 - darkenP) * 0.6 * cloudAlpha})`;
      ctx.shadowBlur = 30 * (1 - darkenP);
    }

    // Cap (ellipse)
    const capGrad = ctx.createRadialGradient(cx, capY, 0, cx, capY, capW);
    capGrad.addColorStop(0, `rgba(${Math.min(255, r+40)},${Math.min(255, g+30)},${b+20},${cloudAlpha})`);
    capGrad.addColorStop(0.6, `rgba(${r},${g},${b},${cloudAlpha})`);
    capGrad.addColorStop(1, `rgba(${r-20},${Math.max(0, g-15)},${b},${cloudAlpha * 0.7})`);
    ctx.fillStyle = capGrad;
    ctx.beginPath();
    ctx.ellipse(cx, capY, capW, capH, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // 3 concentric cloud bands (wavy lines across cap)
    if (riseP > 0.3) {
      const bandAlpha = cloudAlpha * (1 - darkenP * 0.5) * Math.min(1, (riseP - 0.3) * 3);
      for (let band = 0; band < 3; band++) {
        const bandY = capY - capH * 0.4 + (band * capH * 0.35);
        const bandW = capW * (0.5 + band * 0.2);
        ctx.strokeStyle = `rgba(${Math.min(255,r+60)},${Math.min(255,g+40)},${b+30},${bandAlpha * 0.5})`;
        ctx.lineWidth = 1.5 - band * 0.2;
        ctx.beginPath();
        for (let i = -bandW; i <= bandW; i += 3) {
          const wave = Math.sin(i * 0.1 + ts * 2 + band) * 3 * (1 + band * 0.3);
          const ellipseScale = Math.sqrt(1 - (i * i) / (bandW * bandW + 1));
          if (i === -bandW) ctx.moveTo(cx + i, bandY + wave * ellipseScale);
          else ctx.lineTo(cx + i, bandY + wave * ellipseScale);
        }
        ctx.stroke();
      }
    }

    ctx.globalAlpha = 1;
  }

  // Embers
  if (ts > 0.6) drawEmbers(ctx, embersA, ts);

  // City
  const cityGlow = (1 - progress(ts, 0.3, 5)) * (flashP >= 0.3 ? 1 : flashP / 0.3);
  drawCity(ctx, cityA, '#111', '#ff6600', cityGlow);

  // Flash overlay
  if (flashP < 1) {
    const fl = flashP < 0.3 ? flashP / 0.3 : 1 - (flashP - 0.3) / 0.7;
    ctx.fillStyle = `rgba(255,255,240,${fl * 0.9})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// ==========================
// STYLE B: TSAR BOMBA
// ==========================
function drawTsarBomba(t) {
  const ctx = ctxB;
  const ts = t / 1000;

  // Sky — goes much brighter
  const flashP = progress(ts, 0, 0.3);
  const glowP = progress(ts, 0.3, 5.5);
  const returnP = progress(ts, 7, 10.5);
  let skyR = lerp(10, 60, (1 - glowP) * (1 - returnP));
  let skyG = lerp(10, 25, (1 - glowP) * (1 - returnP));
  let skyB = lerp(26, 8, (1 - glowP) * (1 - returnP));
  if (flashP < 1) {
    const fl = flashP < 0.4 ? flashP / 0.4 : 1 - (flashP - 0.4) / 0.6;
    skyR = lerp(skyR, 255, fl * 0.85);
    skyG = lerp(skyG, 245, fl * 0.8);
    skyB = lerp(skyB, 220, fl * 0.7);
  }
  if (glowP > 0 && glowP < 1) {
    skyR = lerp(skyR, 120, (1 - glowP) * 0.6);
    skyG = lerp(skyG, 50, (1 - glowP) * 0.3);
  }

  drawBackground(ctx, `rgb(${Math.round(skyR)},${Math.round(skyG)},${Math.round(skyB)})`, returnP > 0.5 ? returnP : 0);

  // Shockwave — bigger
  const shockP = progress(ts, 0.2, 2.5);
  if (shockP > 0 && shockP < 1) {
    const radius = shockP * 250;
    ctx.strokeStyle = `rgba(255,200,100,${(1 - shockP) * 0.7})`;
    ctx.lineWidth = 4 * (1 - shockP);
    ctx.shadowColor = 'rgba(255,180,60,0.6)';
    ctx.shadowBlur = 15 * (1 - shockP);
    ctx.beginPath();
    ctx.arc(W / 2, H * 0.4, radius, 0, Math.PI * 2);
    ctx.stroke();
    // Second ring
    ctx.strokeStyle = `rgba(255,160,60,${(1 - shockP) * 0.4})`;
    ctx.lineWidth = 2 * (1 - shockP);
    ctx.beginPath();
    ctx.arc(W / 2, H * 0.4, radius * 0.7, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Mushroom cloud — MASSIVE
  const riseP = progress(ts, 0.1, 3.5);
  const darkenP = progress(ts, 2.5, 5);
  const fadeP = progress(ts, 7, 9);
  const cloudAlpha = 1 - fadeP;

  if (riseP > 0 && cloudAlpha > 0.01) {
    const cx = W / 2;
    const capY = lerp(H * 0.7, H * 0.18, ease(riseP));
    const capW = lerp(30, 120, ease(riseP)); // 80% of 300/2 = 120
    const capH = lerp(15, 55, ease(riseP));
    const stemW = lerp(12, 45, ease(riseP));
    const baseY = H * 0.78;

    const r = Math.round(lerp(255, 25, darkenP));
    const g = Math.round(lerp(140, 12, darkenP));
    const b2 = Math.round(lerp(40, 8, darkenP));

    ctx.globalAlpha = cloudAlpha;

    // Ground debris cloud
    if (riseP > 0.2) {
      const debrisP = Math.min(1, (riseP - 0.2) / 0.8);
      const debrisW = lerp(20, 120, ease(debrisP));
      const debrisH = lerp(5, 25, ease(debrisP));
      const debrisGrad = ctx.createRadialGradient(cx, baseY, 0, cx, baseY, debrisW);
      debrisGrad.addColorStop(0, `rgba(${r},${g-10},${b2},${cloudAlpha * 0.7})`);
      debrisGrad.addColorStop(1, `rgba(${r-30},${Math.max(0,g-30)},${b2},0)`);
      ctx.fillStyle = debrisGrad;
      ctx.beginPath();
      ctx.ellipse(cx, baseY, debrisW, debrisH, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Stem with turbulent wavy edges
    ctx.fillStyle = `rgba(${r-20},${Math.max(0,g-15)},${b2},${cloudAlpha})`;
    ctx.beginPath();
    ctx.moveTo(cx - stemW * 0.7, baseY);
    for (let y = baseY; y >= capY + capH * 0.4; y -= 3) {
      const pct = (baseY - y) / (baseY - capY);
      const waveL = Math.sin(y * 0.08 + ts * 3) * 4 * (1 - pct);
      ctx.lineTo(cx - stemW * lerp(0.7, 0.35, pct) + waveL, y);
    }
    for (let y = capY + capH * 0.4; y <= baseY; y += 3) {
      const pct = (baseY - y) / (baseY - capY);
      const waveR = Math.sin(y * 0.08 + ts * 3 + 2) * 4 * (1 - pct);
      ctx.lineTo(cx + stemW * lerp(0.7, 0.35, pct) + waveR, y);
    }
    ctx.closePath();
    ctx.fill();

    // Cap glow
    if (darkenP < 0.7) {
      ctx.shadowColor = `rgba(255,140,30,${(1 - darkenP) * 0.7 * cloudAlpha})`;
      ctx.shadowBlur = 40 * (1 - darkenP);
    }

    // Main cap
    const capGrad = ctx.createRadialGradient(cx, capY, 0, cx, capY, capW);
    capGrad.addColorStop(0, `rgba(${Math.min(255,r+50)},${Math.min(255,g+40)},${b2+30},${cloudAlpha})`);
    capGrad.addColorStop(0.5, `rgba(${r},${g},${b2},${cloudAlpha})`);
    capGrad.addColorStop(1, `rgba(${Math.max(0,r-30)},${Math.max(0,g-20)},${b2},${cloudAlpha * 0.6})`);
    ctx.fillStyle = capGrad;
    ctx.beginPath();
    ctx.ellipse(cx, capY, capW, capH, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Double fireball: white-hot inner core
    if (darkenP < 0.6) {
      const coreAlpha = (1 - darkenP / 0.6) * cloudAlpha;
      const coreGrad = ctx.createRadialGradient(cx, capY, 0, cx, capY, capW * 0.35);
      coreGrad.addColorStop(0, `rgba(255,255,240,${coreAlpha})`);
      coreGrad.addColorStop(0.4, `rgba(255,220,150,${coreAlpha * 0.7})`);
      coreGrad.addColorStop(1, `rgba(255,160,60,0)`);
      ctx.fillStyle = coreGrad;
      ctx.beginPath();
      ctx.ellipse(cx, capY, capW * 0.35, capH * 0.4, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // 5-6 concentric cloud bands
    if (riseP > 0.25) {
      const bandAlpha = cloudAlpha * (1 - darkenP * 0.6) * Math.min(1, (riseP - 0.25) * 3);
      for (let band = 0; band < 6; band++) {
        const bandY = capY - capH * 0.5 + (band * capH * 0.2);
        const bandW = capW * (0.3 + band * 0.13);
        ctx.strokeStyle = `rgba(${Math.min(255,r+70)},${Math.min(255,g+50)},${b2+40},${bandAlpha * 0.4})`;
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        for (let i = -bandW; i <= bandW; i += 2) {
          const wave = Math.sin(i * 0.08 + ts * 1.8 + band * 0.7) * 3 * (1 + band * 0.2);
          const ellipseScale = Math.sqrt(Math.max(0, 1 - (i * i) / (bandW * bandW + 1)));
          if (i === -bandW) ctx.moveTo(cx + i, bandY + wave * ellipseScale);
          else ctx.lineTo(cx + i, bandY + wave * ellipseScale);
        }
        ctx.stroke();
      }
    }

    ctx.globalAlpha = 1;
  }

  // Embers — more and larger
  if (ts > 0.6) drawEmbers(ctx, embersB, ts);

  // City
  const cityGlow = (1 - progress(ts, 0.3, 5.5)) * (flashP >= 0.3 ? 1 : flashP / 0.3);
  drawCity(ctx, cityB, '#111', '#ff8800', cityGlow);

  // Flash overlay — almost white
  if (flashP < 1) {
    const fl = flashP < 0.25 ? flashP / 0.25 : 1 - (flashP - 0.25) / 0.75;
    ctx.fillStyle = `rgba(255,255,255,${fl * 0.95})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// ==========================
// STYLE C: NEUTRON STAR
// ==========================
function drawNeutronStar(t) {
  const ctx = ctxC;
  const ts = t / 1000;

  // Sky — blue-purple tint
  const flashP = progress(ts, 0, 0.3);
  const glowP = progress(ts, 0.3, 5);
  const returnP = progress(ts, 6.5, 10);
  let skyR = lerp(10, 20, (1 - glowP) * (1 - returnP));
  let skyG = lerp(10, 12, (1 - glowP) * (1 - returnP));
  let skyB = lerp(26, 60, (1 - glowP) * (1 - returnP));
  if (flashP < 1) {
    const fl = flashP < 0.3 ? flashP / 0.3 : 1 - (flashP - 0.3) / 0.7;
    skyR = lerp(skyR, 200, fl * 0.5);
    skyG = lerp(skyG, 180, fl * 0.5);
    skyB = lerp(skyB, 255, fl * 0.8);
  }
  if (glowP > 0 && glowP < 1) {
    skyR = lerp(skyR, 30, (1 - glowP) * 0.3);
    skyG = lerp(skyG, 15, (1 - glowP) * 0.2);
    skyB = lerp(skyB, 90, (1 - glowP) * 0.5);
  }

  drawBackground(ctx, `rgb(${Math.round(skyR)},${Math.round(skyG)},${Math.round(skyB)})`, returnP > 0.5 ? returnP : 0);

  const cx = W / 2;
  const cy = H * 0.4;

  // Shockwave rings — 4 concentric energy rings
  const shockP = progress(ts, 0.2, 2.5);
  if (shockP > 0 && shockP < 1) {
    for (let ring = 0; ring < 4; ring++) {
      const ringDelay = ring * 0.15;
      const rp = clamp((shockP - ringDelay) / (1 - ringDelay), 0, 1);
      if (rp <= 0) continue;
      const radius = rp * (160 + ring * 25);
      const alpha = (1 - rp) * 0.5;
      ctx.strokeStyle = `rgba(${150 + ring * 25},${100 + ring * 20},255,${alpha})`;
      ctx.lineWidth = (3 - ring * 0.5) * (1 - rp);
      ctx.shadowColor = `rgba(120,80,255,${alpha})`;
      ctx.shadowBlur = 12 * (1 - rp);
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
  }

  // Spherical energy burst
  const riseP = progress(ts, 0.1, 2.5);
  const pulseP = progress(ts, 0.5, 5);
  const dissipateP = progress(ts, 5, 8);
  const sphereAlpha = 1 - dissipateP;

  if (riseP > 0 && sphereAlpha > 0.01) {
    const sphereR = lerp(5, 80, ease(riseP));

    // Pulsing halo
    if (pulseP > 0 && pulseP < 1) {
      const pulse = 0.7 + 0.3 * Math.sin(ts * 6);
      const haloR = sphereR * (1.4 + 0.15 * pulse);
      const haloGrad = ctx.createRadialGradient(cx, cy, sphereR * 0.8, cx, cy, haloR);
      haloGrad.addColorStop(0, `rgba(150,100,255,${sphereAlpha * 0.3 * pulse})`);
      haloGrad.addColorStop(1, `rgba(100,50,200,0)`);
      ctx.fillStyle = haloGrad;
      ctx.beginPath();
      ctx.arc(cx, cy, haloR, 0, Math.PI * 2);
      ctx.fill();
    }

    // Outer sphere — blue/purple
    ctx.globalAlpha = sphereAlpha;
    const outerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, sphereR);
    outerGrad.addColorStop(0, `rgba(255,255,255,${sphereAlpha})`);
    outerGrad.addColorStop(0.2, `rgba(200,180,255,${sphereAlpha})`);
    outerGrad.addColorStop(0.5, `rgba(120,80,220,${sphereAlpha * 0.8})`);
    outerGrad.addColorStop(0.8, `rgba(80,40,180,${sphereAlpha * 0.5})`);
    outerGrad.addColorStop(1, `rgba(50,20,120,0)`);
    ctx.fillStyle = outerGrad;
    ctx.shadowColor = `rgba(130,80,255,${sphereAlpha * 0.8})`;
    ctx.shadowBlur = 30 * sphereAlpha;
    ctx.beginPath();
    ctx.arc(cx, cy, sphereR, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // White-hot center
    if (dissipateP < 0.5) {
      const coreA = (1 - dissipateP * 2) * sphereAlpha;
      const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, sphereR * 0.3);
      coreGrad.addColorStop(0, `rgba(255,255,255,${coreA})`);
      coreGrad.addColorStop(1, `rgba(200,180,255,0)`);
      ctx.fillStyle = coreGrad;
      ctx.beginPath();
      ctx.arc(cx, cy, sphereR * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    // 6 lightning/electric tendrils
    if (riseP > 0.2 && dissipateP < 0.8) {
      const tendrilAlpha = sphereAlpha * (1 - dissipateP) * Math.min(1, (riseP - 0.2) * 3);
      for (let i = 0; i < 6; i++) {
        const baseAngle = (Math.PI * 2 / 6) * i + ts * 0.3;
        const tendrilLen = sphereR * lerp(1.5, 2.5, 0.5 + 0.5 * Math.sin(ts * 3 + i));
        ctx.strokeStyle = `rgba(180,140,255,${tendrilAlpha * 0.7})`;
        ctx.lineWidth = 2;
        ctx.shadowColor = `rgba(150,100,255,${tendrilAlpha * 0.5})`;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.moveTo(
          cx + Math.cos(baseAngle) * sphereR * 0.8,
          cy + Math.sin(baseAngle) * sphereR * 0.8
        );
        // Jagged lightning segments
        const segments = 6;
        for (let s = 1; s <= segments; s++) {
          const pct = s / segments;
          const jitterX = (Math.random() - 0.5) * 20 * (1 - pct);
          const jitterY = (Math.random() - 0.5) * 20 * (1 - pct);
          ctx.lineTo(
            cx + Math.cos(baseAngle) * sphereR * 0.8 + Math.cos(baseAngle) * tendrilLen * pct + jitterX,
            cy + Math.sin(baseAngle) * sphereR * 0.8 + Math.sin(baseAngle) * tendrilLen * pct + jitterY
          );
        }
        ctx.stroke();
      }
      ctx.shadowBlur = 0;
    }

    // Downward beam of light
    if (riseP > 0.15 && dissipateP < 0.7) {
      const beamAlpha = sphereAlpha * (1 - dissipateP) * Math.min(1, riseP * 4);
      const beamGrad = ctx.createLinearGradient(cx, cy + sphereR * 0.5, cx, H * 0.85);
      beamGrad.addColorStop(0, `rgba(160,120,255,${beamAlpha * 0.6})`);
      beamGrad.addColorStop(0.7, `rgba(120,80,200,${beamAlpha * 0.3})`);
      beamGrad.addColorStop(1, `rgba(100,60,180,0)`);
      ctx.fillStyle = beamGrad;
      const beamTopW = 8;
      const beamBotW = 25 + Math.sin(ts * 4) * 5;
      ctx.beginPath();
      ctx.moveTo(cx - beamTopW, cy + sphereR * 0.5);
      ctx.lineTo(cx - beamBotW, H * 0.85);
      ctx.lineTo(cx + beamBotW, H * 0.85);
      ctx.lineTo(cx + beamTopW, cy + sphereR * 0.5);
      ctx.closePath();
      ctx.fill();

      // Impact glow on ground
      const impactGrad = ctx.createRadialGradient(cx, H * 0.82, 0, cx, H * 0.82, 50);
      impactGrad.addColorStop(0, `rgba(180,140,255,${beamAlpha * 0.5})`);
      impactGrad.addColorStop(1, `rgba(120,80,200,0)`);
      ctx.fillStyle = impactGrad;
      ctx.beginPath();
      ctx.ellipse(cx, H * 0.82, 50, 12, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.globalAlpha = 1;
  }

  // Embers (blue-ish)
  if (ts > 0.6) drawEmbers(ctx, embersC, ts);

  // City
  const cityGlow = (1 - progress(ts, 0.3, 5)) * (flashP >= 0.3 ? 1 : flashP / 0.3);
  drawCity(ctx, cityC, '#0e0e18', '#8855ff', cityGlow);

  // Flash overlay — blue-white
  if (flashP < 1) {
    const fl = flashP < 0.3 ? flashP / 0.3 : 1 - (flashP - 0.3) / 0.7;
    ctx.fillStyle = `rgba(220,220,255,${fl * 0.85})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// ==========================
// MAIN LOOP
// ==========================
function init() {
  initStars();
  initCity(cityA);
  initCity(cityB);
  initCity(cityC);
  initEmbers(embersA, 40, 1);
  initEmbers(embersB, 70, 1.5);
  initEmbersBlue(embersC, 50);
  startTime = performance.now();
}

function restart() {
  init();
}

function frame(now) {
  const elapsed = (now - startTime) % DURATION;
  const ts = elapsed / 1000;
  timerDisplay.textContent = `${ts.toFixed(2)}s / 11.00s`;

  drawClassic(elapsed);
  drawTsarBomba(elapsed);
  drawNeutronStar(elapsed);

  requestAnimationFrame(frame);
}

init();
requestAnimationFrame(frame);
</script>

</body>
</html>
