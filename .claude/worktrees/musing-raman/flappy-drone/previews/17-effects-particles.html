<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EFFECTS &amp; PARTICLES</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a12; color: #eee; font-family: monospace; padding: 20px; }
  h1 { text-align: center; font-size: 22px; margin-bottom: 18px; color: #f80; text-shadow: 0 0 10px #f80; letter-spacing: 4px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 540px; margin: 0 auto; }
  .cell { text-align: center; }
  .cell canvas { border: 1px solid #222; border-radius: 4px; background: #08080f; }
  .label { font-size: 11px; color: #888; margin-top: 4px; letter-spacing: 1px; }
</style>
</head>
<body>
<h1>EFFECTS &amp; PARTICLES</h1>
<div class="grid">
  <div class="cell"><canvas id="cA" width="250" height="200"></canvas><div class="label">A. Regular Explosion</div></div>
  <div class="cell"><canvas id="cB" width="250" height="200"></canvas><div class="label">B. Thrust Burster</div></div>
  <div class="cell"><canvas id="cC" width="250" height="200"></canvas><div class="label">C. Willow Cascade</div></div>
  <div class="cell"><canvas id="cD" width="250" height="200"></canvas><div class="label">D. Classic Burst</div></div>
</div>
<script>
const LOOP_MS = 3000;

// ===== A: Regular Explosion =====
(function(){
  const c = document.getElementById('cA');
  const ctx = c.getContext('2d');
  let particles, debris, smoke, shrapnel, flashAlpha, t;

  function reset() {
    t = 0; flashAlpha = 1.0;
    const cx = 125, cy = 110;
    particles = [];
    for (let i = 0; i < 18; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.5 + Math.random() * 3;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 1,
        life: 40 + Math.random() * 40,
        maxLife: 80,
        size: 2 + Math.random() * 2,
        color: Math.random() > 0.4 ? `hsl(${30 + Math.random()*20}, 100%, ${50+Math.random()*30}%)` : '#ff4'
      });
    }
    debris = [];
    for (let i = 0; i < 8; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 2.5;
      debris.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 1.5,
        life: 50 + Math.random() * 30,
        w: 2 + Math.random() * 4,
        h: 2 + Math.random() * 3,
        rot: Math.random() * 6.28,
        rv: (Math.random() - 0.5) * 0.2
      });
    }
    smoke = { x: cx, y: cy, r: 3, alpha: 0.6 };
    shrapnel = [];
    for (let i = 0; i < 25; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 3 + Math.random() * 4;
      shrapnel.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 15 + Math.random() * 20
      });
    }
  }
  reset();

  function draw() {
    ctx.clearRect(0, 0, 250, 200);
    // ground reference
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 160, 250, 40);
    // small building to explode against
    ctx.fillStyle = '#222';
    ctx.fillRect(90, 80, 70, 80);

    t++;
    if (t > 180) reset(); // 3s at 60fps

    // Flash
    if (flashAlpha > 0) {
      ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
      ctx.beginPath();
      ctx.arc(125, 110, 20, 0, Math.PI * 2);
      ctx.fill();
      flashAlpha -= 0.15;
    }

    // Smoke puff
    if (smoke.alpha > 0) {
      smoke.r += 0.5;
      smoke.alpha -= 0.006;
      ctx.fillStyle = `rgba(80,80,80,${Math.max(0, smoke.alpha)})`;
      ctx.beginPath();
      ctx.arc(smoke.x, smoke.y, smoke.r, 0, Math.PI * 2);
      ctx.fill();
    }

    // Particles
    for (const p of particles) {
      if (p.life <= 0) continue;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05; // gravity
      p.life--;
      const alpha = p.life / p.maxLife;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 4;
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    // Debris
    for (const d of debris) {
      if (d.life <= 0) continue;
      d.x += d.vx;
      d.y += d.vy;
      d.vy += 0.06;
      d.rot += d.rv;
      d.life--;
      ctx.save();
      ctx.translate(d.x, d.y);
      ctx.rotate(d.rot);
      ctx.fillStyle = `rgba(100,80,60,${d.life/80})`;
      ctx.fillRect(-d.w/2, -d.h/2, d.w, d.h);
      ctx.restore();
    }

    // Shrapnel
    for (const s of shrapnel) {
      if (s.life <= 0) continue;
      s.x += s.vx;
      s.y += s.vy;
      s.life--;
      ctx.fillStyle = `rgba(255,200,100,${s.life/35})`;
      ctx.fillRect(s.x, s.y, 1, 1);
    }
  }

  function loop() { draw(); requestAnimationFrame(loop); }
  loop();
})();

// ===== B: Thrust Burster =====
(function(){
  const c = document.getElementById('cB');
  const ctx = c.getContext('2d');
  let particles, t;
  const droneX = 125, droneY = 50;

  function reset() {
    t = 0;
    particles = [];
  }
  reset();

  function draw() {
    ctx.clearRect(0, 0, 250, 200);
    t++;
    if (t > 180) reset();

    // Drone body (simple rect)
    ctx.fillStyle = '#555';
    ctx.fillRect(droneX - 20, droneY - 5, 40, 10);
    ctx.fillStyle = '#444';
    ctx.fillRect(droneX - 6, droneY + 5, 12, 6);

    // Emission point glow (pulsing)
    const pulseR = 5 + Math.sin(t * 0.3) * 2;
    const grd = ctx.createRadialGradient(droneX, droneY + 11, 0, droneX, droneY + 11, pulseR + 4);
    grd.addColorStop(0, 'rgba(180,220,255,0.9)');
    grd.addColorStop(0.4, 'rgba(100,150,255,0.5)');
    grd.addColorStop(1, 'rgba(100,150,255,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(droneX, droneY + 11, pulseR + 4, 0, Math.PI * 2);
    ctx.fill();

    // Emit new particles each frame
    for (let i = 0; i < 3; i++) {
      const isBlue = Math.random() > 0.3;
      particles.push({
        x: droneX + (Math.random() - 0.5) * 8,
        y: droneY + 12,
        vx: (Math.random() - 0.5) * 0.6,
        vy: 1 + Math.random() * 1.5,
        life: 40 + Math.random() * 30,
        maxLife: 70,
        size: isBlue ? 2 : 1.5,
        blue: isBlue
      });
    }

    // Update and draw particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx += (Math.random() - 0.5) * 0.15; // spread
      p.vy *= 0.985; // slow down
      p.life--;
      if (p.life <= 0) { particles.splice(i, 1); continue; }

      const alpha = p.life / p.maxLife;
      if (p.blue) {
        ctx.fillStyle = `rgba(100,180,255,${alpha})`;
        ctx.shadowColor = '#4af';
        ctx.shadowBlur = 4;
      } else {
        ctx.fillStyle = `rgba(255,150,50,${alpha * 0.7})`;
        ctx.shadowColor = '#f80';
        ctx.shadowBlur = 2;
      }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  function loop() { draw(); requestAnimationFrame(loop); }
  loop();
})();

// ===== C: Willow Cascade =====
(function(){
  const c = document.getElementById('cC');
  const ctx = c.getContext('2d');
  let phase, rocketY, rocketTrail, burstParticles, t, flashAlpha;
  const cx = 125, peakY = 40;

  function reset() {
    t = 0; phase = 'rocket';
    rocketY = 190;
    rocketTrail = [];
    burstParticles = [];
    flashAlpha = 0;
  }
  reset();

  function draw() {
    // Fade trail
    ctx.fillStyle = 'rgba(8,8,15,0.15)';
    ctx.fillRect(0, 0, 250, 200);
    t++;
    if (t > 180) reset();

    if (phase === 'rocket') {
      rocketY -= 2.5;
      // Trail sparkles
      rocketTrail.push({
        x: cx + (Math.random()-0.5)*3,
        y: rocketY + 3,
        life: 15 + Math.random()*10,
        size: 1
      });
      // Draw rocket head
      ctx.fillStyle = '#ffd700';
      ctx.shadowColor = '#ffd700';
      ctx.shadowBlur = 6;
      ctx.fillRect(cx - 1, rocketY - 2, 2, 4);
      ctx.shadowBlur = 0;

      // Draw trail
      for (let i = rocketTrail.length-1; i >= 0; i--) {
        const s = rocketTrail[i];
        s.life--;
        if (s.life <= 0) { rocketTrail.splice(i, 1); continue; }
        ctx.fillStyle = `rgba(255,200,50,${s.life/25})`;
        ctx.fillRect(s.x, s.y, s.size, s.size);
      }

      if (rocketY <= peakY) {
        phase = 'burst';
        flashAlpha = 1;
        // Create willow burst
        const numArms = 24;
        for (let i = 0; i < numArms; i++) {
          const angle = (i / numArms) * Math.PI * 2;
          const speed = 1.5 + Math.random() * 1;
          burstParticles.push({
            x: cx, y: peakY,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 0.5,
            life: 80 + Math.random() * 40,
            maxLife: 120,
            trail: [],
            hue: 35 + Math.random() * 15 // golden/amber
          });
        }
      }
    }

    if (phase === 'burst') {
      // Flash
      if (flashAlpha > 0) {
        ctx.fillStyle = `rgba(255,240,200,${flashAlpha})`;
        ctx.beginPath();
        ctx.arc(cx, peakY, 12, 0, Math.PI * 2);
        ctx.fill();
        flashAlpha -= 0.08;
      }

      for (let i = burstParticles.length-1; i >= 0; i--) {
        const p = burstParticles[i];
        // Store trail position
        p.trail.push({x: p.x, y: p.y});
        if (p.trail.length > 12) p.trail.shift();

        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.025; // gravity droop — willow effect
        p.vx *= 0.995;
        p.life--;
        if (p.life <= 0) { burstParticles.splice(i, 1); continue; }

        const alpha = p.life / p.maxLife;
        const col = `hsla(${p.hue}, 100%, ${50 + alpha*30}%, ${alpha})`;

        // Draw trail
        for (let j = 0; j < p.trail.length; j++) {
          const ta = (j / p.trail.length) * alpha * 0.5;
          ctx.fillStyle = `hsla(${p.hue}, 90%, 50%, ${ta})`;
          ctx.fillRect(p.trail[j].x, p.trail[j].y, 1, 1);
        }

        // Draw head
        ctx.fillStyle = col;
        ctx.shadowColor = `hsl(${p.hue}, 100%, 60%)`;
        ctx.shadowBlur = 3;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.5 * alpha, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.shadowBlur = 0;
    }
  }

  function loop() { draw(); requestAnimationFrame(loop); }
  loop();
})();

// ===== D: Classic Burst =====
(function(){
  const c = document.getElementById('cD');
  const ctx = c.getContext('2d');
  let phase, rocketY, burstParticles, subBursts, t, flashAlpha;
  const cx = 125, peakY = 55;

  function reset() {
    t = 0; phase = 'rocket';
    rocketY = 195;
    burstParticles = [];
    subBursts = [];
    flashAlpha = 0;
  }
  reset();

  function draw() {
    ctx.fillStyle = 'rgba(8,8,15,0.2)';
    ctx.fillRect(0, 0, 250, 200);
    t++;
    if (t > 180) reset();

    if (phase === 'rocket') {
      rocketY -= 3;
      ctx.fillStyle = '#fff';
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 4;
      ctx.fillRect(cx - 1, rocketY, 2, 4);
      ctx.shadowBlur = 0;
      // Trail
      ctx.fillStyle = `rgba(255,150,50,0.6)`;
      ctx.fillRect(cx - 0.5, rocketY + 4, 1, 3 + Math.random()*3);

      if (rocketY <= peakY) {
        phase = 'burst';
        flashAlpha = 1;
        const numP = 40;
        for (let i = 0; i < numP; i++) {
          const angle = (i / numP) * Math.PI * 2 + (Math.random()-0.5)*0.3;
          const speed = 1.2 + Math.random() * 2;
          const hue = Math.random() * 360;
          burstParticles.push({
            x: cx, y: peakY,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 50 + Math.random() * 30,
            maxLife: 80,
            hue,
            crackle: Math.random() > 0.7, // some will sub-burst
            crackled: false,
            trail: []
          });
        }
      }
    }

    if (phase === 'burst') {
      if (flashAlpha > 0) {
        ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
        ctx.beginPath();
        ctx.arc(cx, peakY, 15, 0, Math.PI * 2);
        ctx.fill();
        flashAlpha -= 0.1;
      }

      for (let i = burstParticles.length-1; i >= 0; i--) {
        const p = burstParticles[i];
        p.trail.push({x: p.x, y: p.y});
        if (p.trail.length > 6) p.trail.shift();
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.02;
        p.vx *= 0.99;
        p.life--;

        // Crackle sub-burst
        if (p.crackle && !p.crackled && p.life < p.maxLife * 0.4) {
          p.crackled = true;
          for (let j = 0; j < 6; j++) {
            const a2 = Math.random() * Math.PI * 2;
            const s2 = 0.5 + Math.random() * 1;
            subBursts.push({
              x: p.x, y: p.y,
              vx: Math.cos(a2) * s2,
              vy: Math.sin(a2) * s2,
              life: 15 + Math.random() * 10,
              maxLife: 25,
              hue: p.hue
            });
          }
        }

        if (p.life <= 0) { burstParticles.splice(i, 1); continue; }
        const alpha = p.life / p.maxLife;

        // Trail
        for (let j = 0; j < p.trail.length; j++) {
          const ta = (j / p.trail.length) * alpha * 0.3;
          ctx.fillStyle = `hsla(${p.hue}, 100%, 60%, ${ta})`;
          ctx.fillRect(p.trail[j].x, p.trail[j].y, 1, 1);
        }

        ctx.fillStyle = `hsla(${p.hue}, 100%, 65%, ${alpha})`;
        ctx.shadowColor = `hsl(${p.hue}, 100%, 65%)`;
        ctx.shadowBlur = 3;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }

      // Sub-bursts (crackle)
      for (let i = subBursts.length-1; i >= 0; i--) {
        const s = subBursts[i];
        s.x += s.vx;
        s.y += s.vy;
        s.vy += 0.03;
        s.life--;
        if (s.life <= 0) { subBursts.splice(i, 1); continue; }
        const alpha = s.life / s.maxLife;
        ctx.fillStyle = `hsla(${s.hue}, 100%, 75%, ${alpha})`;
        ctx.shadowColor = `hsl(${s.hue}, 100%, 75%)`;
        ctx.shadowBlur = 2;
        ctx.beginPath();
        ctx.arc(s.x, s.y, 1, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.shadowBlur = 0;
    }
  }

  function loop() { draw(); requestAnimationFrame(loop); }
  loop();
})();
</script>
</body>
</html>
