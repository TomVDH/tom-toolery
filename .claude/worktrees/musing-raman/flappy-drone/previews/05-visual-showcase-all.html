<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a18; color: #e0e0e0; font-family: 'SF Mono', 'Menlo', monospace; padding: 20px; overflow-y: auto; }
  h1 { color: #fff; font-size: 20px; margin-bottom: 4px; }
  .subtitle { color: #888; font-size: 12px; margin-bottom: 24px; }
  .section { margin-bottom: 36px; }
  .section h2 { color: #aaa; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 4px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
  .card { background: #111122; border: 1px solid #222; border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color 0.2s; }
  .card:hover { border-color: #00c8f0; }
  .card.selected { border-color: #00c8f0; box-shadow: 0 0 12px rgba(0,200,240,0.3); }
  .card canvas { display: block; width: 100%; }
  .card .label { padding: 10px; }
  .card .label h3 { font-size: 13px; color: #fff; margin-bottom: 3px; }
  .card .label p { font-size: 11px; color: #666; line-height: 1.4; }
  .wide { grid-template-columns: 1fr; }
  .wide .card canvas { max-height: 120px; }
</style>
</head>
<body>

<h1>Flappy Drone — Visual Design Showcase</h1>
<p class="subtitle">Click cards to select. All animated at actual game scale.</p>

<!-- SECTION 1: MORE DRONES -->
<div class="section">
  <h2>New Drone Concepts</h2>
  <div class="grid" id="drones"></div>
</div>

<!-- SECTION 2: BUILDING TYPES -->
<div class="section">
  <h2>Building Variations (wider, decor, sign placements)</h2>
  <div class="grid wide" id="buildings"></div>
</div>

<!-- SECTION 3: STREET DESIGNS -->
<div class="section">
  <h2>Street & Sidewalk</h2>
  <div class="grid wide" id="streets"></div>
</div>

<!-- SECTION 4: NUKE VARIATIONS -->
<div class="section">
  <h2>Nuke Cloud Designs (static snapshots at peak)</h2>
  <div class="grid" id="nukes"></div>
</div>

<!-- SECTION 5: FIREWORK FLASH -->
<div class="section">
  <h2>Firework Flash Intensity</h2>
  <div class="grid" id="fireworks"></div>
</div>

<script>
let tick = 0;
const allCanvases = [];

function addCard(containerId, name, desc, w, h, drawFn) {
  const grid = document.getElementById(containerId);
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => {
    grid.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
  };
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  card.appendChild(canvas);
  const label = document.createElement('div');
  label.className = 'label';
  label.innerHTML = `<h3>${name}</h3><p>${desc}</p>`;
  card.appendChild(label);
  grid.appendChild(card);
  allCanvases.push({ canvas, draw: drawFn });
}

function skyBg(ctx, w, h) {
  const g = ctx.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0, '#050510'); g.addColorStop(0.5, '#0a0a22'); g.addColorStop(1, '#101030');
  ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i = 0; i < 6; i++) ctx.fillRect(20 + i * 42 + (i*13%9), 8 + (i*17%30), 1, 1);
}

// ===== DRONES =====
const S = 3.5;

addCard('drones', 'E: Nano Scout', 'Tiny fast drone. Single rotor ring, antenna, minimal frame. Smallest hitbox.', 280, 130, (ctx, w, h) => {
  skyBg(ctx, w, h);
  const x = w/2, y = h/2;
  ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(x-6*S, y+8*S, 12*S, 2*S);
  ctx.fillStyle = '#2a2a3a'; ctx.fillRect(x-5*S, y-2*S, 10*S, 5*S);
  ctx.fillStyle = '#3a3a4a'; ctx.fillRect(x-4*S, y-1*S, 8*S, 3*S);
  ctx.fillStyle = '#00ddff'; ctx.fillRect(x-2*S, y-3*S, 4*S, 6*S);
  ctx.fillStyle = '#009cc0'; ctx.fillRect(x-1*S, y-2*S, 2*S, 4*S);
  // Single ring rotor
  const spin = Math.abs(Math.sin(tick * 0.2));
  const rr = spin * 18 * S;
  ctx.globalAlpha = 0.5; ctx.strokeStyle = '#aac'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.ellipse(x, y - 1*S, rr/2, 1.5*S * spin, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#555'; ctx.fillRect(x - 0.5*S, y - 6*S, 1*S, 4*S);
  ctx.fillStyle = '#ff3344'; ctx.fillRect(x - 0.5*S, y - 7*S, 1*S, 1*S);
  ctx.fillStyle = '#444'; ctx.fillRect(x-3*S, y+3*S, 1*S, 3*S); ctx.fillRect(x+2*S, y+3*S, 1*S, 3*S);
});

addCard('drones', 'F: Twin Boom', 'Two parallel fuselages connected by wing. Dual camera pods. Surveillance look.', 280, 130, (ctx, w, h) => {
  skyBg(ctx, w, h);
  const x = w/2, y = h/2;
  ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(x-14*S, y+10*S, 28*S, 2*S);
  // Twin booms
  ctx.fillStyle = '#2e2e3e'; ctx.fillRect(x-15*S, y-2*S, 12*S, 4*S); ctx.fillRect(x+3*S, y-2*S, 12*S, 4*S);
  // Connecting wing
  ctx.fillStyle = '#3a3a4a'; ctx.fillRect(x-4*S, y-1*S, 8*S, 2*S);
  // Camera pods
  ctx.fillStyle = '#222'; ctx.fillRect(x-14*S, y+1*S, 3*S, 3*S); ctx.fillRect(x+11*S, y+1*S, 3*S, 3*S);
  const glow = 0.4 + Math.sin(tick * 0.08) * 0.2;
  ctx.fillStyle = `rgba(255,50,50,${glow})`; ctx.fillRect(x-13*S, y+2*S, 1*S, 1*S); ctx.fillRect(x+12*S, y+2*S, 1*S, 1*S);
  // Props on each boom end
  const spin = Math.abs(Math.sin(tick * 0.15));
  const pw = spin * 10 * S;
  ctx.globalAlpha = 0.65; ctx.fillStyle = '#bbc';
  ctx.fillRect(x - 9*S - pw/2, y-3*S, pw, 1.5*S); ctx.fillRect(x + 9*S - pw/2, y-3*S, pw, 1.5*S);
  ctx.globalAlpha = 1;
  // Tail fins
  ctx.fillStyle = '#3a3a4a'; ctx.fillRect(x-16*S, y-4*S, 2*S, 3*S); ctx.fillRect(x+14*S, y-4*S, 2*S, 3*S);
});

addCard('drones', 'G: Cargo Lifter XL', 'Massive 6-rotor heavy lifter. External cargo cage underneath. Slow but imposing.', 280, 130, (ctx, w, h) => {
  skyBg(ctx, w, h);
  const x = w/2, y = h/2 - 5;
  ctx.fillStyle = 'rgba(0,0,0,0.12)'; ctx.fillRect(x-16*S, y+16*S, 32*S, 3*S);
  // Wide body
  ctx.fillStyle = '#3a3228'; ctx.fillRect(x-12*S, y-3*S, 24*S, 8*S);
  ctx.fillStyle = '#4a4238'; ctx.fillRect(x-11*S, y-2*S, 22*S, 6*S);
  // Warning stripes
  ctx.fillStyle = '#cc8800'; ctx.fillRect(x-11*S, y+2*S, 22*S, 1.5*S);
  ctx.fillStyle = '#3a3228'; for (let i = 0; i < 8; i++) ctx.fillRect(x-11*S + i*5.5*S, y+2*S, 2.5*S, 1.5*S);
  // 3 motor mounts per side
  ctx.fillStyle = '#332e28';
  [-20, -13, 13, 20].forEach(mx => ctx.fillRect(x + mx*S - 2*S, y-1*S, 4*S, 3*S));
  // 6 props
  const spin = Math.abs(Math.sin(tick * 0.12));
  const pw = spin * 10 * S;
  ctx.globalAlpha = 0.6; ctx.fillStyle = '#aa9';
  [-20, -13, 13, 20].forEach(mx => ctx.fillRect(x + mx*S - pw/2, y-3*S, pw, 1.5*S));
  ctx.globalAlpha = 1;
  // Cargo cage
  ctx.strokeStyle = '#555045'; ctx.lineWidth = 1;
  ctx.strokeRect(x-6*S, y+6*S, 12*S, 8*S);
  ctx.fillStyle = '#444038'; ctx.fillRect(x-5*S, y+7*S, 10*S, 6*S);
  ctx.fillStyle = tick % 25 < 12 ? '#ff8800' : '#553300';
  ctx.fillRect(x-11*S, y-3*S, 2*S, 1*S); ctx.fillRect(x+9*S, y-3*S, 2*S, 1*S);
});

// ===== BUILDINGS =====
const GH = 32;

addCard('buildings', 'Wide Tower + Side Sign', 'Wider building (80px) with neon sign mounted vertically on the side wall.', 620, 160, (ctx, w, h) => {
  skyBg(ctx, w, h); ctx.fillStyle = '#0c0c1a'; ctx.fillRect(0, h-GH, w, GH);
  // Wide tower
  const bx = 200, bw = 80, bh = 100, ty = h - GH - bh;
  ctx.fillStyle = '#0e0e22'; ctx.fillRect(bx, ty, bw, bh);
  ctx.fillStyle = '#121230'; ctx.fillRect(bx, ty, 2, bh); ctx.fillStyle = '#0a0a1a'; ctx.fillRect(bx+bw-2, ty, 2, bh);
  // Cap
  ctx.fillStyle = '#161636'; ctx.fillRect(bx-4, ty, bw+8, 5); ctx.fillStyle = '#1a1a3a'; ctx.fillRect(bx-4, ty, bw+8, 1);
  // Windows — 5 columns
  for (let r = ty + 10; r < h - GH - 6; r += 14) {
    for (let c = 0; c < 5; c++) {
      const wx = bx + 8 + c * 15;
      const on = Math.sin(bx * 7 + c * 13 + r * 3) > -0.2;
      ctx.fillStyle = on ? 'rgba(255,200,60,0.6)' : 'rgba(255,200,60,0.06)'; ctx.fillRect(wx, r, 5, 7);
    }
  }
  // VERTICAL side sign
  const signText = 'APEX';
  ctx.save(); ctx.translate(bx + bw + 6, ty + 15); ctx.rotate(Math.PI / 2);
  ctx.font = '700 10px "Courier New", monospace'; ctx.fillStyle = '#ff4488'; ctx.globalAlpha = 0.8;
  ctx.fillText(signText, 0, 0); ctx.globalAlpha = 0.15;
  ctx.fillRect(-2, -10, 50, 14); ctx.restore(); ctx.globalAlpha = 1;

  // Regular building for comparison
  const bx2 = 400, bw2 = 56, bh2 = 80, ty2 = h - GH - bh2;
  ctx.fillStyle = '#0e0e22'; ctx.fillRect(bx2, ty2, bw2, bh2);
  ctx.fillStyle = '#161636'; ctx.fillRect(bx2-4, ty2, bw2+8, 5);
  for (let r = ty2 + 10; r < h - GH - 6; r += 14) {
    for (let c = 0; c < 3; c++) {
      const wx = bx2 + 8 + c * 16;
      ctx.fillStyle = Math.random() > 0.4 ? 'rgba(255,200,60,0.6)' : 'rgba(255,200,60,0.06)';
      ctx.fillRect(wx, r, 5, 7);
    }
  }
  // Rooftop sign (current style)
  ctx.font = '700 8px "Courier New", monospace'; ctx.fillStyle = '#44ffaa'; ctx.globalAlpha = 0.8;
  ctx.textAlign = 'center'; ctx.fillText('HOVER', bx2 + bw2/2, ty2 - 4); ctx.globalAlpha = 1; ctx.textAlign = 'left';
});

addCard('buildings', 'Window Sign + Antenna Cluster', 'Sign behind windows (backlit effect). Antenna array on roof with blinking lights.', 620, 160, (ctx, w, h) => {
  skyBg(ctx, w, h); ctx.fillStyle = '#0c0c1a'; ctx.fillRect(0, h-GH, w, GH);
  const bx = 250, bw = 70, bh = 110, ty = h - GH - bh;
  ctx.fillStyle = '#0e0e22'; ctx.fillRect(bx, ty, bw, bh);
  ctx.fillStyle = '#161636'; ctx.fillRect(bx-4, ty, bw+8, 5);
  // Windows
  for (let r = ty + 10; r < h - GH - 6; r += 14) {
    for (let c = 0; c < 4; c++) {
      const wx = bx + 7 + c * 15;
      ctx.fillStyle = Math.sin(bx + c * 17 + r * 5) > 0 ? 'rgba(255,200,60,0.55)' : 'rgba(255,200,60,0.06)';
      ctx.fillRect(wx, r, 5, 7);
    }
  }
  // Backlit window sign — 2 rows of windows glow a different colour
  const signRow = ty + 38;
  ctx.fillStyle = 'rgba(0,200,255,0.15)'; ctx.fillRect(bx+2, signRow-2, bw-4, 22);
  for (let c = 0; c < 4; c++) {
    ctx.fillStyle = 'rgba(0,200,255,0.5)'; ctx.fillRect(bx + 7 + c*15, signRow, 5, 7);
    ctx.fillStyle = 'rgba(0,200,255,0.45)'; ctx.fillRect(bx + 7 + c*15, signRow+14, 5, 7);
  }
  // Antenna cluster
  ctx.fillStyle = '#333'; ctx.fillRect(bx+bw/2 - 1, ty-12, 2, 12);
  ctx.fillStyle = '#333'; ctx.fillRect(bx+bw/2 - 6, ty-8, 1.5, 8); ctx.fillRect(bx+bw/2 + 5, ty-10, 1.5, 10);
  ctx.fillStyle = tick % 50 < 25 ? '#ff2244' : '#440011'; ctx.fillRect(bx+bw/2 - 1, ty-13, 2, 2);
  ctx.fillStyle = tick % 70 < 35 ? '#00ff66' : '#003311'; ctx.fillRect(bx+bw/2 - 6, ty-9, 2, 2);
});

addCard('buildings', 'Balcony Ledges + Billboard', 'Building with protruding balcony ledges every few floors. Large billboard on side.', 620, 160, (ctx, w, h) => {
  skyBg(ctx, w, h); ctx.fillStyle = '#0c0c1a'; ctx.fillRect(0, h-GH, w, GH);
  const bx = 230, bw = 65, bh = 105, ty = h - GH - bh;
  ctx.fillStyle = '#0e0e22'; ctx.fillRect(bx, ty, bw, bh);
  ctx.fillStyle = '#161636'; ctx.fillRect(bx-4, ty, bw+8, 5);
  // Windows + balcony ledges
  let ledgeCount = 0;
  for (let r = ty + 10; r < h - GH - 6; r += 14) {
    for (let c = 0; c < 3; c++) {
      const wx = bx + 10 + c * 16;
      ctx.fillStyle = Math.sin(bx + c * 11 + r * 7) > 0.1 ? 'rgba(255,200,60,0.55)' : 'rgba(255,200,60,0.06)';
      ctx.fillRect(wx, r, 5, 7);
    }
    // Balcony ledge every 3 rows
    if (ledgeCount % 3 === 0) {
      ctx.fillStyle = '#181835'; ctx.fillRect(bx-3, r + 8, bw+6, 2);
    }
    ledgeCount++;
  }
  // Billboard on side
  ctx.fillStyle = '#1a1a30'; ctx.fillRect(bx + bw + 2, ty + 20, 40, 25);
  ctx.fillStyle = '#222245'; ctx.fillRect(bx + bw + 3, ty + 21, 38, 23);
  // Billboard content — coloured rect
  ctx.fillStyle = 'rgba(255,100,50,0.3)'; ctx.fillRect(bx + bw + 5, ty + 23, 34, 19);
  ctx.font = '700 7px "Courier New"'; ctx.fillStyle = '#ff8844'; ctx.globalAlpha = 0.7;
  ctx.fillText('SKYNET', bx + bw + 8, ty + 35); ctx.globalAlpha = 1;
  // Billboard support pole
  ctx.fillStyle = '#333'; ctx.fillRect(bx + bw + 1, ty + 45, 2, 15);
});

// ===== STREETS =====
addCard('streets', 'Kerb Lights + Sidewalk (current)', 'Wider street with flush kerb lights scrolling with road. Sidewalk strip.', 620, 90, (ctx, w, h) => {
  skyBg(ctx, w, h);
  const gy = h - 36;
  ctx.fillStyle = '#0a0a18'; ctx.fillRect(0, gy, w, 36);
  ctx.fillStyle = '#121226'; ctx.fillRect(0, gy, w, 6);
  ctx.fillStyle = '#1a1a36'; ctx.fillRect(0, gy+5, w, 1);
  ctx.fillStyle = '#181830'; ctx.fillRect(0, gy, w, 2);
  const off = (tick * 1.6) % 24;
  ctx.fillStyle = '#1a1a35';
  for (let x = -off; x < w; x += 24) ctx.fillRect(x, gy + 17, 12, 2);
  const lo = (tick * 1.6 / 24) * 80 % 80;
  for (let lx = -lo; lx < w + 80; lx += 80) {
    ctx.fillStyle = 'rgba(255,210,120,0.4)'; ctx.fillRect(lx, gy+4, 2, 2);
    const g = ctx.createRadialGradient(lx+1, gy+8, 0, lx+1, gy+8, 12);
    g.addColorStop(0, 'rgba(255,200,100,0.04)'); g.addColorStop(1, 'rgba(255,200,100,0)');
    ctx.fillStyle = g; ctx.fillRect(lx-11, gy, 24, 20);
  }
  // Silhouette buildings
  ctx.fillStyle = '#0c0c20';
  [30,80,150,220,290,360,420,490,550].forEach((bx,i) => ctx.fillRect(bx, gy - 20 - (i*7+3)%25, 22+(i%3)*4, 20+(i*7+3)%25));
});

addCard('streets', 'Double Lane + Manholes', 'Two visible lanes with dashed divider. Occasional manhole covers scroll by.', 620, 90, (ctx, w, h) => {
  skyBg(ctx, w, h);
  const gy = h - 40;
  ctx.fillStyle = '#0a0a18'; ctx.fillRect(0, gy, w, 40);
  ctx.fillStyle = '#131328'; ctx.fillRect(0, gy, w, 5); // sidewalk
  ctx.fillStyle = '#1a1a38'; ctx.fillRect(0, gy, w, 1);
  ctx.fillStyle = '#181830'; ctx.fillRect(0, gy+4, w, 1); // kerb
  const off = (tick * 1.6) % 24;
  // Top lane stripe
  ctx.fillStyle = '#1c1c38';
  for (let x = -off; x < w; x += 28) ctx.fillRect(x, gy + 15, 14, 1.5);
  // Bottom lane stripe
  for (let x = -(off+12)%28; x < w; x += 28) ctx.fillRect(x, gy + 28, 14, 1.5);
  // Manholes
  const moff = (tick * 1.6 / 24) * 120 % 120;
  ctx.fillStyle = '#080814';
  for (let x = -moff + 40; x < w + 120; x += 120) {
    ctx.beginPath(); ctx.arc(x, gy + 22, 4, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#151528'; ctx.lineWidth = 0.5; ctx.stroke();
  }
  // Kerb lights
  const lo = (tick * 1.6 / 24) * 60 % 60;
  for (let lx = -lo; lx < w + 60; lx += 60) {
    ctx.fillStyle = 'rgba(255,210,120,0.35)'; ctx.fillRect(lx, gy+3, 2, 2);
    const g = ctx.createRadialGradient(lx+1, gy+8, 0, lx+1, gy+8, 10);
    g.addColorStop(0, 'rgba(255,200,100,0.04)'); g.addColorStop(1, 'rgba(255,200,100,0)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(lx+1, gy+8, 10, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = '#0c0c20';
  [30,100,180,260,340,420,500,570].forEach((bx,i) => ctx.fillRect(bx, gy - 15 - (i*11+5)%30, 25+(i%3)*5, 15+(i*11+5)%30));
});

addCard('streets', 'Crosswalk + Bollards', 'Zebra crosswalks scroll by. Small bollard dots on sidewalk edge.', 620, 90, (ctx, w, h) => {
  skyBg(ctx, w, h);
  const gy = h - 36;
  ctx.fillStyle = '#0a0a18'; ctx.fillRect(0, gy, w, 36);
  ctx.fillStyle = '#131328'; ctx.fillRect(0, gy, w, 6);
  ctx.fillStyle = '#181830'; ctx.fillRect(0, gy, w, 2);
  const off = (tick * 1.6) % 24;
  ctx.fillStyle = '#1a1a35';
  for (let x = -off; x < w; x += 24) ctx.fillRect(x, gy + 17, 12, 2);
  // Crosswalks
  const cwOff = (tick * 1.6 / 24) * 200 % 200;
  ctx.fillStyle = 'rgba(200,200,220,0.06)';
  for (let cx = -cwOff + 50; cx < w + 200; cx += 200) {
    for (let s = 0; s < 5; s++) ctx.fillRect(cx + s * 6, gy + 7, 4, 22);
  }
  // Bollards on sidewalk
  const bOff = (tick * 1.6 / 24) * 45 % 45;
  for (let bx = -bOff; bx < w + 45; bx += 45) {
    ctx.fillStyle = '#252540'; ctx.fillRect(bx, gy+2, 2, 4);
    ctx.fillStyle = 'rgba(255,200,100,0.2)'; ctx.fillRect(bx, gy+1, 2, 1);
  }
  ctx.fillStyle = '#0c0c20';
  [40,110,190,280,370,450,530].forEach((bx,i) => ctx.fillRect(bx, gy - 18 - (i*9+2)%22, 24+(i%3)*3, 18+(i*9+2)%22));
});

// ===== NUKE VARIATIONS =====
function drawNukeDesign(ctx, w, h, style) {
  skyBg(ctx, w, h);
  // Ground
  ctx.fillStyle = '#0c0c1a'; ctx.fillRect(0, h-20, w, 20);
  // City silhouette
  ctx.fillStyle = '#0c0c20';
  [20,55,85,120,150,190,220].forEach((bx,i) => ctx.fillRect(bx, h-20-(15+(i*7)%30), 18+(i%3)*4, 15+(i*7)%30));

  const gx = w/2, gy = h - 20;
  const capCY = gy - h * 0.45;
  const capR = 45, capRx = capR * 1.4;

  if (style === 'classic') {
    // Current — orange concentric layers
    ctx.fillStyle = '#3a1a08'; ctx.beginPath();
    ctx.moveTo(gx-10, capCY+capR*0.3); ctx.quadraticCurveTo(gx-12, (capCY+gy)/2, gx-22, gy);
    ctx.lineTo(gx+22, gy); ctx.quadraticCurveTo(gx+12, (capCY+gy)/2, gx+10, capCY+capR*0.3);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#2a0e04'; ctx.beginPath(); ctx.ellipse(gx, capCY, capRx*1.1, capR*0.95, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#4a2008'; ctx.beginPath(); ctx.ellipse(gx, capCY-capR*0.05, capRx*0.9, capR*0.8, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#6a3010'; ctx.beginPath(); ctx.ellipse(gx, capCY-capR*0.08, capRx*0.65, capR*0.6, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#aa6020'; ctx.beginPath(); ctx.ellipse(gx, capCY-capR*0.1, capRx*0.35, capR*0.35, 0, 0, Math.PI*2); ctx.fill();
  } else if (style === 'plasma') {
    // Purple/blue plasma nuke
    ctx.fillStyle = '#1a0830'; ctx.beginPath();
    ctx.moveTo(gx-8, capCY+capR*0.3); ctx.quadraticCurveTo(gx-10, (capCY+gy)/2, gx-18, gy);
    ctx.lineTo(gx+18, gy); ctx.quadraticCurveTo(gx+10, (capCY+gy)/2, gx+8, capCY+capR*0.3);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#220a44'; ctx.beginPath(); ctx.ellipse(gx, capCY, capRx*1.1, capR*0.95, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#3a1466'; ctx.beginPath(); ctx.ellipse(gx, capCY-capR*0.05, capRx*0.85, capR*0.75, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#5522aa'; ctx.beginPath(); ctx.ellipse(gx, capCY-capR*0.08, capRx*0.55, capR*0.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#8844ff'; ctx.beginPath(); ctx.ellipse(gx, capCY-capR*0.1, capRx*0.25, capR*0.25, 0, 0, Math.PI*2); ctx.fill();
    // Electric arcs
    ctx.strokeStyle = 'rgba(150,100,255,0.3)'; ctx.lineWidth = 1;
    for (let i = 0; i < 4; i++) {
      ctx.beginPath(); ctx.moveTo(gx + Math.cos(i*1.5)*capRx*0.7, capCY + Math.sin(i*1.5)*capR*0.6);
      ctx.lineTo(gx + Math.cos(i*1.5+0.5)*capRx*1.2, capCY + Math.sin(i*1.5+0.5)*capR*1.1); ctx.stroke();
    }
  } else if (style === 'thermonuclear') {
    // White-hot centre, wider cloud, more realistic layers
    ctx.fillStyle = '#2a1505'; ctx.beginPath();
    ctx.moveTo(gx-14, capCY+capR*0.4); ctx.quadraticCurveTo(gx-18, (capCY+gy)/2, gx-28, gy);
    ctx.lineTo(gx+28, gy); ctx.quadraticCurveTo(gx+18, (capCY+gy)/2, gx+14, capCY+capR*0.4);
    ctx.closePath(); ctx.fill();
    // Wider, flatter cap
    ctx.fillStyle = '#1a0a02'; ctx.beginPath(); ctx.ellipse(gx, capCY+5, capRx*1.3, capR*0.7, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#3a1808'; ctx.beginPath(); ctx.ellipse(gx, capCY, capRx*1.1, capR*0.6, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#6a3010'; ctx.beginPath(); ctx.ellipse(gx, capCY-3, capRx*0.8, capR*0.45, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#cc6620'; ctx.beginPath(); ctx.ellipse(gx, capCY-5, capRx*0.45, capR*0.3, 0, 0, Math.PI*2); ctx.fill();
    // White-hot core
    ctx.fillStyle = '#ffeecc'; ctx.globalAlpha = 0.6;
    ctx.beginPath(); ctx.ellipse(gx, capCY-6, capRx*0.2, capR*0.15, 0, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    // Base ring
    ctx.fillStyle = '#3a1808'; ctx.beginPath(); ctx.ellipse(gx, capCY+capR*0.5, capRx*1.4, capR*0.18, 0, 0, Math.PI*2); ctx.fill();
  } else if (style === 'dirty') {
    // Dark, ashy mushroom — greys and browns
    ctx.fillStyle = '#1a1610'; ctx.beginPath();
    ctx.moveTo(gx-12, capCY+capR*0.3); ctx.quadraticCurveTo(gx-15, (capCY+gy)/2, gx-25, gy);
    ctx.lineTo(gx+25, gy); ctx.quadraticCurveTo(gx+15, (capCY+gy)/2, gx+12, capCY+capR*0.3);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#1e1a14'; ctx.beginPath(); ctx.ellipse(gx, capCY, capRx*1.15, capR, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#2a2420'; ctx.beginPath(); ctx.ellipse(gx, capCY-capR*0.05, capRx*0.9, capR*0.8, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#3a3228'; ctx.beginPath(); ctx.ellipse(gx, capCY-capR*0.08, capRx*0.6, capR*0.55, 0, 0, Math.PI*2); ctx.fill();
    // Ember glow deep inside
    ctx.fillStyle = '#884422'; ctx.globalAlpha = 0.4;
    ctx.beginPath(); ctx.ellipse(gx, capCY-capR*0.1, capRx*0.3, capR*0.25, 0, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    // Ash particles around
    ctx.fillStyle = '#444'; for (let i = 0; i < 8; i++) {
      ctx.fillRect(gx + Math.cos(i*0.8)*capRx*0.9, capCY + Math.sin(i*0.8)*capR*0.7, 2, 2);
    }
  }
}

addCard('nukes', 'Classic (Current)', 'Orange concentric layers. The existing mushroom cloud.', 280, 200, (ctx, w, h) => drawNukeDesign(ctx, w, h, 'classic'));
addCard('nukes', 'Plasma', 'Purple/blue energy explosion. Electric arcs. Sci-fi feel.', 280, 200, (ctx, w, h) => drawNukeDesign(ctx, w, h, 'plasma'));
addCard('nukes', 'Thermonuclear', 'Wider, flatter cap. White-hot core. More realistic.', 280, 200, (ctx, w, h) => drawNukeDesign(ctx, w, h, 'thermonuclear'));
addCard('nukes', 'Dirty Bomb', 'Dark ashy cloud. Greys and browns. Ember glow inside.', 280, 200, (ctx, w, h) => drawNukeDesign(ctx, w, h, 'dirty'));

// ===== FIREWORK FLASH =====
addCard('fireworks', 'Bright Flash (implemented)', 'Large radial glow, 6 frames, retracts fast. r=50-100px.', 280, 160, (ctx, w, h) => {
  skyBg(ctx, w, h);
  // Simulate a firework burst with flash
  const fx = w/2, fy = h/2 - 10;
  const flashT = Math.max(0, 1 - (tick % 90) / 6);
  if (flashT > 0) {
    const r = 60 * flashT;
    const g = ctx.createRadialGradient(fx, fy, 0, fx, fy, r);
    g.addColorStop(0, `hsla(30, 100%, 95%, ${flashT * 0.8})`);
    g.addColorStop(0.25, `hsla(30, 100%, 85%, ${flashT * 0.4})`);
    g.addColorStop(0.6, `hsla(30, 100%, 60%, ${flashT * 0.1})`);
    g.addColorStop(1, 'hsla(30, 100%, 50%, 0)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(fx, fy, r, 0, Math.PI*2); ctx.fill();
  }
  // Burst particles
  const burstT = Math.min(1, (tick % 90) / 30);
  if (burstT < 1) {
    for (let i = 0; i < 24; i++) {
      const a = (Math.PI*2/24)*i;
      const d = burstT * 40;
      ctx.globalAlpha = (1-burstT) * 0.7;
      ctx.fillStyle = `hsl(${(30 + i*15)%360}, 100%, 65%)`;
      ctx.beginPath(); ctx.arc(fx + Math.cos(a)*d, fy + Math.sin(a)*d, 2*(1-burstT), 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
});

// ===== RENDER LOOP =====
function renderAll() {
  tick++;
  allCanvases.forEach(({ canvas, draw }) => {
    const ctx = canvas.getContext('2d');
    draw(ctx, canvas.width, canvas.height);
  });
  requestAnimationFrame(renderAll);
}
renderAll();
</script>
