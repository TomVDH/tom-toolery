<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TIMES OF DAY — Flappy Drone Cityscape Variations</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    color: #aab;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px 50px;
  }
  h1 {
    font-size: 28px;
    letter-spacing: 12px;
    color: #667;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 12px;
    letter-spacing: 4px;
    color: #445;
    margin-bottom: 30px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 300px);
    gap: 24px;
  }
  .cell {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  canvas {
    border: 1px solid #1a1a2a;
    border-radius: 6px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .label {
    margin-top: 8px;
    font-size: 13px;
    letter-spacing: 6px;
    color: #556;
  }
  .label .current { color: #6a8; font-size: 10px; letter-spacing: 2px; }
</style>
</head>
<body>
<h1>Times of Day</h1>
<p class="subtitle">CITYSCAPE BACKGROUND VARIATIONS</p>
<div class="grid">
  <div class="cell">
    <canvas id="c0" width="300" height="200"></canvas>
    <div class="label">NIGHT <span class="current">(CURRENT)</span></div>
  </div>
  <div class="cell">
    <canvas id="c1" width="300" height="200"></canvas>
    <div class="label">DAWN</div>
  </div>
  <div class="cell">
    <canvas id="c2" width="300" height="200"></canvas>
    <div class="label">MORNING</div>
  </div>
  <div class="cell">
    <canvas id="c3" width="300" height="200"></canvas>
    <div class="label">AFTERNOON</div>
  </div>
  <div class="cell">
    <canvas id="c4" width="300" height="200"></canvas>
    <div class="label">DUSK</div>
  </div>
  <div class="cell">
    <canvas id="c5" width="300" height="200"></canvas>
    <div class="label">MIDNIGHT</div>
  </div>
</div>

<script>
'use strict';

// --- Shared city silhouette data (same for all panels) ---
var buildings = [
  { x: 0, w: 28, h: 50 },
  { x: 25, w: 22, h: 72 },
  { x: 44, w: 30, h: 55 },
  { x: 70, w: 18, h: 88 },
  { x: 85, w: 26, h: 60 },
  { x: 108, w: 20, h: 95 },
  { x: 125, w: 32, h: 48 },
  { x: 152, w: 16, h: 78 },
  { x: 165, w: 28, h: 62 },
  { x: 188, w: 22, h: 105 },
  { x: 206, w: 30, h: 55 },
  { x: 232, w: 18, h: 82 },
  { x: 247, w: 26, h: 68 },
  { x: 270, w: 32, h: 45 },
];

// Far buildings (back layer, shorter)
var farBuildings = [
  { x: 10, w: 35, h: 35 },
  { x: 50, w: 25, h: 28 },
  { x: 80, w: 40, h: 42 },
  { x: 130, w: 30, h: 30 },
  { x: 170, w: 35, h: 38 },
  { x: 210, w: 28, h: 32 },
  { x: 250, w: 35, h: 25 },
];

var GROUND_H = 16;
var W = 300, H = 200;

// Pseudo-random for window lighting
function hash(a, b, c) {
  var h = a * 2654435761 + b * 340573321 + c * 196314165;
  h = ((h >>> 16) ^ h) * 0x45d9f3b;
  return ((h >>> 16) ^ h & 0xFF) / 255;
}

// --- TIME-OF-DAY CONFIGURATIONS ---
var configs = [
  // 0: NIGHT (current game look)
  {
    sky: [
      [0, '#050510'],
      [0.5, '#0a0a22'],
      [1, '#101030']
    ],
    stars: true,
    starCount: 45,
    starAlpha: 0.6,
    moon: { type: 'crescent', x: 240, y: 40, r: 18, color: '#c8cde8', glowColor: 'rgba(180,190,220,0.12)', cutX: 9, cutY: -4 },
    clouds: [
      { x: 30, y: 45, w: 60, opacity: 0.04, color: '#b0b8d0' },
      { x: 160, y: 65, w: 45, opacity: 0.03, color: '#b0b8d0' },
    ],
    buildingColor: '#0c0c1e',
    farBuildingColor: '#080818',
    groundColor: '#080812',
    windowChance: 0.38,
    windowColor: 'rgba(255,210,100,WA)',
    windowAlphaRange: [0.3, 0.8],
  },
  // 1: DAWN
  {
    sky: [
      [0, '#1a1030'],
      [0.35, '#2a1838'],
      [0.6, '#4a2040'],
      [0.8, '#884433'],
      [1, '#cc7744']
    ],
    stars: false,
    sun: { type: 'glow', x: 220, y: 192, r: 30, colors: ['rgba(255,160,60,0.50)', 'rgba(255,120,50,0.20)', 'rgba(255,100,40,0)'], radii: [1, 3, 6] },
    clouds: [
      { x: 40, y: 50, w: 55, opacity: 0.18, color: '#dd8866' },
      { x: 130, y: 38, w: 70, opacity: 0.14, color: '#ee9977' },
      { x: 220, y: 60, w: 40, opacity: 0.15, color: '#cc7755' },
    ],
    buildingColor: '#1a1020',
    farBuildingColor: '#140c18',
    groundColor: '#120a14',
    windowChance: 0.15,
    windowColor: 'rgba(255,200,120,WA)',
    windowAlphaRange: [0.2, 0.5],
  },
  // 2: MORNING
  {
    sky: [
      [0, '#4488cc'],
      [0.6, '#6699cc'],
      [1, '#88bbdd']
    ],
    stars: false,
    sun: { type: 'circle', x: 250, y: 45, r: 20, color: '#ffe855', glowColor: 'rgba(255,240,120,0.2)', glowR: 4 },
    clouds: [
      { x: 25, y: 40, w: 65, opacity: 0.55, color: '#ffffff', puffs: true },
      { x: 140, y: 55, w: 50, opacity: 0.45, color: '#ffffff', puffs: true },
      { x: 200, y: 30, w: 40, opacity: 0.35, color: '#f8f8ff', puffs: true },
    ],
    buildingColor: '#2a2a3a',
    farBuildingColor: '#222233',
    groundColor: '#1e1e2a',
    windowChance: 0.12,
    windowColor: 'rgba(255,255,240,WA)',
    windowAlphaRange: [0.5, 0.9],
    windowReflect: true,
  },
  // 3: AFTERNOON
  {
    sky: [
      [0, '#2266aa'],
      [0.7, '#4488bb'],
      [1, '#5599cc']
    ],
    haze: { color: 'rgba(200,210,180,0.08)', y: 0.75 },
    stars: false,
    sun: { type: 'circle', x: 150, y: 30, r: 22, color: '#fff4aa', glowColor: 'rgba(255,245,180,0.18)', glowR: 5 },
    clouds: [
      { x: 50, y: 50, w: 55, opacity: 0.45, color: '#ffffff', puffs: true, tall: true },
      { x: 200, y: 40, w: 45, opacity: 0.35, color: '#f0f0f8', puffs: true, tall: true },
    ],
    buildingColor: '#2e3040',
    farBuildingColor: '#282838',
    groundColor: '#222230',
    windowChance: 0.08,
    windowColor: 'rgba(255,250,220,WA)',
    windowAlphaRange: [0.3, 0.6],
    buildingTint: 'rgba(80,90,110,0.12)',
  },
  // 4: DUSK
  {
    sky: [
      [0, '#1a2244'],
      [0.3, '#2a2255'],
      [0.55, '#442255'],
      [0.75, '#883322'],
      [1, '#cc5522']
    ],
    stars: true,
    starCount: 18,
    starAlpha: 0.35,
    sun: { type: 'setting', x: 200, y: 188, r: 26, color: '#ff7733', glowColor: 'rgba(255,100,30,0.35)' },
    clouds: [
      { x: 20, y: 38, w: 70, opacity: 0.35, color: '#dd6633', backlit: true },
      { x: 140, y: 52, w: 55, opacity: 0.28, color: '#cc5544', backlit: true },
      { x: 225, y: 32, w: 50, opacity: 0.25, color: '#aa4466', backlit: true },
    ],
    buildingColor: '#121225',
    farBuildingColor: '#0e0e1c',
    groundColor: '#0c0c16',
    windowChance: 0.30,
    windowColor: 'rgba(255,190,80,WA)',
    windowAlphaRange: [0.3, 0.7],
  },
  // 5: MIDNIGHT
  {
    sky: [
      [0, '#050508'],
      [0.5, '#080812'],
      [1, '#0a0a18']
    ],
    stars: true,
    starCount: 65,
    starAlpha: 0.55,
    moon: { type: 'crescent', x: 60, y: 35, r: 14, color: '#a0a8c0', glowColor: 'rgba(140,150,180,0.08)', cutX: 7, cutY: -3 },
    clouds: [
      { x: 50, y: 55, w: 50, opacity: 0.02, color: '#8890a8' },
    ],
    fog: { color: 'rgba(25,35,75,0.22)', y: 0.6 },
    buildingColor: '#060610',
    farBuildingColor: '#04040c',
    groundColor: '#040408',
    windowChance: 0.08,
    windowColor: 'rgba(200,190,150,WA)',
    windowAlphaRange: [0.15, 0.4],
  },
];

// --- RENDER EACH CANVAS ---
configs.forEach(function(cfg, idx) {
  var canvas = document.getElementById('c' + idx);
  var ctx = canvas.getContext('2d');

  // 1. SKY GRADIENT
  var skyG = ctx.createLinearGradient(0, 0, 0, H);
  cfg.sky.forEach(function(s) { skyG.addColorStop(s[0], s[1]); });
  ctx.fillStyle = skyG;
  ctx.fillRect(0, 0, W, H);

  // 2. HORIZON HAZE (afternoon)
  if (cfg.haze) {
    var hazeG = ctx.createLinearGradient(0, H * cfg.haze.y, 0, H);
    hazeG.addColorStop(0, 'rgba(0,0,0,0)');
    hazeG.addColorStop(1, cfg.haze.color);
    ctx.fillStyle = hazeG;
    ctx.fillRect(0, H * cfg.haze.y, W, H * (1 - cfg.haze.y));
  }

  // 3. STARS
  if (cfg.stars) {
    var count = cfg.starCount || 45;
    // Seeded positions so they're consistent
    for (var i = 0; i < count; i++) {
      var sx = (hash(i, 7, idx) * W) | 0;
      var sy = (hash(i, 13, idx) * H * 0.65) | 0;
      var sr = 0.5 + hash(i, 19, idx) * 1.2;
      var sa = cfg.starAlpha * (0.3 + hash(i, 31, idx) * 0.7);
      ctx.globalAlpha = sa;
      ctx.fillStyle = '#b0b8d0';
      ctx.beginPath();
      ctx.arc(sx, sy, sr, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // 4. SUN / MOON
  if (cfg.moon) {
    var m = cfg.moon;
    // Scatter glow
    var scatter = ctx.createRadialGradient(m.x, m.y, m.r, m.x, m.y, m.r * 5);
    scatter.addColorStop(0, m.glowColor);
    scatter.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = scatter;
    ctx.fillRect(m.x - m.r * 5, m.y - m.r * 5, m.r * 10, m.r * 10);

    // Moon disc
    ctx.save();
    ctx.beginPath();
    ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
    ctx.fillStyle = m.color;
    ctx.globalAlpha = 0.9;
    ctx.fill();

    // Craters
    ctx.globalCompositeOperation = 'source-atop';
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = '#8088a8';
    ctx.beginPath();
    ctx.ellipse(m.x - m.r * 0.35, m.y - m.r * 0.3, m.r * 0.18, m.r * 0.14, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.09;
    ctx.beginPath();
    ctx.ellipse(m.x - m.r * 0.2, m.y + m.r * 0.2, m.r * 0.14, m.r * 0.1, -0.2, 0, Math.PI * 2);
    ctx.fill();

    // Crescent cutout
    ctx.globalCompositeOperation = 'destination-out';
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.arc(m.x + m.cutX, m.y + m.cutY, m.r * 0.88, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
  }

  if (cfg.sun) {
    var s = cfg.sun;
    if (s.type === 'circle') {
      // Glow rings
      for (var gi = 3; gi >= 1; gi--) {
        var gr = ctx.createRadialGradient(s.x, s.y, s.r * 0.5, s.x, s.y, s.r * (s.glowR || 4) * (gi / 2));
        gr.addColorStop(0, s.glowColor);
        gr.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = gr;
        ctx.fillRect(s.x - s.r * 6, s.y - s.r * 6, s.r * 12, s.r * 12);
      }
      // Sun disc
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.color;
      ctx.fill();
      // Bright center
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.globalAlpha = 0.4;
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (s.type === 'glow') {
      // Dawn: glow at horizon, no visible disc
      for (var ri = 0; ri < s.radii.length; ri++) {
        var rg = ctx.createRadialGradient(s.x, s.y, s.r * 0.3, s.x, s.y, s.r * s.radii[ri]);
        rg.addColorStop(0, s.colors[ri]);
        rg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = rg;
        ctx.fillRect(s.x - s.r * s.radii[ri], s.y - s.r * s.radii[ri], s.r * s.radii[ri] * 2, s.r * s.radii[ri] * 2);
      }
    } else if (s.type === 'setting') {
      // Dusk: half sun at horizon
      // Wide horizontal glow band at horizon
      var horizG = ctx.createLinearGradient(0, H - GROUND_H - 40, 0, H - GROUND_H);
      horizG.addColorStop(0, 'rgba(0,0,0,0)');
      horizG.addColorStop(0.5, 'rgba(255,100,30,0.06)');
      horizG.addColorStop(1, 'rgba(255,80,20,0.12)');
      ctx.fillStyle = horizG;
      ctx.fillRect(0, H - GROUND_H - 40, W, 40);

      // Large radial glow behind sun
      var sg = ctx.createRadialGradient(s.x, s.y, s.r * 0.2, s.x, s.y, s.r * 6);
      sg.addColorStop(0, s.glowColor);
      sg.addColorStop(0.3, 'rgba(255,80,20,0.12)');
      sg.addColorStop(0.6, 'rgba(255,50,10,0.04)');
      sg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = sg;
      ctx.fillRect(s.x - s.r * 6, s.y - s.r * 6, s.r * 12, s.r * 12);

      // Sun disc (clip to above ground)
      ctx.save();
      ctx.beginPath();
      ctx.rect(0, 0, W, H - GROUND_H);
      ctx.clip();
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      var sunG = ctx.createRadialGradient(s.x, s.y - s.r * 0.3, 0, s.x, s.y, s.r);
      sunG.addColorStop(0, '#ffdd55');
      sunG.addColorStop(0.4, s.color);
      sunG.addColorStop(0.8, '#cc4411');
      sunG.addColorStop(1, '#992200');
      ctx.fillStyle = sunG;
      ctx.fill();
      ctx.restore();
    }
  }

  // 5. CLOUDS
  if (cfg.clouds) {
    cfg.clouds.forEach(function(c) {
      var cx = c.x + c.w / 2;
      var cy = c.y;
      if (c.puffs) {
        // Fluffy daytime clouds — multiple overlapping ellipses
        var tallMul = c.tall ? 1.6 : 1;
        ctx.globalAlpha = c.opacity;
        ctx.fillStyle = c.color;
        // Main body
        ctx.beginPath();
        ctx.ellipse(cx, cy, c.w * 0.45, c.w * 0.10 * tallMul, 0, 0, Math.PI * 2);
        ctx.fill();
        // Left puff
        ctx.beginPath();
        ctx.ellipse(cx - c.w * 0.22, cy - c.w * 0.04 * tallMul, c.w * 0.22, c.w * 0.12 * tallMul, 0, 0, Math.PI * 2);
        ctx.fill();
        // Right puff
        ctx.beginPath();
        ctx.ellipse(cx + c.w * 0.18, cy - c.w * 0.02 * tallMul, c.w * 0.20, c.w * 0.10 * tallMul, 0, 0, Math.PI * 2);
        ctx.fill();
        // Top puff
        ctx.globalAlpha = c.opacity * 0.8;
        ctx.beginPath();
        ctx.ellipse(cx - c.w * 0.05, cy - c.w * 0.08 * tallMul, c.w * 0.18, c.w * 0.11 * tallMul, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      } else if (c.backlit) {
        // Dramatic backlit clouds (dusk) — dark body with glowing orange/purple underside
        var hw = c.w * 0.45;
        var hh = c.w * 0.12;
        // Outer warm glow aura
        ctx.globalAlpha = c.opacity * 0.4;
        var aura = ctx.createRadialGradient(cx, cy + hh, hw * 0.3, cx, cy, hw * 1.3);
        aura.addColorStop(0, c.color);
        aura.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = aura;
        ctx.fillRect(cx - hw * 1.5, cy - hh * 3, hw * 3, hh * 6);
        // Main cloud body — dark silhouette with multiple puffs
        ctx.globalAlpha = c.opacity * 1.2;
        ctx.fillStyle = 'rgba(20,12,25,0.7)';
        ctx.beginPath();
        ctx.ellipse(cx, cy, hw, hh, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cx - hw * 0.35, cy - hh * 0.2, hw * 0.45, hh * 0.9, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cx + hw * 0.3, cy + hh * 0.1, hw * 0.4, hh * 0.7, 0, 0, Math.PI * 2);
        ctx.fill();
        // Bottom-lit edge — warm orange glow from below
        ctx.globalAlpha = c.opacity * 0.9;
        var bottomGlow = ctx.createLinearGradient(cx, cy, cx, cy + hh * 1.5);
        bottomGlow.addColorStop(0, 'rgba(0,0,0,0)');
        bottomGlow.addColorStop(0.5, c.color);
        bottomGlow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = bottomGlow;
        ctx.beginPath();
        ctx.ellipse(cx, cy + hh * 0.5, hw * 0.95, hh * 0.6, 0, 0, Math.PI * 2);
        ctx.fill();
        // Top edge highlight — thin bright rim
        ctx.globalAlpha = c.opacity * 0.5;
        ctx.strokeStyle = c.color;
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.ellipse(cx, cy - hh * 0.15, hw * 0.8, hh * 0.5, 0, Math.PI * 1.1, Math.PI * 1.9);
        ctx.stroke();
        ctx.globalAlpha = 1;
      } else {
        // Night wisps
        var hw2 = c.w / 2;
        var hh2 = c.w * 0.07;
        ctx.globalAlpha = c.opacity;
        ctx.fillStyle = c.color;
        ctx.beginPath();
        ctx.ellipse(cx, cy, hw2, hh2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = c.opacity * 0.5;
        ctx.beginPath();
        ctx.ellipse(cx + hw2 * 0.3, cy - hh2 * 0.3, hw2 * 0.5, hh2 * 0.7, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    });
  }

  // 6. FAR BUILDINGS (back layer)
  ctx.fillStyle = cfg.farBuildingColor;
  farBuildings.forEach(function(b) {
    ctx.fillRect(b.x, H - GROUND_H - b.h, b.w, b.h);
  });

  // 7. MAIN BUILDINGS
  ctx.fillStyle = cfg.buildingColor;
  buildings.forEach(function(b) {
    ctx.fillRect(b.x, H - GROUND_H - b.h, b.w, b.h);

    // Building tint overlay (afternoon)
    if (cfg.buildingTint) {
      ctx.fillStyle = cfg.buildingTint;
      ctx.fillRect(b.x, H - GROUND_H - b.h, b.w, b.h);
      ctx.fillStyle = cfg.buildingColor;
    }
  });

  // 8. WINDOWS on main buildings
  buildings.forEach(function(b, bi) {
    var cols = Math.floor(b.w / 6);
    var rows = Math.floor(b.h / 8);
    for (var col = 0; col < cols; col++) {
      for (var row = 0; row < rows; row++) {
        var v = hash(bi, col, row);
        if (v < cfg.windowChance) {
          var wx = b.x + 3 + col * 6;
          var wy = H - GROUND_H - b.h + 4 + row * 8;
          var wa = cfg.windowAlphaRange[0] + hash(bi + 99, col, row) * (cfg.windowAlphaRange[1] - cfg.windowAlphaRange[0]);

          if (cfg.windowReflect && hash(bi + 200, col, row) > 0.6) {
            // Sun reflection — bright white
            ctx.fillStyle = 'rgba(255,255,255,' + (wa * 0.9) + ')';
          } else {
            ctx.fillStyle = cfg.windowColor.replace('WA', wa.toFixed(2));
          }
          ctx.fillRect(wx, wy, 3, 4);
        }
      }
    }
  });

  // 9. FOG / HAZE at ground level (midnight)
  if (cfg.fog) {
    var fogG = ctx.createLinearGradient(0, H * cfg.fog.y, 0, H);
    fogG.addColorStop(0, 'rgba(0,0,0,0)');
    fogG.addColorStop(0.5, cfg.fog.color);
    fogG.addColorStop(1, cfg.fog.color);
    ctx.fillStyle = fogG;
    ctx.fillRect(0, H * cfg.fog.y, W, H * (1 - cfg.fog.y));
  }

  // 10. GROUND
  ctx.fillStyle = cfg.groundColor;
  ctx.fillRect(0, H - GROUND_H, W, GROUND_H);

  // Ground top edge — subtle line
  ctx.strokeStyle = idx <= 1 || idx >= 4
    ? 'rgba(60,60,80,0.3)'   // darker times
    : 'rgba(80,90,100,0.25)'; // daytime
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(0, H - GROUND_H);
  ctx.lineTo(W, H - GROUND_H);
  ctx.stroke();
});
</script>
</body>
</html>
