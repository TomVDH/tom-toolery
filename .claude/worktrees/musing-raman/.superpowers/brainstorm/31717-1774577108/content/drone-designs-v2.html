<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a18; color: #e0e0e0; font-family: 'SF Mono', 'Menlo', monospace; padding: 20px; }
  h1 { color: #fff; font-size: 22px; margin-bottom: 6px; }
  .subtitle { color: #888; font-size: 13px; margin-bottom: 30px; }
  .section { margin-bottom: 40px; }
  .section h2 { color: #aaa; font-size: 15px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; border-bottom: 1px solid #222; padding-bottom: 6px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
  .card { background: #111122; border: 1px solid #222; border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color 0.2s; }
  .card:hover { border-color: #00c8f0; }
  .card.selected { border-color: #00c8f0; box-shadow: 0 0 12px rgba(0,200,240,0.3); }
  .card canvas { display: block; width: 100%; }
  .card .label { padding: 12px; }
  .card .label h3 { font-size: 14px; color: #fff; margin-bottom: 4px; }
  .card .label p { font-size: 12px; color: #777; line-height: 1.5; }
  .tag { display: inline-block; background: #1a1a2e; border: 1px solid #333; padding: 2px 8px; border-radius: 3px; font-size: 10px; color: #00c8f0; margin-top: 6px; }
  .fixed { color: #44ff88; }
</style>
</head>
<body>

<h1>Drone Designs <span class="fixed">— rotors fixed</span></h1>
<p class="subtitle">Right rotor alignment corrected on all designs. Props now centred on their motor mounts.</p>

<div class="section">
  <h2>Drone Designs</h2>
  <div class="grid" id="drones"></div>
</div>

<script>
const S = 4;

const drones = [
  {
    id: 'current',
    name: 'Current — Pixel Quad',
    desc: 'The existing design. Blocky quadcopter with cyan cabin, blinking LED, landing skids.',
    tags: ['current'],
    draw(ctx, cx, cy, tick) {
      const x = cx, y = cy;
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.fillRect(x-10*S, y+13*S, 20*S, 3*S);
      // Body
      ctx.fillStyle = '#3a3a4a';
      ctx.fillRect(x-14*S, y-3*S, 28*S, 7*S);
      ctx.fillStyle = '#4a4a5a';
      ctx.fillRect(x-12*S, y-2*S, 24*S, 5*S);
      // Cabin
      ctx.fillStyle = '#00c8f0';
      ctx.fillRect(x-4*S, y-5*S, 8*S, 11*S);
      ctx.fillStyle = '#009abb';
      ctx.fillRect(x-3*S, y-4*S, 6*S, 9*S);
      // LED
      ctx.fillStyle = tick % 40 < 20 ? '#ff2255' : '#551122';
      ctx.fillRect(x-1*S, y-7*S, 2*S, 2*S);
      // Motor mounts — symmetric: left at -18, right at +11 (both 7*S wide)
      ctx.fillStyle = '#505060';
      ctx.fillRect(x-18*S, y-1*S, 7*S, 3*S);
      ctx.fillRect(x+11*S, y-1*S, 7*S, 3*S);
      // Props — centred on mount centres: left=-14.5, right=+14.5
      const spin = Math.abs(Math.sin(tick * 0.15));
      const propW = spin * 12 * S;
      ctx.globalAlpha = 0.55;
      ctx.fillStyle = '#99a';
      ctx.fillRect(x - 14.5*S - propW/2, y-4*S, propW, 2*S);
      ctx.fillRect(x + 14.5*S - propW/2, y-4*S, propW, 2*S);
      ctx.globalAlpha = 1;
      // Landing gear
      ctx.fillStyle = '#555565';
      ctx.fillRect(x-10*S, y+5*S, 2*S, 4*S);
      ctx.fillRect(x+8*S, y+5*S, 2*S, 4*S);
      ctx.fillRect(x-12*S, y+8*S, 8*S, 2*S);
      ctx.fillRect(x+4*S, y+8*S, 8*S, 2*S);
    }
  },
  {
    id: 'stealth',
    name: 'Stealth — Angular',
    desc: 'Low-profile angular drone. Sharper lines, darker tones, green sensor eye. Military vibe.',
    tags: ['new'],
    draw(ctx, cx, cy, tick) {
      const x = cx, y = cy;
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(x-12*S, y+11*S, 24*S, 2*S);
      // Body — angular
      ctx.fillStyle = '#2a2a35';
      ctx.beginPath();
      ctx.moveTo(x-16*S, y);
      ctx.lineTo(x-8*S, y-4*S);
      ctx.lineTo(x+8*S, y-4*S);
      ctx.lineTo(x+16*S, y);
      ctx.lineTo(x+8*S, y+3*S);
      ctx.lineTo(x-8*S, y+3*S);
      ctx.closePath();
      ctx.fill();
      // Top panel
      ctx.fillStyle = '#35354a';
      ctx.beginPath();
      ctx.moveTo(x-7*S, y-3*S);
      ctx.lineTo(x+7*S, y-3*S);
      ctx.lineTo(x+12*S, y);
      ctx.lineTo(x-12*S, y);
      ctx.closePath();
      ctx.fill();
      // Sensor eye
      const glow = 0.6 + Math.sin(tick * 0.08) * 0.3;
      ctx.fillStyle = `rgba(0, 255, 120, ${glow})`;
      ctx.fillRect(x-2*S, y-2*S, 4*S, 2*S);
      ctx.fillStyle = `rgba(0, 255, 120, ${glow * 0.3})`;
      ctx.fillRect(x-4*S, y-2*S, 8*S, 2*S);
      // Engines — symmetric: left centre=-17, right centre=+17
      ctx.fillStyle = '#222230';
      ctx.fillRect(x-20*S, y-2*S, 6*S, 4*S);
      ctx.fillRect(x+14*S, y-2*S, 6*S, 4*S);
      // Engine glow
      ctx.fillStyle = `rgba(0, 200, 255, ${0.3 + Math.sin(tick * 0.12) * 0.15})`;
      ctx.fillRect(x-19*S, y+1*S, 4*S, 1*S);
      ctx.fillRect(x+15*S, y+1*S, 4*S, 1*S);
      // Props — centred on engine centres: -17, +17
      const spin = Math.abs(Math.sin(tick * 0.2));
      const propW = spin * 10 * S;
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = '#88a';
      ctx.fillRect(x - 17*S - propW/2, y-3*S, propW, 1*S);
      ctx.fillRect(x + 17*S - propW/2, y-3*S, propW, 1*S);
      ctx.globalAlpha = 1;
      // Antenna
      ctx.fillStyle = '#444';
      ctx.fillRect(x, y-6*S, 1*S, 3*S);
      ctx.fillStyle = '#ff3344';
      ctx.fillRect(x, y-7*S, 1*S, 1*S);
    }
  },
  {
    id: 'heavy',
    name: 'Heavy Lift — Industrial',
    desc: 'Chunky cargo drone. Thick frame, four visible rotors, orange warning stripes, heavy landing gear.',
    tags: ['new'],
    draw(ctx, cx, cy, tick) {
      const x = cx, y = cy;
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(x-14*S, y+14*S, 28*S, 3*S);
      // Main body
      ctx.fillStyle = '#3d3530';
      ctx.fillRect(x-10*S, y-4*S, 20*S, 10*S);
      ctx.fillStyle = '#4a4238';
      ctx.fillRect(x-9*S, y-3*S, 18*S, 8*S);
      // Warning stripes
      ctx.fillStyle = '#cc8800';
      ctx.fillRect(x-9*S, y+2*S, 18*S, 2*S);
      ctx.fillStyle = '#3d3530';
      for (let i = 0; i < 6; i++) {
        ctx.fillRect(x-9*S + i*6*S, y+2*S, 3*S, 2*S);
      }
      // Cabin window
      ctx.fillStyle = '#335577';
      ctx.fillRect(x-3*S, y-3*S, 6*S, 4*S);
      ctx.fillStyle = '#4477aa';
      ctx.fillRect(x-2*S, y-2*S, 4*S, 2*S);
      // Rotor arms — symmetric
      ctx.fillStyle = '#332e28';
      ctx.fillRect(x-20*S, y-2*S, 12*S, 4*S);
      ctx.fillRect(x+8*S, y-2*S, 12*S, 4*S);
      // Rotor housings — left centre=-19.5, right centre=+19.5
      ctx.fillStyle = '#444038';
      ctx.fillRect(x-22*S, y-4*S, 5*S, 8*S);
      ctx.fillRect(x+17*S, y-4*S, 5*S, 8*S);
      // Props — centred on housings
      const spin = Math.abs(Math.sin(tick * 0.13));
      const propW = spin * 14 * S;
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = '#998';
      ctx.fillRect(x - 19.5*S - propW/2, y-5*S, propW, 2*S);
      ctx.fillRect(x + 19.5*S - propW/2, y-5*S, propW, 2*S);
      ctx.globalAlpha = 1;
      // Heavy landing gear
      ctx.fillStyle = '#555045';
      ctx.fillRect(x-12*S, y+6*S, 3*S, 6*S);
      ctx.fillRect(x+9*S, y+6*S, 3*S, 6*S);
      ctx.fillRect(x-14*S, y+11*S, 7*S, 2*S);
      ctx.fillRect(x+7*S, y+11*S, 7*S, 2*S);
      // Cargo hook
      ctx.fillStyle = '#666';
      ctx.fillRect(x-1*S, y+6*S, 2*S, 3*S);
      ctx.fillStyle = '#888';
      ctx.fillRect(x-2*S, y+8*S, 4*S, 2*S);
      // Status LEDs
      ctx.fillStyle = tick % 30 < 15 ? '#ff8800' : '#553300';
      ctx.fillRect(x-9*S, y-4*S, 2*S, 1*S);
      ctx.fillRect(x+7*S, y-4*S, 2*S, 1*S);
    }
  },
  {
    id: 'racer',
    name: 'Racer — FPV Speed',
    desc: 'Compact racing drone. Tilted forward stance, exposed electronics, bright accent colour, aggressive.',
    tags: ['new'],
    draw(ctx, cx, cy, tick) {
      const x = cx, y = cy;
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.fillRect(x-10*S, y+10*S, 20*S, 2*S);
      // Body
      ctx.fillStyle = '#1a1a2a';
      ctx.fillRect(x-8*S, y-2*S, 16*S, 6*S);
      ctx.fillStyle = '#252535';
      ctx.fillRect(x-7*S, y-2*S, 14*S, 2*S);
      // Accent stripe
      ctx.fillStyle = '#ff0066';
      ctx.fillRect(x-7*S, y, 14*S, 1*S);
      // FPV camera
      ctx.fillStyle = '#333';
      ctx.fillRect(x+5*S, y-4*S, 4*S, 3*S);
      ctx.fillStyle = `rgba(255, 0, 80, ${0.4 + Math.sin(tick * 0.1) * 0.2})`;
      ctx.fillRect(x+6*S, y-3*S, 2*S, 1*S);
      // Arms — symmetric: left centre=-17, right centre=+17
      ctx.fillStyle = '#222233';
      ctx.fillRect(x-20*S, y-1*S, 11*S, 2*S);
      ctx.fillRect(x+9*S, y-1*S, 11*S, 2*S);
      // Motor bells — left centre=-18, right centre=+18
      ctx.fillStyle = '#2a2a3a';
      ctx.fillRect(x-20*S, y-3*S, 4*S, 6*S);
      ctx.fillRect(x+16*S, y-3*S, 4*S, 6*S);
      // Motor accent rings
      ctx.fillStyle = '#ff0066';
      ctx.fillRect(x-20*S, y-3*S, 4*S, 1*S);
      ctx.fillRect(x+16*S, y-3*S, 4*S, 1*S);
      // Props — centred on motor bell centres: -18, +18
      const spin = Math.abs(Math.sin(tick * 0.25));
      const propW = spin * 12 * S;
      ctx.globalAlpha = 0.45;
      ctx.fillStyle = '#aab';
      ctx.fillRect(x - 18*S - propW/2, y-4*S, propW, 1*S);
      ctx.fillRect(x + 18*S - propW/2, y-4*S, propW, 1*S);
      ctx.globalAlpha = 1;
      // Battery pack
      ctx.fillStyle = '#ff0066';
      ctx.fillRect(x-3*S, y+4*S, 6*S, 2*S);
      ctx.fillStyle = '#cc0055';
      ctx.fillRect(x-2*S, y+4*S, 4*S, 2*S);
      // Minimal legs
      ctx.fillStyle = '#444';
      ctx.fillRect(x-6*S, y+4*S, 1*S, 4*S);
      ctx.fillRect(x+5*S, y+4*S, 1*S, 4*S);
      ctx.fillRect(x-8*S, y+7*S, 5*S, 1*S);
      ctx.fillRect(x+3*S, y+7*S, 5*S, 1*S);
    }
  }
];

const droneGrid = document.getElementById('drones');
let tick = 0;
const droneCanvases = [];

drones.forEach(d => {
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => card.classList.toggle('selected');

  const canvas = document.createElement('canvas');
  canvas.width = 260;
  canvas.height = 140;
  card.appendChild(canvas);

  const label = document.createElement('div');
  label.className = 'label';
  label.innerHTML = '<h3>' + d.name + '</h3><p>' + d.desc + '</p>' +
    d.tags.map(t => '<span class="tag">' + t + '</span>').join(' ');
  card.appendChild(label);

  droneGrid.appendChild(card);
  droneCanvases.push({ canvas, drone: d });
});

function renderAll() {
  tick++;
  droneCanvases.forEach(({ canvas, drone }) => {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
    g.addColorStop(0, '#050510');
    g.addColorStop(1, '#101030');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    for (let i = 0; i < 8; i++) {
      ctx.fillRect(30 + i * 28 + (i*17%11), 10 + (i*23%40), 1, 1);
    }
    drone.draw(ctx, canvas.width / 2, canvas.height / 2, tick);
  });
  requestAnimationFrame(renderAll);
}

renderAll();
</script>
</body>
</html>
