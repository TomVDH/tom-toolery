<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a18; color: #e0e0e0; font-family: 'SF Mono', 'Menlo', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
  h1 { color: #fff; font-size: 20px; margin-bottom: 4px; }
  .sub { color: #888; font-size: 12px; margin-bottom: 16px; }
  canvas { border: 2px solid #1a1a3a; border-radius: 14px; box-shadow: 0 0 80px #00d4ff08, 0 8px 40px #00000090; }
  .controls { margin-top: 16px; display: flex; gap: 10px; }
  button { background: #151528; border: 1px solid #ff4400; color: #ff8844; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; font-family: inherit; }
  button:hover { background: #1a0800; }
  .timer { color: #666; font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>

<h1>Thermonuclear Blast â€” Full Animation</h1>
<p class="sub">Wide flat cap, white-hot core, base ring, cloud bands, sky brightening, rim light. 11s cycle.</p>

<canvas id="game" width="620" height="640"></canvas>
<div class="controls">
  <button onclick="triggerNuke()">DETONATE</button>
  <button onclick="reset()" style="border-color:#334; color:#aab;">RESET</button>
</div>
<div class="timer" id="timer">Ready</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 620, H = 640, GROUND_H = 32;
let tick = 0;
let nukeActive = false, nukeStart = 0;
let nukeGx = W/2, nukeGy = H - GROUND_H;
let screenShake = 0;
let particles = [];

const bgStars = Array.from({length:55}, () => ({
  x: Math.random()*W, y: Math.random()*(H*0.6), r: Math.random()*1.1+0.3, phase: Math.random()*Math.PI*2
}));
const farBuildings = [
  ...Array.from({length:8}, (_,i) => ({ x:i*40+5, h:70+Math.sin(i*2.1+0.5)*40+Math.cos(i*3.7)*20, w:16+((i*5+2)%4)*3, layer:'back' })),
  ...Array.from({length:14}, (_,i) => ({ x:i*23+((i*3)%7), h:20+Math.sin(i*2.9+1.1)*15+Math.cos(i*4.3)*10, w:16+((i*7+1)%6)*2, layer:'front' }))
];
const clouds = Array.from({length:5}, () => ({
  x: Math.random()*W, y: 50+Math.random()*160, w: 80+Math.random()*100, speed: 0.008+Math.random()*0.015, opacity: 0.015+Math.random()*0.02
}));

function triggerNuke() {
  nukeActive = true;
  nukeStart = performance.now();
  nukeGx = W/2 + (Math.random()-0.5)*80;
  nukeGy = H - GROUND_H;
  screenShake = 50;
  // Debris
  for (let i = 0; i < 60; i++) {
    const a = Math.random()*Math.PI*2, spd = Math.random()*6+2;
    particles.push({ x:nukeGx+(Math.random()-0.5)*40, y:nukeGy-Math.random()*40,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd, life:50+Math.random()*40, maxLife:90,
      r:Math.random()*4+2, hue:15+Math.random()*35, sat:100, lum:50 });
  }
  // Embers
  setTimeout(() => {
    for (let i = 0; i < 40; i++) {
      particles.push({ x:nukeGx+(Math.random()-0.5)*120, y:nukeGy-100-Math.random()*200,
        vx:(Math.random()-0.5)*2, vy:Math.random()*2+0.5, life:50+Math.random()*40, maxLife:90,
        r:Math.random()*3+1, hue:10+Math.random()*30, sat:100, lum:55 });
    }
    screenShake = 8;
  }, 600);
}

function reset() {
  nukeActive = false; screenShake = 0; particles = [];
  document.getElementById('timer').textContent = 'Ready';
}

function drawSky() {
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#050510'); g.addColorStop(0.5,'#0a0a22'); g.addColorStop(1,'#101030');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  if (nukeActive) {
    const ne = performance.now()-nukeStart;
    let sb = 0;
    if (ne<1000) sb=ne/1000; else if(ne<7000) sb=1; else sb=Math.max(0,1-(ne-7000)/4000);
    if (sb>0.01) {
      const sg = ctx.createLinearGradient(0,H,0,0);
      sg.addColorStop(0,`hsla(15,90%,20%,${sb*0.35})`);
      sg.addColorStop(0.4,`hsla(20,80%,12%,${sb*0.2})`);
      sg.addColorStop(1,`hsla(25,60%,6%,${sb*0.08})`);
      ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);
    }
  }
}

function drawStars() {
  bgStars.forEach(s => {
    ctx.globalAlpha = (Math.sin(s.phase+tick*0.012)+1)/2*0.55+0.15;
    ctx.fillStyle='#b0b8d0'; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }); ctx.globalAlpha=1;
}

function drawClouds() {
  clouds.forEach(c => {
    c.x -= c.speed; if (c.x+c.w < -c.w) c.x = W+c.w;
    const cx=c.x+c.w/2, cy=c.y, hw=c.w/2, hh=c.w*0.07;
    ctx.globalAlpha=c.opacity; ctx.fillStyle='#b0b8d0';
    ctx.beginPath(); ctx.ellipse(cx,cy,hw,hh,0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=c.opacity*0.5;
    ctx.beginPath(); ctx.ellipse(cx+hw*0.3,cy-hh*0.3,hw*0.5,hh*0.7,0,0,Math.PI*2); ctx.fill();
    if (nukeActive) {
      const ne=performance.now()-nukeStart; let br=0;
      if(ne<1000) br=ne/1000; else if(ne<7000) br=1; else br=Math.max(0,1-(ne-7000)/4000);
      if (br>0.01) {
        ctx.globalAlpha=1; ctx.fillStyle=`rgba(255,180,80,${br*0.08})`;
        ctx.beginPath(); ctx.ellipse(cx,cy+hh*0.5,hw*1.1,hh*1.2,0,0,Math.PI*2); ctx.fill();
      }
    }
    ctx.globalAlpha=1;
  });
}

function drawMoon() {
  const mx=W-90,my=75,r=28;
  const scatter=ctx.createRadialGradient(mx,my,r,mx,my,r*6);
  scatter.addColorStop(0,'rgba(180,190,220,0.04)'); scatter.addColorStop(0.4,'rgba(180,190,220,0.015)'); scatter.addColorStop(1,'rgba(180,190,220,0)');
  ctx.fillStyle=scatter; ctx.fillRect(mx-r*6,my-r*6,r*12,r*12);
  const glow=ctx.createRadialGradient(mx,my,r*0.6,mx,my,r*3);
  glow.addColorStop(0,'rgba(220,215,200,0.14)'); glow.addColorStop(0.4,'rgba(210,210,230,0.06)'); glow.addColorStop(1,'rgba(200,210,240,0)');
  ctx.fillStyle=glow; ctx.fillRect(mx-r*3,my-r*3,r*6,r*6);
  ctx.save(); ctx.beginPath(); ctx.arc(mx,my,r,0,Math.PI*2); ctx.fillStyle='#c8cde8'; ctx.globalAlpha=0.9; ctx.fill();
  ctx.globalCompositeOperation='source-atop'; ctx.globalAlpha=0.12; ctx.fillStyle='#8088a8';
  ctx.beginPath(); ctx.ellipse(mx-10,my-8,5,4,0.3,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=0.09; ctx.beginPath(); ctx.ellipse(mx-6,my+5,4,3,-0.2,0,Math.PI*2); ctx.fill();
  ctx.globalCompositeOperation='destination-out'; ctx.globalAlpha=1;
  ctx.beginPath(); ctx.arc(mx+14,my-6,r*0.88,0,Math.PI*2); ctx.fill();
  ctx.restore(); ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
}

function drawFarCity() {
  const scrollX=(tick*0.12)%320, backSX=(scrollX*0.6)%320;
  const back=farBuildings.filter(b=>b.layer==='back'), front=farBuildings.filter(b=>b.layer==='front');
  ctx.fillStyle='#080818';
  for(let t=-320;t<W+320;t+=320) back.forEach(b=>{const bx=b.x+t-backSX;if(bx+b.w>-10&&bx<W+10) ctx.fillRect(bx,H-GROUND_H-b.h,b.w,b.h);});
  ctx.fillStyle='#0c0c20';
  for(let t=-320;t<W+320;t+=320) front.forEach(b=>{const bx=b.x+t-scrollX;if(bx+b.w>-10&&bx<W+10) ctx.fillRect(bx,H-GROUND_H-b.h,b.w,b.h);});

  // Rim light
  if (nukeActive) {
    const ne=performance.now()-nukeStart; let ra=0;
    if(ne<500) ra=Math.min(1,ne/300); else if(ne<3500) ra=1; else ra=Math.max(0,1-(ne-3500)/1500);
    if (ra>0.01) {
      ctx.save();
      const rw=Math.min(1,ne/1500), rh=rw*25, rs=60+rw*40, rl=95-rw*45;
      ctx.strokeStyle=`hsla(${rh},${rs}%,${rl}%,${ra*0.5})`;
      ctx.shadowColor=`hsla(${rh},${rs}%,${rl+5}%,${ra*0.6})`;
      ctx.shadowBlur=6+ra*4; ctx.lineWidth=0.75;
      ctx.beginPath();
      for(let t=-320;t<W+320;t+=320) back.forEach(b=>{const bx=b.x+t-backSX;if(bx+b.w>-10&&bx<W+10){const ty=H-GROUND_H-b.h;ctx.moveTo(bx,ty);ctx.lineTo(bx+b.w,ty);ctx.lineTo(bx+b.w,H-GROUND_H);}});
      ctx.stroke();
      ctx.beginPath();
      for(let t=-320;t<W+320;t+=320) front.forEach(b=>{const bx=b.x+t-scrollX;if(bx+b.w>-10&&bx<W+10){const ty=H-GROUND_H-b.h;ctx.moveTo(bx,ty);ctx.lineTo(bx+b.w,ty);ctx.lineTo(bx+b.w,H-GROUND_H);}});
      ctx.stroke(); ctx.restore();
    }
  }
}

function drawGround() {
  ctx.fillStyle='#0a0a18'; ctx.fillRect(0,H-GROUND_H,W,GROUND_H);
  ctx.fillStyle='#121226'; ctx.fillRect(0,H-GROUND_H,W,6);
  ctx.fillStyle='#1a1a36'; ctx.fillRect(0,H-GROUND_H+5,W,1);
  ctx.fillStyle='#181830'; ctx.fillRect(0,H-GROUND_H,W,2);
  const off=(tick*1.6)%24;
  ctx.fillStyle='#1a1a35';
  for(let x=-off;x<W;x+=24) ctx.fillRect(x,H-GROUND_H+15,12,2);
}

// ===== THERMONUCLEAR MUSHROOM CLOUD =====
function drawNukeCloud() {
  if (!nukeActive) return;
  const elapsed = performance.now() - nukeStart;
  const totalMs = 11000;
  const gx = nukeGx, gy = nukeGy;

  // Shockwave ring
  if (elapsed > 200 && elapsed < 2000) {
    const st = (elapsed-200)/1800;
    const radius = st * Math.max(W,H) * 0.8;
    ctx.globalAlpha = (1-st)*0.3;
    ctx.strokeStyle = 'rgba(255,200,100,0.6)'; ctx.lineWidth = 3+(1-st)*8;
    ctx.beginPath(); ctx.arc(gx,gy,radius,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Mushroom cloud
  if (elapsed > 100) {
    const cloudT = Math.min(1, (elapsed-100)/3000);
    const fadeT = elapsed > 9000 ? Math.min(1, (elapsed-9000)/2000) : 0;
    const darkT = elapsed > 3000 ? Math.min(1, (elapsed-3000)/3500) : 0;
    const alpha = (1-fadeT) * 0.85;

    if (alpha > 0.01) {
      const hShift = darkT * 15;
      const lDrop = darkT * 30;
      ctx.globalAlpha = alpha;

      const riseEase = 1 - Math.pow(1 - Math.min(1, cloudT*1.5), 3);
      const slowDrift = Math.min(1, elapsed/totalMs) * H * 0.07;
      const cloudCenterY = gy - riseEase * (H * 0.45) - slowDrift;
      const stemBaseY = gy;

      const capGrow = Math.min(1, cloudT*2);
      const capR = 38 + capGrow * 55;
      const capRx = capR * 1.6; // WIDER than standard (1.4 â†’ 1.6)
      const stemTopW = 18 + capGrow * 14;
      const stemBaseW = 30 + capGrow * 28;

      // Base glow â€” intense
      const baseGlowR = capRx * 2;
      const baseGlowAlpha = alpha * Math.max(0, 1 - darkT * 0.7);
      const baseGlow = ctx.createRadialGradient(gx, stemBaseY, 0, gx, stemBaseY, baseGlowR);
      baseGlow.addColorStop(0, `hsla(35,100%,70%,${baseGlowAlpha*0.7})`);
      baseGlow.addColorStop(0.15, `hsla(28,100%,50%,${baseGlowAlpha*0.35})`);
      baseGlow.addColorStop(0.4, `hsla(20,100%,30%,${baseGlowAlpha*0.08})`);
      baseGlow.addColorStop(1, 'hsla(15,100%,20%,0)');
      ctx.fillStyle = baseGlow; ctx.beginPath(); ctx.arc(gx, stemBaseY, baseGlowR, 0, Math.PI*2); ctx.fill();

      // Stem â€” wider, organic
      const stemGrad = ctx.createLinearGradient(gx, cloudCenterY+capR*0.3, gx, stemBaseY);
      stemGrad.addColorStop(0, `hsla(${25-hShift},90%,${Math.max(10,45-lDrop)}%,${alpha})`);
      stemGrad.addColorStop(0.4, `hsla(${18-hShift},80%,${Math.max(8,35-lDrop)}%,${alpha})`);
      stemGrad.addColorStop(1, `hsla(${12-hShift},70%,${Math.max(5,25-lDrop)}%,${alpha})`);
      ctx.fillStyle = stemGrad;
      ctx.beginPath();
      ctx.moveTo(gx-stemTopW/2, cloudCenterY+capR*0.3);
      ctx.quadraticCurveTo(gx-stemTopW*0.7, (cloudCenterY+stemBaseY)/2, gx-stemBaseW/2, stemBaseY);
      ctx.lineTo(gx+stemBaseW/2, stemBaseY);
      ctx.quadraticCurveTo(gx+stemTopW*0.7, (cloudCenterY+stemBaseY)/2, gx+stemTopW/2, cloudCenterY+capR*0.3);
      ctx.closePath(); ctx.fill();

      // Core light spills down stem
      const spillAlpha = alpha * Math.max(0, 1 - darkT * 0.8);
      if (spillAlpha > 0.01) {
        const spillG = ctx.createLinearGradient(gx, cloudCenterY+capR*0.3, gx, cloudCenterY + capR*1.5);
        spillG.addColorStop(0, `hsla(35,100%,55%,${spillAlpha*0.2})`);
        spillG.addColorStop(1, 'hsla(25,100%,30%,0)');
        ctx.fillStyle = spillG; ctx.fillRect(gx-stemTopW*0.4, cloudCenterY+capR*0.3, stemTopW*0.8, capR*1.2);
      }

      // Cap glow â€” soft, wide
      const glowRadius = capRx * 2.5;
      const glowGrad = ctx.createRadialGradient(gx, cloudCenterY, capR*0.2, gx, cloudCenterY, glowRadius);
      glowGrad.addColorStop(0, `hsla(30,100%,${Math.max(15,60-lDrop*2)}%,${alpha*0.35})`);
      glowGrad.addColorStop(0.4, `hsla(25,100%,${Math.max(10,45-lDrop*2)}%,${alpha*0.15})`);
      glowGrad.addColorStop(1, 'hsla(15,100%,30%,0)');
      ctx.fillStyle = glowGrad; ctx.beginPath(); ctx.arc(gx, cloudCenterY, glowRadius, 0, Math.PI*2); ctx.fill();

      // Cap layers â€” WIDE and FLAT
      ctx.fillStyle = `hsla(${8-hShift},50%,${Math.max(5,16-lDrop)}%,${alpha})`;
      ctx.beginPath(); ctx.ellipse(gx, cloudCenterY+5, capRx*1.2, capR*0.6, 0, 0, Math.PI*2); ctx.fill();

      ctx.fillStyle = `hsla(${15-hShift},70%,${Math.max(8,24-lDrop)}%,${alpha})`;
      ctx.beginPath(); ctx.ellipse(gx, cloudCenterY, capRx*1.0, capR*0.5, 0, 0, Math.PI*2); ctx.fill();

      ctx.fillStyle = `hsla(${22-hShift},85%,${Math.max(10,35-lDrop)}%,${alpha})`;
      ctx.beginPath(); ctx.ellipse(gx, cloudCenterY-3, capRx*0.7, capR*0.38, 0, 0, Math.PI*2); ctx.fill();

      // Hot core
      const coreDarkDelay = elapsed > 5500 ? Math.min(1, (elapsed-5500)/2500) : 0;
      const coreAlpha = alpha * Math.max(0.1, 1-coreDarkDelay);
      ctx.fillStyle = `hsla(${35-hShift},100%,${Math.max(15,50-lDrop*2)}%,${coreAlpha})`;
      ctx.beginPath(); ctx.ellipse(gx, cloudCenterY-5, capRx*0.4, capR*0.25, 0, 0, Math.PI*2); ctx.fill();

      // White-hot centre
      if (cloudT < 0.5) {
        const wa = (1-cloudT/0.5)*alpha;
        ctx.fillStyle = `rgba(255,245,210,${wa*0.6})`;
        ctx.beginPath(); ctx.ellipse(gx, cloudCenterY-6, capRx*0.2, capR*0.12, 0, 0, Math.PI*2); ctx.fill();
      }

      // Prominent base ring
      ctx.fillStyle = `hsla(${12-hShift},65%,${Math.max(5,22-lDrop)}%,${alpha*0.7})`;
      ctx.beginPath(); ctx.ellipse(gx, cloudCenterY+capR*0.45, capRx*1.35, capR*0.15, 0, 0, Math.PI*2); ctx.fill();

      // Cloud bands â€” staggered, wavy
      {
        const now = elapsed / 1000;
        for (let i = 0; i < 3; i++) {
          const entryT = 0.15 + i * 0.15;
          if (cloudT < entryT) continue;
          const bandAge = Math.min(1, (cloudT - entryT) / 0.35);
          const t01 = i / 2;
          const finalY = cloudCenterY - capR * (0.55 - t01 * 1.0) - 35;
          const startY2 = cloudCenterY + capR * 0.5;
          const bandY = startY2 + (finalY - startY2) * bandAge + Math.sin(now*(0.4+i*0.25)+i*2.3)*capR*0.03;
          const widthAtY = capRx * (0.6 + t01 * 0.8) * bandAge;
          const fade = (0.7 + t01 * 0.3) * bandAge;
          const pulse = 0.3 + 0.1 * Math.sin(now*(1.2+i*0.4)+i*1.7);
          const bandAlpha = alpha * pulse * fade;
          const bandL = Math.max(8, (42-i*5) - lDrop);
          const bandH = 22 - hShift + i*3;
          const sag1 = capR*0.05*Math.sin(now*(0.6+i*0.3)+i);
          const sag2 = capR*0.04*Math.sin(now*(0.5+i*0.2)+i+1.5);
          ctx.strokeStyle = `hsla(${bandH},75%,${bandL}%,${bandAlpha})`;
          ctx.lineWidth = (4+t01*2)*bandAge;
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(gx-widthAtY, bandY);
          ctx.quadraticCurveTo(gx-widthAtY*0.35, bandY+sag1, gx, bandY+sag2);
          ctx.quadraticCurveTo(gx+widthAtY*0.35, bandY-sag1, gx+widthAtY, bandY);
          ctx.stroke();
        }
      }

      ctx.globalAlpha = 1;
    }
  }

  // Shake
  if (elapsed < 1200) screenShake = Math.max(screenShake, 50*(1-elapsed/1200));
  else if (elapsed < 4000) screenShake = Math.max(screenShake*0.94, 0);

  if (elapsed > totalMs) nukeActive = false;
}

// Nuke overlay
function drawNukeOverlay() {
  if (!nukeActive) return;
  const elapsed = performance.now()-nukeStart;
  const cloudT = Math.min(1, Math.max(0,elapsed-100)/3000);
  const riseEase = 1-Math.pow(1-Math.min(1,cloudT*1.5),3);
  const slowDrift = Math.min(1,elapsed/11000)*H*0.07;
  const cloudCenterY = nukeGy - riseEase*(H*0.45) - slowDrift;

  if (elapsed < 300) {
    const ft = elapsed/300;
    ctx.globalAlpha = (1-ft*ft)*0.95; ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1;
  }
  if (elapsed < 7000) {
    const lt = elapsed/7000;
    const intensity = (1-lt*lt)*0.45;
    const rad = Math.max(W,H)*1.2;
    const radGrad = ctx.createRadialGradient(nukeGx,cloudCenterY,0,nukeGx,cloudCenterY,rad);
    radGrad.addColorStop(0,`hsla(35,100%,65%,${intensity})`);
    radGrad.addColorStop(0.3,`hsla(25,100%,45%,${intensity*0.5})`);
    radGrad.addColorStop(0.7,`hsla(20,90%,25%,${intensity*0.15})`);
    radGrad.addColorStop(1,'hsla(15,80%,15%,0)');
    ctx.fillStyle=radGrad; ctx.fillRect(0,0,W,H);
  }
}

function drawParticles() {
  particles.forEach(p => {
    const t = p.life/p.maxLife;
    ctx.globalAlpha = t*0.75;
    ctx.fillStyle = `hsl(${p.hue},${p.sat}%,${p.lum+(1-t)*20}%)`;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*t,0,Math.PI*2); ctx.fill();
  }); ctx.globalAlpha=1;
}

function updateParticles() {
  particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vx*=0.98; p.vy*=0.98; p.vy+=0.02; p.life--; });
  particles = particles.filter(p => p.life > 0);
}

function render() {
  tick++;
  const shaking = screenShake > 0.3;
  const sx = shaking ? (Math.random()-0.5)*screenShake : 0;
  const sy = shaking ? (Math.random()-0.5)*screenShake : 0;

  ctx.save(); ctx.translate(sx, sy);
  drawSky(); drawMoon(); drawStars(); drawClouds();
  drawNukeCloud(); drawFarCity(); drawGround();
  drawParticles();

  // Vignette
  const vg = ctx.createRadialGradient(W/2,H/2,H*0.35,W/2,H/2,H*0.75);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.35)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

  drawNukeOverlay();
  ctx.restore();

  if (screenShake > 0.3) screenShake *= 0.85;
  updateParticles();

  // Timer display
  if (nukeActive) {
    const elapsed = ((performance.now()-nukeStart)/1000).toFixed(1);
    document.getElementById('timer').textContent = elapsed + 's / 11s';
  }

  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
