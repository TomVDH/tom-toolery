<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a18; color: #e0e0e0; font-family: 'SF Mono', 'Menlo', monospace; padding: 20px; }
  h1 { color: #fff; font-size: 20px; margin-bottom: 4px; }
  .sub { color: #888; font-size: 12px; margin-bottom: 24px; }
  .section { margin-bottom: 36px; }
  .section h2 { color: #aaa; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 4px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 14px; }
  .card { background: #111122; border: 1px solid #222; border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color 0.2s; }
  .card:hover { border-color: #00c8f0; }
  .card.selected { border-color: #00c8f0; box-shadow: 0 0 12px rgba(0,200,240,0.3); }
  .card canvas { display: block; width: 100%; }
  .card .label { padding: 10px; }
  .card .label h3 { font-size: 13px; color: #fff; margin-bottom: 3px; }
  .card .label p { font-size: 11px; color: #666; line-height: 1.4; }
</style>
</head>
<body>

<h1>Nuke Variations & Firework Effects</h1>
<p class="sub">Click to select. Nukes shown at peak moment. Fireworks are animated.</p>

<div class="section">
  <h2>Thermonuclear Iterations</h2>
  <div class="grid" id="nukes"></div>
</div>

<div class="section">
  <h2>Firework Burst Styles</h2>
  <div class="grid" id="fireworks"></div>
</div>

<script>
let tick = 0;
const allCanvases = [];

function addCard(id, name, desc, w, h, drawFn) {
  const grid = document.getElementById(id);
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => { grid.querySelectorAll('.card').forEach(c => c.classList.remove('selected')); card.classList.add('selected'); };
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  card.appendChild(canvas);
  const label = document.createElement('div');
  label.className = 'label';
  label.innerHTML = `<h3>${name}</h3><p>${desc}</p>`;
  card.appendChild(label);
  grid.appendChild(card);
  allCanvases.push({ canvas, draw: drawFn });
}

function nukeScene(ctx, w, h) {
  const g = ctx.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0, '#050510'); g.addColorStop(0.5, '#0a0a22'); g.addColorStop(1, '#101030');
  ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
  // Sky brightening
  const sg = ctx.createLinearGradient(0, h, 0, 0);
  sg.addColorStop(0, 'hsla(15, 90%, 20%, 0.3)'); sg.addColorStop(0.4, 'hsla(20, 80%, 12%, 0.15)'); sg.addColorStop(1, 'hsla(25, 60%, 6%, 0.05)');
  ctx.fillStyle = sg; ctx.fillRect(0, 0, w, h);
  // Stars dimmed
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  for (let i = 0; i < 6; i++) ctx.fillRect(15 + i * 45 + (i*13%9), 8 + (i*17%25), 1, 1);
  // Ground
  ctx.fillStyle = '#0c0c1a'; ctx.fillRect(0, h-24, w, 24);
  // City silhouette
  ctx.fillStyle = '#0c0c20';
  [15,50,80,115,145,180,210,245].forEach((bx,i) => ctx.fillRect(bx, h-24-(12+(i*9)%35), 16+(i%3)*5, 12+(i*9)%35));
}

// ===== THERMONUCLEAR VARIATIONS =====

addCard('nukes', 'Thermo A — Wide Flat Cap', 'Very wide, flattened mushroom cap. Prominent base ring. White-hot elongated core. Realistic proportions.', 310, 260, (ctx, w, h) => {
  nukeScene(ctx, w, h);
  const gx = w/2, gy = h-24;
  const capCY = gy - h * 0.42;
  const capR = 38, capRx = capR * 1.8; // extra wide

  // Base glow
  const bg = ctx.createRadialGradient(gx, gy, 0, gx, gy, capRx * 1.5);
  bg.addColorStop(0, 'hsla(35,100%,70%,0.4)'); bg.addColorStop(0.2, 'hsla(28,100%,50%,0.15)');
  bg.addColorStop(0.5, 'hsla(20,100%,30%,0.04)'); bg.addColorStop(1, 'hsla(15,100%,20%,0)');
  ctx.fillStyle = bg; ctx.beginPath(); ctx.arc(gx, gy, capRx*1.5, 0, Math.PI*2); ctx.fill();

  // Stem — wider, organic
  const stemG = ctx.createLinearGradient(gx, capCY+capR*0.4, gx, gy);
  stemG.addColorStop(0, 'hsla(25,90%,35%,0.85)'); stemG.addColorStop(0.5, 'hsla(18,80%,25%,0.8)'); stemG.addColorStop(1, 'hsla(12,70%,18%,0.75)');
  ctx.fillStyle = stemG; ctx.beginPath();
  ctx.moveTo(gx-14, capCY+capR*0.4); ctx.quadraticCurveTo(gx-18, (capCY+gy)/2, gx-28, gy);
  ctx.lineTo(gx+28, gy); ctx.quadraticCurveTo(gx+18, (capCY+gy)/2, gx+14, capCY+capR*0.4);
  ctx.closePath(); ctx.fill();

  // Cap — wide flat layers
  ctx.fillStyle = 'hsla(8,50%,14%,0.85)'; ctx.beginPath(); ctx.ellipse(gx, capCY+5, capRx*1.2, capR*0.6, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'hsla(15,70%,22%,0.85)'; ctx.beginPath(); ctx.ellipse(gx, capCY, capRx*1.0, capR*0.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'hsla(22,85%,32%,0.85)'; ctx.beginPath(); ctx.ellipse(gx, capCY-3, capRx*0.7, capR*0.38, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'hsla(30,100%,45%,0.8)'; ctx.beginPath(); ctx.ellipse(gx, capCY-5, capRx*0.4, capR*0.25, 0, 0, Math.PI*2); ctx.fill();
  // White-hot core
  ctx.fillStyle = 'rgba(255,240,200,0.55)'; ctx.beginPath(); ctx.ellipse(gx, capCY-6, capRx*0.2, capR*0.12, 0, 0, Math.PI*2); ctx.fill();
  // Prominent base ring
  ctx.fillStyle = 'hsla(12,65%,20%,0.7)'; ctx.beginPath(); ctx.ellipse(gx, capCY+capR*0.45, capRx*1.35, capR*0.15, 0, 0, Math.PI*2); ctx.fill();
  // Cloud bands
  ctx.strokeStyle = 'hsla(20,70%,35%,0.2)'; ctx.lineWidth = 2.5;
  for (let i = 0; i < 3; i++) {
    const by = capCY + capR*(0.3-i*0.35);
    const bw = capRx*(0.6+i*0.3);
    ctx.beginPath(); ctx.moveTo(gx-bw, by); ctx.quadraticCurveTo(gx, by+3, gx+bw, by); ctx.stroke();
  }
  // Cap glow
  const cg = ctx.createRadialGradient(gx, capCY, capR*0.2, gx, capCY, capRx*2);
  cg.addColorStop(0, 'hsla(30,100%,60%,0.25)'); cg.addColorStop(0.4, 'hsla(25,100%,40%,0.08)'); cg.addColorStop(1, 'hsla(15,100%,30%,0)');
  ctx.fillStyle = cg; ctx.beginPath(); ctx.arc(gx, capCY, capRx*2, 0, Math.PI*2); ctx.fill();
});

addCard('nukes', 'Thermo B — Towering Stem', 'Taller stem, narrower cap. More vertical proportions. Intense core glow that lights the stem from above.', 310, 260, (ctx, w, h) => {
  nukeScene(ctx, w, h);
  const gx = w/2, gy = h-24;
  const capCY = gy - h * 0.5; // higher up
  const capR = 42, capRx = capR * 1.3;

  // Base glow
  const bg = ctx.createRadialGradient(gx, gy, 0, gx, gy, capRx*1.3);
  bg.addColorStop(0, 'hsla(35,100%,65%,0.35)'); bg.addColorStop(0.3, 'hsla(25,100%,40%,0.1)'); bg.addColorStop(1, 'hsla(15,100%,20%,0)');
  ctx.fillStyle = bg; ctx.beginPath(); ctx.arc(gx, gy, capRx*1.3, 0, Math.PI*2); ctx.fill();

  // Tall stem with top-lit gradient
  const stemG = ctx.createLinearGradient(gx, capCY+capR*0.3, gx, gy);
  stemG.addColorStop(0, 'hsla(30,95%,45%,0.85)'); stemG.addColorStop(0.3, 'hsla(22,85%,30%,0.8)'); stemG.addColorStop(1, 'hsla(12,65%,15%,0.7)');
  ctx.fillStyle = stemG; ctx.beginPath();
  ctx.moveTo(gx-10, capCY+capR*0.3); ctx.quadraticCurveTo(gx-14, (capCY+gy)/2, gx-22, gy);
  ctx.lineTo(gx+22, gy); ctx.quadraticCurveTo(gx+14, (capCY+gy)/2, gx+10, capCY+capR*0.3);
  ctx.closePath(); ctx.fill();

  // Cap layers
  ctx.fillStyle = 'hsla(10,55%,16%,0.85)'; ctx.beginPath(); ctx.ellipse(gx, capCY, capRx*1.1, capR*0.85, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'hsla(18,75%,25%,0.85)'; ctx.beginPath(); ctx.ellipse(gx, capCY-capR*0.05, capRx*0.85, capR*0.7, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'hsla(25,90%,38%,0.85)'; ctx.beginPath(); ctx.ellipse(gx, capCY-capR*0.1, capRx*0.6, capR*0.5, 0, 0, Math.PI*2); ctx.fill();
  // Intense core
  ctx.fillStyle = 'hsla(40,100%,55%,0.7)'; ctx.beginPath(); ctx.ellipse(gx, capCY-capR*0.12, capRx*0.3, capR*0.28, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,245,210,0.5)'; ctx.beginPath(); ctx.ellipse(gx, capCY-capR*0.14, capRx*0.15, capR*0.13, 0, 0, Math.PI*2); ctx.fill();
  // Core light spills down stem
  const spillG = ctx.createLinearGradient(gx, capCY+capR*0.3, gx, capCY+capR*1.5);
  spillG.addColorStop(0, 'hsla(35,100%,55%,0.15)'); spillG.addColorStop(1, 'hsla(25,100%,30%,0)');
  ctx.fillStyle = spillG; ctx.fillRect(gx-12, capCY+capR*0.3, 24, capR*1.2);
  // Base ring
  ctx.fillStyle = 'hsla(15,60%,18%,0.65)'; ctx.beginPath(); ctx.ellipse(gx, capCY+capR*0.55, capRx*1.2, capR*0.2, 0, 0, Math.PI*2); ctx.fill();
  // Glow
  const cg = ctx.createRadialGradient(gx, capCY, capR*0.15, gx, capCY, capRx*2.2);
  cg.addColorStop(0, 'hsla(35,100%,60%,0.3)'); cg.addColorStop(0.3, 'hsla(25,100%,40%,0.1)'); cg.addColorStop(1, 'hsla(15,100%,25%,0)');
  ctx.fillStyle = cg; ctx.beginPath(); ctx.arc(gx, capCY, capRx*2.2, 0, Math.PI*2); ctx.fill();
});

addCard('nukes', 'Thermo C — Double Cap', 'Two mushroom caps stacked — smaller secondary cap forming above the main one. Extra dramatic.', 310, 260, (ctx, w, h) => {
  nukeScene(ctx, w, h);
  const gx = w/2, gy = h-24;
  const capCY = gy - h * 0.38;
  const cap2CY = capCY - 55; // second cap above
  const capR = 40, capRx = capR * 1.5;

  // Base glow
  const bg = ctx.createRadialGradient(gx, gy, 0, gx, gy, capRx*1.4);
  bg.addColorStop(0, 'hsla(35,100%,65%,0.35)'); bg.addColorStop(0.3, 'hsla(25,100%,40%,0.1)'); bg.addColorStop(1, 'hsla(15,100%,20%,0)');
  ctx.fillStyle = bg; ctx.beginPath(); ctx.arc(gx, gy, capRx*1.4, 0, Math.PI*2); ctx.fill();

  // Lower stem
  const stemG = ctx.createLinearGradient(gx, capCY+capR*0.3, gx, gy);
  stemG.addColorStop(0, 'hsla(25,90%,35%,0.8)'); stemG.addColorStop(1, 'hsla(12,70%,18%,0.7)');
  ctx.fillStyle = stemG; ctx.beginPath();
  ctx.moveTo(gx-12, capCY+capR*0.3); ctx.quadraticCurveTo(gx-16, (capCY+gy)/2, gx-25, gy);
  ctx.lineTo(gx+25, gy); ctx.quadraticCurveTo(gx+16, (capCY+gy)/2, gx+12, capCY+capR*0.3);
  ctx.closePath(); ctx.fill();

  // Main (lower) cap
  ctx.fillStyle = 'hsla(10,55%,16%,0.8)'; ctx.beginPath(); ctx.ellipse(gx, capCY, capRx*1.1, capR*0.8, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'hsla(20,80%,28%,0.8)'; ctx.beginPath(); ctx.ellipse(gx, capCY-3, capRx*0.8, capR*0.6, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'hsla(28,95%,40%,0.75)'; ctx.beginPath(); ctx.ellipse(gx, capCY-5, capRx*0.5, capR*0.4, 0, 0, Math.PI*2); ctx.fill();

  // Upper stem connecting caps
  ctx.fillStyle = 'hsla(22,80%,28%,0.6)'; ctx.beginPath();
  ctx.moveTo(gx-8, capCY-capR*0.5); ctx.quadraticCurveTo(gx-6, (capCY+cap2CY)/2, gx-6, cap2CY+18);
  ctx.lineTo(gx+6, cap2CY+18); ctx.quadraticCurveTo(gx+6, (capCY+cap2CY)/2, gx+8, capCY-capR*0.5);
  ctx.closePath(); ctx.fill();

  // Secondary (upper) cap — smaller
  const cap2R = 22, cap2Rx = cap2R * 1.4;
  ctx.fillStyle = 'hsla(12,50%,18%,0.7)'; ctx.beginPath(); ctx.ellipse(gx, cap2CY, cap2Rx*1.1, cap2R*0.8, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'hsla(20,75%,28%,0.7)'; ctx.beginPath(); ctx.ellipse(gx, cap2CY-2, cap2Rx*0.7, cap2R*0.55, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'hsla(35,100%,45%,0.6)'; ctx.beginPath(); ctx.ellipse(gx, cap2CY-3, cap2Rx*0.35, cap2R*0.3, 0, 0, Math.PI*2); ctx.fill();

  // Glow on both caps
  const cg = ctx.createRadialGradient(gx, capCY, capR*0.2, gx, capCY, capRx*2);
  cg.addColorStop(0, 'hsla(30,100%,55%,0.2)'); cg.addColorStop(0.5, 'hsla(25,100%,35%,0.06)'); cg.addColorStop(1, 'hsla(15,100%,25%,0)');
  ctx.fillStyle = cg; ctx.beginPath(); ctx.arc(gx, capCY, capRx*2, 0, Math.PI*2); ctx.fill();

  // Base rings
  ctx.fillStyle = 'hsla(15,60%,20%,0.5)'; ctx.beginPath(); ctx.ellipse(gx, capCY+capR*0.5, capRx*1.2, capR*0.15, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'hsla(15,50%,18%,0.35)'; ctx.beginPath(); ctx.ellipse(gx, cap2CY+cap2R*0.5, cap2Rx*1.1, cap2R*0.12, 0, 0, Math.PI*2); ctx.fill();
});

// ===== FIREWORK VARIATIONS =====

function drawBurst(ctx, fx, fy, t, count, hue, style) {
  if (t > 1) return;
  for (let i = 0; i < count; i++) {
    const a = (Math.PI * 2 / count) * i;
    const r = t * 45 * (style === 'streaks' ? 1.3 : 1);
    const px = fx + Math.cos(a) * r;
    const py = fy + Math.sin(a) * r - t * 8;
    const life = Math.max(0, 1 - t);
    ctx.globalAlpha = life * 0.7;
    const h = (hue + i * (360 / count * 0.3)) % 360;
    ctx.fillStyle = `hsl(${h}, 100%, ${60 + life * 20}%)`;
    if (style === 'streaks') {
      const sx = fx + Math.cos(a) * r * 0.6;
      const sy = fy + Math.sin(a) * r * 0.6 - t * 5;
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(px, py); ctx.strokeStyle = ctx.fillStyle; ctx.lineWidth = 1.5 * life; ctx.stroke();
      ctx.beginPath(); ctx.arc(px, py, 1.5 * life, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(px, py, (style === 'fat' ? 3 : 2) * life, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function drawFlash(ctx, fx, fy, t, size, hue) {
  if (t > 1) return;
  const life = Math.max(0, 1 - t * t); // fast retract
  const r = size * life;
  const g = ctx.createRadialGradient(fx, fy, 0, fx, fy, r);
  g.addColorStop(0, `hsla(${hue}, 100%, 95%, ${life * 0.9})`);
  g.addColorStop(0.2, `hsla(${hue}, 100%, 80%, ${life * 0.5})`);
  g.addColorStop(0.5, `hsla(${hue}, 100%, 60%, ${life * 0.12})`);
  g.addColorStop(1, `hsla(${hue}, 100%, 40%, 0)`);
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(fx, fy, r, 0, Math.PI * 2); ctx.fill();
}

function fwScene(ctx, w, h) {
  const g = ctx.createLinearGradient(0, 0, 0, h); g.addColorStop(0, '#050510'); g.addColorStop(1, '#101030');
  ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i = 0; i < 5; i++) ctx.fillRect(20+i*55, 8+(i*13%20), 1, 1);
  ctx.fillStyle = '#0c0c20';
  [20,60,100,140,180,220].forEach((bx,i) => ctx.fillRect(bx, h-20-(8+(i*7)%18), 15+(i%3)*3, 8+(i*7)%18));
  ctx.fillStyle = '#0c0c1a'; ctx.fillRect(0, h-20, w, 20);
}

addCard('fireworks', 'Standard Burst + Bright Flash', 'Round burst with the implemented bright glow flash. Fast retract.', 290, 180, (ctx, w, h) => {
  fwScene(ctx, w, h);
  const period = 100;
  const phase = (tick % period) / period;
  const fx = w/2, fy = h/2 - 15;
  // Trail
  if (phase < 0.3) {
    const tp = phase / 0.3;
    const ty = h - 25 - tp * (h/2 - 10);
    ctx.fillStyle = 'hsl(30, 80%, 70%)'; ctx.globalAlpha = 0.6;
    ctx.fillRect(fx-1, ty, 2, 3); ctx.globalAlpha = 1;
  }
  if (phase >= 0.3) {
    const bt = (phase - 0.3) / 0.7;
    drawFlash(ctx, fx, fy, bt * 3, 55, 30);
    drawBurst(ctx, fx, fy, bt, 28, 30, 'dots');
  }
});

addCard('fireworks', 'Streak Burst + Intense Flash', 'Particles leave light streaks. Bigger, brighter flash with white-hot centre.', 290, 180, (ctx, w, h) => {
  fwScene(ctx, w, h);
  const period = 100;
  const phase = (tick % period) / period;
  const fx = w/2, fy = h/2 - 15;
  if (phase < 0.3) {
    const tp = phase / 0.3;
    ctx.fillStyle = 'hsl(200, 80%, 70%)'; ctx.globalAlpha = 0.6;
    ctx.fillRect(fx-1, h-25-tp*(h/2-10), 2, 3); ctx.globalAlpha = 1;
  }
  if (phase >= 0.3) {
    const bt = (phase - 0.3) / 0.7;
    drawFlash(ctx, fx, fy, bt * 2.5, 70, 200);
    drawBurst(ctx, fx, fy, bt, 22, 200, 'streaks');
  }
});

addCard('fireworks', 'Multi-Ring Burst + Dual Flash', 'Two concentric rings of particles. Two flash pulses — big then small.', 290, 180, (ctx, w, h) => {
  fwScene(ctx, w, h);
  const period = 110;
  const phase = (tick % period) / period;
  const fx = w/2, fy = h/2 - 15;
  if (phase < 0.3) {
    const tp = phase / 0.3;
    ctx.fillStyle = 'hsl(300, 80%, 70%)'; ctx.globalAlpha = 0.6;
    ctx.fillRect(fx-1, h-25-tp*(h/2-10), 2, 3); ctx.globalAlpha = 1;
  }
  if (phase >= 0.3) {
    const bt = (phase - 0.3) / 0.7;
    drawFlash(ctx, fx, fy, bt * 2.5, 60, 300);
    drawBurst(ctx, fx, fy, bt, 20, 300, 'dots');
    // Delayed inner ring
    if (bt > 0.15) {
      const bt2 = (bt - 0.15) / 0.85;
      drawFlash(ctx, fx, fy, bt2 * 3, 35, 330);
      drawBurst(ctx, fx, fy, bt2 * 0.7, 12, 330, 'fat');
    }
  }
});

addCard('fireworks', 'Cascading Willow + Soft Glow', 'Particles arc downward like a weeping willow. Soft warm glow instead of sharp flash.', 290, 180, (ctx, w, h) => {
  fwScene(ctx, w, h);
  const period = 120;
  const phase = (tick % period) / period;
  const fx = w/2, fy = h/2 - 20;
  if (phase < 0.25) {
    const tp = phase / 0.25;
    ctx.fillStyle = 'hsl(45, 80%, 70%)'; ctx.globalAlpha = 0.6;
    ctx.fillRect(fx-1, h-25-tp*(h/2-5), 2, 3); ctx.globalAlpha = 1;
  }
  if (phase >= 0.25) {
    const bt = (phase - 0.25) / 0.75;
    // Soft glow
    const life = Math.max(0, 1 - bt);
    const gr = ctx.createRadialGradient(fx, fy, 0, fx, fy, 40 * life);
    gr.addColorStop(0, `hsla(45,100%,80%,${life*0.4})`); gr.addColorStop(0.5, `hsla(45,100%,60%,${life*0.1})`);
    gr.addColorStop(1, 'hsla(45,100%,40%,0)');
    ctx.fillStyle = gr; ctx.beginPath(); ctx.arc(fx, fy, 40*life, 0, Math.PI*2); ctx.fill();
    // Willow trails
    for (let i = 0; i < 24; i++) {
      const a = (Math.PI * 2 / 24) * i;
      const t2 = Math.min(1, bt * 1.2);
      const r = t2 * 35;
      const gravity = t2 * t2 * 25; // droop
      const px = fx + Math.cos(a) * r;
      const py = fy + Math.sin(a) * r + gravity;
      const plife = Math.max(0, 1 - bt * 0.8);
      ctx.globalAlpha = plife * 0.6;
      ctx.fillStyle = `hsl(${(45 + i * 5) % 360}, 100%, ${55 + plife * 25}%)`;
      // Streak from origin
      const sx = fx + Math.cos(a) * r * 0.3;
      const sy = fy + Math.sin(a) * r * 0.3 + gravity * 0.2;
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(px, py); ctx.strokeStyle = ctx.fillStyle; ctx.lineWidth = 1; ctx.stroke();
      ctx.beginPath(); ctx.arc(px, py, 1.5 * plife, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
});

function renderAll() {
  tick++;
  allCanvases.forEach(({ canvas, draw }) => draw(canvas.getContext('2d'), canvas.width, canvas.height));
  requestAnimationFrame(renderAll);
}
renderAll();
</script>
</body>
</html>
