<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Drone</title>
<link rel="stylesheet" href="css/game.css">
<!-- Google Analytics 4 — replace G-XXXXXXXXXX with your Measurement ID -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-XXXXXXXXXX');
  // Analytics helper — call from game.js
  window.trackEvent = function(name, params) {
    if (typeof gtag === 'function') gtag('event', name, params || {});
  };
</script>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="620" height="640"></canvas>
  <div class="version">version: 428c013</div>
  <div class="hud" id="hud">0</div>
  <div class="hud-timer" id="hudTimer" style="display:none">30.0</div>

  <div class="screen show" id="menuScreen">
    <div class="title" id="gameTitle">FLAPPY DRONE</div>
    <div class="slogan" id="gameSlogan">Building the drone as we're flying it</div>
    <script>
      (function(){
        var titles = [
          { name: 'FLAPPY DRONE', slogan: "Building the drone as we're flying it" },
          { name: 'ROTORHEAD', slogan: 'fly. crash. repeat.' },
          { name: 'SKY RAT', slogan: 'the city is your obstacle course' },
          { name: 'PROP DROP', slogan: "don't look down" },
          { name: 'HOVER BOTHER', slogan: 'an irritating flying game' },
          { name: 'BUZZED', slogan: 'a drone thing' }
        ];
        var pick = titles[Math.floor(Math.random() * titles.length)];
        document.getElementById('gameTitle').textContent = pick.name;
        document.getElementById('gameSlogan').textContent = pick.slogan;
      })();
    </script>
    <div class="mode-picker">
      <span class="mode-arrow" id="modeLeft">◀</span>
      <span class="mode-label" id="modeLabel">CLASSIC</span>
      <span class="mode-arrow" id="modeRight">▶</span>
    </div>
    <div class="mode-desc" id="modeDesc">Endless flight</div>
    <div class="drone-picker">
      <span class="drone-arrow" id="droneLeft">◀</span>
      <span class="drone-label" id="droneLabel">PIXEL QUAD</span>
      <span class="drone-arrow" id="droneRight">▶</span>
    </div>
    <div class="prompt">Tap or press Space</div>
  </div>

  <div class="screen score-screen" id="scoreScreen">
    <div class="score-label">Score</div>
    <div class="score-value" id="scoreValue">0</div>
    <div class="score-best" id="scoreBest">Best: 0</div>
    <div class="score-prompt">Tap to retry</div>
  </div>
</div>
<div class="copyright">ZenaSoft (c) 1984 -- All Rights Reserved.</div>

<script src="js/config.js"></script>
<script src="js/background.js"></script>
<script src="js/buildings.js"></script>
<script src="js/drones.js"></script>
<script src="js/effects.js"></script>
<script src="js/ui.js"></script>
<script src="js/game.js"></script>
</body>
</html>
