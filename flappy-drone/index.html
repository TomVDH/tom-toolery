<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Drone</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex; justify-content: center; align-items: center;
    height: 100vh; overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    user-select: none; -webkit-user-select: none;
  }
  #wrap {
    position: relative;
    width: 620px; height: 640px;
    border: 2px solid #1a1a3a;
    border-radius: 14px;
    box-shadow: 0 0 60px #00d4ff10, 0 8px 32px #00000080, inset 0 0 30px #00000040;
    overflow: hidden;
  }
  canvas {
    display: block; width: 100%; height: 100%;
  }
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    pointer-events: none; border-radius: 12px; transition: opacity 0.3s;
  }
  .overlay.hidden { opacity: 0; }
  .tagline {
    font-family: 'Courier New', monospace;
    font-size: 14px; letter-spacing: 6px; color: #445;
    margin-bottom: 10px; text-transform: uppercase;
  }
  .title {
    font-size: 36px; font-weight: 700; letter-spacing: 3px;
    color: #fff; margin-bottom: 6px;
    text-shadow: 0 0 20px #00d4ff44;
  }
  .subtitle {
    font-size: 13px; color: #667; letter-spacing: 1px; text-transform: uppercase;
  }
  .prompt {
    margin-top: 32px; font-size: 14px; color: #556;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
  .death-score { font-size: 64px; font-weight: 700; color: #fff; line-height: 1; }
  .death-label { font-size: 13px; color: #556; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .death-best { font-size: 14px; color: #445; margin-top: 8px; }
  .death-prompt { font-size: 14px; color: #556; margin-top: 28px; animation: pulse 2s ease-in-out infinite; }
  .hud {
    position: absolute; top: 20px; left: 0; right: 0;
    text-align: center; pointer-events: none;
    font-size: 36px; font-weight: 700; color: #fff;
    text-shadow: 0 2px 8px #00000066;
    opacity: 0; transition: opacity 0.3s;
  }
  .hud.visible { opacity: 1; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="620" height="640"></canvas>
  <div class="hud" id="hud">0</div>
  <div class="overlay" id="menuScreen">
    <div class="tagline">-- ZENATECH --</div>
    <div class="title">FLAPPY DRONE</div>
    <div class="subtitle">Navigate the skyline</div>
    <div class="prompt">Tap or press Space</div>
  </div>
  <div class="overlay hidden" id="deathScreen">
    <div class="death-label">Score</div>
    <div class="death-score" id="deathScore">0</div>
    <div class="death-best" id="deathBest">Best: 0</div>
    <div class="death-prompt">Tap to retry</div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const menuScreen = document.getElementById('menuScreen');
const deathScreen = document.getElementById('deathScreen');
const deathScoreEl = document.getElementById('deathScore');
const deathBestEl = document.getElementById('deathBest');

const W = 620, H = 640;

// --- Game config ---
const GRAVITY = 0.22;
const FLAP_FORCE = -5.2;
const PIPE_SPEED = 1.6;
const PIPE_INTERVAL = 160; // frames between pipes (wider spacing)
const GAP_SIZE = 170;
const PIPE_WIDTH = 56;
const GROUND_H = 24;

// --- State ---
let state = 'menu';
let score = 0, best = 0;
let drone, pipes, particles, stars;
let frame = 0;
let deathTimer = 0;
let screenShake = 0;

// --- Stars (static background) ---
const bgStars = Array.from({ length: 50 }, () => ({
  x: Math.random() * W, y: Math.random() * (H * 0.65),
  r: Math.random() * 1.2 + 0.4, phase: Math.random() * Math.PI * 2
}));

// --- Distant buildings (parallax) ---
const farBuildings = Array.from({ length: 22 }, (_, i) => ({
  x: i * 34 - 10,
  h: 25 + Math.random() * 40,
  w: 22 + Math.random() * 10
}));

function init() {
  drone = { x: 90, y: H / 2, vy: 0, targetAngle: 0, angle: 0, propPhase: 0 };
  pipes = [];
  particles = [];
  score = 0;
  frame = 0;
  deathTimer = 0;
  screenShake = 0;
  hud.textContent = '0';
}

// --- Input ---
let canFlap = true;

function flap() {
  if (state === 'menu') {
    state = 'play';
    menuScreen.classList.add('hidden');
    hud.classList.add('visible');
    init();
  }
  if (state === 'play' && canFlap) {
    drone.vy = FLAP_FORCE;
    spawnThrustParticles();
  }
  if (state === 'dead' && deathTimer > 40) {
    state = 'menu';
    deathScreen.classList.add('hidden');
    menuScreen.classList.remove('hidden');
    hud.classList.remove('visible');
    init();
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
});
canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });

// --- Particles ---
function spawnThrustParticles() {
  for (let i = 0; i < 4; i++) {
    particles.push({
      x: drone.x, y: drone.y + 10,
      vx: (Math.random() - 0.5) * 1.2,
      vy: Math.random() * 2 + 0.8,
      life: 18, maxLife: 18,
      r: Math.random() * 2 + 1,
      color: `hsl(${195 + Math.random() * 15}, 100%, ${60 + Math.random() * 20}%)`
    });
  }
}

function spawnExplosion(x, y) {
  for (let i = 0; i < 24; i++) {
    const a = (Math.PI * 2 / 24) * i + Math.random() * 0.3;
    const spd = Math.random() * 3.5 + 0.5;
    particles.push({
      x, y,
      vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
      life: 25 + Math.random() * 15, maxLife: 40,
      r: Math.random() * 2.5 + 1,
      color: `hsl(${[20, 40, 195, 350][Math.random() * 4 | 0]}, 90%, ${55 + Math.random() * 20}%)`
    });
  }
}

// --- Drawing ---
function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#060614');
  g.addColorStop(0.6, '#0c0c28');
  g.addColorStop(1, '#141432');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawStars() {
  bgStars.forEach(s => {
    const alpha = (Math.sin(s.phase + frame * 0.015) + 1) / 2 * 0.6 + 0.2;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#c8d0e0';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawFarCity() {
  const scrollX = (frame * 0.15) % 34;
  ctx.fillStyle = '#0e0e24';
  farBuildings.forEach(b => {
    const bx = ((b.x - scrollX) % (22 * 34) + 22 * 34) % (22 * 34) - 34;
    ctx.fillRect(bx, H - GROUND_H - b.h, b.w, b.h);
  });
}

function drawGround() {
  // Road
  ctx.fillStyle = '#0f0f1e';
  ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
  // Curb
  ctx.fillStyle = '#1a1a30';
  ctx.fillRect(0, H - GROUND_H, W, 2);
  // Lane markings
  ctx.fillStyle = '#222240';
  const off = (frame * PIPE_SPEED) % 24;
  for (let x = -off; x < W; x += 24) {
    ctx.fillRect(x, H - GROUND_H / 2, 12, 2);
  }
}

function drawBuilding(x, w, topY, height, fromTop) {
  // Stable color per pipe pair based on spawn position
  const seed = Math.round(x + w * 100) | 0;
  const hue = 230 + (seed % 30);
  const light = 12 + (seed % 5);

  // Main body
  ctx.fillStyle = `hsl(${hue}, 25%, ${light}%)`;
  ctx.fillRect(x, topY, w, height);

  // Left edge highlight
  ctx.fillStyle = `hsl(${hue}, 20%, ${light + 5}%)`;
  ctx.fillRect(x, topY, 2, height);

  // Right edge shadow
  ctx.fillStyle = `hsl(${hue}, 30%, ${light - 3}%)`;
  ctx.fillRect(x + w - 2, topY, 2, height);

  // Cap / ledge
  const capY = fromTop ? topY + height - 5 : topY;
  ctx.fillStyle = `hsl(${hue}, 15%, ${light + 8}%)`;
  ctx.fillRect(x - 4, capY, w + 8, 5);
  ctx.fillStyle = `hsl(${hue}, 15%, ${light + 12}%)`;
  ctx.fillRect(x - 4, capY, w + 8, 1);

  // Windows
  const winCols = 3;
  const winW = 5, winH = 7;
  const margin = (w - winCols * winW) / (winCols + 1);
  const rowH = 16;
  const startY = fromTop ? topY + 10 : capY + 10;
  const endY = fromTop ? topY + height - 14 : topY + height - 6;

  for (let row = startY; row < endY; row += rowH) {
    for (let col = 0; col < winCols; col++) {
      const wx = x + margin + col * (winW + margin);
      // Deterministic lit pattern
      const lit = ((seed * 7 + col * 13 + Math.floor(row) * 3) % 5) > 1;
      ctx.fillStyle = lit ? 'rgba(255, 200, 60, 0.7)' : 'rgba(255, 200, 60, 0.1)';
      ctx.fillRect(wx, row, winW, winH);
    }
  }
}

function drawDrone(x, y, angle, propPhase) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  // Shadow underneath
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(-10, 12, 20, 3);

  // Body frame
  ctx.fillStyle = '#3a3a4a';
  ctx.fillRect(-14, -3, 28, 7);
  ctx.fillStyle = '#4a4a5a';
  ctx.fillRect(-12, -2, 24, 5);

  // Center hub
  ctx.fillStyle = '#00c8f0';
  ctx.fillRect(-4, -5, 8, 11);
  ctx.fillStyle = '#009abb';
  ctx.fillRect(-3, -4, 6, 9);

  // Status LED
  const ledOn = frame % 40 < 20;
  ctx.fillStyle = ledOn ? '#ff2255' : '#661133';
  ctx.fillRect(-1, -7, 2, 2);

  // Arms
  ctx.fillStyle = '#505060';
  ctx.fillRect(-18, -1, 7, 3);
  ctx.fillRect(11, -1, 7, 3);

  // Propeller blur
  const spin = Math.abs(Math.sin(propPhase));
  ctx.globalAlpha = 0.6;
  ctx.fillStyle = '#aab';
  ctx.fillRect(-18 - spin * 6, -4, spin * 12, 2);
  ctx.fillRect(14 - spin * 6, -4, spin * 12, 2);
  ctx.globalAlpha = 1;

  // Landing skids
  ctx.fillStyle = '#555565';
  ctx.fillRect(-10, 5, 2, 4);
  ctx.fillRect(8, 5, 2, 4);
  ctx.fillRect(-12, 8, 8, 2);
  ctx.fillRect(4, 8, 8, 2);

  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    const alpha = (p.life / p.maxLife) * 0.8;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * (p.life / p.maxLife), 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// --- Update ---
function update() {
  if (state === 'dead') {
    deathTimer++;
    // Continue particle physics
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.97; p.vy *= 0.97;
      p.life--;
    });
    particles = particles.filter(p => p.life > 0);
    if (screenShake > 0) screenShake *= 0.85;
    return;
  }
  if (state !== 'play') return;

  frame++;

  // Drone physics
  drone.vy += GRAVITY;
  drone.vy = Math.min(drone.vy, 8); // terminal velocity
  drone.y += drone.vy;
  drone.targetAngle = drone.vy * 0.055;
  drone.targetAngle = Math.max(-0.4, Math.min(0.5, drone.targetAngle));
  drone.angle += (drone.targetAngle - drone.angle) * 0.15; // smooth rotation
  drone.propPhase += 0.5;

  // Spawn pipes
  if (frame % PIPE_INTERVAL === 0) {
    const minTop = 70;
    const maxTop = H - GAP_SIZE - GROUND_H - 70;
    const topH = minTop + Math.random() * (maxTop - minTop);
    const id = frame; // unique id for color stability
    pipes.push(
      { x: W + 10, w: PIPE_WIDTH, y: 0, h: topH, fromTop: true, scored: false, id },
      { x: W + 10, w: PIPE_WIDTH, y: topH + GAP_SIZE, h: H - GROUND_H - topH - GAP_SIZE, fromTop: false, id }
    );
  }

  // Move pipes
  pipes.forEach(p => p.x -= PIPE_SPEED);
  pipes = pipes.filter(p => p.x + p.w > -20);

  // Scoring
  for (let i = 0; i < pipes.length; i += 2) {
    if (pipes[i] && !pipes[i].scored && pipes[i].x + pipes[i].w < drone.x - 12) {
      pipes[i].scored = true;
      score++;
      hud.textContent = score;
    }
  }

  // Collision (use inner body hitbox, forgiving)
  const hb = { x: drone.x - 10, y: drone.y - 4, w: 20, h: 12 };
  for (const p of pipes) {
    const px = p.x - 2, pw = p.w + 4; // slight cap overhang
    if (hb.x + hb.w > px && hb.x < px + pw &&
        hb.y + hb.h > p.y && hb.y < p.y + p.h) {
      die(); return;
    }
  }

  // Ceiling / ground
  if (drone.y > H - GROUND_H - 8) { drone.y = H - GROUND_H - 8; die(); return; }
  if (drone.y < -30) { drone.y = -30; die(); return; }

  // Particle update
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.03;
    p.life--;
  });
  particles = particles.filter(p => p.life > 0);
}

function die() {
  state = 'dead';
  best = Math.max(best, score);
  screenShake = 6;
  spawnExplosion(drone.x, drone.y);

  // Show death screen after short delay
  setTimeout(() => {
    deathScoreEl.textContent = score;
    deathBestEl.textContent = `Best: ${best}`;
    deathScreen.classList.remove('hidden');
    hud.classList.remove('visible');
  }, 500);
}

// --- Render loop ---
function render() {
  // Screen shake offset
  const sx = state === 'dead' && screenShake > 0.5 ? (Math.random() - 0.5) * screenShake : 0;
  const sy = state === 'dead' && screenShake > 0.5 ? (Math.random() - 0.5) * screenShake : 0;

  ctx.save();
  ctx.translate(sx, sy);

  drawSky();
  drawStars();
  drawFarCity();
  drawGround();

  // Buildings
  pipes.forEach(p => drawBuilding(p.x, p.w, p.y, p.h, p.fromTop));

  // Particles behind drone
  drawParticles();

  // Drone (hide after explosion fades)
  if (state !== 'dead') {
    drawDrone(drone.x, drone.y, drone.angle, drone.propPhase);
  }

  ctx.restore();

  // Menu idle drone
  if (state === 'menu') {
    frame++;
    drone.propPhase += 0.5;
    drone.y = H / 2 + Math.sin(frame * 0.03) * 12;
    drone.angle = Math.sin(frame * 0.02) * 0.05;
    drawDrone(drone.x, drone.y, drone.angle, drone.propPhase);
  }

  update();
  requestAnimationFrame(render);
}

init();
render();
</script>
</body>
</html>
