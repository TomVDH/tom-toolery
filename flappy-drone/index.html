<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Drone</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060610;
    display: flex; justify-content: center; align-items: center;
    height: 100vh; overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    user-select: none; -webkit-user-select: none;
  }
  #wrap {
    position: relative;
    width: 620px; height: 640px;
    border: 2px solid #1a1a3a;
    border-radius: 14px;
    box-shadow: 0 0 80px #00d4ff08, 0 8px 40px #00000090;
    overflow: hidden;
  }
  canvas { display: block; width: 100%; height: 100%; }

  /* --- Overlays --- */
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    pointer-events: none;
    opacity: 0; visibility: hidden;
    transition: opacity 0.6s ease, visibility 0s 0.6s;
  }
  .screen.show { opacity: 1; visibility: visible; transition: opacity 0.6s ease, visibility 0s 0s; }

  /* Menu */
  .tagline {
    font-family: 'Courier New', monospace;
    font-size: 18px; font-weight: 700; letter-spacing: 10px; color: #445;
    margin-bottom: 14px; text-transform: uppercase;
    text-shadow: 0 0 12px #00d4ff11;
  }
  .title {
    font-family: 'Courier New', monospace;
    font-size: 42px; font-weight: 700; letter-spacing: 6px;
    color: transparent;
    -webkit-text-stroke: 1.5px rgba(160, 180, 220, 0.8);
    text-shadow: 0 0 30px #00d4ff22, 0 0 60px #1a2a5511;
    pointer-events: auto; cursor: default;
  }
  .title:hover {
    animation: jitter 0.06s infinite;
  }
  @keyframes jitter {
    0% { transform: translate(0, 0); }
    25% { transform: translate(-1px, 1px); }
    50% { transform: translate(1px, -1px); }
    75% { transform: translate(-1px, -1px); }
    100% { transform: translate(1px, 1px); }
  }
  .slogan {
    font-size: 12px; color: #556; letter-spacing: 2px;
    font-style: italic; margin-top: 6px;
  }
  .subtitle {
    font-size: 11px; color: #334; letter-spacing: 1px;
    text-transform: uppercase; margin-top: 10px;
  }
  .copyright {
    position: absolute; bottom: 32px; left: 0; right: 0;
    text-align: center;
    font-family: 'Courier New', monospace;
    font-size: 11px; color: #556; letter-spacing: 1.5px;
  }
  .prompt {
    margin-top: 100px; font-size: 15px; color: #445; letter-spacing: 1.5px;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  /* HUD */
  .hud {
    position: absolute; top: 20px; left: 0; right: 0;
    text-align: center; pointer-events: none;
    font-size: 40px; font-weight: 700; color: #fff;
    text-shadow: 0 2px 12px #00000066;
    opacity: 0; transition: opacity 0.3s;
    font-variant-numeric: tabular-nums;
  }
  .hud.show { opacity: 1; }

  /* Score screen */
  .score-screen.show {
    background: rgba(5, 5, 16, 0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .score-value { font-size: 72px; font-weight: 700; color: #fff; line-height: 1; }
  .score-label {
    font-size: 12px; color: #445; letter-spacing: 3px;
    text-transform: uppercase; margin-bottom: 8px;
  }
  .score-best { font-size: 13px; color: #334; margin-top: 10px; }
  .score-prompt {
    font-size: 13px; color: #445; margin-top: 32px; letter-spacing: 1px;
    animation: pulse 2.5s ease-in-out infinite;
  }
  .version {
    position: absolute; top: 8px; right: 12px;
    font-family: 'Courier New', monospace;
    font-size: 9px; color: #556; letter-spacing: 0.5px;
    pointer-events: auto; cursor: default; z-index: 5;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="620" height="640"></canvas>
  <div class="version">version: 0852ce8</div>
  <div class="hud" id="hud">0</div>

  <div class="screen show" id="menuScreen">
    <div class="title">FLAPPY DRONE</div>
    <div class="slogan">Building the drone as we're flying it</div>
    <div class="copyright">ZenaSoft (c) 1984 -- All Rights Reserved.</div>
    <div class="prompt">Tap or press Space</div>
  </div>

  <div class="screen score-screen" id="scoreScreen">
    <div class="score-label">Score</div>
    <div class="score-value" id="scoreValue">0</div>
    <div class="score-best" id="scoreBest">Best: 0</div>
    <div class="score-prompt">Tap to retry</div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const hudEl = document.getElementById('hud');
const menuScreen = document.getElementById('menuScreen');
const scoreScreen = document.getElementById('scoreScreen');
const scoreValueEl = document.getElementById('scoreValue');
const scoreBestEl = document.getElementById('scoreBest');

const W = 620, H = 640;

// --- Config ---
const GRAVITY = 0.22;
const FLAP_FORCE = -5.2;
const PIPE_SPEED = 1.6;
const PIPE_INTERVAL = 160;
const GAP_SIZE = 170;
const PIPE_WIDTH = 56;
const GROUND_H = 24;
const CEILING_Y = 10;

// --- Death sequence timing (frames) ---
const DEATH_FLASH_DUR = 15;       // red flash
const DIED_FADE_IN = 120;         // "YOU DIED" fades in slowly over ~2s
const DIED_HOLD = 70;             // holds for ~1.2s
const DIED_FADE_OUT = 60;         // fades out over ~1s
const DIED_TOTAL = DEATH_FLASH_DUR + DIED_FADE_IN + DIED_HOLD + DIED_FADE_OUT;
const SCORE_DELAY = 20;           // pause before score screen

// --- Ready countdown ---
const READY_MS = 4000; // 4 seconds, refresh-rate independent

// --- State ---
// States: menu, ready, play, dying, dead
let state = 'menu';
let score = 0, best = 0;
let drone, pipes, particles;
let frame = 0;
let deathTimer = 0;
let readyStartTime = 0; // timestamp when ready began
let readyT = 0;         // 0->1 progress through ready phase
let screenShake = 0;
let flashAlpha = 0;
let globalTick = 0;
let fireworks = [];     // { x, y, vy, hue, fuse, exploded }
let fwTimer = 0;        // frames until next firework

// --- Nuke easter egg ---
let nukeActive = false;
let nukeStart = 0;
let nukeGx = W / 2, nukeGy = H - GROUND_H;
let versionClicks = 0;
let versionClickTimer = 0;

// --- Background (generated once, deterministic) ---
const bgStars = Array.from({ length: 55 }, () => ({
  x: Math.random() * W,
  y: Math.random() * (H * 0.6),
  r: Math.random() * 1.1 + 0.3,
  phase: Math.random() * Math.PI * 2
}));

const FAR_TILE_W = 320;
const farBuildings = Array.from({ length: 10 }, (_, i) => ({
  x: i * 32,
  h: 20 + Math.sin(i * 2.7 + 1.3) * 18 + Math.cos(i * 4.1) * 12 + 15,
  w: 20 + ((i * 7 + 3) % 5) * 2
}));

// --- Init ---
function init() {
  drone = { x: 100, y: H / 2, vy: 0, angle: 0, propPhase: 0 };
  pipes = [];
  particles = [];
  score = 0;
  frame = 0;
  deathTimer = 0;
  screenShake = 0;
  flashAlpha = 0;
  hudEl.textContent = '0';
}

// --- Screen helpers ---
function showScreen(el) { el.classList.add('show'); }
function hideScreen(el) { el.classList.remove('show'); }

// --- Input ---
function flap() {
  if (state === 'menu') {
    hideScreen(menuScreen);
    init();
    // Delay ready state until menu fade completes
    state = 'fading';
    setTimeout(() => {
      state = 'ready';
      readyStartTime = performance.now();
      readyT = 0;
    }, 650);
    return;
  }
  if (state === 'play') {
    drone.vy = FLAP_FORCE;
    spawnThrust();
    return;
  }
  // Can retry once score screen is visible and settled
  if (state === 'dead' && deathTimer > 30) {
    state = 'menu';
    hideScreen(scoreScreen);
    showScreen(menuScreen);
    hudEl.classList.remove('show');
    init();
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
});
canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });

// --- Nuke easter egg: rapid click version hash 5 times on menu ---
document.querySelector('.version').addEventListener('click', e => {
  e.stopPropagation();
  if (state !== 'menu') return;
  const now = Date.now();
  if (now - versionClickTimer > 1500) versionClicks = 0; // reset if too slow
  versionClickTimer = now;
  versionClicks++;
  if (versionClicks >= 5) {
    versionClicks = 0;
    triggerNukeEasterEgg();
  }
});

function triggerNukeEasterEgg() {
  // Fade menu away
  hideScreen(menuScreen);
  state = 'nuking';
  // After 1.5s, nuke goes off
  setTimeout(() => {
    nukeActive = true;
    nukeStart = performance.now();
    nukeGx = W / 2 + (Math.random() - 0.5) * 80;
    nukeGy = H - GROUND_H;
    screenShake = 20;
    // Debris flies all over the screen
    for (let i = 0; i < 60; i++) {
      const a = Math.random() * Math.PI * 2;
      const spd = Math.random() * 6 + 2;
      particles.push({
        x: nukeGx + (Math.random() - 0.5) * 40,
        y: nukeGy - Math.random() * 40,
        vx: Math.cos(a) * spd,
        vy: Math.sin(a) * spd,
        life: 50 + Math.random() * 40, maxLife: 90,
        r: Math.random() * 4 + 2,
        hue: 15 + Math.random() * 35, sat: 100, lum: 50
      });
    }
    // After 2s, drone crashes down
    setTimeout(() => {
      if (state === 'nuking') {
        drone.vy = 8; // slam down
        state = 'nukeFall';
      }
    }, 2000);
  }, 1500);
}

// --- Particles ---
function spawnThrust() {
  for (let i = 0; i < 6; i++) {
    particles.push({
      x: drone.x + (Math.random() - 0.5) * 8,
      y: drone.y + 8 + Math.random() * 4,
      vx: (Math.random() - 0.5) * 1.2,
      vy: Math.random() * 2.5 + 0.5,
      life: 14 + Math.random() * 8, maxLife: 22,
      r: Math.random() * 2 + 0.6,
      hue: 190 + Math.random() * 25, sat: 100, lum: 60 + Math.random() * 15
    });
  }
}

function spawnExplosion(x, y) {
  const hues = [5, 15, 25, 35, 45, 55]; // red -> orange -> yellow
  // Outer burst -- big sparkles
  for (let i = 0; i < 36; i++) {
    const a = (Math.PI * 2 / 36) * i + Math.random() * 0.3;
    const spd = Math.random() * 5 + 1.5;
    particles.push({
      x: x + (Math.random() - 0.5) * 6, y: y + (Math.random() - 0.5) * 6,
      vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
      life: 30 + Math.random() * 25, maxLife: 55,
      r: Math.random() * 4 + 2,
      hue: hues[i % hues.length], sat: 100, lum: 55
    });
  }
  // Inner hot core -- bright white-yellow
  for (let i = 0; i < 16; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = Math.random() * 2 + 0.3;
    particles.push({
      x, y,
      vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
      life: 15 + Math.random() * 12, maxLife: 27,
      r: Math.random() * 2.5 + 1.5,
      hue: 45 + Math.random() * 15, sat: 100, lum: 75
    });
  }
}

// --- Fireworks ---
function updateFireworks() {
  // Random spawn every 180-400 frames, only after 5 gates cleared
  if (state === 'play' && score >= 5) {
    fwTimer--;
    if (fwTimer <= 0) {
      fwTimer = 180 + Math.random() * 220;
      const fx = 40 + Math.random() * (W - 80);
      // Size: 0=small, 1=medium, 2=large. Large is rare (~10%)
      const sizeRoll = Math.random();
      const size = sizeRoll < 0.1 ? 2 : sizeRoll < 0.4 ? 1 : 0;
      fireworks.push({
        x: fx, y: H - GROUND_H,
        vy: -(2.5 + Math.random() * 2.5),
        hue: Math.random() * 360,
        targetY: 40 + Math.random() * 250, // wide range of heights
        trail: [], exploded: false, size
      });
    }
  }

  fireworks.forEach(fw => {
    if (!fw.exploded) {
      fw.y += fw.vy;
      fw.trail.push({ x: fw.x + (Math.random() - 0.5) * 2, y: fw.y });
      if (fw.trail.length > 12) fw.trail.shift();
      if (fw.y <= fw.targetY) {
        fw.exploded = true;
        const burstHues = [fw.hue, (fw.hue + 40) % 360, (fw.hue + 80) % 360, (fw.hue + 120) % 360];
        // Size-based burst: small=18, medium=32, large=55
        const count = [18, 32, 55][fw.size || 0];
        const spdMul = [1, 1.4, 2.2][fw.size || 0];
        const rMul = [1, 1.5, 2.5][fw.size || 0];
        const lifeMul = [1, 1.3, 1.8][fw.size || 0];
        for (let i = 0; i < count; i++) {
          const a = (Math.PI * 2 / count) * i + Math.random() * 0.4;
          const spd = (Math.random() * 3 + 1) * spdMul;
          particles.push({
            x: fw.x, y: fw.y,
            vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 0.5,
            life: (25 + Math.random() * 20) * lifeMul, maxLife: 45 * lifeMul,
            r: (Math.random() * 3 + 1.5) * rMul,
            hue: burstHues[i % burstHues.length], sat: 100, lum: 60
          });
        }
      }
    }
  });
  fireworks = fireworks.filter(fw => !fw.exploded);
}

function drawFireworks() {
  fireworks.forEach(fw => {
    if (fw.exploded) return;
    // Trail
    fw.trail.forEach((pt, i) => {
      ctx.globalAlpha = (i / fw.trail.length) * 0.6;
      ctx.fillStyle = `hsl(${fw.hue}, 80%, 70%)`;
      ctx.fillRect(pt.x, pt.y, 2, 2);
    });
    // Head
    ctx.globalAlpha = 1;
    ctx.fillStyle = `hsl(${fw.hue}, 90%, 85%)`;
    ctx.fillRect(fw.x - 1, fw.y - 1, 3, 3);
    ctx.globalAlpha = 1;
  });
}

// --- Nuke cloud (behind city) ---
function drawNukeCloud() {
  if (!nukeActive) return;
  const elapsed = performance.now() - nukeStart;
  const totalMs = 8000;
  const gx = nukeGx, gy = nukeGy;

  // Shockwave ring
  if (elapsed > 200 && elapsed < 2000) {
    const st = (elapsed - 200) / 1800;
    const radius = st * Math.max(W, H) * 0.8;
    ctx.globalAlpha = (1 - st) * 0.3;
    ctx.strokeStyle = 'rgba(255, 200, 100, 0.6)';
    ctx.lineWidth = 3 + (1 - st) * 8;
    ctx.beginPath(); ctx.arc(gx, gy, radius, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Mushroom cloud
  if (elapsed > 100) {
    const cloudT = Math.min(1, (elapsed - 100) / 3000);
    const fadeT = elapsed > 6000 ? Math.min(1, (elapsed - 6000) / 2000) : 0; // dissipate 6-8s
    const darkT = elapsed > 2500 ? Math.min(1, (elapsed - 2500) / 2000) : 0; // darken 2.5-4.5s
    const alpha = (1 - fadeT) * 0.85;

    if (alpha > 0.01) {
      ctx.globalAlpha = alpha;
      const riseEase = 1 - Math.pow(1 - Math.min(1, cloudT * 1.5), 3);
      const cloudCenterY = gy - riseEase * (H * 0.45);
      const stemBaseY = gy;
      const capGrow = Math.min(1, cloudT * 2);
      const capR = 40 + capGrow * 55;
      const capRx = capR * 1.4;
      const stemTopW = 18 + capGrow * 12;
      const stemBaseW = 30 + capGrow * 25;

      // Color darkening over time
      const hShift = darkT * 10;
      const lDrop = darkT * 20;

      // Stem
      const stemGrad = ctx.createLinearGradient(gx, cloudCenterY + capR * 0.3, gx, stemBaseY);
      stemGrad.addColorStop(0, `hsla(${25 - hShift}, 90%, ${Math.max(10, 45 - lDrop)}%, ${alpha})`);
      stemGrad.addColorStop(0.4, `hsla(${20 - hShift}, 85%, ${Math.max(8, 35 - lDrop)}%, ${alpha})`);
      stemGrad.addColorStop(1, `hsla(${15 - hShift}, 70%, ${Math.max(5, 25 - lDrop)}%, ${alpha})`);
      ctx.fillStyle = stemGrad;
      ctx.beginPath();
      ctx.moveTo(gx - stemTopW / 2, cloudCenterY + capR * 0.3);
      ctx.quadraticCurveTo(gx - stemTopW * 0.6, (cloudCenterY + stemBaseY) / 2, gx - stemBaseW / 2, stemBaseY);
      ctx.lineTo(gx + stemBaseW / 2, stemBaseY);
      ctx.quadraticCurveTo(gx + stemTopW * 0.6, (cloudCenterY + stemBaseY) / 2, gx + stemTopW / 2, cloudCenterY + capR * 0.3);
      ctx.closePath(); ctx.fill();

      // Glow
      const glowGrad = ctx.createRadialGradient(gx, cloudCenterY, capR * 0.3, gx, cloudCenterY, capRx * 1.3);
      glowGrad.addColorStop(0, `hsla(30, 100%, ${Math.max(15, 60 - lDrop * 2)}%, ${alpha * 0.3})`);
      glowGrad.addColorStop(1, 'hsla(15, 100%, 30%, 0)');
      ctx.fillStyle = glowGrad;
      ctx.fillRect(gx - capRx * 1.5, cloudCenterY - capR * 1.5, capRx * 3, capR * 3);

      // Cap layers (darken over time)
      ctx.fillStyle = `hsla(${12 - hShift}, 60%, ${Math.max(5, 22 - lDrop)}%, ${alpha})`;
      ctx.beginPath(); ctx.ellipse(gx, cloudCenterY, capRx * 1.1, capR * 0.95, 0, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = `hsla(${18 - hShift}, 80%, ${Math.max(8, 32 - lDrop)}%, ${alpha})`;
      ctx.beginPath(); ctx.ellipse(gx, cloudCenterY - capR * 0.05, capRx * 0.9, capR * 0.8, 0, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = `hsla(${25 - hShift}, 90%, ${Math.max(10, 42 - lDrop)}%, ${alpha})`;
      ctx.beginPath(); ctx.ellipse(gx, cloudCenterY - capR * 0.08, capRx * 0.65, capR * 0.6, 0, 0, Math.PI * 2); ctx.fill();

      // Hot core -- last to darken, lingers bright
      const coreDarkDelay = elapsed > 4000 ? Math.min(1, (elapsed - 4000) / 2000) : 0;
      const coreAlpha = alpha * Math.max(0.1, 1 - coreDarkDelay);
      ctx.fillStyle = `hsla(40, 100%, ${Math.max(20, 70 - lDrop * 2)}%, ${coreAlpha})`;
      ctx.beginPath(); ctx.ellipse(gx, cloudCenterY - capR * 0.1, capRx * 0.35, capR * 0.35, 0, 0, Math.PI * 2); ctx.fill();

      // White-hot center
      if (cloudT < 0.4) {
        const wa = (1 - cloudT / 0.4) * alpha;
        ctx.fillStyle = `rgba(255, 255, 220, ${wa})`;
        ctx.beginPath(); ctx.ellipse(gx, cloudCenterY, capRx * 0.2, capR * 0.2, 0, 0, Math.PI * 2); ctx.fill();
      }

      // Base ring
      ctx.fillStyle = `hsla(${15 - hShift}, 70%, ${Math.max(5, 28 - lDrop)}%, ${alpha * 0.7})`;
      ctx.beginPath(); ctx.ellipse(gx, cloudCenterY + capR * 0.5, capRx * 1.15, capR * 0.25, 0, 0, Math.PI * 2); ctx.fill();

      ctx.globalAlpha = 1;
    }
  }

  // Shake
  if (elapsed < 800) screenShake = 20 * (1 - elapsed / 800);
  else if (elapsed < 3000) screenShake = Math.max(screenShake * 0.96, 0);

  if (elapsed > totalMs) nukeActive = false;
}

// Nuke overlay: flash + light wash
function drawNukeOverlay() {
  if (!nukeActive) return;
  const elapsed = performance.now() - nukeStart;

  if (elapsed < 300) {
    const ft = elapsed / 300;
    ctx.globalAlpha = (1 - ft * ft) * 0.95;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  if (elapsed < 2000) {
    const lt = elapsed / 2000;
    ctx.globalAlpha = (1 - lt) * 0.35;
    ctx.fillStyle = `hsl(${25 + lt * 10}, 100%, ${60 - lt * 20}%)`;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  } else if (elapsed < 4000) {
    const lt = (elapsed - 2000) / 2000;
    ctx.globalAlpha = (1 - lt) * 0.12;
    ctx.fillStyle = '#cc2200';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
}

// --- Drawing ---
function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#050510');
  g.addColorStop(0.5, '#0a0a22');
  g.addColorStop(1, '#101030');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawMoon() {
  const mx = W - 90, my = 75, r = 28;
  const glow = ctx.createRadialGradient(mx, my, r * 0.8, mx, my, r * 3);
  glow.addColorStop(0, 'rgba(200, 210, 240, 0.06)');
  glow.addColorStop(1, 'rgba(200, 210, 240, 0)');
  ctx.fillStyle = glow;
  ctx.fillRect(mx - r * 3, my - r * 3, r * 6, r * 6);

  ctx.save();
  ctx.beginPath();
  ctx.arc(mx, my, r, 0, Math.PI * 2);
  ctx.fillStyle = '#c8cde8';
  ctx.globalAlpha = 0.9;
  ctx.fill();
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath();
  ctx.arc(mx + 14, my - 6, r * 0.88, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
}

function drawStars() {
  bgStars.forEach(s => {
    const a = (Math.sin(s.phase + globalTick * 0.012) + 1) / 2 * 0.55 + 0.15;
    ctx.globalAlpha = a;
    ctx.fillStyle = '#b0b8d0';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawFarCity() {
  const scrollX = (globalTick * 0.12) % FAR_TILE_W;
  ctx.fillStyle = '#0c0c20';
  for (let tileOff = -FAR_TILE_W; tileOff < W + FAR_TILE_W; tileOff += FAR_TILE_W) {
    farBuildings.forEach(b => {
      const bx = b.x + tileOff - scrollX;
      if (bx + b.w > -10 && bx < W + 10) {
        ctx.fillRect(bx, H - GROUND_H - b.h, b.w, b.h);
      }
    });
  }
}

function drawGround() {
  ctx.fillStyle = '#0c0c1a';
  ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
  ctx.fillStyle = '#181830';
  ctx.fillRect(0, H - GROUND_H, W, 2);
  ctx.fillStyle = '#1a1a35';
  const off = (globalTick * PIPE_SPEED) % 24;
  for (let x = -off; x < W; x += 24) {
    ctx.fillRect(x, H - GROUND_H / 2, 12, 2);
  }
}

function drawBuilding(x, w, topY, height, fromTop, pipeId) {
  const seed = Math.round(x + w * 100) | 0;
  const hue = 228 + (seed % 25);
  const lit = 11 + (seed % 5);

  ctx.fillStyle = `hsl(${hue}, 25%, ${lit}%)`;
  ctx.fillRect(x, topY, w, height);

  ctx.fillStyle = `hsl(${hue}, 18%, ${lit + 4}%)`;
  ctx.fillRect(x, topY, 2, height);
  ctx.fillStyle = `hsl(${hue}, 30%, ${lit - 2}%)`;
  ctx.fillRect(x + w - 2, topY, 2, height);

  const capY = fromTop ? topY + height - 5 : topY;
  ctx.fillStyle = `hsl(${hue}, 12%, ${lit + 7}%)`;
  ctx.fillRect(x - 4, capY, w + 8, 5);
  ctx.fillStyle = `hsl(${hue}, 12%, ${lit + 10}%)`;
  ctx.fillRect(x - 4, capY, w + 8, 1);

  // Windows
  const winW = 5, winH = 7, cols = 3;
  const margin = (w - cols * winW) / (cols + 1);
  const startY = fromTop ? topY + 10 : capY + 10;
  const endY = fromTop ? topY + height - 14 : topY + height - 6;

  for (let row = startY; row < endY; row += 16) {
    for (let c = 0; c < cols; c++) {
      const wx = x + margin + c * (winW + margin);
      const on = ((seed * 7 + c * 13 + Math.floor(row) * 3) % 5) > 1;
      ctx.fillStyle = on ? 'rgba(255, 200, 60, 0.65)' : 'rgba(255, 200, 60, 0.08)';
      ctx.fillRect(wx, row, winW, winH);
    }
  }

  // Rooftop neon signs (bottom buildings only, ~1 in 4)
  if (!fromTop && pipeId !== undefined) {
    const hash = ((pipeId * 13 + 7) * 37) % 100; // better spread
    if (hash < 25) { // 25% chance
      const roofTexts  = ['IQ NANO', 'ZD1000', 'PP-1', 'IQ SQUARE', 'ZenaGames', 'ZENATECH'];
      const roofColors = ['#ff4488', '#44ffaa', '#ffaa22', '#aa66ff',   '#44ddff',  '#00d4ff'];
      const idx = ((pipeId * 11 + 5) * 23) % roofTexts.length;
      drawNeonText(roofTexts[idx], x, topY - 14, w, roofColors[idx], pipeId);
    }
  }
}

// --- Pixel font (5x5 per character) ---
const PX = {
  A:[0b01110,0b10001,0b11111,0b10001,0b10001],
  C:[0b01111,0b10000,0b10000,0b10000,0b01111],
  D:[0b11110,0b10001,0b10001,0b10001,0b11110],
  E:[0b11111,0b10000,0b11110,0b10000,0b11111],
  G:[0b01111,0b10000,0b10011,0b10001,0b01111],
  H:[0b10001,0b10001,0b11111,0b10001,0b10001],
  I:[0b11111,0b00100,0b00100,0b00100,0b11111],
  N:[0b10001,0b11001,0b10101,0b10011,0b10001],
  O:[0b01110,0b10001,0b10001,0b10001,0b01110],
  P:[0b11110,0b10001,0b11110,0b10000,0b10000],
  Q:[0b01110,0b10001,0b10101,0b10010,0b01101],
  R:[0b11110,0b10001,0b11110,0b10010,0b10001],
  S:[0b01111,0b10000,0b01110,0b00001,0b11110],
  T:[0b11111,0b00100,0b00100,0b00100,0b00100],
  U:[0b10001,0b10001,0b10001,0b10001,0b01110],
  Z:[0b11111,0b00010,0b00100,0b01000,0b11111],
  // lowercase
  a:[0b00000,0b01110,0b00001,0b01111,0b01111],
  e:[0b00000,0b01110,0b11111,0b10000,0b01110],
  m:[0b00000,0b11010,0b10101,0b10101,0b10001],
  n:[0b00000,0b10110,0b11001,0b10001,0b10001],
  s:[0b00000,0b01111,0b01000,0b00110,0b11110],
  // digits + symbols
  '0':[0b01110,0b10011,0b10101,0b11001,0b01110],
  '1':[0b00110,0b10100,0b00100,0b00100,0b11111],
  '-':[0b00000,0b00000,0b11111,0b00000,0b00000],
  ' ':[0b00000,0b00000,0b00000,0b00000,0b00000],
};

function drawNeonText(text, bx, sy, bw, color, seed) {
  const charW = 5, charH = 5, gap = 1, scale = 1.5;
  const totalW = text.length * (charW + gap) * scale - gap * scale;
  const sx = bx + (bw - totalW) / 2;

  // Glow backdrop
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = color;
  ctx.fillRect(sx - 3, sy - 2, totalW + 6, charH * scale + 4);
  ctx.globalAlpha = 1;

  // Flicker (each sign has its own rhythm)
  const flicker = Math.sin(globalTick * 0.06 + seed * 3.7) > -0.85 ? 1 : 0.25;
  ctx.globalAlpha = 0.85 * flicker;
  ctx.fillStyle = color;

  for (let ci = 0; ci < text.length; ci++) {
    const rows = PX[text[ci]];
    if (!rows) continue;
    const cx = sx + ci * (charW + gap) * scale;
    for (let r = 0; r < charH; r++) {
      for (let c = 0; c < charW; c++) {
        if ((rows[r] >> (charW - 1 - c)) & 1) {
          ctx.fillRect(cx + c * scale, sy + r * scale, scale, scale);
        }
      }
    }
  }
  ctx.globalAlpha = 1;
}

function drawDrone(x, y, angle, propPhase) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.fillRect(-10, 13, 20, 3);

  ctx.fillStyle = '#3a3a4a';
  ctx.fillRect(-14, -3, 28, 7);
  ctx.fillStyle = '#4a4a5a';
  ctx.fillRect(-12, -2, 24, 5);

  ctx.fillStyle = '#00c8f0';
  ctx.fillRect(-4, -5, 8, 11);
  ctx.fillStyle = '#009abb';
  ctx.fillRect(-3, -4, 6, 9);

  ctx.fillStyle = globalTick % 40 < 20 ? '#ff2255' : '#551122';
  ctx.fillRect(-1, -7, 2, 2);

  ctx.fillStyle = '#505060';
  ctx.fillRect(-18, -1, 7, 3);
  ctx.fillRect(11, -1, 7, 3);

  const spin = Math.abs(Math.sin(propPhase));
  ctx.globalAlpha = 0.55;
  ctx.fillStyle = '#99a';
  ctx.fillRect(-18 - spin * 6, -4, spin * 12, 2);
  ctx.fillRect(14 - spin * 6, -4, spin * 12, 2);
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#555565';
  ctx.fillRect(-10, 5, 2, 4);
  ctx.fillRect(8, 5, 2, 4);
  ctx.fillRect(-12, 8, 8, 2);
  ctx.fillRect(4, 8, 8, 2);

  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    const t = p.life / p.maxLife;
    ctx.globalAlpha = t * 0.75;
    const sat = p.sat || 90, lum = p.lum || 55;
    ctx.fillStyle = `hsl(${p.hue}, ${sat}%, ${lum + (1 - t) * 20}%)`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * t, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawVignette() {
  const g = ctx.createRadialGradient(W / 2, H / 2, H * 0.35, W / 2, H / 2, H * 0.75);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

// --- Dark Souls "YOU DIED" (canvas-rendered) ---
function drawDeathSequence() {
  if (state !== 'dying') return;

  const t = deathTimer;

  // Phase 1: Red flash (first few frames)
  if (t < DEATH_FLASH_DUR) {
    const flashT = 1 - (t / DEATH_FLASH_DUR);
    ctx.globalAlpha = flashT * 0.4;
    ctx.fillStyle = '#cc1100';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  // Phase 2+3+4: "YOU DIED" text with horizontal shadow band
  const textStart = DEATH_FLASH_DUR;
  const textT = t - textStart;

  if (textT >= 0) {
    // Calculate text opacity: fade in -> hold -> fade out
    let textAlpha = 0;
    if (textT < DIED_FADE_IN) {
      // Slow fade in
      textAlpha = textT / DIED_FADE_IN;
      textAlpha = textAlpha * textAlpha; // ease-in curve
    } else if (textT < DIED_FADE_IN + DIED_HOLD) {
      textAlpha = 1;
    } else if (textT < DIED_FADE_IN + DIED_HOLD + DIED_FADE_OUT) {
      const fadeT = (textT - DIED_FADE_IN - DIED_HOLD) / DIED_FADE_OUT;
      textAlpha = 1 - fadeT;
    }

    if (textAlpha > 0.01) {
      // Horizontal shadow band (blurred dark bar across screen center)
      const bandH = 80;
      const bandY = H / 2 - bandH / 2;
      const bandGrad = ctx.createLinearGradient(0, bandY - 20, 0, bandY + bandH + 20);
      bandGrad.addColorStop(0, 'rgba(0,0,0,0)');
      bandGrad.addColorStop(0.15, `rgba(0,0,0,${textAlpha * 0.6})`);
      bandGrad.addColorStop(0.5, `rgba(0,0,0,${textAlpha * 0.75})`);
      bandGrad.addColorStop(0.85, `rgba(0,0,0,${textAlpha * 0.6})`);
      bandGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = bandGrad;
      ctx.fillRect(0, bandY - 20, W, bandH + 40);

      // "YOU DIED" text
      ctx.globalAlpha = textAlpha;
      ctx.font = '700 48px "Segoe UI", system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Red glow layers
      ctx.shadowColor = '#cc220088';
      ctx.shadowBlur = 40;
      ctx.fillStyle = '#bb2200';
      ctx.fillText('YOU DIED', W / 2, H / 2);

      ctx.shadowBlur = 20;
      ctx.fillStyle = '#cc2200';
      ctx.fillText('YOU DIED', W / 2, H / 2);

      ctx.shadowBlur = 0;
      ctx.shadowColor = 'transparent';
      ctx.globalAlpha = 1;
    }
  }
}

// --- Ready countdown overlay ---
function drawReadySequence() {
  if (state !== 'ready') return;

  const t = readyT; // 0 -> 1 over exactly 4 seconds
  const elapsed = performance.now() - readyStartTime;

  // Draw drone
  drawDrone(drone.x, drone.y, drone.angle, drone.propPhase);

  // Blinking outline that hugs the drone shape
  // Blink frequency: starts fast (~15Hz), tapers to slow (~2Hz), then fades out
  // Use elapsed ms for consistent blink speed regardless of refresh rate
  const blinkHz = 15 - t * t * 13; // 15Hz -> 2Hz, cubic taper
  const blinkPhase = Math.sin(elapsed * blinkHz * 0.00628); // 2*PI/1000
  const blinkOn = blinkPhase > 0;

  if (blinkOn || t > 0.9) {
    ctx.save();
    ctx.translate(drone.x, drone.y);
    ctx.rotate(drone.angle);

    const outlineAlpha = t > 0.9 ? Math.max(0, 1 - (t - 0.9) / 0.1) : 0.85;
    ctx.strokeStyle = '#00d4ff';
    ctx.lineWidth = 1;
    ctx.globalAlpha = outlineAlpha;
    ctx.shadowColor = '#00d4ff';
    ctx.shadowBlur = 6;

    // Tight outline following drone body shape
    ctx.beginPath();
    ctx.moveTo(-15, -5);
    ctx.lineTo(-4, -5);
    ctx.lineTo(-4, -8);  // hub top
    ctx.lineTo(4, -8);
    ctx.lineTo(4, -5);
    ctx.lineTo(15, -5);
    ctx.lineTo(19, -2);  // right arm tip
    ctx.lineTo(19, 3);
    ctx.lineTo(15, 3);
    ctx.lineTo(10, 5);
    ctx.lineTo(10, 9);   // right skid
    ctx.lineTo(-10, 9);  // left skid
    ctx.lineTo(-10, 5);
    ctx.lineTo(-15, 3);
    ctx.lineTo(-19, 3);
    ctx.lineTo(-19, -2); // left arm tip
    ctx.closePath();
    ctx.stroke();

    ctx.shadowBlur = 0;
    ctx.shadowColor = 'transparent';
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Text: Ready? (0-38%) -> Set. (38-75%) -> DRONE! (75-100%)
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const textY = H / 2 - 70;

  if (t < 0.38) {
    // "Ready?" -- swoosh in from left, hold, swoosh out right
    const phase = t / 0.38;
    let alpha, offsetX;
    if (phase < 0.15) {
      const p = phase / 0.15;
      alpha = p * 0.8; offsetX = (1 - p) * -40;
    } else if (phase > 0.85) {
      const p = (phase - 0.85) / 0.15;
      alpha = (1 - p) * 0.8; offsetX = p * 40;
    } else {
      alpha = 0.8; offsetX = 0;
    }
    ctx.globalAlpha = alpha;
    ctx.font = '700 22px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#667';
    ctx.fillText('Ready?', W / 2 + offsetX, textY);

  } else if (t < 0.75) {
    // "Set." -- swoosh in, hold, swoosh out
    const phase = (t - 0.38) / 0.37;
    let alpha, offsetX;
    if (phase < 0.12) {
      const p = phase / 0.12;
      alpha = p * 0.85; offsetX = (1 - p) * -35;
    } else if (phase > 0.88) {
      const p = (phase - 0.88) / 0.12;
      alpha = (1 - p) * 0.85; offsetX = p * 35;
    } else {
      alpha = 0.85; offsetX = 0;
    }
    ctx.globalAlpha = alpha;
    ctx.font = '700 22px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#778';
    ctx.fillText('Set.', W / 2 + offsetX, textY);

  } else {
    // "DRONE!" -- smacks into view: fast scale-up + glow punch
    const phase = (t - 0.75) / 0.25;
    const smackT = Math.min(1, phase / 0.15); // arrives fast in first 15% of segment
    // Overshoot ease: goes to 1.15 then settles to 1.0
    const ease = smackT < 1 ? smackT * (2 - smackT) : 1; // ease-out
    const scaleOvershoot = smackT < 1 ? 1 + (1 - smackT) * 0.2 : 1;
    const alpha = Math.min(1, smackT * 1.5);

    ctx.save();
    ctx.translate(W / 2, textY);
    ctx.scale(scaleOvershoot, scaleOvershoot);
    ctx.globalAlpha = alpha;
    ctx.font = '700 36px "Courier New", monospace';
    ctx.fillStyle = '#00d4ff';
    ctx.shadowColor = '#00d4ffaa';
    ctx.shadowBlur = 30;
    ctx.fillText('DRONE!', 0, 0);
    // Double draw for extra punch
    ctx.shadowBlur = 12;
    ctx.fillText('DRONE!', 0, 0);
    ctx.shadowBlur = 0;
    ctx.shadowColor = 'transparent';
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// --- Update ---
function update() {
  if (state === 'dying') {
    deathTimer++;
    if (screenShake > 0.3) screenShake *= 0.82;
    updateParticles();
    // Transition to score screen after full sequence
    if (deathTimer > DIED_TOTAL + SCORE_DELAY) {
      state = 'dead';
      deathTimer = 0;
      scoreValueEl.textContent = score;
      scoreBestEl.textContent = `Best: ${best}`;
      showScreen(scoreScreen);
    }
    return;
  }

  if (state === 'dead') {
    deathTimer++;
    updateParticles();
    return;
  }

  // Nuke easter egg: drone floats idle
  if (state === 'nuking') {
    updateParticles();
    return;
  }

  // Nuke fall: drone drops and crashes
  if (state === 'nukeFall') {
    drone.vy += GRAVITY * 1.5;
    drone.y += drone.vy;
    drone.angle += 0.05; // tumble
    drone.propPhase += 0.1; // slow props
    updateParticles();
    if (drone.y > H - GROUND_H - 8) {
      drone.y = H - GROUND_H - 8;
      // Transition to death sequence
      state = 'dying';
      best = Math.max(best, score);
      deathTimer = 0;
      spawnExplosion(drone.x, drone.y);
    }
    return;
  }

  if (state === 'ready') {
    readyT = Math.min(1, (performance.now() - readyStartTime) / READY_MS);
    drone.propPhase += 0.5;
    drone.y = H / 2 + Math.sin(globalTick * 0.025) * 8;
    drone.angle = Math.sin(globalTick * 0.018) * 0.03;
    if (readyT >= 1) {
      state = 'play';
      hudEl.classList.add('show');
    }
    return;
  }

  if (state !== 'play') return;

  frame++;

  // Drone physics
  drone.vy += GRAVITY;
  drone.vy = Math.min(drone.vy, 8);
  drone.y += drone.vy;

  if (drone.y < CEILING_Y) {
    drone.y = CEILING_Y;
    drone.vy = Math.max(drone.vy, 0);
  }

  const targetAngle = Math.max(-0.4, Math.min(0.5, drone.vy * 0.055));
  drone.angle += (targetAngle - drone.angle) * 0.12;
  drone.propPhase += 0.5;

  // Spawn pipes
  if (frame % PIPE_INTERVAL === 0) {
    const minTop = 70;
    const maxTop = H - GAP_SIZE - GROUND_H - 70;
    const topH = minTop + Math.random() * (maxTop - minTop);
    const id = Math.floor(frame / PIPE_INTERVAL);
    pipes.push(
      { x: W + 10, w: PIPE_WIDTH, y: 0, h: topH, fromTop: true, scored: false, id },
      { x: W + 10, w: PIPE_WIDTH, y: topH + GAP_SIZE, h: H - GROUND_H - topH - GAP_SIZE, fromTop: false, id }
    );
  }

  pipes.forEach(p => p.x -= PIPE_SPEED);
  pipes = pipes.filter(p => p.x + p.w > -20);

  for (let i = 0; i < pipes.length; i += 2) {
    if (pipes[i] && !pipes[i].scored && pipes[i].x + pipes[i].w < drone.x - 12) {
      pipes[i].scored = true;
      score++;
      hudEl.textContent = score;
    }
  }

  const hb = { x: drone.x - 10, y: drone.y - 4, w: 20, h: 12 };
  for (const p of pipes) {
    const px = p.x - 2, pw = p.w + 4;
    if (hb.x + hb.w > px && hb.x < px + pw &&
        hb.y + hb.h > p.y && hb.y < p.y + p.h) {
      die(); return;
    }
  }

  if (drone.y > H - GROUND_H - 8) { drone.y = H - GROUND_H - 8; die(); return; }

  updateParticles();
}

function updateParticles() {
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.98; p.vy *= 0.98;
    p.vy += 0.02;
    p.life--;
  });
  particles = particles.filter(p => p.life > 0);
}

function die() {
  state = 'dying';
  best = Math.max(best, score);
  deathTimer = 0;
  screenShake = 8;
  spawnExplosion(drone.x, drone.y);
  hudEl.classList.remove('show');
}

// --- Render ---
function render() {
  const shaking = (state === 'dying') && screenShake > 0.3;
  const sx = shaking ? (Math.random() - 0.5) * screenShake : 0;
  const sy = shaking ? (Math.random() - 0.5) * screenShake : 0;

  ctx.save();
  ctx.translate(sx, sy);

  drawSky();
  drawMoon();
  drawStars();
  drawNukeCloud();
  drawFarCity();
  drawGround();

  pipes.forEach(p => drawBuilding(p.x, p.w, p.y, p.h, p.fromTop, p.id));
  drawFireworks();
  drawParticles();

  if (state === 'play') {
    drawDrone(drone.x, drone.y, drone.angle, drone.propPhase);
  }

  // Draw drone during nuke states
  if (state === 'nuking' || state === 'nukeFall') {
    drawDrone(drone.x, drone.y, drone.angle, drone.propPhase);
  }

  drawVignette();
  drawReadySequence();
  drawDeathSequence();
  drawNukeOverlay();

  ctx.restore();

  // Menu / fading / nuking idle drone
  if (state === 'menu' || state === 'fading' || state === 'nuking') {
    drone.propPhase += 0.5;
    drone.y = H / 2 + Math.sin(globalTick * 0.025) * 14;
    drone.angle = Math.sin(globalTick * 0.018) * 0.04;
    drawDrone(drone.x, drone.y, drone.angle, drone.propPhase);
  }

  globalTick++;
  updateFireworks();
  update();
  requestAnimationFrame(render);
}

init();
render();
</script>
</body>
