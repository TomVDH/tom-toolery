<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Drone</title>
<link rel="stylesheet" href="css/game.css">
</head>
<body>
<div id="wrap">
  <canvas id="game" width="620" height="640"></canvas>
  <div class="version">version: 0852ce8</div>
  <div class="hud" id="hud">0</div>

  <div class="screen show" id="menuScreen">
    <div class="title">FLAPPY DRONE</div>
    <div class="slogan">Building the drone as we're flying it</div>
    <div class="drone-select">
      <button class="drone-btn active" data-drone="quad">QUAD</button>
      <button class="drone-btn" data-drone="stealth">STEALTH</button>
      <button class="drone-btn" data-drone="heavy">HEAVY</button>
      <button class="drone-btn" data-drone="racer">RACER</button>
      <button class="drone-btn" data-drone="osprey">OSPREY</button>
      <button class="drone-btn" data-drone="dragonfly">DRAGONFLY</button>
      <button class="drone-btn" data-drone="disc">DISC</button>
      <button class="drone-btn" data-drone="spider">SPIDER</button>
    </div>
    <div class="copyright">ZenaSoft (c) 1984 -- All Rights Reserved.</div>
    <div class="prompt">Tap or press Space</div>
  </div>

  <div class="screen score-screen" id="scoreScreen">
    <div class="score-label">Score</div>
    <div class="score-value" id="scoreValue">0</div>
    <div class="score-best" id="scoreBest">Best: 0</div>
    <div class="score-prompt">Tap to retry</div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/background.js"></script>
<script src="js/buildings.js"></script>
<script src="js/drones.js"></script>
<script src="js/effects.js"></script>
<script src="js/ui.js"></script>
<script src="js/game.js"></script>
</body>
</html>
