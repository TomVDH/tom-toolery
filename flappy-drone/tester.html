<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Drone - Effect Tester</title>
<link rel="stylesheet" href="css/game.css">
<link rel="stylesheet" href="css/tester.css">
</head>
<body>
<div id="panel">
  <div class="title-bar">
    <h1>TESTER</h1>
    <span class="badge">DEV</span>
  </div>

  <h2>Drones</h2>
  <button class="btn-fx" onclick="selectDrone('quad')" style="border-color:#00c8f0;">Pixel Quad</button>
  <button class="btn-fx" onclick="selectDrone('stealth')" style="border-color:#00ff78;">Stealth</button>
  <button class="btn-fx" onclick="selectDrone('heavy')" style="border-color:#cc8800;">Heavy Lift</button>
  <button class="btn-fx" onclick="selectDrone('racer')" style="border-color:#ff0066;">Racer</button>
  <button class="btn-fx" onclick="selectDrone('osprey')" style="border-color:#446688;">Osprey</button>
  <button class="btn-fx" onclick="selectDrone('dragonfly')" style="border-color:#64ffc8;">Dragonfly</button>
  <button class="btn-fx" onclick="selectDrone('disc')" style="border-color:#00c8ff;">Disc UFO</button>
  <button class="btn-fx" onclick="selectDrone('spider')" style="border-color:#ff3232;">Spider Hex</button>

  <h2>Effects</h2>
  <button class="btn-fx" onclick="triggerFirework()">Firework</button>
  <button class="btn-fx" onclick="triggerCountdown()">Ready? Set. DRONE!</button>
  <button class="btn-fx" onclick="triggerExplosion()">Explosion</button>
  <button class="btn-fx" onclick="triggerThrust()">Thrust Burst</button>

  <h2>Neon Signs</h2>
  <button class="btn-sign" onclick="spawnSignBuilding('ZENATECH', '#00d4ff')">ZENATECH (rooftop)</button>
  <button class="btn-sign" onclick="spawnSignBuilding('IQ NANO', '#ff4488')">IQ NANO</button>
  <button class="btn-sign" onclick="spawnSignBuilding('ZD1000', '#44ffaa')">ZD1000</button>
  <button class="btn-sign" onclick="spawnSignBuilding('PP-1', '#ffaa22')">PP-1</button>
  <button class="btn-sign" onclick="spawnSignBuilding('IQ SQUARE', '#aa66ff')">IQ SQUARE</button>
  <button class="btn-sign" onclick="spawnSignBuilding('ZenaGames', '#44ddff')">ZenaGames</button>

  <h2>Special</h2>
  <button class="btn-death" onclick="triggerNuke()" style="border-color:#ff4400; background:#1a0800;">NUKE</button>
  <button class="btn-fx" onclick="spawnPickup('nuke')" style="border-color:#ffcc00;">Nuke Pickup</button>
  <button class="btn-fx" onclick="spawnPickup('shield')" style="border-color:#00bbff;">Shield Pickup</button>
  <button class="btn-fx" onclick="spawnPickup('magnet')" style="border-color:#cc2233;">Magnet Pickup</button>

  <h2>Death Sequence</h2>
  <button class="btn-death" onclick="triggerDeath()">Death - Full Sequence</button>
  <button class="btn-death" onclick="triggerFlash()">Red Flash Only</button>
  <button class="btn-death" onclick="triggerYouDied()">YOU DIED Text Only</button>

  <h2>Scene</h2>
  <button class="btn-fx" id="motionBtn" onclick="toggleMotion()">Motion: ON</button>
  <button class="btn-fx" onclick="resetScene()">Reset Scene</button>
</div>

<canvas id="game" width="620" height="640"></canvas>

<script src="js/config.js"></script>
<script src="js/background.js"></script>
<script src="js/buildings.js"></script>
<script src="js/drones.js"></script>
<script src="js/effects.js"></script>
<script src="js/ui.js"></script>
<script src="js/tester.js"></script>
</body>
</html>
