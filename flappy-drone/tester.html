<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Drone - Effect Tester</title>
<link rel="stylesheet" href="css/game.css">
<link rel="stylesheet" href="css/tester.css">
</head>
<body style="flex-direction:row;height:100vh;overflow:hidden">
<div id="panel">
  <div class="title-bar">
    <h1>TESTER</h1>
    <span class="badge">DEV</span>
  </div>

  <h2>Drones</h2>
  <div class="btn-grid">
    <button class="btn-fx" onclick="selectDrone('quad')" id="drone-quad">Pixel Quad</button>
    <button class="btn-fx" onclick="selectDrone('stealth')" id="drone-stealth">Stealth</button>
    <button class="btn-fx" onclick="selectDrone('heavy')" id="drone-heavy">Heavy Lift</button>
    <button class="btn-fx" onclick="selectDrone('racer')" id="drone-racer">Racer</button>
    <button class="btn-fx" onclick="selectDrone('osprey')" id="drone-osprey">Osprey</button>
    <button class="btn-fx" onclick="selectDrone('dragonfly')" id="drone-dragonfly">Dragonfly</button>
    <button class="btn-fx" onclick="selectDrone('disc')" id="drone-disc">Disc UFO</button>
    <button class="btn-fx" onclick="selectDrone('spider')" id="drone-spider">Spider Hex</button>
    <button class="btn-fx" onclick="selectDrone('jetwing')" id="drone-jetwing">Jetwing</button>
    <button class="btn-fx" onclick="selectDrone('balloon')" id="drone-balloon">Balloon</button>
    <button class="btn-fx" onclick="selectDrone('paperplane')" id="drone-paperplane">Paper Plane</button>
    <button class="btn-fx" onclick="selectDrone('chopper')" id="drone-chopper">Chopper</button>
    <button class="btn-fx" onclick="selectDrone('gyro')" id="drone-gyro">Whirlybird</button>
    <button class="btn-fx" onclick="selectDrone('blimp')" id="drone-blimp">Zephyr</button>
    <button class="btn-fx" onclick="selectDrone('tandem')" id="drone-tandem">Warhorse</button>
  </div>

  <h2>Effects</h2>
  <div class="btn-grid">
    <button class="btn-fx" onclick="triggerFirework()">Firework</button>
    <button class="btn-fx" onclick="triggerExplosion()">Explosion</button>
    <button class="btn-fx" onclick="triggerThrust()">Thrust Burst</button>
    <button class="btn-fx" onclick="triggerCountdown()">Countdown</button>
  </div>

  <h2>Neon Signs</h2>
  <div class="btn-grid-3">
    <button class="btn-sign" onclick="spawnSignBuilding('ZENATECH', '#00d4ff')">ZENATECH</button>
    <button class="btn-sign" onclick="spawnSignBuilding('IQ NANO', '#ff4488')">IQ NANO</button>
    <button class="btn-sign" onclick="spawnSignBuilding('ZD1000', '#44ffaa')">ZD1000</button>
    <button class="btn-sign" onclick="spawnSignBuilding('SKYNET', '#ff2244')">SKYNET</button>
    <button class="btn-sign" onclick="spawnSignBuilding('APEX', '#ff8800')">APEX</button>
    <button class="btn-sign" onclick="spawnSignBuilding('VOLT', '#00ffcc')">VOLT</button>
  </div>

  <h2>Special</h2>
  <button class="btn-nuke" onclick="triggerNuke()">☢ NUKE</button>
  <div class="btn-row">
    <button class="btn-fx" onclick="spawnPickup('nuke')" style="border-color:#ffcc00;">Nuke Pickup</button>
    <button class="btn-fx" onclick="spawnPickup('shield')" style="border-color:#00bbff;">Shield Pickup</button>
  </div>

  <h2>Death</h2>
  <div class="btn-row">
    <button class="btn-death" onclick="triggerDeath()">Full Sequence</button>
    <button class="btn-death" onclick="triggerFlash()">Flash</button>
    <button class="btn-death" onclick="triggerYouDied()">YOU DIED</button>
  </div>

  <h2>Pipe Generation</h2>
  <div class="btn-row" style="margin-bottom:6px">
    <button class="btn-mode" id="pipeMode-classic" onclick="setPipeMode('classic')">Classic</button>
    <button class="btn-mode" id="pipeMode-rush" onclick="setPipeMode('rush')">Rush</button>
  </div>
  <div class="slider-row">
    <label>Score: <span id="pipeScoreLabel">0</span></label>
    <input type="range" id="pipeScore" min="0" max="50" value="0" oninput="onPipeScoreChange(this.value)">
  </div>
  <div class="btn-row">
    <button class="btn-fx" onclick="generatePipePreview()">Generate</button>
    <button class="btn-fx" id="scrollBtn" onclick="togglePipeScroll()">Scroll: OFF</button>
    <button class="btn-fx" onclick="clearPipePreview()">Clear</button>
  </div>
  <div class="btn-row" style="margin-top:4px">
    <button class="btn-fx" id="hitboxBtn" onclick="toggleHitboxes()">Hitboxes: OFF</button>
  </div>

  <h2>Scene</h2>
  <div class="btn-row">
    <button class="btn-fx" id="motionBtn" onclick="toggleMotion()">Motion: ON</button>
    <button class="btn-fx" onclick="resetScene()">Reset</button>
  </div>
</div>

<canvas id="game" width="620" height="640"></canvas>

<script src="js/config.js"></script>
<script src="js/background.js"></script>
<script src="js/buildings.js"></script>
<script src="js/drones.js"></script>
<script src="js/effects.js"></script>
<script src="js/ui.js"></script>
<script src="js/tester.js"></script>
</body>
</html>
