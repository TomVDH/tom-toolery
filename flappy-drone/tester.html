<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Drone - Effect Tester</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060610; color: #ccc;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex; gap: 24px; padding: 24px;
    min-height: 100vh;
  }
  #panel {
    width: 220px; flex-shrink: 0;
    display: flex; flex-direction: column; gap: 8px;
  }
  h2 { font-size: 14px; color: #556; letter-spacing: 2px; text-transform: uppercase; margin: 12px 0 4px; }
  h2:first-child { margin-top: 0; }
  .tag { font-size: 10px; color: #334; letter-spacing: 1px; text-transform: uppercase; }
  button {
    background: #151528; border: 1px solid #252540; color: #aab;
    padding: 10px 14px; border-radius: 6px; cursor: pointer;
    font-size: 13px; text-align: left; transition: all 0.15s;
  }
  button:hover { background: #1e1e38; border-color: #3a3a5a; color: #dde; }
  button:active { background: #252548; }
  .btn-death { border-color: #442222; }
  .btn-death:hover { border-color: #663333; color: #ff8888; }
  .btn-fx { border-color: #223344; }
  .btn-fx:hover { border-color: #335566; color: #88ccff; }
  .btn-sign { border-color: #224422; }
  .btn-sign:hover { border-color: #336633; color: #88ff88; }
  .btn-future { border-color: #333322; opacity: 0.5; }
  .btn-future:hover { opacity: 0.7; }
  canvas {
    flex: 1; max-width: 620px; max-height: 640px;
    border: 2px solid #1a1a3a; border-radius: 14px;
    box-shadow: 0 0 80px #00d4ff08, 0 8px 40px #00000090;
  }
  .title-bar {
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
  }
  .title-bar h1 {
    font-size: 18px; font-weight: 700; color: #fff; letter-spacing: 1px;
  }
  .title-bar .badge {
    font-size: 10px; background: #ff440033; color: #ff8844;
    padding: 2px 8px; border-radius: 10px; letter-spacing: 1px;
  }
</style>
</head>
<body>
<div id="panel">
  <div class="title-bar">
    <h1>TESTER</h1>
    <span class="badge">DEV</span>
  </div>

  <h2>Death Sequence</h2>
  <button class="btn-death" onclick="triggerDeath()">Death - Full Sequence</button>
  <button class="btn-death" onclick="triggerFlash()">Red Flash Only</button>
  <button class="btn-death" onclick="triggerYouDied()">YOU DIED Text Only</button>

  <h2>Particles</h2>
  <button class="btn-fx" onclick="triggerExplosion()">Explosion</button>
  <button class="btn-fx" onclick="triggerThrust()">Thrust Burst</button>

  <h2>Neon Signs</h2>
  <button class="btn-sign" onclick="spawnSignBuilding('ZENATECH', '#00d4ff')">ZENATECH (rooftop)</button>
  <button class="btn-sign" onclick="spawnSignBuilding('IQ NANO', '#ff4488')">IQ NANO</button>
  <button class="btn-sign" onclick="spawnSignBuilding('ZD1000', '#44ffaa')">ZD1000</button>
  <button class="btn-sign" onclick="spawnSignBuilding('PP-1', '#ffaa22')">PP-1</button>
  <button class="btn-sign" onclick="spawnSignBuilding('IQ SQUARE', '#aa66ff')">IQ SQUARE</button>
  <button class="btn-sign" onclick="spawnSignBuilding('ZenaGames', '#44ddff')">ZenaGames</button>

  <h2>Effects</h2>
  <button class="btn-fx" onclick="triggerFirework()">Firework</button>
  <button class="btn-fx" onclick="triggerCountdown()">Ready? Set. DRONE!</button>

  <h2>Special</h2>
  <button class="btn-death" onclick="triggerNuke()" style="border-color:#ff4400; background:#1a0800;">NUKE</button>

  <h2>Pickups</h2>
  <button class="btn-fx" onclick="spawnPickup('nuke')" style="border-color:#ffcc00;">Nuke Pickup</button>
  <button class="btn-fx" onclick="spawnPickup('shield')" style="border-color:#00bbff;">Shield Pickup</button>
  <button class="btn-fx" onclick="spawnPickup('magnet')" style="border-color:#cc2233;">Magnet Pickup</button>

  <h2>Scene</h2>
  <button class="btn-fx" id="motionBtn" onclick="toggleMotion()">Motion: ON</button>
  <button class="btn-fx" onclick="resetScene()">Reset Scene</button>
</div>

<canvas id="game" width="620" height="640"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 620, H = 640;
const GROUND_H = 24;

let globalTick = 0;
let motionEnabled = true;
let fireworks = [];
let countdownActive = false;
let countdownStart = 0;
let nukeActive = false;
let nukeStart = 0;
let particles = [];
let testBuildings = [];  // { x, w, topY, height, fromTop, signText, signColor, signType }
let flashAlpha = 0;
let youDiedAlpha = 0;
let youDiedState = 'off'; // off, fadein, hold, fadeout
let youDiedTimer = 0;
let screenShake = 0;
let pickups = []; // floating pickup items

// --- Background (same as game) ---
const bgStars = Array.from({ length: 55 }, () => ({
  x: Math.random() * W, y: Math.random() * (H * 0.6),
  r: Math.random() * 1.1 + 0.3, phase: Math.random() * Math.PI * 2
}));

const FAR_TILE_W = 320;
const farBuildings = Array.from({ length: 10 }, (_, i) => ({
  x: i * 32,
  h: 20 + Math.sin(i * 2.7 + 1.3) * 18 + Math.cos(i * 4.1) * 12 + 15,
  w: 20 + ((i * 7 + 3) % 5) * 2
}));

// Drone state
const drone = { x: W / 2, y: H / 2 - 40, vy: 0, angle: 0, propPhase: 0 };

// --- Pixel font ---
const PX = {
  A:[0b01110,0b10001,0b11111,0b10001,0b10001],
  C:[0b01111,0b10000,0b10000,0b10000,0b01111],
  D:[0b11110,0b10001,0b10001,0b10001,0b11110],
  E:[0b11111,0b10000,0b11110,0b10000,0b11111],
  G:[0b01111,0b10000,0b10011,0b10001,0b01111],
  H:[0b10001,0b10001,0b11111,0b10001,0b10001],
  I:[0b11111,0b00100,0b00100,0b00100,0b11111],
  N:[0b10001,0b11001,0b10101,0b10011,0b10001],
  O:[0b01110,0b10001,0b10001,0b10001,0b01110],
  P:[0b11110,0b10001,0b11110,0b10000,0b10000],
  Q:[0b01110,0b10001,0b10101,0b10010,0b01101],
  R:[0b11110,0b10001,0b11110,0b10010,0b10001],
  S:[0b01111,0b10000,0b01110,0b00001,0b11110],
  T:[0b11111,0b00100,0b00100,0b00100,0b00100],
  U:[0b10001,0b10001,0b10001,0b10001,0b01110],
  Z:[0b11111,0b00010,0b00100,0b01000,0b11111],
  a:[0b00000,0b01110,0b00001,0b01111,0b01111],
  e:[0b00000,0b01110,0b11111,0b10000,0b01110],
  m:[0b00000,0b11010,0b10101,0b10101,0b10001],
  n:[0b00000,0b10110,0b11001,0b10001,0b10001],
  s:[0b00000,0b01111,0b01000,0b00110,0b11110],
  '0':[0b01110,0b10011,0b10101,0b11001,0b01110],
  '1':[0b00110,0b10100,0b00100,0b00100,0b11111],
  '-':[0b00000,0b00000,0b11111,0b00000,0b00000],
  ' ':[0b00000,0b00000,0b00000,0b00000,0b00000],
};

// --- Drawing functions (mirrored from game) ---
function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#050510');
  g.addColorStop(0.5, '#0a0a22');
  g.addColorStop(1, '#101030');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Nuke sky brightening — warm glow across entire sky while active
  if (nukeActive) {
    const elapsed = performance.now() - nukeStart;
    let skyBright = 0;
    if (elapsed < 1000) skyBright = elapsed / 1000;
    else if (elapsed < 7000) skyBright = 1;
    else skyBright = Math.max(0, 1 - (elapsed - 7000) / 4000);
    if (skyBright > 0.01) {
      const skyG = ctx.createLinearGradient(0, H, 0, 0);
      skyG.addColorStop(0, `hsla(15, 90%, 20%, ${skyBright * 0.35})`);
      skyG.addColorStop(0.4, `hsla(20, 80%, 12%, ${skyBright * 0.2})`);
      skyG.addColorStop(1, `hsla(25, 60%, 6%, ${skyBright * 0.08})`);
      ctx.fillStyle = skyG;
      ctx.fillRect(0, 0, W, H);
    }
  }
}

function drawMoon() {
  const mx = W - 90, my = 75, r = 28;
  const glow = ctx.createRadialGradient(mx, my, r * 0.8, mx, my, r * 3);
  glow.addColorStop(0, 'rgba(200, 210, 240, 0.06)');
  glow.addColorStop(1, 'rgba(200, 210, 240, 0)');
  ctx.fillStyle = glow;
  ctx.fillRect(mx - r * 3, my - r * 3, r * 6, r * 6);
  ctx.save();
  ctx.beginPath(); ctx.arc(mx, my, r, 0, Math.PI * 2);
  ctx.fillStyle = '#c8cde8'; ctx.globalAlpha = 0.9; ctx.fill();
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath(); ctx.arc(mx + 14, my - 6, r * 0.88, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
}

function drawStars() {
  bgStars.forEach(s => {
    ctx.globalAlpha = (Math.sin(s.phase + globalTick * 0.012) + 1) / 2 * 0.55 + 0.15;
    ctx.fillStyle = '#b0b8d0';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawFarCity() {
  const scrollX = motionEnabled ? (globalTick * 0.12) % FAR_TILE_W : 0;
  ctx.fillStyle = '#0c0c20';
  for (let tileOff = -FAR_TILE_W; tileOff < W + FAR_TILE_W; tileOff += FAR_TILE_W) {
    farBuildings.forEach(b => {
      const bx = b.x + tileOff - scrollX;
      if (bx + b.w > -10 && bx < W + 10) ctx.fillRect(bx, H - GROUND_H - b.h, b.w, b.h);
    });
  }

  // Nuke rim light on skyline
  if (nukeActive) {
    const ne = performance.now() - nukeStart;
    let rimAlpha = 0;
    if (ne < 500) rimAlpha = Math.min(1, ne / 300);
    else if (ne < 7000) rimAlpha = 1;
    else rimAlpha = Math.max(0, 1 - (ne - 7000) / 2000);
    if (rimAlpha > 0.01) {
      ctx.save();
      const rimWarmth = Math.min(1, ne / 1500); // 0=white, 1=orange over 1.5s
      const rimHue = rimWarmth * 25;
      const rimSat = 60 + rimWarmth * 40;
      const rimLum = 95 - rimWarmth * 45;
      ctx.strokeStyle = `hsla(${rimHue}, ${rimSat}%, ${rimLum}%, ${rimAlpha * 0.5})`;
      ctx.shadowColor = `hsla(${rimHue}, ${rimSat}%, ${rimLum + 5}%, ${rimAlpha * 0.6})`;
      ctx.shadowBlur = 6 + rimAlpha * 4;
      ctx.lineWidth = 0.75;
      ctx.beginPath();
      for (let tileOff = -FAR_TILE_W; tileOff < W + FAR_TILE_W; tileOff += FAR_TILE_W) {
        farBuildings.forEach(b => {
          const bx = b.x + tileOff - scrollX;
          if (bx + b.w > -10 && bx < W + 10) {
            const ty = H - GROUND_H - b.h;
            ctx.moveTo(bx, ty);
            ctx.lineTo(bx + b.w, ty);
            ctx.lineTo(bx + b.w, H - GROUND_H);
          }
        });
      }
      ctx.stroke();
      ctx.restore();
    }
  }
}

function drawGround() {
  ctx.fillStyle = '#0c0c1a'; ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
  ctx.fillStyle = '#181830'; ctx.fillRect(0, H - GROUND_H, W, 2);
  ctx.fillStyle = '#1a1a35';
  const off = motionEnabled ? (globalTick * 1.6) % 24 : 0;
  for (let x = -off; x < W; x += 24) ctx.fillRect(x, H - GROUND_H / 2, 12, 2);
}

function drawBuilding(b) {
  const { x, w, topY, height, fromTop } = b;
  const seed = b.seed || (Math.round(x + w * 100) | 0);
  const hue = 228 + (seed % 25), lit = 11 + (seed % 5);

  ctx.fillStyle = `hsl(${hue}, 25%, ${lit}%)`; ctx.fillRect(x, topY, w, height);
  ctx.fillStyle = `hsl(${hue}, 18%, ${lit + 4}%)`; ctx.fillRect(x, topY, 2, height);
  ctx.fillStyle = `hsl(${hue}, 30%, ${lit - 2}%)`; ctx.fillRect(x + w - 2, topY, 2, height);

  const capY = fromTop ? topY + height - 5 : topY;
  ctx.fillStyle = `hsl(${hue}, 12%, ${lit + 7}%)`; ctx.fillRect(x - 4, capY, w + 8, 5);
  ctx.fillStyle = `hsl(${hue}, 12%, ${lit + 10}%)`; ctx.fillRect(x - 4, capY, w + 8, 1);

  const winW = 5, winH = 7, cols = 3, margin = (w - cols * winW) / (cols + 1);
  const startY = fromTop ? topY + 10 : capY + 10;
  const endY = fromTop ? topY + height - 14 : topY + height - 6;
  for (let row = startY; row < endY; row += 16) {
    for (let c = 0; c < cols; c++) {
      const wx = x + margin + c * (winW + margin);
      const on = ((seed * 7 + c * 13 + Math.floor(row) * 3) % 5) > 1;
      ctx.fillStyle = on ? 'rgba(255, 200, 60, 0.65)' : 'rgba(255, 200, 60, 0.08)';
      ctx.fillRect(wx, row, winW, winH);
    }
  }

  // Nuke rim light on game buildings (top + right edge)
  if (nukeActive) {
    const ne = performance.now() - nukeStart;
    let rimAlpha = 0;
    if (ne < 500) rimAlpha = Math.min(1, ne / 300);
    else if (ne < 7000) rimAlpha = 1;
    else rimAlpha = Math.max(0, 1 - (ne - 7000) / 2000);
    if (rimAlpha > 0.01) {
      ctx.save();
      const rimWarmth = Math.min(1, ne / 1500);
      const rimHue = rimWarmth * 25;
      const rimSat = 60 + rimWarmth * 40;
      const rimLum = 95 - rimWarmth * 45;
      ctx.strokeStyle = `hsla(${rimHue}, ${rimSat}%, ${rimLum}%, ${rimAlpha * 0.5})`;
      ctx.shadowColor = `hsla(${rimHue}, ${rimSat}%, ${rimLum + 5}%, ${rimAlpha * 0.6})`;
      ctx.shadowBlur = 6 + rimAlpha * 4;
      ctx.lineWidth = 0.75;
      ctx.beginPath();
      ctx.moveTo(x, topY);
      ctx.lineTo(x + w, topY);
      ctx.lineTo(x + w, topY + height);
      ctx.stroke();
      ctx.restore();
    }
  }

  // Neon sign
  if (b.signText) {
    const sy = b.signType === 'roof' ? topY - 10 : topY + 20;
    drawNeonText(b.signText, x, sy, w, b.signColor, seed);
  }
}

function drawNeonText(text, bx, sy, bw, color, seed) {
  const charW = 5, charH = 5, gap = 1, scale = 1.5;
  const totalW = text.length * (charW + gap) * scale - gap * scale;
  const sx = bx + (bw - totalW) / 2;

  ctx.globalAlpha = 0.15; ctx.fillStyle = color;
  ctx.fillRect(sx - 3, sy - 2, totalW + 6, charH * scale + 4);

  const flicker = Math.sin(globalTick * 0.06 + seed * 3.7) > -0.85 ? 1 : 0.25;
  ctx.globalAlpha = 0.85 * flicker; ctx.fillStyle = color;

  for (let ci = 0; ci < text.length; ci++) {
    const rows = PX[text[ci]]; if (!rows) continue;
    const cx = sx + ci * (charW + gap) * scale;
    for (let r = 0; r < charH; r++)
      for (let c = 0; c < charW; c++)
        if ((rows[r] >> (charW - 1 - c)) & 1)
          ctx.fillRect(cx + c * scale, sy + r * scale, scale, scale);
  }
  ctx.globalAlpha = 1;
}

function drawDrone() {
  const { x, y, angle, propPhase } = drone;
  ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
  ctx.fillStyle = 'rgba(0,0,0,0.12)'; ctx.fillRect(-10, 13, 20, 3);
  ctx.fillStyle = '#3a3a4a'; ctx.fillRect(-14, -3, 28, 7);
  ctx.fillStyle = '#4a4a5a'; ctx.fillRect(-12, -2, 24, 5);
  ctx.fillStyle = '#00c8f0'; ctx.fillRect(-4, -5, 8, 11);
  ctx.fillStyle = '#009abb'; ctx.fillRect(-3, -4, 6, 9);
  ctx.fillStyle = globalTick % 40 < 20 ? '#ff2255' : '#551122'; ctx.fillRect(-1, -7, 2, 2);
  ctx.fillStyle = '#505060'; ctx.fillRect(-18, -1, 7, 3); ctx.fillRect(11, -1, 7, 3);
  const spin = Math.abs(Math.sin(propPhase));
  ctx.globalAlpha = 0.55; ctx.fillStyle = '#99a';
  ctx.fillRect(-18 - spin * 6, -4, spin * 12, 2);
  ctx.fillRect(14 - spin * 6, -4, spin * 12, 2); ctx.globalAlpha = 1;
  ctx.fillStyle = '#555565';
  ctx.fillRect(-10, 5, 2, 4); ctx.fillRect(8, 5, 2, 4);
  ctx.fillRect(-12, 8, 8, 2); ctx.fillRect(4, 8, 8, 2);
  // Nuke silhouette — redraws drone shape in black
  if (nukeActive) {
    const ne = performance.now() - nukeStart;
    let sil = 0;
    if (ne < 500) sil = 1;
    else if (ne < 4000) sil = 1 - (ne - 500) / 3500;
    if (sil > 0.01) {
      ctx.globalAlpha = Math.min(1, sil);
      ctx.fillStyle = '#000';
      ctx.fillRect(-14, -3, 28, 7);
      ctx.fillRect(-4, -5, 8, 11);
      ctx.fillRect(-1, -7, 2, 2);
      ctx.fillRect(-18, -1, 7, 3);
      ctx.fillRect(11, -1, 7, 3);
      const pSpin = Math.abs(Math.sin(propPhase));
      ctx.fillRect(-18 - pSpin * 6, -4, pSpin * 12, 2);
      ctx.fillRect(14 - pSpin * 6, -4, pSpin * 12, 2);
      ctx.fillRect(-10, 5, 2, 4); ctx.fillRect(8, 5, 2, 4);
      ctx.fillRect(-12, 8, 8, 2); ctx.fillRect(4, 8, 8, 2);
    }
  }
  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    const t = p.life / p.maxLife;
    ctx.globalAlpha = t * 0.75;
    const sat = p.sat || 90, lum = p.lum || 55;
    ctx.fillStyle = `hsl(${p.hue}, ${sat}%, ${lum + (1 - t) * 20}%)`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * t, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawVignette() {
  const g = ctx.createRadialGradient(W / 2, H / 2, H * 0.35, W / 2, H / 2, H * 0.75);
  g.addColorStop(0, 'rgba(0,0,0,0)'); g.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
}

function drawFlash() {
  if (flashAlpha > 0.01) {
    ctx.globalAlpha = flashAlpha; ctx.fillStyle = '#cc1100';
    ctx.fillRect(0, 0, W, H); ctx.globalAlpha = 1;
  }
}

function drawYouDied() {
  if (youDiedAlpha < 0.01) return;

  // Shadow band
  const bandH = 80, bandY = H / 2 - bandH / 2;
  const g = ctx.createLinearGradient(0, bandY - 20, 0, bandY + bandH + 20);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(0.15, `rgba(0,0,0,${youDiedAlpha * 0.6})`);
  g.addColorStop(0.5, `rgba(0,0,0,${youDiedAlpha * 0.75})`);
  g.addColorStop(0.85, `rgba(0,0,0,${youDiedAlpha * 0.6})`);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0, bandY - 20, W, bandH + 40);

  ctx.globalAlpha = youDiedAlpha;
  ctx.font = '700 48px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = '#cc220088'; ctx.shadowBlur = 40;
  ctx.fillStyle = '#bb2200'; ctx.fillText('YOU DIED', W / 2, H / 2);
  ctx.shadowBlur = 20; ctx.fillStyle = '#cc2200'; ctx.fillText('YOU DIED', W / 2, H / 2);
  ctx.shadowBlur = 0; ctx.shadowColor = 'transparent'; ctx.globalAlpha = 1;
}

// --- Effect triggers ---
function triggerDeath() {
  flashAlpha = 0.5;
  screenShake = 8;
  spawnExplosionAt(drone.x, drone.y);
  youDiedState = 'wait';
  youDiedTimer = 0;
}

function triggerFlash() {
  flashAlpha = 0.6;
  screenShake = 6;
}

function triggerYouDied() {
  youDiedState = 'fadein';
  youDiedTimer = 0;
  youDiedAlpha = 0;
}

function triggerExplosion() {
  spawnExplosionAt(drone.x, drone.y);
  screenShake = 4;
}

function triggerThrust() {
  for (let i = 0; i < 6; i++) {
    particles.push({
      x: drone.x + (Math.random() - 0.5) * 8,
      y: drone.y + 8 + Math.random() * 4,
      vx: (Math.random() - 0.5) * 1.2,
      vy: Math.random() * 2.5 + 0.5,
      life: 14 + Math.random() * 8, maxLife: 22,
      r: Math.random() * 2 + 0.6,
      hue: 190 + Math.random() * 25, sat: 100, lum: 60 + Math.random() * 15
    });
  }
}

function spawnSignBuilding(text, color) {
  const bw = 56;
  // Place a bottom building in the center area
  const bx = W / 2 - bw / 2 + (Math.random() - 0.5) * 200;
  const bh = 120 + Math.random() * 100;
  const topY = H - GROUND_H - bh;
  testBuildings.push({
    x: bx, w: bw, topY, height: bh, fromTop: false,
    signText: text, signColor: color,
    signType: 'roof',
    seed: ((testBuildings.length * 2654435761) >>> 0)
  });
  // Keep max 6 buildings
  if (testBuildings.length > 6) testBuildings.shift();
}

function triggerFirework() {
  const fx = 100 + Math.random() * (W - 200);
  const sizeRoll = Math.random();
  const size = sizeRoll < 0.25 ? 2 : sizeRoll < 0.55 ? 1 : 0; // more large in tester
  fireworks.push({
    x: fx, y: H - GROUND_H,
    vy: -(2.5 + Math.random() * 2.5),
    hue: Math.random() * 360,
    targetY: 40 + Math.random() * 250,
    trail: [], exploded: false, size
  });
}

function triggerCountdown() {
  countdownActive = true;
  countdownStart = performance.now();
}

let nukeGx = W / 2, nukeGy = H - GROUND_H - 5;

function triggerNuke() {
  nukeActive = true;
  nukeStart = performance.now();
  screenShake = 50;
  nukeGx = W / 2 + (Math.random() - 0.5) * 80;
  nukeGy = H - GROUND_H;

  // Debris flies all over screen
  for (let i = 0; i < 60; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = Math.random() * 6 + 2;
    particles.push({
      x: nukeGx + (Math.random() - 0.5) * 40,
      y: nukeGy - Math.random() * 40,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd,
      life: 50 + Math.random() * 40, maxLife: 90,
      r: Math.random() * 4 + 2,
      hue: 15 + Math.random() * 35, sat: 100, lum: 50
    });
  }
  // Delayed ember shower
  setTimeout(() => {
    for (let i = 0; i < 40; i++) {
      particles.push({
        x: nukeGx + (Math.random() - 0.5) * 120,
        y: nukeGy - 100 - Math.random() * 200,
        vx: (Math.random() - 0.5) * 2, vy: Math.random() * 2 + 0.5,
        life: 50 + Math.random() * 40, maxLife: 90,
        r: Math.random() * 3 + 1,
        hue: 10 + Math.random() * 30, sat: 100, lum: 55
      });
    }
    screenShake = 8;
  }, 600);
}

// Nuke cloud (behind city) + overlay (on top) split into two draw calls
function drawNukeCloud() {
  if (!nukeActive) return;
  const elapsed = performance.now() - nukeStart;
  const totalMs = 11000;
  const t = Math.min(1, elapsed / totalMs);
  const gx = nukeGx, gy = nukeGy;

  // --- Shockwave ring (200ms - 2000ms) ---
  if (elapsed > 200 && elapsed < 2000) {
    const st = (elapsed - 200) / 1800;
    const radius = st * Math.max(W, H) * 0.8;
    ctx.globalAlpha = (1 - st) * 0.3;
    ctx.strokeStyle = 'rgba(255, 200, 100, 0.6)';
    ctx.lineWidth = 3 + (1 - st) * 8;
    ctx.beginPath();
    ctx.arc(gx, gy, radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // --- Fireball + Mushroom cloud (100ms - 5500ms) ---
  if (elapsed > 100) {
    const cloudT = Math.min(1, (elapsed - 100) / 3000);
    const fadeT = elapsed > 9000 ? Math.min(1, (elapsed - 9000) / 2000) : 0;
    const darkT = elapsed > 3000 ? Math.min(1, (elapsed - 3000) / 3500) : 0;
    const alpha = (1 - fadeT) * 0.85;

    if (alpha > 0.01) {
      const hShift = darkT * 15;
      const lDrop = darkT * 30;
      ctx.globalAlpha = alpha;

      // Rise: fast initial rise + slow continuous drift upward
      const riseEase = 1 - Math.pow(1 - Math.min(1, cloudT * 1.5), 3);
      const slowDrift = Math.min(1, elapsed / totalMs) * H * 0.07;
      const cloudCenterY = gy - riseEase * (H * 0.45) - slowDrift;
      const stemBaseY = gy;

      // Mushroom cap size (grows then stabilizes)
      const capGrow = Math.min(1, cloudT * 2);
      const capR = 40 + capGrow * 55;
      const capRx = capR * 1.4; // wider than tall

      // Stem width (narrower at top, wider at base)
      const stemTopW = 18 + capGrow * 12;
      const stemBaseW = 30 + capGrow * 25;

      // Intense base glow — hot at ground, rapid taper
      const baseGlowR = capRx * 1.8;
      const baseGlowAlpha = alpha * Math.max(0, 1 - darkT * 0.7);
      const baseGlow = ctx.createRadialGradient(gx, stemBaseY, 0, gx, stemBaseY, baseGlowR);
      baseGlow.addColorStop(0, `hsla(35, 100%, 70%, ${baseGlowAlpha * 0.7})`);
      baseGlow.addColorStop(0.15, `hsla(28, 100%, 50%, ${baseGlowAlpha * 0.35})`);
      baseGlow.addColorStop(0.4, `hsla(20, 100%, 30%, ${baseGlowAlpha * 0.08})`);
      baseGlow.addColorStop(1, 'hsla(15, 100%, 20%, 0)');
      ctx.fillStyle = baseGlow;
      ctx.beginPath();
      ctx.arc(gx, stemBaseY, baseGlowR, 0, Math.PI * 2);
      ctx.fill();

      // --- Draw stem ---
      const stemGrad = ctx.createLinearGradient(gx, cloudCenterY + capR * 0.3, gx, stemBaseY);
      stemGrad.addColorStop(0, `hsla(${25 - hShift}, 90%, ${Math.max(10, 45 - lDrop)}%, ${alpha})`);
      stemGrad.addColorStop(0.4, `hsla(${20 - hShift}, 85%, ${Math.max(8, 35 - lDrop)}%, ${alpha})`);
      stemGrad.addColorStop(1, `hsla(${15 - hShift}, 70%, ${Math.max(5, 25 - lDrop)}%, ${alpha})`);
      ctx.fillStyle = stemGrad;
      ctx.beginPath();
      ctx.moveTo(gx - stemTopW / 2, cloudCenterY + capR * 0.3);
      ctx.quadraticCurveTo(gx - stemTopW * 0.6, (cloudCenterY + stemBaseY) / 2, gx - stemBaseW / 2, stemBaseY);
      ctx.lineTo(gx + stemBaseW / 2, stemBaseY);
      ctx.quadraticCurveTo(gx + stemTopW * 0.6, (cloudCenterY + stemBaseY) / 2, gx + stemTopW / 2, cloudCenterY + capR * 0.3);
      ctx.closePath();
      ctx.fill();

      // Outer glow (soft radial — no hard clip)
      const glowRadius = capRx * 2.5;
      const glowGrad = ctx.createRadialGradient(gx, cloudCenterY, capR * 0.2, gx, cloudCenterY, glowRadius);
      glowGrad.addColorStop(0, `hsla(30, 100%, ${Math.max(15, 60 - lDrop * 2)}%, ${alpha * 0.35})`);
      glowGrad.addColorStop(0.4, `hsla(25, 100%, ${Math.max(10, 45 - lDrop * 2)}%, ${alpha * 0.15})`);
      glowGrad.addColorStop(1, 'hsla(15, 100%, 30%, 0)');
      ctx.fillStyle = glowGrad;
      ctx.beginPath();
      ctx.arc(gx, cloudCenterY, glowRadius, 0, Math.PI * 2);
      ctx.fill();

      // Dark outer cap
      ctx.fillStyle = `hsla(${12 - hShift}, 60%, ${Math.max(5, 22 - lDrop)}%, ${alpha})`;
      ctx.beginPath();
      ctx.ellipse(gx, cloudCenterY, capRx * 1.1, capR * 0.95, 0, 0, Math.PI * 2);
      ctx.fill();

      // Mid cap
      ctx.fillStyle = `hsla(${18 - hShift}, 80%, ${Math.max(8, 32 - lDrop)}%, ${alpha})`;
      ctx.beginPath();
      ctx.ellipse(gx, cloudCenterY - capR * 0.05, capRx * 0.9, capR * 0.8, 0, 0, Math.PI * 2);
      ctx.fill();

      // Inner cap
      ctx.fillStyle = `hsla(${25 - hShift}, 90%, ${Math.max(10, 42 - lDrop)}%, ${alpha})`;
      ctx.beginPath();
      ctx.ellipse(gx, cloudCenterY - capR * 0.08, capRx * 0.65, capR * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();

      // Hot core -- last to darken
      const coreDarkDelay = elapsed > 5500 ? Math.min(1, (elapsed - 5500) / 2500) : 0;
      const coreAlpha = alpha * Math.max(0.1, 1 - coreDarkDelay);
      ctx.fillStyle = `hsla(40, 100%, ${Math.max(20, 70 - lDrop * 2)}%, ${coreAlpha})`;
      ctx.beginPath();
      ctx.ellipse(gx, cloudCenterY - capR * 0.1, capRx * 0.35, capR * 0.35, 0, 0, Math.PI * 2);
      ctx.fill();

      // White-hot center flash (early only)
      if (cloudT < 0.4) {
        const whiteAlpha = (1 - cloudT / 0.4) * alpha;
        ctx.fillStyle = `rgba(255, 255, 220, ${whiteAlpha})`;
        ctx.beginPath();
        ctx.ellipse(gx, cloudCenterY, capRx * 0.2, capR * 0.2, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Base ring
      ctx.fillStyle = `hsla(${15 - hShift}, 70%, ${Math.max(5, 28 - lDrop)}%, ${alpha * 0.7})`;
      ctx.beginPath();
      ctx.ellipse(gx, cloudCenterY + capR * 0.5, capRx * 1.15, capR * 0.25, 0, 0, Math.PI * 2);
      ctx.fill();

      // Concentric cloud bands — narrowest at top, widening downward, cloud-like
      {
        const now = elapsed / 1000;
        for (let i = 0; i < 3; i++) {
          const entryT = 0.15 + i * 0.15;
          if (cloudT < entryT) continue;
          const bandAge = Math.min(1, (cloudT - entryT) / 0.35);
          const t01 = i / 2; // 0 = top (narrowest), 1 = bottom (widest)
          const finalY = cloudCenterY - capR * (0.55 - t01 * 1.0) - 35;
          const startY = cloudCenterY + capR * 0.5;
          const bandY = startY + (finalY - startY) * bandAge
            + Math.sin(now * (0.4 + i * 0.25) + i * 2.3) * capR * 0.03;
          const widthAtY = capRx * (0.6 + t01 * 0.8) * bandAge;
          const fade = (0.7 + t01 * 0.3) * bandAge;
          const pulse = 0.3 + 0.1 * Math.sin(now * (1.2 + i * 0.4) + i * 1.7);
          const bandAlpha = alpha * pulse * fade;
          const bandL = Math.max(10, (44 - i * 4) - lDrop);
          const bandH = 24 - hShift + i * 3;
          const sag1 = capR * 0.05 * Math.sin(now * (0.6 + i * 0.3) + i);
          const sag2 = capR * 0.04 * Math.sin(now * (0.5 + i * 0.2) + i + 1.5);
          ctx.strokeStyle = `hsla(${bandH}, 75%, ${bandL}%, ${bandAlpha})`;
          ctx.lineWidth = (4 + t01 * 2) * bandAge;
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(gx - widthAtY, bandY);
          ctx.quadraticCurveTo(gx - widthAtY * 0.35, bandY + sag1, gx, bandY + sag2);
          ctx.quadraticCurveTo(gx + widthAtY * 0.35, bandY - sag1, gx + widthAtY, bandY);
          ctx.stroke();
        }
      }

      ctx.globalAlpha = 1;
    }
  }

  // Shake (runs in cloud pass)
  if (elapsed < 800) {
    screenShake = Math.max(screenShake, 50 * (1 - elapsed / 1200));
  } else if (elapsed < 3000) {
    screenShake = Math.max(screenShake * 0.94, 0);
  }


  if (elapsed > totalMs) nukeActive = false;
}

// Nuke overlay: flash + radiant light from mushroom
function drawNukeOverlay() {
  if (!nukeActive) return;
  const elapsed = performance.now() - nukeStart;
  const cloudT = Math.min(1, Math.max(0, elapsed - 100) / 3000);
  const riseEase = 1 - Math.pow(1 - Math.min(1, cloudT * 1.5), 3);
  const cloudCenterY = nukeGy - riseEase * (H * 0.45);

  // Blinding white flash (0-300ms)
  if (elapsed < 300) {
    const ft = elapsed / 300;
    ctx.globalAlpha = (1 - ft * ft) * 0.95;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  // Warm radiant glow emanating from mushroom position (0-5s)
  if (elapsed < 7000) {
    const lt = elapsed / 7000;
    const intensity = (1 - lt * lt) * 0.45;
    const rad = Math.max(W, H) * 1.2;
    const radGrad = ctx.createRadialGradient(nukeGx, cloudCenterY, 0, nukeGx, cloudCenterY, rad);
    radGrad.addColorStop(0, `hsla(35, 100%, 65%, ${intensity})`);
    radGrad.addColorStop(0.3, `hsla(25, 100%, 45%, ${intensity * 0.5})`);
    radGrad.addColorStop(0.7, `hsla(20, 90%, 25%, ${intensity * 0.15})`);
    radGrad.addColorStop(1, 'hsla(15, 80%, 15%, 0)');
    ctx.fillStyle = radGrad;
    ctx.fillRect(0, 0, W, H);
  }

}

function spawnPickup(typeId) {
  const type = PICKUP_TYPES.find(t => t.id === typeId) || PICKUP_TYPES[0];
  const px = W * 0.3 + Math.random() * W * 0.4;
  const py = H * 0.2 + Math.random() * H * 0.35;
  pickups.push({ type, x: px, y: py, r: 14, born: globalTick });
  if (pickups.length > 4) pickups.shift();
}

function drawPickups() {
  pickups.forEach(p => {
    const age = globalTick - p.born;
    // Float bob
    const bobY = p.y + Math.sin(age * 0.03) * 6;
    p.type.draw(p.x, bobY, p.r, globalTick);
  });
}

function toggleMotion() {
  motionEnabled = !motionEnabled;

}

function spawnExplosionAt(x, y) {

      x: x + (Math.random() - 0.5) * 6, y: y + (Math.random() - 0.5) * 6,

    });

// --- Fireworks ---
function updateFireworks() {
  fireworks.forEach(fw => {
    if (!fw.exploded) {
      fw.y += fw.vy;
      fw.trail.push({ x: fw.x + (Math.random() - 0.5) * 2, y: fw.y });
      if (fw.trail.length > 12) fw.trail.shift();
      if (fw.y <= fw.targetY) {
        fw.exploded = true;
        const burstHues = [fw.hue, (fw.hue + 40) % 360, (fw.hue + 80) % 360, (fw.hue + 120) % 360];
        const count = [18, 32, 55][fw.size || 0];
        const spdMul = [1, 1.4, 2.2][fw.size || 0];
        const rMul = [1, 1.5, 2.5][fw.size || 0];
        const lifeMul = [1, 1.3, 1.8][fw.size || 0];
        for (let i = 0; i < count; i++) {
          const a = (Math.PI * 2 / count) * i + Math.random() * 0.4;
          const spd = (Math.random() * 3 + 1) * spdMul;
          particles.push({
            x: fw.x, y: fw.y,
            vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 0.5,
            life: (25 + Math.random() * 20) * lifeMul, maxLife: 45 * lifeMul,
            r: (Math.random() * 3 + 1.5) * rMul,
            hue: burstHues[i % burstHues.length], sat: 100, lum: 60
          });
        }
      }
    }
  });
  fireworks = fireworks.filter(fw => !fw.exploded);
}

function drawFireworks() {
  fireworks.forEach(fw => {
    if (fw.exploded) return;
    fw.trail.forEach((pt, i) => {
      ctx.globalAlpha = (i / fw.trail.length) * 0.6;
      ctx.fillStyle = `hsl(${fw.hue}, 80%, 70%)`;
      ctx.fillRect(pt.x, pt.y, 2, 2);
    });
    ctx.globalAlpha = 1;
    ctx.fillStyle = `hsl(${fw.hue}, 90%, 85%)`;
    ctx.fillRect(fw.x - 1, fw.y - 1, 3, 3);
  });
  ctx.globalAlpha = 1;
}

// --- Countdown overlay ---
function drawCountdown() {
  if (!countdownActive) return;
  const elapsed = performance.now() - countdownStart;
  const t = Math.min(1, elapsed / 4000);
  const textY = H / 2 - 70;

  // Drone outline blink
  const blinkHz = 15 - t * t * t * 13;
  const blinkOn = Math.sin(elapsed * blinkHz * 0.00628) > 0;
  if (blinkOn || t > 0.9) {
    ctx.save(); ctx.translate(drone.x, drone.y); ctx.rotate(drone.angle);
    const a = t > 0.9 ? Math.max(0, 1 - (t - 0.9) / 0.1) : 0.85;
    ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 1; ctx.globalAlpha = a;
    ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.moveTo(-15, -5); ctx.lineTo(-4, -5); ctx.lineTo(-4, -8);
    ctx.lineTo(4, -8); ctx.lineTo(4, -5); ctx.lineTo(15, -5);
    ctx.lineTo(19, -2); ctx.lineTo(19, 3); ctx.lineTo(15, 3);
    ctx.lineTo(10, 5); ctx.lineTo(10, 9); ctx.lineTo(-10, 9);
    ctx.lineTo(-10, 5); ctx.lineTo(-15, 3); ctx.lineTo(-19, 3);
    ctx.lineTo(-19, -2); ctx.closePath(); ctx.stroke();
    ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
    ctx.globalAlpha = 1; ctx.restore();
  }

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  if (t < 0.38) {
    const phase = t / 0.38;
    let alpha, ox;
    if (phase < 0.15) { const p = phase / 0.15; alpha = p * 0.8; ox = (1 - p) * -40; }
    else if (phase > 0.85) { const p = (phase - 0.85) / 0.15; alpha = (1 - p) * 0.8; ox = p * 40; }
    else { alpha = 0.8; ox = 0; }
    ctx.globalAlpha = alpha; ctx.font = '700 22px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#667'; ctx.fillText('Ready?', W / 2 + ox, textY);
  } else if (t < 0.75) {
    const phase = (t - 0.38) / 0.37;
    let alpha, ox;
    if (phase < 0.12) { const p = phase / 0.12; alpha = p * 0.85; ox = (1 - p) * -35; }
    else if (phase > 0.88) { const p = (phase - 0.88) / 0.12; alpha = (1 - p) * 0.85; ox = p * 35; }
    else { alpha = 0.85; ox = 0; }
    ctx.globalAlpha = alpha; ctx.font = '700 22px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#778'; ctx.fillText('Set.', W / 2 + ox, textY);
  } else {
    const phase = (t - 0.75) / 0.25;
    const smackT = Math.min(1, phase / 0.15);
    const scaleOvershoot = smackT < 1 ? 1 + (1 - smackT) * 0.2 : 1;
    ctx.save(); ctx.translate(W / 2, textY); ctx.scale(scaleOvershoot, scaleOvershoot);
    ctx.globalAlpha = Math.min(1, smackT * 1.5);
    ctx.font = '700 36px "Courier New", monospace'; ctx.fillStyle = '#00d4ff';
    ctx.shadowColor = '#00d4ffaa'; ctx.shadowBlur = 30;
    ctx.fillText('DRONE!', 0, 0); ctx.shadowBlur = 12; ctx.fillText('DRONE!', 0, 0);
    ctx.shadowBlur = 0; ctx.shadowColor = 'transparent'; ctx.restore();
  }
  ctx.globalAlpha = 1;
  if (t >= 1) countdownActive = false;
}

// --- Update ---
function update() {
  globalTick++;
  drone.propPhase += 0.5;
  drone.y = H / 2 - 40 + Math.sin(globalTick * 0.025) * 14;
  drone.angle = Math.sin(globalTick * 0.018) * 0.04;

  flashAlpha *= 0.92;
  if (screenShake > 0.3) screenShake *= 0.85;

  // YOU DIED state machine
  if (youDiedState === 'wait') {
    youDiedTimer++;
    if (youDiedTimer > 18) { youDiedState = 'fadein'; youDiedTimer = 0; }
  } else if (youDiedState === 'fadein') {
    youDiedTimer++;
    youDiedAlpha = Math.pow(youDiedTimer / 120, 2);
    if (youDiedTimer >= 120) { youDiedState = 'hold'; youDiedTimer = 0; youDiedAlpha = 1; }
  } else if (youDiedState === 'hold') {
    youDiedTimer++;
    if (youDiedTimer >= 70) { youDiedState = 'fadeout'; youDiedTimer = 0; }
  } else if (youDiedState === 'fadeout') {
    youDiedTimer++;
    youDiedAlpha = 1 - youDiedTimer / 60;
    if (youDiedTimer >= 60) { youDiedState = 'off'; youDiedAlpha = 0; }
  }

  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vx *= 0.98; p.vy *= 0.98; p.vy += 0.02; p.life--; });
  particles = particles.filter(p => p.life > 0);
}

// --- Render ---
function render() {
  const shaking = screenShake > 0.3;
  const sx = shaking ? (Math.random() - 0.5) * screenShake : 0;
  const sy = shaking ? (Math.random() - 0.5) * screenShake : 0;

  ctx.save(); ctx.translate(sx, sy);

  drawSky();
  drawMoon();
  drawStars();
  drawNukeCloud();
  drawFarCity();
  drawGround();

  testBuildings.forEach(b => drawBuilding(b));
  drawPickups();
  drawFireworks();
  drawParticles();
  drawDrone();
  drawVignette();
  drawCountdown();
  drawFlash();
  drawYouDied();
  drawNukeOverlay();

  ctx.restore();

  updateFireworks();
  update();
  requestAnimationFrame(render);
}

render();
</script>
</body>
