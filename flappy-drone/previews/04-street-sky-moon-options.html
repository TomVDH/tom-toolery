<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a18; color: #e0e0e0; font-family: 'SF Mono', 'Menlo', monospace; padding: 20px; }
  h1 { color: #fff; font-size: 22px; margin-bottom: 6px; }
  .subtitle { color: #888; font-size: 13px; margin-bottom: 30px; }
  .section { margin-bottom: 40px; }
  .section h2 { color: #aaa; font-size: 15px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; border-bottom: 1px solid #222; padding-bottom: 6px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
  .card { background: #111122; border: 1px solid #222; border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color 0.2s; }
  .card:hover { border-color: #00c8f0; }
  .card.selected { border-color: #00c8f0; box-shadow: 0 0 12px rgba(0,200,240,0.3); }
  .card canvas { display: block; width: 100%; }
  .card .label { padding: 12px; }
  .card .label h3 { font-size: 14px; color: #fff; margin-bottom: 4px; }
  .card .label p { font-size: 12px; color: #777; line-height: 1.5; }
</style>
</head>
<body>

<h1>Street & Sky Design Options</h1>
<p class="subtitle">Click to select. These render at actual game scale (620px wide).</p>

<div class="section">
  <h2>Street / Ground Design</h2>
  <div class="grid" id="streets"></div>
</div>

<div class="section">
  <h2>Cloud Styles</h2>
  <div class="grid" id="clouds"></div>
</div>

<div class="section">
  <h2>Moon Variations</h2>
  <div class="grid" id="moons"></div>
</div>

<script>
const GROUND_H = 36;
const W = 620;

// ========== STREET DESIGNS ==========
const streetDesigns = [
  {
    name: 'A: Static Lamp Posts',
    desc: 'Lamp posts fixed to screen edges (don\'t scroll). Warm pools of light on the road. Clean, no jitter.',
    draw(ctx, H, tick) {
      const gy = H - GROUND_H;
      // Road
      ctx.fillStyle = '#0c0c1a';
      ctx.fillRect(0, gy, W, GROUND_H);
      ctx.fillStyle = '#181830';
      ctx.fillRect(0, gy, W, 2);
      // Scrolling lane stripes
      const off = (tick * 1.6) % 24;
      ctx.fillStyle = '#1a1a35';
      for (let x = -off; x < W; x += 24) ctx.fillRect(x, gy + GROUND_H/2 - 1, 12, 2);
      // Static lamp posts at fixed screen positions
      const lampPositions = [80, 230, 390, 540];
      lampPositions.forEach(lx => {
        // Pole
        ctx.fillStyle = '#1e1e30';
        ctx.fillRect(lx - 1, gy - 14, 2, 14);
        // Lamp arm
        ctx.fillStyle = '#1e1e30';
        ctx.fillRect(lx, gy - 14, 6, 1);
        // Bulb glow
        const glow = ctx.createRadialGradient(lx + 5, gy - 13, 0, lx + 5, gy - 13, 20);
        glow.addColorStop(0, 'rgba(255, 210, 120, 0.15)');
        glow.addColorStop(0.5, 'rgba(255, 190, 80, 0.05)');
        glow.addColorStop(1, 'rgba(255, 180, 60, 0)');
        ctx.fillStyle = glow;
        ctx.fillRect(lx - 15, gy - 33, 40, 40);
        // Bulb
        ctx.fillStyle = 'rgba(255, 220, 140, 0.5)';
        ctx.fillRect(lx + 4, gy - 14, 3, 2);
        // Light pool on road
        const pool = ctx.createRadialGradient(lx + 5, gy + 4, 0, lx + 5, gy + GROUND_H * 0.6, 22);
        pool.addColorStop(0, 'rgba(255, 200, 100, 0.06)');
        pool.addColorStop(1, 'rgba(255, 200, 100, 0)');
        ctx.fillStyle = pool;
        ctx.fillRect(lx - 20, gy, 50, GROUND_H);
      });
      // Kerb line
      ctx.fillStyle = '#222240';
      ctx.fillRect(0, gy + 2, W, 1);
    }
  },
  {
    name: 'B: Embedded Road Lights',
    desc: 'Flush ground-level lights embedded in the kerb. No poles, just warm dots with subtle glow halos. Minimal.',
    draw(ctx, H, tick) {
      const gy = H - GROUND_H;
      ctx.fillStyle = '#0c0c1a';
      ctx.fillRect(0, gy, W, GROUND_H);
      ctx.fillStyle = '#181830';
      ctx.fillRect(0, gy, W, 2);
      const off = (tick * 1.6) % 24;
      ctx.fillStyle = '#1a1a35';
      for (let x = -off; x < W; x += 24) ctx.fillRect(x, gy + GROUND_H/2 - 1, 12, 2);
      // Embedded lights along kerb — scroll with road
      const lightOff = (tick * 1.6) % 40;
      for (let x = -lightOff; x < W + 40; x += 40) {
        // Warm dot
        ctx.fillStyle = 'rgba(255, 210, 120, 0.35)';
        ctx.fillRect(x, gy + 3, 2, 2);
        // Subtle glow
        const g = ctx.createRadialGradient(x + 1, gy + 4, 0, x + 1, gy + 4, 10);
        g.addColorStop(0, 'rgba(255, 200, 100, 0.08)');
        g.addColorStop(1, 'rgba(255, 200, 100, 0)');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(x + 1, gy + 4, 10, 0, Math.PI * 2); ctx.fill();
      }
    }
  },
  {
    name: 'C: Sidewalk + Drain Grates',
    desc: 'Two-tone: darker road below, slightly lighter sidewalk strip on top. Drain grates scroll by. No lights.',
    draw(ctx, H, tick) {
      const gy = H - GROUND_H;
      const sidewalkH = 8;
      // Sidewalk (lighter)
      ctx.fillStyle = '#141428';
      ctx.fillRect(0, gy, W, sidewalkH);
      // Kerb edge
      ctx.fillStyle = '#1c1c38';
      ctx.fillRect(0, gy, W, 1);
      ctx.fillStyle = '#181830';
      ctx.fillRect(0, gy + sidewalkH - 1, W, 1);
      // Road (darker)
      ctx.fillStyle = '#0a0a16';
      ctx.fillRect(0, gy + sidewalkH, W, GROUND_H - sidewalkH);
      // Lane stripes
      const off = (tick * 1.6) % 24;
      ctx.fillStyle = '#1a1a35';
      for (let x = -off; x < W; x += 24) ctx.fillRect(x, gy + sidewalkH + (GROUND_H - sidewalkH)/2 - 1, 12, 2);
      // Drain grates on sidewalk
      const drainOff = (tick * 1.6) % 80;
      ctx.fillStyle = '#0e0e1e';
      for (let x = -drainOff + 20; x < W + 80; x += 80) {
        for (let i = 0; i < 3; i++) {
          ctx.fillRect(x + i * 3, gy + 3, 2, 3);
        }
      }
    }
  },
  {
    name: 'D: Lamp Posts + Sidewalk',
    desc: 'Best of both — sidewalk strip with static lamp posts. Light pools on the road. Full urban feel.',
    draw(ctx, H, tick) {
      const gy = H - GROUND_H;
      const sidewalkH = 7;
      // Sidewalk
      ctx.fillStyle = '#121226';
      ctx.fillRect(0, gy, W, sidewalkH);
      ctx.fillStyle = '#1a1a36';
      ctx.fillRect(0, gy, W, 1);
      // Road
      ctx.fillStyle = '#0a0a18';
      ctx.fillRect(0, gy + sidewalkH, W, GROUND_H - sidewalkH);
      // Lane stripes
      const off = (tick * 1.6) % 24;
      ctx.fillStyle = '#1a1a35';
      for (let x = -off; x < W; x += 24) ctx.fillRect(x, gy + sidewalkH + (GROUND_H - sidewalkH)/2, 12, 2);
      // Static lamp posts
      [100, 310, 520].forEach(lx => {
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(lx, gy - 16, 2, 16);
        ctx.fillRect(lx + 1, gy - 16, 7, 1);
        // Bulb
        ctx.fillStyle = 'rgba(255, 215, 130, 0.55)';
        ctx.fillRect(lx + 6, gy - 16, 2, 2);
        // Glow halo
        const glow = ctx.createRadialGradient(lx + 7, gy - 15, 0, lx + 7, gy - 15, 25);
        glow.addColorStop(0, 'rgba(255, 210, 110, 0.12)');
        glow.addColorStop(0.5, 'rgba(255, 200, 90, 0.04)');
        glow.addColorStop(1, 'rgba(255, 190, 80, 0)');
        ctx.fillStyle = glow;
        ctx.beginPath(); ctx.arc(lx + 7, gy - 15, 25, 0, Math.PI * 2); ctx.fill();
        // Light on road
        const pool = ctx.createRadialGradient(lx + 7, gy + sidewalkH + 2, 0, lx + 7, gy + GROUND_H * 0.7, 28);
        pool.addColorStop(0, 'rgba(255, 200, 100, 0.05)');
        pool.addColorStop(1, 'rgba(255, 200, 100, 0)');
        ctx.fillStyle = pool;
        ctx.fillRect(lx - 25, gy + sidewalkH, 65, GROUND_H - sidewalkH);
      });
    }
  }
];

// ========== CLOUD STYLES ==========
const cloudStyles = [
  {
    name: 'A: Thin Wisps',
    desc: 'Barely-there horizontal streaks. Like mist dissolving in the night.',
    clouds: Array.from({length: 5}, (_, i) => ({
      x: i * 130 + Math.random() * 40, y: 40 + i * 35, w: 100 + Math.random() * 60, opacity: 0.015 + Math.random() * 0.01
    })),
    draw(ctx, tick) {
      this.clouds.forEach(c => {
        const cx = ((c.x - tick * 0.01) % (W + c.w * 2)) + c.w;
        ctx.globalAlpha = c.opacity;
        ctx.fillStyle = '#b0b8d0';
        ctx.beginPath();
        ctx.ellipse(cx, c.y, c.w / 2, c.w * 0.03, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      });
    }
  },
  {
    name: 'B: Soft Puffs',
    desc: 'Slightly more defined cloud shapes. Still very transparent. 3-4 in the sky.',
    clouds: Array.from({length: 4}, (_, i) => ({
      x: 50 + i * 160, y: 50 + (i % 2) * 60 + Math.random() * 30, w: 70 + Math.random() * 50, opacity: 0.02 + Math.random() * 0.015
    })),
    draw(ctx, tick) {
      this.clouds.forEach(c => {
        const cx = ((c.x - tick * 0.015) % (W + c.w * 2)) + c.w;
        const hw = c.w / 2, hh = c.w * 0.12;
        ctx.globalAlpha = c.opacity;
        ctx.fillStyle = '#c0c8e0';
        // Main body
        ctx.beginPath(); ctx.ellipse(cx, c.y, hw, hh, 0, 0, Math.PI * 2); ctx.fill();
        // Puff left
        ctx.globalAlpha = c.opacity * 0.6;
        ctx.beginPath(); ctx.ellipse(cx - hw * 0.4, c.y + hh * 0.2, hw * 0.4, hh * 0.7, 0, 0, Math.PI * 2); ctx.fill();
        // Puff right
        ctx.beginPath(); ctx.ellipse(cx + hw * 0.35, c.y - hh * 0.1, hw * 0.45, hh * 0.65, 0, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
      });
    }
  },
  {
    name: 'C: No Clouds',
    desc: 'Clean night sky. Stars only. Sometimes less is more.',
    clouds: [],
    draw() {}
  }
];

// ========== MOON VARIATIONS ==========
const moonStyles = [
  {
    name: 'A: Current (Craters)',
    desc: 'Crescent with crater texture and warm halo glow.',
    draw(ctx) {
      const mx = 150, my = 60, r = 28;
      // Halo
      const glow = ctx.createRadialGradient(mx, my, r * 0.6, mx, my, r * 3);
      glow.addColorStop(0, 'rgba(220, 215, 200, 0.14)');
      glow.addColorStop(0.4, 'rgba(210, 210, 230, 0.06)');
      glow.addColorStop(1, 'rgba(200, 210, 240, 0)');
      ctx.fillStyle = glow;
      ctx.fillRect(mx - r * 3, my - r * 3, r * 6, r * 6);
      // Moon
      ctx.save();
      ctx.beginPath(); ctx.arc(mx, my, r, 0, Math.PI * 2);
      ctx.fillStyle = '#c8cde8'; ctx.globalAlpha = 0.9; ctx.fill();
      // Craters
      ctx.globalCompositeOperation = 'source-atop';
      ctx.globalAlpha = 0.12; ctx.fillStyle = '#8088a8';
      ctx.beginPath(); ctx.ellipse(mx - 10, my - 8, 5, 4, 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 0.09;
      ctx.beginPath(); ctx.ellipse(mx - 6, my + 5, 4, 3, -0.2, 0, Math.PI * 2); ctx.fill();
      // Crescent cut
      ctx.globalCompositeOperation = 'destination-out';
      ctx.globalAlpha = 1;
      ctx.beginPath(); ctx.arc(mx + 14, my - 6, r * 0.88, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
      ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
    }
  },
  {
    name: 'B: Ethereal Glow',
    desc: 'Larger, softer glow. Moon itself is smaller, more like a bright point with atmosphere.',
    draw(ctx) {
      const mx = 150, my = 60, r = 20;
      // Large atmospheric glow
      const glow = ctx.createRadialGradient(mx, my, r * 0.3, mx, my, r * 5);
      glow.addColorStop(0, 'rgba(230, 225, 210, 0.18)');
      glow.addColorStop(0.2, 'rgba(210, 215, 230, 0.08)');
      glow.addColorStop(0.5, 'rgba(180, 190, 220, 0.03)');
      glow.addColorStop(1, 'rgba(180, 190, 220, 0)');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(mx, my, r * 5, 0, Math.PI * 2); ctx.fill();
      // Crisp crescent
      ctx.save();
      ctx.beginPath(); ctx.arc(mx, my, r, 0, Math.PI * 2);
      ctx.fillStyle = '#d5daf0'; ctx.globalAlpha = 0.95; ctx.fill();
      ctx.globalCompositeOperation = 'destination-out';
      ctx.globalAlpha = 1;
      ctx.beginPath(); ctx.arc(mx + 10, my - 4, r * 0.85, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
      ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
    }
  },
  {
    name: 'C: Full Moon (Small)',
    desc: 'Small full moon — no crescent. Subtle surface markings. Classic.',
    draw(ctx) {
      const mx = 150, my = 60, r = 18;
      const glow = ctx.createRadialGradient(mx, my, r * 0.5, mx, my, r * 3.5);
      glow.addColorStop(0, 'rgba(220, 220, 240, 0.1)');
      glow.addColorStop(1, 'rgba(200, 210, 240, 0)');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(mx, my, r * 3.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#bcc2d8';
      ctx.globalAlpha = 0.85;
      ctx.beginPath(); ctx.arc(mx, my, r, 0, Math.PI * 2); ctx.fill();
      // Mare
      ctx.globalAlpha = 0.08; ctx.fillStyle = '#6670a0';
      ctx.beginPath(); ctx.ellipse(mx - 4, my - 3, 7, 5, 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(mx + 3, my + 4, 5, 4, -0.5, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
];

// ========== RENDER ==========
let tick = 0;
const allCanvases = [];

function createCards(designs, containerId, canvasW, canvasH, drawFn) {
  const grid = document.getElementById(containerId);
  designs.forEach(d => {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => {
      grid.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
    };
    const canvas = document.createElement('canvas');
    canvas.width = canvasW; canvas.height = canvasH;
    card.appendChild(canvas);
    const label = document.createElement('div');
    label.className = 'label';
    label.innerHTML = `<h3>${d.name}</h3><p>${d.desc}</p>`;
    card.appendChild(label);
    grid.appendChild(card);
    allCanvases.push({ canvas, design: d, type: containerId });
  });
}

createCards(streetDesigns, 'streets', 620, 80, null);
createCards(cloudStyles, 'clouds', 320, 140, null);
createCards(moonStyles, 'moons', 300, 130, null);

function renderAll() {
  tick++;
  allCanvases.forEach(({ canvas, design, type }) => {
    const ctx = canvas.getContext('2d');
    const cW = canvas.width, cH = canvas.height;
    ctx.clearRect(0, 0, cW, cH);

    if (type === 'streets') {
      // Sky strip at top
      const g = ctx.createLinearGradient(0, 0, 0, cH);
      g.addColorStop(0, '#0a0a22');
      g.addColorStop(1, '#101030');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, cW, cH);
      // Some silhouette buildings
      ctx.fillStyle = '#0c0c20';
      [30, 80, 140, 210, 270, 340, 400, 460, 510, 570].forEach((bx, i) => {
        const bh = 15 + (i * 7 + 3) % 20;
        ctx.fillRect(bx, cH - GROUND_H - bh, 22 + (i % 3) * 4, bh);
      });
      design.draw(ctx, cH, tick);
    } else if (type === 'clouds') {
      const g = ctx.createLinearGradient(0, 0, 0, cH);
      g.addColorStop(0, '#050510');
      g.addColorStop(0.5, '#0a0a22');
      g.addColorStop(1, '#101030');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, cW, cH);
      // Stars
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      for (let i = 0; i < 10; i++) ctx.fillRect(15 + i * 30 + (i*13%9), 8 + (i*19%40), 1, 1);
      design.draw(ctx, tick);
    } else if (type === 'moons') {
      const g = ctx.createLinearGradient(0, 0, 0, cH);
      g.addColorStop(0, '#050510');
      g.addColorStop(1, '#0a0a22');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, cW, cH);
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      for (let i = 0; i < 8; i++) ctx.fillRect(10 + i * 35 + (i*11%7), 10 + (i*17%35), 1, 1);
      design.draw(ctx);
    }
  });
  requestAnimationFrame(renderAll);
}
renderAll();
</script>
</body>
</html>
