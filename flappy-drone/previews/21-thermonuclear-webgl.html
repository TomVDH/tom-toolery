<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a18; color: #e0e0e0; font-family: 'SF Mono', 'Menlo', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
  h1 { color: #fff; font-size: 20px; margin-bottom: 4px; }
  .sub { color: #888; font-size: 12px; margin-bottom: 16px; }
  canvas { border: 2px solid #1a1a3a; border-radius: 14px; box-shadow: 0 0 120px #ff440018, 0 0 80px #00d4ff08, 0 8px 40px #00000090; cursor: crosshair; }
  .controls { margin-top: 16px; display: flex; gap: 10px; align-items: center; }
  button { background: #151528; border: 1px solid #ff4400; color: #ff8844; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; font-family: inherit; transition: all 0.2s; }
  button:hover { background: #1a0800; box-shadow: 0 0 20px #ff440030; }
  .reset-btn { border-color: #334; color: #aab; }
  .reset-btn:hover { background: #111; box-shadow: none; }
  .timer { color: #666; font-size: 12px; margin-top: 8px; font-variant-numeric: tabular-nums; }
  .badge { font-size: 10px; color: #333; margin-top: 4px; }
</style>
</head>
<body>

<h1>Thermonuclear Blast &mdash; WebGL Edition</h1>
<p class="sub">GLSL volumetric fire, FBM noise cloud, heat distortion, screen shake. Henske + Thieuke.</p>

<canvas id="c" width="620" height="640"></canvas>
<div class="controls">
  <button id="btnNuke">DETONATE</button>
  <button id="btnReset" class="reset-btn">RESET</button>
</div>
<div class="timer" id="timer">Ready</div>
<div class="badge">WebGL 2.0 &mdash; GLSL 300 es</div>

<script>
'use strict';

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: false, alpha: false });
if (!gl) { document.body.innerHTML = '<h1 style="color:#f44">WebGL 2 required</h1>'; throw 'no gl'; }

const W = 620, H = 640;

// --- State ---
let nukeTime = -1.0;
let startMs = 0;
let shakeX = 0, shakeY = 0;

// --- Fullscreen quad ---
const quadBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

// --- Shader helpers ---
function mkShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { console.error('GLSL:', gl.getShaderInfoLog(s)); return null; }
  return s;
}
function mkProg(vSrc, fSrc) {
  const p = gl.createProgram();
  gl.attachShader(p, mkShader(gl.VERTEX_SHADER, vSrc));
  gl.attachShader(p, mkShader(gl.FRAGMENT_SHADER, fSrc));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) { console.error('Link:', gl.getProgramInfoLog(p)); return null; }
  return p;
}

// --- Vertex shader ---
const VS = `#version 300 es
in vec2 a;
out vec2 uv;
void main(){ uv = a*.5+.5; gl_Position = vec4(a,0,1); }`;

// --- Fragment shader: everything in one pass ---
const FS = `#version 300 es
precision highp float;
in vec2 uv;
out vec4 O;

uniform float T;    // global time
uniform float NT;   // nuke time (-1 = off)
uniform vec2 R;     // resolution
uniform vec2 SK;    // shake offset

// ---- noise ----
float h21(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }

float nse(vec2 p){
  vec2 i=floor(p), f=fract(p);
  f=f*f*(3.-2.*f);
  return mix(mix(h21(i),h21(i+vec2(1,0)),f.x),
             mix(h21(i+vec2(0,1)),h21(i+vec2(1,1)),f.x),f.y);
}

float fbm(vec2 p){
  float v=0., a=.5;
  mat2 m=mat2(.8,.6,-.6,.8);
  for(int i=0;i<6;i++){ v+=a*nse(p); p=m*p*2.; a*=.5; }
  return v;
}

float fbm4(vec2 p){
  float v=0., a=.5;
  mat2 m=mat2(.8,.6,-.6,.8);
  for(int i=0;i<4;i++){ v+=a*nse(p); p=m*p*2.; a*=.5; }
  return v;
}

// ---- sky ----
vec3 sky(vec2 u){
  vec3 c = mix(vec3(.02,.02,.07), vec3(.04,.04,.14), u.y);

  // stars
  vec2 sg = floor(u*350.);
  float sv = h21(sg);
  if(sv>.9965){
    float tw = sin(T*2.5+sv*80.)*.3+.7;
    c += vec3(.65,.7,.85) * tw * smoothstep(.35,1.,u.y) * .8;
  }

  // moon
  vec2 mp = vec2(.85,.88);
  float md = length(u-mp);
  c += vec3(.1,.1,.16) * smoothstep(.2,.04,md) * .6;
  float mm = smoothstep(.046,.042,md);
  float cr = smoothstep(.042,.038,length(u-mp-vec2(.022,-.01)));
  mm *= (1.-cr);
  c = mix(c, vec3(.78,.8,.92), mm*.85);

  return c;
}

// ---- atmospheric clouds ----
vec3 clouds(vec2 u, vec3 c){
  float cl = fbm4(vec2(u.x*3.+T*.008, u.y*8.+3.));
  cl = smoothstep(.45,.65,cl) * smoothstep(.5,.85,u.y) * .04;
  c += vec3(.7,.72,.82)*cl;
  return c;
}

// ---- city ----
float cityH(float x, float seed){
  float h = .08*nse(vec2(x*8.,seed)) + .04*nse(vec2(x*16.,seed+5.)) + .02*nse(vec2(x*32.,seed+10.));
  float tall = nse(vec2(floor(x*20.),seed+20.));
  if(tall>.75) h += .06*(tall-.75)*4.;
  return h;
}

vec3 city(vec2 u, vec3 c){
  float gnd = .05;

  // back
  float bh = cityH(u.x+T*.003, 0.);
  if(u.y < gnd+bh+.06) c = mix(c, vec3(.03,.03,.08), smoothstep(gnd+bh+.06,gnd+bh+.02,u.y));

  // front
  float fh = cityH(u.x+T*.006, 50.);
  if(u.y < gnd+fh) c = vec3(.045,.045,.11);

  // rim light
  if(NT>0.){
    float ri = smoothstep(0.,.5,NT)*smoothstep(5.,3.,NT);
    // back rim
    float be = smoothstep(gnd+bh+.065,gnd+bh+.055,u.y)*step(gnd+bh+.02,u.y);
    c += vec3(1.,.6,.2)*be*ri*.45;
    // front rim
    float fe = smoothstep(gnd+fh+.005,gnd+fh-.005,u.y)*step(gnd+fh-.01,u.y);
    c += vec3(1.,.5,.15)*fe*ri*.65;
  }

  // ground
  if(u.y<gnd){
    c = vec3(.035,.035,.07);
    float marks = step(.49,fract((u.x+T*.01)*15.))*step(u.y,gnd-.015);
    c += vec3(.02)*marks;
    // ground glow from nuke
    if(NT>0.){
      float gg = smoothstep(.15,0.,u.y)*smoothstep(0.,.5,NT)*smoothstep(8.,4.,NT);
      c += vec3(.5,.2,.05)*gg*.3;
    }
  }

  return c;
}

// ==== THE MUSHROOM CLOUD ====
vec3 nuke(vec2 u, vec3 c){
  if(NT<0.) return c;
  float t = NT;
  float gnd = .05;

  // timing curves
  float riseT = smoothstep(0.,3.,t);
  float riseE = 1.-pow(1.-min(1.,riseT),3.);
  float fade = smoothstep(11.,8.5,t);
  float dark = smoothstep(3.,7.5,t);

  vec2 ctr = vec2(.5, gnd + riseE*.45 + t*.007);

  // === WHITE FLASH ===
  if(t<.35){
    float fl = 1.-t/.35;
    fl *= fl;
    c = mix(c, vec3(1.,.98,.92), fl*.95);
  }

  // === SHOCKWAVE ===
  if(t>.15 && t<2.2){
    float st = (t-.15)/2.05;
    float sr = st*.9;
    float sd = length(vec2(u.x-ctr.x,(u.y-gnd)*2.));
    float ring = exp(-pow((sd-sr)*25.,2.));
    c += vec3(1.,.82,.45)*ring*(1.-st)*.5;
  }

  // === BASE GROUND GLOW ===
  {
    float gr = .28*smoothstep(0.,1.,t);
    float gd = length(vec2((u.x-.5)*.8, u.y-gnd));
    float gm = exp(-gd/gr*3.)*fade*(1.-dark*.6);
    c += vec3(1.,.5,.1)*gm*.7;
  }

  // === STEM ===
  float stemMask = 0.;
  {
    float stw = .025+riseT*.018;
    float sbw = .045+riseT*.035;
    float stop = ctr.y - .02;
    float sbot = gnd;
    if(u.y>sbot && u.y<stop){
      float st2 = (u.y-sbot)/(stop-sbot);
      float w = mix(sbw,stw,st2);
      float wob = fbm4(vec2(u.y*15.+t*.5,t*.3))*.012;
      float dx = abs(u.x-.5+wob);
      stemMask = smoothstep(w,w*.5,dx)*fade;
    }
  }
  if(stemMask>.01){
    float sn = fbm(vec2(u.x*14.+t*.5, u.y*10.-t*.8));
    float sh = mix(.8,.15,dark);
    vec3 sc = mix(vec3(.95,.5,.12)*sh, vec3(.18,.07,.02), dark*.65+sn*.3);
    // core glow line
    float cl = exp(-abs(u.x-.5)*90.)*(1.-dark)*.6;
    sc += vec3(1.,.85,.35)*cl;
    // internal turbulence
    float turb = fbm(vec2(u.x*25.-t*.8,u.y*20.+t*1.2));
    sc *= .85+turb*.3;
    c = mix(c,sc,stemMask);
  }

  // === MUSHROOM CAP (volumetric FBM) ===
  float capMask = 0.;
  vec3 capCol = vec3(0.);
  {
    float outerR = .065+riseT*.12;
    vec2 cu = (u-ctr)/outerR;
    cu.x *= .6;  // wide and flat

    float d = length(cu);

    // noise-displaced SDF
    float n1 = fbm(u*11.+vec2(t*.35,-t*.25))*.4;
    float n2 = fbm(u*19.-vec2(t*.55,t*.45))*.25;
    float sdf = d - 1. + n1 - n2;

    capMask = smoothstep(.12,-.35,sdf)*fade*smoothstep(0.,.4,t);

    if(capMask>.01){
      float fn = fbm(u*15.+vec2(t*.7,-t*.9));
      float fn2 = fbm(u*24.-vec2(t*1.,t*.4));

      // temperature: hot core -> cool edges
      float temp = smoothstep(1.,.0,d)*(1.-dark*.65);
      temp += fn*.3;
      temp = clamp(temp,0.,1.5);

      // colour ramp
      vec3 hc;
      if(temp>1.){
        hc = mix(vec3(1.,.92,.65), vec3(1.,1.,.95), min(1.,(temp-1.)*2.));
      } else if(temp>.7){
        hc = mix(vec3(1.,.55,.08), vec3(1.,.92,.65), (temp-.7)*3.33);
      } else if(temp>.4){
        hc = mix(vec3(.6,.18,.03), vec3(1.,.55,.08), (temp-.4)*3.33);
      } else if(temp>.15){
        hc = mix(vec3(.2,.06,.02), vec3(.6,.18,.03), (temp-.15)*4.);
      } else {
        hc = mix(vec3(.04,.02,.015), vec3(.2,.06,.02), temp*6.67);
      }

      // internal glow
      float ig = exp(-d*3.5)*(1.-dark)*1.8;
      hc += vec3(1.,.75,.25)*ig;

      // cloud band striations
      float bands = sin((u.y-ctr.y)*65.+fn2*9.+t*1.8)*.5+.5;
      bands = smoothstep(.25,.75,bands);
      hc *= .78+bands*.44;

      // edge turbulence darkening
      float et = fbm(u*32.+t*.8)*smoothstep(.3,.85,d);
      hc = mix(hc,hc*.25,et*.55);

      // rolling internal fire detail
      float roll = fbm(vec2(u.x*40.+t*2.,u.y*30.-t*3.));
      float rollMask = smoothstep(.35,.65,roll)*smoothstep(.8,.3,d)*(1.-dark*.5);
      hc += vec3(.3,.1,.0)*rollMask;

      capCol = hc;
    }
  }
  c = mix(c, capCol, capMask);

  // === BASE RING / SKIRT ===
  {
    float ry = ctr.y - .015;
    float rd = abs(u.y-ry);
    float rw = .14*smoothstep(0.,1.8,t);
    float rxd = abs(u.x-.5);
    float rm = smoothstep(.012,0.,rd)*smoothstep(rw,rw*.4,rxd)*fade*.55;
    vec3 rc = mix(vec3(.65,.28,.06),vec3(.12,.04,.02),dark);
    c = mix(c,rc,rm);
  }

  // === ATMOSPHERIC GLOW (large soft overlay) ===
  if(t>0.&&t<9.){
    float at = smoothstep(0.,1.2,t)*smoothstep(9.,5.5,t);
    float ad = length(u-ctr);
    float am = exp(-ad*2.5)*at;
    c += vec3(.5,.18,.04)*am*.35;
  }

  // === EMBERS / SPARKS (procedural) ===
  if(t>.3 && t<8.){
    float sparkT = smoothstep(.3,.8,t)*smoothstep(8.,5.,t);
    for(int i=0;i<12;i++){
      float fi = float(i);
      float seed = h21(vec2(fi*7.3,fi*13.7+1.));
      float born = .3+seed*1.5;
      if(t<born) continue;
      float age = t-born;
      float life = 2.+seed*3.;
      if(age>life) continue;
      float prog = age/life;

      vec2 sp = vec2(
        .5+(seed-.5)*.15+sin(age*2.+fi)*.02,
        gnd+age*.08-prog*prog*.02
      );
      sp.x += (h21(vec2(fi,3.))-0.5)*.1*age;

      float sd = length(u-sp);
      float sm = exp(-sd*300.)*(1.-prog)*.8;
      float hue = h21(vec2(fi,7.));
      vec3 sc2 = mix(vec3(1.,.7,.2),vec3(1.,.4,.05),hue);
      c += sc2*sm*sparkT;
    }
  }

  return c;
}

// ==== HEAT DISTORTION ====
vec2 heatWarp(vec2 u){
  if(NT<.5 || NT>9.) return u;
  float ht = smoothstep(.5,1.5,NT)*smoothstep(9.,5.,NT);
  float hd = length(u-vec2(.5,.35));
  float hm = exp(-hd*4.)*ht;
  return u + vec2(
    sin(u.y*80.+T*6.)*.003,
    cos(u.x*60.+T*5.)*.003
  )*hm;
}

void main(){
  vec2 p = uv + SK;

  // heat distortion
  p = heatWarp(p);

  vec3 c = sky(p);
  c = clouds(p,c);
  c = nuke(p,c);
  c = city(p,c);

  // vignette
  float v = 1.-smoothstep(.4,.85,length(uv-.5));
  c *= .6+v*.4;

  // soft bloom approximation: boost bright areas
  float lum = dot(c,vec3(.2126,.7152,.0722));
  if(lum>.5) c += (c-.5)*.5;

  // ACES tonemap
  c = c*(2.51*c+.03)/(c*(2.43*c+.59)+.14);

  // gamma
  c = pow(clamp(c,0.,1.), vec3(1./2.2));

  O = vec4(c,1.);
}`;

const prog = mkProg(VS, FS);
if(!prog) throw 'shader failed';

const aLoc = gl.getAttribLocation(prog, 'a');
const uT = gl.getUniformLocation(prog, 'T');
const uNT = gl.getUniformLocation(prog, 'NT');
const uR = gl.getUniformLocation(prog, 'R');
const uSK = gl.getUniformLocation(prog, 'SK');

gl.useProgram(prog);
gl.uniform2f(uR, W, H);

const t0 = performance.now();

function frame(now) {
  const gt = (now - t0) / 1000;
  const nt = nukeTime >= 0 ? (now - startMs) / 1000 : -1;

  // shake
  if (nt > 0 && nt < 5) {
    const si = nt < 1.2 ? (1 - nt / 1.2) * .015 : Math.max(0, shakeX) * .9;
    shakeX = (Math.random() - .5) * si;
    shakeY = (Math.random() - .5) * si;
  } else { shakeX = 0; shakeY = 0; }

  gl.uniform1f(uT, gt);
  gl.uniform1f(uNT, nt);
  gl.uniform2f(uSK, shakeX, shakeY);

  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.enableVertexAttribArray(aLoc);
  gl.vertexAttribPointer(aLoc, 2, gl.FLOAT, false, 0, 0);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  // timer
  if (nt >= 0 && nt < 11) {
    document.getElementById('timer').textContent = nt.toFixed(1) + 's / 11s';
  } else if (nt >= 11) {
    nukeTime = -1;
    document.getElementById('timer').textContent = 'Complete';
  }

  requestAnimationFrame(frame);
}

// --- Controls ---
document.getElementById('btnNuke').onclick = () => {
  nukeTime = 0; startMs = performance.now();
};
document.getElementById('btnReset').onclick = () => {
  nukeTime = -1; shakeX = 0; shakeY = 0;
  document.getElementById('timer').textContent = 'Ready';
};

requestAnimationFrame(frame);
</script>
</body>
</html>
