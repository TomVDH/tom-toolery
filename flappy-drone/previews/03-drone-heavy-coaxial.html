<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a18; color: #e0e0e0; font-family: 'SF Mono', 'Menlo', monospace; padding: 20px; }
  h1 { color: #fff; font-size: 22px; margin-bottom: 6px; }
  .subtitle { color: #888; font-size: 13px; margin-bottom: 30px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
  .card { background: #111122; border: 1px solid #222; border-radius: 8px; overflow: hidden; }
  .card canvas { display: block; width: 100%; }
  .card .label { padding: 12px; }
  .card .label h3 { font-size: 14px; color: #fff; margin-bottom: 4px; }
  .card .label p { font-size: 12px; color: #777; line-height: 1.5; }
  .tag { display: inline-block; background: #1a1a2e; border: 1px solid #333; padding: 2px 8px; border-radius: 3px; font-size: 10px; color: #ff8800; margin-top: 6px; }
</style>
</head>
<body>

<h1>Heavy Lift — Bottom Rotors Added</h1>
<p class="subtitle">Coaxial quad: top + bottom prop pairs on each motor housing. More lift, more visual bulk.</p>

<div class="grid" id="drones"></div>

<script>
const S = 4;

const drones = [
  {
    id: 'heavy-before',
    name: 'Before — Top Rotors Only',
    draw(ctx, cx, cy, tick) {
      const x = cx, y = cy;
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(x-14*S, y+14*S, 28*S, 3*S);
      ctx.fillStyle = '#3d3530';
      ctx.fillRect(x-10*S, y-4*S, 20*S, 10*S);
      ctx.fillStyle = '#4a4238';
      ctx.fillRect(x-9*S, y-3*S, 18*S, 8*S);
      ctx.fillStyle = '#cc8800';
      ctx.fillRect(x-9*S, y+2*S, 18*S, 2*S);
      ctx.fillStyle = '#3d3530';
      for (let i = 0; i < 6; i++) ctx.fillRect(x-9*S + i*6*S, y+2*S, 3*S, 2*S);
      ctx.fillStyle = '#335577';
      ctx.fillRect(x-3*S, y-3*S, 6*S, 4*S);
      ctx.fillStyle = '#4477aa';
      ctx.fillRect(x-2*S, y-2*S, 4*S, 2*S);
      ctx.fillStyle = '#332e28';
      ctx.fillRect(x-20*S, y-2*S, 12*S, 4*S);
      ctx.fillRect(x+8*S, y-2*S, 12*S, 4*S);
      ctx.fillStyle = '#444038';
      ctx.fillRect(x-22*S, y-4*S, 5*S, 8*S);
      ctx.fillRect(x+17*S, y-4*S, 5*S, 8*S);
      const spin = Math.abs(Math.sin(tick * 0.13));
      const propW = spin * 14 * S;
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = '#998';
      ctx.fillRect(x - 19.5*S - propW/2, y-5*S, propW, 2*S);
      ctx.fillRect(x + 19.5*S - propW/2, y-5*S, propW, 2*S);
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#555045';
      ctx.fillRect(x-12*S, y+6*S, 3*S, 6*S);
      ctx.fillRect(x+9*S, y+6*S, 3*S, 6*S);
      ctx.fillRect(x-14*S, y+11*S, 7*S, 2*S);
      ctx.fillRect(x+7*S, y+11*S, 7*S, 2*S);
      ctx.fillStyle = '#666';
      ctx.fillRect(x-1*S, y+6*S, 2*S, 3*S);
      ctx.fillStyle = '#888';
      ctx.fillRect(x-2*S, y+8*S, 4*S, 2*S);
      ctx.fillStyle = tick % 30 < 15 ? '#ff8800' : '#553300';
      ctx.fillRect(x-9*S, y-4*S, 2*S, 1*S);
      ctx.fillRect(x+7*S, y-4*S, 2*S, 1*S);
    }
  },
  {
    id: 'heavy-coaxial',
    name: 'After — Coaxial (Top + Bottom)',
    draw(ctx, cx, cy, tick) {
      const x = cx, y = cy;
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(x-14*S, y+14*S, 28*S, 3*S);
      // Main body
      ctx.fillStyle = '#3d3530';
      ctx.fillRect(x-10*S, y-4*S, 20*S, 10*S);
      ctx.fillStyle = '#4a4238';
      ctx.fillRect(x-9*S, y-3*S, 18*S, 8*S);
      // Warning stripes
      ctx.fillStyle = '#cc8800';
      ctx.fillRect(x-9*S, y+2*S, 18*S, 2*S);
      ctx.fillStyle = '#3d3530';
      for (let i = 0; i < 6; i++) ctx.fillRect(x-9*S + i*6*S, y+2*S, 3*S, 2*S);
      // Cabin
      ctx.fillStyle = '#335577';
      ctx.fillRect(x-3*S, y-3*S, 6*S, 4*S);
      ctx.fillStyle = '#4477aa';
      ctx.fillRect(x-2*S, y-2*S, 4*S, 2*S);
      // Rotor arms
      ctx.fillStyle = '#332e28';
      ctx.fillRect(x-20*S, y-2*S, 12*S, 4*S);
      ctx.fillRect(x+8*S, y-2*S, 12*S, 4*S);
      // Rotor housings — taller to accommodate coaxial
      ctx.fillStyle = '#444038';
      ctx.fillRect(x-22*S, y-5*S, 5*S, 10*S);
      ctx.fillRect(x+17*S, y-5*S, 5*S, 10*S);
      // Centre shaft detail
      ctx.fillStyle = '#3a3630';
      ctx.fillRect(x-20.5*S, y-4*S, 2*S, 8*S);
      ctx.fillRect(x+18.5*S, y-4*S, 2*S, 8*S);

      const spin = Math.abs(Math.sin(tick * 0.13));
      const spinB = Math.abs(Math.sin(tick * 0.13 + 1.2)); // offset phase
      const propW = spin * 14 * S;
      const propWB = spinB * 12 * S;

      // Top props
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = '#998';
      ctx.fillRect(x - 19.5*S - propW/2, y-6*S, propW, 2*S);
      ctx.fillRect(x + 19.5*S - propW/2, y-6*S, propW, 2*S);
      // Bottom props — slightly smaller, offset spin phase
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = '#887';
      ctx.fillRect(x - 19.5*S - propWB/2, y+4*S, propWB, 2*S);
      ctx.fillRect(x + 19.5*S - propWB/2, y+4*S, propWB, 2*S);
      ctx.globalAlpha = 1;

      // Landing gear
      ctx.fillStyle = '#555045';
      ctx.fillRect(x-12*S, y+6*S, 3*S, 6*S);
      ctx.fillRect(x+9*S, y+6*S, 3*S, 6*S);
      ctx.fillRect(x-14*S, y+11*S, 7*S, 2*S);
      ctx.fillRect(x+7*S, y+11*S, 7*S, 2*S);
      // Cargo hook
      ctx.fillStyle = '#666';
      ctx.fillRect(x-1*S, y+6*S, 2*S, 3*S);
      ctx.fillStyle = '#888';
      ctx.fillRect(x-2*S, y+8*S, 4*S, 2*S);
      // Status LEDs
      ctx.fillStyle = tick % 30 < 15 ? '#ff8800' : '#553300';
      ctx.fillRect(x-9*S, y-4*S, 2*S, 1*S);
      ctx.fillRect(x+7*S, y-4*S, 2*S, 1*S);
    }
  }
];

const grid = document.getElementById('drones');
let tick = 0;
const canvases = [];

drones.forEach(d => {
  const card = document.createElement('div');
  card.className = 'card';
  const canvas = document.createElement('canvas');
  canvas.width = 280;
  canvas.height = 160;
  card.appendChild(canvas);
  const label = document.createElement('div');
  label.className = 'label';
  label.innerHTML = '<h3>' + d.name + '</h3>';
  card.appendChild(label);
  grid.appendChild(card);
  canvases.push({ canvas, drone: d });
});

function renderAll() {
  tick++;
  canvases.forEach(({ canvas, drone }) => {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
    g.addColorStop(0, '#050510');
    g.addColorStop(1, '#101030');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    for (let i = 0; i < 8; i++) ctx.fillRect(30 + i * 30 + (i*17%11), 10 + (i*23%50), 1, 1);
    drone.draw(ctx, canvas.width / 2, canvas.height / 2, tick);
  });
  requestAnimationFrame(renderAll);
}
renderAll();
</script>
</body>
</html>
