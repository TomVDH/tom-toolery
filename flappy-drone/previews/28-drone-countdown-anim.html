<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Preview 28 — DRONE! Countdown Animation Prototypes</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #05050f; color: #ccc; font-family: 'SF Mono', 'Menlo', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 20px; }
  h1 { font-size: 14px; color: #445; letter-spacing: 3px; text-transform: uppercase; }
  .row { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
  .proto { position: relative; }
  .proto canvas { border: 2px solid #1a1a3a; border-radius: 10px; cursor: pointer; }
  .proto .label { text-align: center; font-size: 11px; color: #556; margin-top: 6px; letter-spacing: 1px; }
  .hint { font-size: 10px; color: #334; margin-top: 8px; }
</style>
</head>
<body>
<h1>DRONE! Countdown — Animation Prototypes</h1>
<p class="hint">Click any canvas to replay</p>
<div class="row">

  <div class="proto">
    <canvas id="c1" width="310" height="320"></canvas>
    <div class="label">A — Milestone Slam (current)</div>
  </div>

  <div class="proto">
    <canvas id="c2" width="310" height="320"></canvas>
    <div class="label">B — Typewriter Burn-In</div>
  </div>

  <div class="proto">
    <canvas id="c3" width="310" height="320"></canvas>
    <div class="label">C — Glitch Reveal</div>
  </div>

  <div class="proto">
    <canvas id="c4" width="310" height="320"></canvas>
    <div class="label">D — Shockwave Slam</div>
  </div>

</div>

<script>
// Shared
const W = 310, H = 320;
const canvases = ['c1','c2','c3','c4'].map(id => {
  const c = document.getElementById(id);
  return { canvas: c, ctx: c.getContext('2d'), startTime: 0, active: false };
});

function startAnim(idx) {
  canvases[idx].startTime = performance.now();
  canvases[idx].active = true;
}

// Click to replay
canvases.forEach((c, i) => {
  c.canvas.addEventListener('click', () => startAnim(i));
});

// Background
function drawBg(ctx) {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#080815');
  g.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  // Subtle city silhouette
  for (let i = 0; i < 12; i++) {
    const bx = i * 28 + (i * 7) % 10;
    const bh = 30 + Math.sin(i * 2.3) * 20;
    ctx.fillStyle = '#0c0c1e';
    ctx.fillRect(bx, H - 40 - bh, 20, bh);
  }
  // Ground
  ctx.fillStyle = '#0a0a18';
  ctx.fillRect(0, H - 40, W, 40);
}

// ═══════════════════════════════════════════════
// A — Milestone Slam (current implementation)
// ═══════════════════════════════════════════════
function drawA(ctx, t) {
  drawBg(ctx);
  if (t < 0) return;
  const dur = 1.8; // seconds
  const phase = Math.min(1, t / dur);

  let scale, alpha;
  if (phase < 0.15) {
    const p = phase / 0.15;
    const ease = p < 0.7 ? p / 0.7 : 1 + (1 - (p - 0.7) / 0.3) * 0.15;
    scale = 2.0 - ease; alpha = Math.min(1, p * 2);
  } else if (phase < 0.7) {
    scale = 1 + Math.sin((phase - 0.15) * 12) * 0.02; alpha = 1;
  } else {
    const rt = (phase - 0.7) / 0.3;
    scale = 1 + rt * rt * 1.2; alpha = Math.max(0, 1 - rt * rt * 1.5);
  }

  ctx.save();
  ctx.translate(W/2, H/2 - 30);
  ctx.scale(scale, scale);
  ctx.globalAlpha = alpha;
  ctx.font = '700 38px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#00d4ff';
  ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 30;
  ctx.fillText('DRONE!', 0, 0);
  ctx.shadowBlur = 12; ctx.fillText('DRONE!', 0, 0);
  ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ═══════════════════════════════════════════════
// B — Typewriter Burn-In
// Characters appear one by one with a bright flash per letter,
// then the whole word pulses and fades.
// ═══════════════════════════════════════════════
function drawB(ctx, t) {
  drawBg(ctx);
  if (t < 0) return;
  const text = 'DRONE!';
  const charTime = 0.12; // seconds per char
  const totalType = text.length * charTime;
  const holdTime = 0.8;
  const fadeTime = 0.4;
  const dur = totalType + holdTime + fadeTime;
  const phase = Math.min(1, t / dur);

  ctx.font = '700 42px "Courier New", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const cx = W / 2, cy = H / 2 - 30;

  // Measure char width
  const charW = ctx.measureText('D').width;
  const totalW = ctx.measureText(text).width;
  const startX = cx - totalW / 2;

  if (t < totalType) {
    // Typing phase
    const charsVisible = Math.floor(t / charTime);
    const charPhase = (t % charTime) / charTime;

    for (let i = 0; i <= charsVisible && i < text.length; i++) {
      const isNew = (i === charsVisible);
      const charX = startX + ctx.measureText(text.substring(0, i)).width + charW / 2;

      ctx.save();
      if (isNew) {
        // New char — bright flash
        const flash = 1 - charPhase;
        ctx.globalAlpha = 0.3 + charPhase * 0.7;
        ctx.fillStyle = '#00d4ff';
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur = 20 + flash * 30;
        ctx.fillText(text[i], charX, cy);
        // Flash burst
        if (flash > 0.5) {
          ctx.globalAlpha = flash * 0.5;
          ctx.fillStyle = '#ffffff';
          ctx.shadowBlur = 40;
          ctx.fillText(text[i], charX, cy);
        }
      } else {
        // Settled char
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#00d4ff';
        ctx.shadowColor = '#00d4ff';
        ctx.shadowBlur = 8;
        ctx.fillText(text[i], charX, cy);
      }
      ctx.restore();
    }

    // Cursor blink
    const cursorX = startX + ctx.measureText(text.substring(0, Math.min(charsVisible + 1, text.length))).width + 4;
    if (Math.sin(t * 20) > 0) {
      ctx.fillStyle = '#00d4ff';
      ctx.globalAlpha = 0.6;
      ctx.fillRect(cursorX, cy - 18, 2, 36);
      ctx.globalAlpha = 1;
    }
  } else if (t < totalType + holdTime) {
    // Hold — full text with pulse
    const holdPhase = (t - totalType) / holdTime;
    const pulse = 1 + Math.sin(holdPhase * Math.PI * 4) * 0.03;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(pulse, pulse);
    ctx.fillStyle = '#00d4ff';
    ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 15;
    ctx.fillText(text, 0, 0);
    ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
    ctx.restore();
  } else {
    // Fade out
    const fadePhase = (t - totalType - holdTime) / fadeTime;
    ctx.save();
    ctx.globalAlpha = Math.max(0, 1 - fadePhase);
    ctx.translate(cx, cy);
    ctx.scale(1 + fadePhase * 0.3, 1 + fadePhase * 0.3);
    ctx.fillStyle = '#00d4ff';
    ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 10 + fadePhase * 20;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════
// C — Glitch Reveal
// Text appears with digital glitch artifacts, then stabilises
// ═══════════════════════════════════════════════
function drawC(ctx, t) {
  drawBg(ctx);
  if (t < 0) return;
  const dur = 2.2;
  const phase = Math.min(1, t / dur);
  const text = 'DRONE!';
  const cx = W / 2, cy = H / 2 - 30;

  ctx.font = '700 42px "Courier New", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  if (phase < 0.35) {
    // Glitch phase — scrambled text + offset slices
    const glitchIntensity = 1 - (phase / 0.35);
    const chars = 'DRONE!'.split('');

    // Random character substitution
    const displayed = chars.map((c, i) => {
      if (Math.random() < glitchIntensity * 0.6) {
        return String.fromCharCode(33 + Math.floor(Math.random() * 60));
      }
      return c;
    }).join('');

    // Draw with glitch slices
    ctx.save();
    ctx.fillStyle = '#00d4ff';
    ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 6;
    ctx.globalAlpha = 0.4 + phase * 1.7;

    // Main text
    ctx.fillText(displayed, cx, cy);

    // Glitch slices — horizontal offset copies
    if (glitchIntensity > 0.2) {
      for (let s = 0; s < 3; s++) {
        const sliceY = cy - 20 + Math.random() * 40;
        const sliceH = 4 + Math.random() * 12;
        const sliceOff = (Math.random() - 0.5) * glitchIntensity * 30;
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, sliceY, W, sliceH);
        ctx.clip();
        ctx.globalAlpha = 0.3 + Math.random() * 0.3;
        // Red/cyan chromatic split
        ctx.fillStyle = Math.random() > 0.5 ? '#ff0044' : '#00ffcc';
        ctx.fillText(displayed, cx + sliceOff, cy);
        ctx.restore();
      }
    }
    ctx.restore();

    // Scanlines
    ctx.globalAlpha = glitchIntensity * 0.15;
    for (let sy = 0; sy < H; sy += 3) {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, sy, W, 1);
    }
    ctx.globalAlpha = 1;

  } else if (phase < 0.75) {
    // Stable hold
    const stablePhase = (phase - 0.35) / 0.4;
    ctx.fillStyle = '#00d4ff';
    ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 12;
    ctx.fillText(text, cx, cy);
    ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';

    // Subtle scanline remnant
    ctx.globalAlpha = 0.03;
    for (let sy = 0; sy < H; sy += 4) {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, sy, W, 1);
    }
    ctx.globalAlpha = 1;

  } else {
    // Glitch out
    const outPhase = (phase - 0.75) / 0.25;
    ctx.save();
    ctx.globalAlpha = Math.max(0, 1 - outPhase * 1.3);
    ctx.fillStyle = '#00d4ff';
    ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = outPhase * 30;

    // Split and scatter
    const offset = outPhase * 40;
    ctx.fillText(text.substring(0, 3), cx - offset, cy - outPhase * 8);
    ctx.fillText(text.substring(3), cx + offset, cy + outPhase * 8);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════
// D — Shockwave Slam
// Text drops in from above with a shockwave ring on impact
// ═══════════════════════════════════════════════
function drawD(ctx, t) {
  drawBg(ctx);
  if (t < 0) return;
  const dur = 2.0;
  const phase = Math.min(1, t / dur);
  const text = 'DRONE!';
  const cx = W / 2, cy = H / 2 - 30;

  ctx.font = '700 42px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  if (phase < 0.15) {
    // Drop in from above — fast ease-in
    const dropT = phase / 0.15;
    const easeIn = dropT * dropT * dropT; // cubic ease-in = accelerating
    const y = -40 + (cy + 40) * easeIn;
    const alpha = Math.min(1, dropT * 2);

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#00d4ff';
    ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 20;
    ctx.fillText(text, cx, y);
    ctx.restore();

  } else if (phase < 0.2) {
    // Impact — flash + shockwave starts
    const impactT = (phase - 0.15) / 0.05;
    const flashAlpha = Math.max(0, 1 - impactT);

    // White flash
    ctx.save();
    ctx.globalAlpha = flashAlpha * 0.4;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();

    // Text at rest with shake
    const shake = (1 - impactT) * 4;
    ctx.save();
    ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    ctx.fillStyle = '#00d4ff';
    ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 25;
    ctx.fillText(text, cx, cy);
    ctx.shadowBlur = 10; ctx.fillText(text, cx, cy);
    ctx.restore();

  } else if (phase < 0.7) {
    // Hold + shockwave expanding
    const holdPhase = (phase - 0.2) / 0.5;

    // Shockwave ring
    const ringRadius = 20 + holdPhase * 180;
    const ringAlpha = Math.max(0, 0.4 - holdPhase * 0.5);
    ctx.save();
    ctx.strokeStyle = 'rgba(0, 212, 255, ' + ringAlpha + ')';
    ctx.lineWidth = 2 - holdPhase * 1.5;
    ctx.shadowColor = '#00d4ff';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(cx, cy, ringRadius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

    // Second ring (delayed)
    if (holdPhase > 0.15) {
      const ring2Phase = (holdPhase - 0.15) / 0.85;
      const ring2R = 15 + ring2Phase * 150;
      const ring2A = Math.max(0, 0.25 - ring2Phase * 0.35);
      ctx.save();
      ctx.strokeStyle = 'rgba(0, 212, 255, ' + ring2A + ')';
      ctx.lineWidth = 1.5 - ring2Phase;
      ctx.beginPath();
      ctx.arc(cx, cy, ring2R, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // Text
    const breathe = 1 + Math.sin(holdPhase * Math.PI * 6) * 0.015;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(breathe, breathe);
    ctx.fillStyle = '#00d4ff';
    ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 12;
    ctx.fillText(text, 0, 0);
    ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
    ctx.restore();

  } else {
    // Fade out — text scales up slightly
    const fadeT = (phase - 0.7) / 0.3;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(1 + fadeT * 0.4, 1 + fadeT * 0.4);
    ctx.globalAlpha = Math.max(0, 1 - fadeT * 1.3);
    ctx.fillStyle = '#00d4ff';
    ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = fadeT * 25;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════
// Animation loop
// ═══════════════════════════════════════════════
const drawFns = [drawA, drawB, drawC, drawD];

function loop() {
  const now = performance.now();
  canvases.forEach((c, i) => {
    const elapsed = (now - c.startTime) / 1000;
    // Auto-restart with 1s pause between loops
    const totalDur = [1.8, 2.2, 2.2, 2.0][i];
    const loopDur = totalDur + 1.0;
    const t = elapsed % loopDur;
    drawFns[i](c.ctx, t < totalDur ? t : -1);
  });
  requestAnimationFrame(loop);
}

// Start all with stagger
canvases.forEach((c, i) => { c.startTime = performance.now() - i * 400; });
loop();
</script>
</body>
</html>
