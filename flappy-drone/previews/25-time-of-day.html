<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Time of Day — Flappy Drone</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060610;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 18px 6px 14px;
    font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
    color: #aaa;
  }
  h1 { color: #eee; font-size: 17px; letter-spacing: 4px; margin-bottom: 3px; font-weight: 400; }
  .sub { color: #444; font-size: 10px; letter-spacing: 2px; margin-bottom: 14px; }
  canvas { display: block; border: 1px solid #1a1a2e; border-radius: 2px; }
  .controls {
    margin-top: 11px;
    display: flex;
    gap: 7px;
    align-items: center;
  }
  button {
    background: #0a0a18;
    border: 1px solid #222238;
    color: #666;
    padding: 7px 20px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 3px;
    letter-spacing: 2px;
    transition: background .15s, color .15s, border-color .15s;
  }
  button:hover { background: #141426; color: #bbb; }
  .btn-night  { border-color: #22285a; color: #6677aa; }
  .btn-night.mode-active  { background: #0c0d1f; border-color: #4455aa; color: #99aadd; }
  .btn-dawn   { border-color: #552233; color: #aa6655; }
  .btn-dawn.mode-active   { background: #180c0e; border-color: #cc5533; color: #ff9966; }
  .btn-day    { border-color: #1a3355; color: #5599bb; }
  .btn-day.mode-active    { background: #0c1520; border-color: #3388bb; color: #77bbdd; }
  .btn-dusk   { border-color: #553311; color: #aa7733; }
  .btn-dusk.mode-active   { background: #180e07; border-color: #bb7722; color: #ffbb55; }
  .credits {
    font-size: 9px;
    color: #2a2a3a;
    margin-top: 10px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<h1>TIME OF DAY</h1>
<p class="sub">Atmospheric Preview &mdash; Flappy Drone</p>

<canvas id="c" width="620" height="640"></canvas>

<div class="controls">
  <button class="btn-night mode-active" id="btn-night">NIGHT</button>
  <button class="btn-dawn"              id="btn-dawn">DAWN</button>
  <button class="btn-day"               id="btn-day">DAY</button>
  <button class="btn-dusk"              id="btn-dusk">DUSK</button>
</div>

<div class="credits">Henske &middot; Thieuke &middot; Sakke &middot; Jonas &middot; Pitr &middot; Poekie &middot; Bostrol &middot; Kevijntje</div>

<script>
'use strict';

// ================================================================
// TIME OF DAY — Flappy Drone Atmospheric Preview
// v1.0  2026-03-28
//
// Henske:    sky gradients, aurora curtains, atmospheric depth,
//            cloud variety, glow layering, sun/moon rendering
// Thieuke:   clean architecture, cross-fade interpolation,
//            no redundancy, deterministic hash
// Sakke:     pre-computed building data, no runtime allocations
// Jonasty:   60fps timing, smooth easing, transition curves
// Pitr:      every render call earns its place
// Poekie:    city character, window personality, Z-Tower
// Bostrol:   version discipline
// Kevijntje: scope — single canvas, no frameworks
// ================================================================

const C  = document.getElementById('c');
const X  = C.getContext('2d');
const W  = 620, H = 640;
const GY = 540;   // ground y — leaves 100px for ground bar

// ---------------------------------------------------------------
// Core math
// ---------------------------------------------------------------
const clamp = (v, lo = 0, hi = 1) => Math.max(lo, Math.min(hi, v));
const lerp  = (a, b, t) => a + (b - a) * clamp(t);
const ss    = (lo, hi, x) => { const t = clamp((x - lo) / (hi - lo)); return t * t * (3 - 2 * t); };
const hash  = (x, y) => { let s = Math.sin(x * 127.1 + y * 311.7) * 43758.5453; return s - Math.floor(s); };

function hexRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

// Parse 'rgba(r,g,b,a)' or 'rgba(r, g, b, a)' to [r,g,b,a]
const _wcCache = {};
function parseRgba(s) {
  if (_wcCache[s]) return _wcCache[s];
  const m = s.match(/rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*(?:,\s*([0-9.]+))?\s*\)/);
  return (_wcCache[s] = m ? [+m[1], +m[2], +m[3], m[4] !== undefined ? +m[4] : 1] : [255,200,55,0.35]);
}

// ---------------------------------------------------------------
// Time-of-day palette definitions
// ---------------------------------------------------------------
const TIMES = {
  night: {
    // Sky
    skyStops: [0, 0.55, 1],
    sky:      ['#050510', '#0a0a22', '#101030'],
    // Ground
    groundCol: '#050514',
    // Horizon glow
    horizonGlow: null,
    // Celestial
    stars: true,  starAlpha: 0.92,
    moonOn: true,
    sunOn: false, sunY: 0, sunHigh: false,
    // Aurora
    aurora: true, auroraAlpha: 1.0,
    // Clouds
    cloudStyle: 'wisp',  cloudAlpha: 0.50,
    // City
    buildBack:  '#080818',
    buildFront: '#0e0e24',
    winCol:     'rgba(255,200,55,0.35)',
    winPct:     0.60,
    winReflect: false,
    ambientLight: 0.0,
  },
  dawn: {
    skyStops: [0, 0.30, 0.60, 0.80, 1],
    sky:      ['#1a0a20', '#3a1530', '#8a3838', '#cc6040', '#ffaa60'],
    groundCol: '#0d0810',
    horizonGlow: { col: '#ff8040', yFrac: 0.86, r: 150, a: 0.22 },
    stars: true,  starAlpha: 0.10,
    moonOn: false,
    sunOn: true,  sunY: 0.91, sunHigh: false,
    aurora: false, auroraAlpha: 0,
    cloudStyle: 'dawn',  cloudAlpha: 0.70,
    buildBack:  '#0a0810',
    buildFront: '#120e18',
    winCol:     'rgba(255,200,55,0.25)',
    winPct:     0.30,
    winReflect: false,
    ambientLight: 0.08,
  },
  day: {
    skyStops: [0, 0.35, 0.70, 1],
    sky:      ['#2277bb', '#4499cc', '#88bbdd', '#aaccee'],
    groundCol: '#3a4040',
    horizonGlow: { col: '#ffffff', yFrac: 1.02, r: 220, a: 0.07 },
    stars: false, starAlpha: 0,
    moonOn: false,
    sunOn: true,  sunY: 0.11, sunHigh: true,
    aurora: false, auroraAlpha: 0,
    cloudStyle: 'puff',  cloudAlpha: 0.88,
    buildBack:  '#2a3040',
    buildFront: '#3a4558',
    winCol:     'rgba(200,220,255,0.3)',
    winPct:     0.10,
    winReflect: true,
    ambientLight: 1.0,
  },
  dusk: {
    skyStops: [0, 0.25, 0.50, 0.68, 0.84, 1],
    sky:      ['#0a0820', '#2a1035', '#662244', '#aa4430', '#dd8830', '#ffaa44'],
    groundCol: '#0d0910',
    horizonGlow: { col: '#ff8822', yFrac: 0.92, r: 170, a: 0.28 },
    stars: true,  starAlpha: 0.22,
    moonOn: false,
    sunOn: true,  sunY: 0.925, sunHigh: false,
    aurora: true, auroraAlpha: 0.28,
    cloudStyle: 'dusk',  cloudAlpha: 0.75,
    buildBack:  '#0a0815',
    buildFront: '#0e0e20',
    winCol:     'rgba(255,200,55,0.30)',
    winPct:     0.50,
    winReflect: false,
    ambientLight: 0.04,
  }
};
const TIME_KEYS = ['night', 'dawn', 'day', 'dusk'];

// ---------------------------------------------------------------
// Transition state
// ---------------------------------------------------------------
let currentKey    = 'night';
let targetKey     = 'night';
let transT        = 1.0;
let transStart    = 0;
const TRANS_DUR   = 2000;

// ---------------------------------------------------------------
// Pre-computed stars
// ---------------------------------------------------------------
const STARS = Array.from({length: 85}, (_, i) => ({
  x:  hash(i,  0) * W,
  y:  hash(i,  1) * GY * 0.80,
  r:  0.4 + hash(i,  2) * 1.5,
  ph: hash(i,  3) * Math.PI * 2,
  sp: 0.4 + hash(i,  4) * 2.4,
  br: 0.55 + hash(i,  5) * 0.45,
}));

// ---------------------------------------------------------------
// Pre-computed clouds — each has drift speed + puff offsets
// ---------------------------------------------------------------
const CLOUDS = Array.from({length: 10}, (_, i) => ({
  x0: hash(i, 20) * (W + 400) - 200,
  y:  28 + hash(i, 21) * 210,
  w:  55 + hash(i, 22) * 140,
  h:  14 + hash(i, 23) * 24,
  sp: 0.010 + hash(i, 24) * 0.022,
  puffs: Array.from({length: 3 + Math.floor(hash(i, 25) * 5)}, (_, j) => ({
    dx: hash(i * 5 + j, 30),          // 0-1 fraction of width
    dy: hash(i * 5 + j, 31) * 0.4 - 0.1,
    rs: 0.35 + hash(i * 5 + j, 32) * 0.60,
  })),
}));

// ---------------------------------------------------------------
// Pre-computed buildings
// ---------------------------------------------------------------
function buildLayer(off, xGap, wMin, wRng, hMin, hRng, wStep, wPad) {
  const blds = [];
  let bx = 0;
  while (bx < W + 80) {
    const bw = wMin + hash(bx + off, 51) * wRng;
    const bh = hMin + hash(bx + off, 52) * hRng;
    const wins = [];
    for (let wy = wPad; wy < bh - wPad - 4; wy += wStep) {
      for (let wx = wPad; wx < bw - wPad - 2; wx += wStep - 1) {
        wins.push({
          dx: wx,
          dy: wy,
          id: hash(bx + wx + off * 2.3, wy + 7),  // stable 0-1 identity
        });
      }
    }
    blds.push({ x: bx, w: bw, h: bh, wins });
    bx += bw + 2 + hash(bx + off, 53) * xGap;
  }
  return blds;
}

const BLDS_BACK  = buildLayer(0,   13, 10, 26, 38, 125, 9,  3);
const BLDS_FRONT = buildLayer(999, 10, 14, 36, 55, 175, 10, 4);

// ---------------------------------------------------------------
// Aurora strips
// ---------------------------------------------------------------
const AURORA_STRIPS = Array.from({length: 16}, (_, i) => ({
  x:     (i / 15) * W,
  ph:    hash(i, 60) * Math.PI * 2,
  sp:    0.00035 + hash(i, 61) * 0.00065,
  green: hash(i, 62) < 0.55,
  amp:   16 + hash(i, 63) * 42,
  width: 30 + hash(i, 64) * 55,
}));

// ---------------------------------------------------------------
// Z-Tower constants
// ---------------------------------------------------------------
const ZTX  = 312;
const ZTH  = 315;
const ZTB  = 40;   // base half-width
const ZTT  = 13;   // top half-width

// ---------------------------------------------------------------
// Button wiring
// ---------------------------------------------------------------
const btns = {};
TIME_KEYS.forEach(k => {
  const el = document.getElementById('btn-' + k);
  btns[k] = el;
  el.addEventListener('click', () => {
    if (targetKey === k && transT >= 1) return;
    currentKey = targetKey;         // snap current to wherever we were heading
    targetKey  = k;
    transT     = 0;
    transStart = performance.now();
    TIME_KEYS.forEach(j => btns[j].classList.toggle('mode-active', j === k));
  });
});

// ---------------------------------------------------------------
// Draw: sky gradient
// ---------------------------------------------------------------
function drawSky(def, alpha) {
  if (alpha <= 0.002) return;
  const grd = X.createLinearGradient(0, 0, 0, GY);
  def.sky.forEach((c, i) => {
    const [r, g, b] = hexRgb(c);
    grd.addColorStop(def.skyStops[i], `rgba(${r},${g},${b},${alpha})`);
  });
  X.fillStyle = grd;
  X.fillRect(0, 0, W, GY);
}

// ---------------------------------------------------------------
// Draw: horizon glow
// ---------------------------------------------------------------
function drawHorizonGlow(def, alpha) {
  if (!def.horizonGlow || alpha <= 0.002) return;
  const hg = def.horizonGlow;
  const cy = H * hg.yFrac;
  const [r, g, b] = hexRgb(hg.col);
  const rad = X.createRadialGradient(W * 0.5, cy, 0, W * 0.5, cy, hg.r);
  rad.addColorStop(0,   `rgba(${r},${g},${b},${hg.a * alpha})`);
  rad.addColorStop(0.45,`rgba(${r},${g},${b},${hg.a * alpha * 0.35})`);
  rad.addColorStop(1,   `rgba(${r},${g},${b},0)`);
  X.fillStyle = rad;
  X.fillRect(W * 0.5 - hg.r, cy - hg.r, hg.r * 2, hg.r * 2);
}

// ---------------------------------------------------------------
// Draw: stars
// ---------------------------------------------------------------
function drawStars(def, now, alpha) {
  if (!def.stars || alpha * def.starAlpha <= 0.005) return;
  const base = def.starAlpha * alpha;
  STARS.forEach(s => {
    const tw = 0.48 + 0.52 * Math.sin(now * 0.001 * s.sp + s.ph);
    X.globalAlpha = tw * s.br * base;
    X.fillStyle = '#ddeeff';
    X.beginPath(); X.arc(s.x, s.y, s.r, 0, Math.PI * 2); X.fill();
  });
  X.globalAlpha = 1;
}

// ---------------------------------------------------------------
// Draw: aurora
// ---------------------------------------------------------------
function drawAurora(def, now, alpha) {
  if (!def.aurora || alpha * def.auroraAlpha <= 0.005) return;
  const a      = def.auroraAlpha * alpha;
  const topY   = GY * 0.04;
  const height = GY * 0.36;

  AURORA_STRIPS.forEach(s => {
    const w1 = Math.sin(now * s.sp + s.ph) * s.amp;
    const w2 = Math.sin(now * s.sp * 1.8 + s.ph + 1.4) * s.amp * 0.38;
    const cy  = topY + height * 0.5 + w1 + w2;
    const [r, g, b] = s.green ? [28, 215, 90] : [155, 55, 255];
    const grd = X.createLinearGradient(0, cy - height * 0.5, 0, cy + height * 0.5);
    grd.addColorStop(0,   `rgba(${r},${g},${b},0)`);
    grd.addColorStop(0.28,`rgba(${r},${g},${b},${a * 0.55})`);
    grd.addColorStop(0.5, `rgba(${r},${g},${b},${a})`);
    grd.addColorStop(0.72,`rgba(${r},${g},${b},${a * 0.55})`);
    grd.addColorStop(1,   `rgba(${r},${g},${b},0)`);
    X.fillStyle = grd;
    X.fillRect(s.x - s.width * 0.5, cy - height * 0.5, s.width, height);
  });
}

// ---------------------------------------------------------------
// Draw: moon (crescent)
// ---------------------------------------------------------------
function drawMoon(alpha, now) {
  if (alpha <= 0.002) return;
  const mx = W * 0.79, my = H * 0.135;
  const mr = 24;

  // Outer atmospheric glow
  X.globalAlpha = alpha * 0.16;
  const og = X.createRadialGradient(mx, my, 0, mx, my, mr * 4);
  og.addColorStop(0, 'rgba(200,215,255,1)');
  og.addColorStop(0.4,'rgba(175,195,250,0.45)');
  og.addColorStop(1, 'rgba(120,145,220,0)');
  X.fillStyle = og;
  X.beginPath(); X.arc(mx, my, mr * 4, 0, Math.PI * 2); X.fill();

  // Moon disc
  X.globalAlpha = alpha;
  X.fillStyle = '#c8d4ee';
  X.beginPath(); X.arc(mx, my, mr, 0, Math.PI * 2); X.fill();

  // Subtle surface texture — a couple of faint craters
  X.globalAlpha = alpha * 0.12;
  X.fillStyle = '#99a8cc';
  [[mr*0.25, mr*-0.2, mr*0.18],[mr*-0.3, mr*0.1, mr*0.12]].forEach(([cx,cy,cr]) => {
    X.beginPath(); X.arc(mx + cx, my + cy, cr, 0, Math.PI * 2); X.fill();
  });

  // Crescent shadow
  X.globalAlpha = alpha;
  X.fillStyle = '#04040e';
  X.beginPath(); X.arc(mx + mr * 0.44, my, mr * 0.88, 0, Math.PI * 2); X.fill();

  X.globalAlpha = 1;
}

// ---------------------------------------------------------------
// Draw: sun
// ---------------------------------------------------------------
function drawSun(def, alpha, now) {
  if (!def.sunOn || alpha <= 0.002) return;
  const high  = def.sunHigh;
  const sx    = high ? W * 0.73 : W * 0.58;
  const sy    = H * def.sunY;
  const sr    = high ? 34 : 23;

  // Outer corona
  const coronaR = sr * (high ? 4.2 : 3.0);
  X.globalAlpha = (high ? 0.16 : 0.24) * alpha;
  const corona = X.createRadialGradient(sx, sy, 0, sx, sy, coronaR);
  if (high) {
    corona.addColorStop(0,   'rgba(255,255,200,1)');
    corona.addColorStop(0.3, 'rgba(255,240,150,0.55)');
    corona.addColorStop(1,   'rgba(255,210,80,0)');
  } else {
    corona.addColorStop(0,   'rgba(255,165,55,1)');
    corona.addColorStop(0.3, 'rgba(255,120,25,0.5)');
    corona.addColorStop(1,   'rgba(255,70,0,0)');
  }
  X.fillStyle = corona;
  X.beginPath(); X.arc(sx, sy, coronaR, 0, Math.PI * 2); X.fill();

  // Sun disc — clip to above horizon for dawn/dusk
  X.globalAlpha = alpha;
  X.save();
  if (!high) {
    X.beginPath(); X.rect(0, 0, W, sy + 3); X.clip();
  }
  const disc = X.createRadialGradient(sx - sr * 0.2, sy - sr * 0.2, 0, sx, sy, sr);
  if (high) {
    disc.addColorStop(0, '#fffff0');
    disc.addColorStop(0.6,'#ffee88');
    disc.addColorStop(1, '#ffcc44');
  } else {
    disc.addColorStop(0, '#ffdd66');
    disc.addColorStop(0.6,'#ffaa33');
    disc.addColorStop(1, '#ff6600');
  }
  X.fillStyle = disc;
  X.beginPath(); X.arc(sx, sy, sr, 0, Math.PI * 2); X.fill();
  X.restore();

  // Radial rays (day only)
  if (high) {
    X.globalAlpha = 0.14 * alpha;
    X.strokeStyle = '#ffeeaa';
    X.lineWidth   = 1.5;
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2 + now * 0.00018;
      const r0 = sr + 7, r1 = sr + 20 + Math.sin(now * 0.0009 + i) * 5;
      X.beginPath();
      X.moveTo(sx + Math.cos(a) * r0, sy + Math.sin(a) * r0);
      X.lineTo(sx + Math.cos(a) * r1, sy + Math.sin(a) * r1);
      X.stroke();
    }
    // Lens flare streak
    X.globalAlpha = 0.06 * alpha;
    const lf = X.createLinearGradient(sx - 220, sy, sx + 220, sy);
    lf.addColorStop(0,   'rgba(255,255,220,0)');
    lf.addColorStop(0.45,'rgba(255,255,230,1)');
    lf.addColorStop(0.55,'rgba(255,255,230,1)');
    lf.addColorStop(1,   'rgba(255,255,220,0)');
    X.fillStyle = lf;
    X.fillRect(sx - 220, sy - 1.5, 440, 3);
  } else {
    // Horizon shimmer
    X.globalAlpha = 0.13 * alpha;
    const hs = X.createLinearGradient(0, sy, W, sy);
    hs.addColorStop(0,   'rgba(255,140,40,0)');
    hs.addColorStop(0.35,'rgba(255,160,55,0.9)');
    hs.addColorStop(0.65,'rgba(255,160,55,0.9)');
    hs.addColorStop(1,   'rgba(255,140,40,0)');
    X.fillStyle = hs;
    X.fillRect(0, sy - 1, W, 2);
  }
  X.globalAlpha = 1;
}

// ---------------------------------------------------------------
// Draw: mountain silhouettes
// ---------------------------------------------------------------
function drawMountains(def, alpha) {
  if (alpha <= 0.002) return;
  // Far layer
  _drawMtnLayer(def.buildBack, 0,   GY, 0.93, 0.055, 70,  alpha, 0);
  // Near layer
  _drawMtnLayer(def.buildBack, 777, GY, 0.97, 0.075, 50,  alpha, 14);
}

function _drawMtnLayer(colHex, sOff, gy, yBase, hFrac, peakW, alpha, bright) {
  const [r, g, b] = hexRgb(colHex);
  X.globalAlpha = alpha;
  X.fillStyle = `rgb(${Math.min(255,r+bright)},${Math.min(255,g+bright)},${Math.min(255,b+bright)})`;
  const yB   = gy * yBase;
  const maxH = gy * hFrac;
  X.beginPath();
  X.moveTo(0, gy);
  let px = 0;
  while (px <= W + peakW) {
    const ph  = hash(px + sOff, 90) * maxH;
    const pw  = peakW * 0.5 + hash(px + sOff, 91) * peakW;
    X.quadraticCurveTo(px,            yB - ph, px + pw * 0.5, yB - ph);
    X.quadraticCurveTo(px + pw,       yB - ph, px + pw,       yB);
    px += pw;
  }
  X.lineTo(W, gy);
  X.closePath();
  X.fill();
  X.globalAlpha = 1;
}

// ---------------------------------------------------------------
// Draw: clouds
// ---------------------------------------------------------------
function drawClouds(def, now, alpha) {
  if (alpha <= 0.003) return;
  const style = def.cloudStyle;

  CLOUDS.forEach((cl, ci) => {
    const cx = ((cl.x0 + now * cl.sp) % (W + 450)) - 225;
    const cy = cl.y;
    const w = cl.w, h = cl.h;
    const localA = def.cloudAlpha * alpha * (0.5 + 0.5 * hash(ci, 99));

    if (style === 'wisp') {
      // Night: dark translucent wisps
      X.globalAlpha = localA * 0.6;
      X.fillStyle = '#09091c';
      X.beginPath(); X.ellipse(cx, cy, w * 0.5, h * 0.32, 0, 0, Math.PI * 2); X.fill();
      X.globalAlpha = localA * 0.4;
      X.fillStyle = '#0b0b20';
      X.beginPath(); X.ellipse(cx + w * 0.22, cy - h * 0.18, w * 0.28, h * 0.18, 0, 0, Math.PI * 2); X.fill();
      X.beginPath(); X.ellipse(cx - w * 0.18, cy + h * 0.08, w * 0.22, h * 0.14, 0, 0, Math.PI * 2); X.fill();

    } else if (style === 'dawn') {
      // Dawn: amber/warm gradient clouds
      cl.puffs.forEach(p => {
        const pr = (h * 0.55 + w * 0.05) * p.rs;
        const px = cx + (p.dx - 0.5) * w;
        const py = cy + p.dy * h;
        const grd = X.createRadialGradient(px, py - pr * 0.2, 0, px, py, pr * 1.4);
        grd.addColorStop(0,   `rgba(235,160,80,${localA})`);
        grd.addColorStop(0.45,`rgba(200,110,60,${localA * 0.65})`);
        grd.addColorStop(1,   `rgba(120,60,35,0)`);
        X.fillStyle = grd;
        X.globalAlpha = 1;
        X.beginPath(); X.ellipse(px, py, pr * 1.5, pr * 0.72, 0, 0, Math.PI * 2); X.fill();
      });

    } else if (style === 'puff') {
      // Day: fluffy white cumulus
      // Shadow base
      X.globalAlpha = localA * 0.20;
      X.fillStyle = 'rgba(165,185,215,0.45)';
      X.beginPath(); X.ellipse(cx, cy + h * 0.35, w * 0.42, h * 0.16, 0, 0, Math.PI * 2); X.fill();
      cl.puffs.forEach(p => {
        const pr = (h * 0.58 + w * 0.055) * p.rs;
        const px = cx + (p.dx - 0.5) * w;
        const py = cy + p.dy * h;
        const grd = X.createRadialGradient(px - pr * 0.18, py - pr * 0.22, 0, px, py, pr * 1.25);
        grd.addColorStop(0,   `rgba(255,255,255,${localA})`);
        grd.addColorStop(0.5, `rgba(242,247,255,${localA * 0.78})`);
        grd.addColorStop(1,   `rgba(210,220,240,0)`);
        X.fillStyle = grd;
        X.globalAlpha = 1;
        X.beginPath(); X.ellipse(px, py, pr * 1.3, pr * 0.78, 0, 0, Math.PI * 2); X.fill();
      });

    } else if (style === 'dusk') {
      // Dusk: orange/pink lit edges
      cl.puffs.forEach(p => {
        const pr = (h * 0.52 + w * 0.05) * p.rs;
        const px = cx + (p.dx - 0.5) * w;
        const py = cy + p.dy * h;
        const grd = X.createRadialGradient(px, py - pr * 0.15, 0, px, py, pr * 1.4);
        grd.addColorStop(0,   `rgba(255,185,70,${localA})`);
        grd.addColorStop(0.38,`rgba(215,95,50,${localA * 0.7})`);
        grd.addColorStop(1,   `rgba(110,40,25,0)`);
        X.fillStyle = grd;
        X.globalAlpha = 1;
        X.beginPath(); X.ellipse(px, py, pr * 1.35, pr * 0.70, 0, 0, Math.PI * 2); X.fill();
      });
    }
  });
  X.globalAlpha = 1;
}

// ---------------------------------------------------------------
// Draw: buildings layer
// ---------------------------------------------------------------
function drawBuildings(def, blds, alpha, now, isBack) {
  if (alpha <= 0.002) return;
  const col   = isBack ? def.buildBack : def.buildFront;
  const [cr, cg, cb] = hexRgb(col);
  const [wr, wg, wb, wbase] = parseRgba(def.winCol);
  const pct   = def.winPct;
  const refl  = def.winReflect;
  const amb   = def.ambientLight;

  blds.forEach(b => {
    const by = GY - b.h;

    // Building fill
    X.globalAlpha = alpha;
    X.fillStyle = col;
    X.fillRect(b.x, by, b.w, b.h);

    // Ambient skylight wash (daytime)
    if (amb > 0) {
      X.globalAlpha = alpha * amb * 0.10;
      X.fillStyle   = isBack ? 'rgba(100,130,200,0.5)' : 'rgba(115,145,215,0.45)';
      X.fillRect(b.x, by, b.w, b.h);
    }

    // Top ledge highlight
    X.globalAlpha = alpha * (0.08 + amb * 0.12);
    X.fillStyle = `rgb(${Math.min(255,cr+40)},${Math.min(255,cg+40)},${Math.min(255,cb+40)})`;
    X.fillRect(b.x, by, b.w, 2);

    // Windows
    b.wins.forEach(w => {
      const isLit = w.id < pct;

      if (refl) {
        // Daytime: reflective glints on some windows
        if (w.id > 0.12) return;
        const gp = Math.sin(now * 0.0007 + w.id * 28.3 + b.x * 0.05);
        const wa = gp > 0.35 ? (gp - 0.35) * 0.55 : 0;
        if (wa <= 0.005) return;
        X.globalAlpha = alpha * wa;
        X.fillStyle = `rgba(${wr},${wg},${wb},0.7)`;
        X.fillRect(b.x + w.dx, by + w.dy, 3, 4);
      } else {
        if (!isLit) return;
        // Organic flicker
        const flick = Math.sin(now * 0.0014 * (0.5 + w.id * 2.2) + w.id * 91.3) * 0.055;
        const wa = Math.max(0, wbase + flick);
        X.globalAlpha = alpha;
        X.fillStyle = `rgba(${wr},${wg},${wb},${wa})`;
        X.fillRect(b.x + w.dx, by + w.dy, 3, 4);
      }
    });
  });
  X.globalAlpha = 1;
}

// ---------------------------------------------------------------
// Draw: Z-Tower
// ---------------------------------------------------------------
function drawZTower(def, alpha, now) {
  if (alpha <= 0.002) return;

  const ty = GY - ZTH;   // top y
  const [fr, fg, fb] = hexRgb(def.buildFront);
  // Body — slightly lighter than front buildings
  const br = Math.min(255, fr + 20), bg = Math.min(255, fg + 20), bb = Math.min(255, fb + 20);

  X.globalAlpha = alpha;

  // Tower body (tapered trapezoid)
  X.fillStyle = `rgb(${br},${bg},${bb})`;
  X.beginPath();
  X.moveTo(ZTX - ZTB * 0.5, GY);
  X.lineTo(ZTX - ZTT * 0.5, ty);
  X.lineTo(ZTX + ZTT * 0.5, ty);
  X.lineTo(ZTX + ZTB * 0.5, GY);
  X.closePath();
  X.fill();

  // Left-edge highlight band
  X.globalAlpha = alpha * 0.30;
  X.fillStyle = `rgb(${Math.min(255,br+55)},${Math.min(255,bg+55)},${Math.min(255,bb+55)})`;
  X.beginPath();
  X.moveTo(ZTX - ZTB * 0.5,     GY);
  X.lineTo(ZTX - ZTT * 0.5,     ty);
  X.lineTo(ZTX - ZTT * 0.5 + 4, ty);
  X.lineTo(ZTX - ZTB * 0.5 + 4, GY);
  X.closePath();
  X.fill();

  // Ambient light wash (daytime)
  if (def.ambientLight > 0) {
    X.globalAlpha = alpha * def.ambientLight * 0.09;
    X.fillStyle = 'rgba(120,150,220,0.5)';
    X.beginPath();
    X.moveTo(ZTX - ZTB * 0.5, GY);
    X.lineTo(ZTX - ZTT * 0.5, ty);
    X.lineTo(ZTX + ZTT * 0.5, ty);
    X.lineTo(ZTX + ZTB * 0.5, GY);
    X.closePath();
    X.fill();
  }

  // Purple windows — 3 columns, 20 rows
  const COLS = 3, ROWS = 20;
  X.globalAlpha = alpha;
  for (let row = 0; row < ROWS; row++) {
    const rowFrac = row / ROWS;
    const wRowY   = ty + ZTH * 0.04 + row * (ZTH * 0.90 / ROWS);
    // Taper the column width
    const halfW   = ZTB * 0.5 - (ZTB * 0.5 - ZTT * 0.5) * rowFrac;
    const colW    = (halfW * 2 - 8) / COLS;
    for (let col = 0; col < COLS; col++) {
      const wColX = ZTX - halfW + 4 + col * colW;
      if (hash(row * 7 + col + 11, 77) < 0.28) continue; // ~72% lit
      const flick = 0.55 + 0.45 * Math.sin(now * 0.0009 * (1 + row * 0.12) + row * 2.3 + col * 5.1);
      X.globalAlpha = alpha * flick * 0.75;
      X.fillStyle = 'rgba(175,70,255,0.65)';
      X.fillRect(wColX, wRowY, 4, 5);
    }
  }

  // "Z" label
  const zFlicker = 0.72 + 0.28 * Math.sin(now * 0.0021);
  X.globalAlpha = alpha * zFlicker;
  X.fillStyle   = '#ffffff';
  X.font        = 'bold 13px Courier New';
  X.textAlign   = 'center';
  X.textBaseline= 'middle';
  // Soft glow behind the Z
  X.shadowColor = '#aaaaff';
  X.shadowBlur  = 6;
  X.fillText('Z', ZTX, ty - 9);
  X.shadowBlur  = 0;

  // Red antenna
  X.globalAlpha = alpha;
  X.strokeStyle = '#bb1111';
  X.lineWidth   = 2;
  X.beginPath(); X.moveTo(ZTX, ty - 2); X.lineTo(ZTX, ty - 24); X.stroke();
  // Blinking tip
  const blink = Math.sin(now * 0.0022) > 0.1;
  X.globalAlpha = alpha * (blink ? 0.92 : 0.18);
  X.fillStyle   = '#ff2222';
  X.beginPath(); X.arc(ZTX, ty - 24, 2.8, 0, Math.PI * 2); X.fill();

  X.globalAlpha  = 1;
  X.textAlign    = 'left';
  X.textBaseline = 'alphabetic';
}

// ---------------------------------------------------------------
// Draw: ground bar
// ---------------------------------------------------------------
function drawGround(def, alpha) {
  if (alpha <= 0.002) return;
  const [gr, gg, gb] = hexRgb(def.groundCol);
  const grd = X.createLinearGradient(0, GY, 0, H);
  grd.addColorStop(0,    `rgb(${Math.min(255,gr+22)},${Math.min(255,gg+22)},${Math.min(255,gb+18)})`);
  grd.addColorStop(0.14,  def.groundCol);
  grd.addColorStop(1,     def.groundCol);
  X.globalAlpha = alpha;
  X.fillStyle   = grd;
  X.fillRect(0, GY, W, H - GY);
  // Horizon ledge line
  X.globalAlpha = alpha * 0.45;
  X.fillStyle   = `rgb(${Math.min(255,gr+45)},${Math.min(255,gg+42)},${Math.min(255,gb+38)})`;
  X.fillRect(0, GY, W, 1.5);
  X.globalAlpha = 1;
}

// ---------------------------------------------------------------
// Main render loop
// ---------------------------------------------------------------
function frame(now) {
  requestAnimationFrame(frame);

  // Update transition progress
  if (transT < 1) {
    transT = clamp((now - transStart) / TRANS_DUR);
  }
  const t = ss(0, 1, transT);
  const aA = 1 - t;   // alpha for current (A) scene
  const bA = t;       // alpha for target (B) scene

  const defA = TIMES[currentKey];
  const defB = TIMES[targetKey];

  X.clearRect(0, 0, W, H);

  // Sky — both layers
  drawSky(defA, aA);
  drawSky(defB, bA);

  // Horizon glow
  drawHorizonGlow(defA, aA);
  drawHorizonGlow(defB, bA);

  // Aurora (behind everything else)
  drawAurora(defA, now, aA);
  drawAurora(defB, now, bA);

  // Stars
  drawStars(defA, now, aA);
  drawStars(defB, now, bA);

  // Moon
  if (defA.moonOn) drawMoon(aA, now);
  if (defB.moonOn) drawMoon(bA, now);

  // Sun
  drawSun(defA, aA, now);
  drawSun(defB, bA, now);

  // Mountains (far + near)
  drawMountains(defA, aA);
  drawMountains(defB, bA);

  // Clouds
  drawClouds(defA, now, aA);
  drawClouds(defB, now, bA);

  // Buildings — back layer
  drawBuildings(defA, BLDS_BACK, aA, now, true);
  drawBuildings(defB, BLDS_BACK, bA, now, true);

  // Z-Tower
  drawZTower(defA, aA, now);
  drawZTower(defB, bA, now);

  // Buildings — front layer
  drawBuildings(defA, BLDS_FRONT, aA, now, false);
  drawBuildings(defB, BLDS_FRONT, bA, now, false);

  // Ground bar
  drawGround(defA, aA);
  drawGround(defB, bA);
}

// ---------------------------------------------------------------
// Boot
// ---------------------------------------------------------------
requestAnimationFrame(frame);
</script>
</body>
