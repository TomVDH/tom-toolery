<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tsar Bomba — Cabinet Cut</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080810; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Courier New', monospace; color: #aaa; }
  canvas { display: block; border: 1px solid #222; }
  .controls { margin-top: 12px; display: flex; gap: 16px; align-items: center; }
  button { background: #c33; color: #fff; border: none; padding: 8px 24px; font-size: 14px; cursor: pointer; font-family: inherit; border-radius: 3px; }
  button:hover { background: #e44; }
  #timer { font-size: 14px; color: #888; min-width: 120px; }
  h3 { color: #c44; margin-bottom: 4px; font-size: 13px; letter-spacing: 2px; }
  .credits { font-size: 10px; color: #444; margin-bottom: 8px; }
</style>
</head>
<body>
<h3>TSAR BOMBA &mdash; CABINET CUT</h3>
<div class="credits">Henske &middot; Thieuke &middot; Sakke &middot; Jonasty &middot; Pitr &middot; Poekie &middot; Bostrol &middot; Kevijntje</div>
<canvas id="c" width="620" height="640"></canvas>
<div class="controls">
  <button id="btn">Detonate</button>
  <span id="timer">Ready</span>
</div>

<script>
// ================================================================
// TSAR BOMBA — CABINET CUT
// Spun off from 19-tsar-bomba-full.html
//
// Henske:    fire colour ramp, thermal pillar, atmospheric wash
// Thieuke:   clean architecture, smooth easing, no redundancy
// Jonasty:   timing curves, interpolation quality, particle lifecycle
// Sakke:     efficient particle pools, no GC thrashing
// Pitr:      cut the bloat — every line earns its place
// Poekie:    city with EMP blackout, dust wave, human-scale dread
// Bostrol:   version tracking, marker discipline
// Kevijntje: scope — 11s, same canvas, no frameworks
// ================================================================
'use strict';

const C = document.getElementById('c');
const X = C.getContext('2d');
const W = 620, H = 640;
const btn = document.getElementById('btn');
const timerEl = document.getElementById('timer');

let nukeOn = false, nukeT0 = 0;
const DUR = 11000;
const GX = W / 2, GY = H * 0.78;

// --- Easing (Jonasty: clean interpolation) ---
const ease3 = t => 1 - Math.pow(1 - t, 3);
const clamp01 = t => Math.max(0, Math.min(1, t));
const lerp = (a, b, t) => a + (b - a) * clamp01(t);
const smoothstep = (lo, hi, x) => { const t = clamp01((x - lo) / (hi - lo)); return t * t * (3 - 2 * t); };

// --- Pseudo-random (Sakke: deterministic, no allocations) ---
const seed = (x, y) => { let s = Math.sin(x * 127.1 + y * 311.7) * 43758.5453; return s - Math.floor(s); };

// --- Stars ---
const stars = Array.from({length: 45}, (_, i) => ({
  x: seed(i, 0) * W, y: seed(i, 1) * H * 0.5,
  r: 0.5 + seed(i, 2) * 1.5, ph: seed(i, 3) * 6.28, sp: 0.5 + seed(i, 4) * 2
}));

// --- Clouds ---
const clouds = Array.from({length: 6}, (_, i) => ({
  x: 40 + seed(i, 10) * (W - 80), y: 60 + seed(i, 11) * 140,
  w: 60 + seed(i, 12) * 90, h: 8 + seed(i, 13) * 12
}));

// --- City (Poekie: detailed skyline with windows that die) ---
const buildings = [];
for (let bx = 0; bx < W; bx += 14 + seed(bx, 50) * 16) {
  const bw = 12 + seed(bx, 51) * 20;
  const bh = 30 + seed(bx, 52) * 100;
  const wins = [];
  for (let wy = 6; wy < bh - 8; wy += 11) {
    for (let wx = 3; wx < bw - 5; wx += 7) {
      wins.push({ dx: wx, dy: wy, on: seed(bx + wx, wy) > 0.35, dieAt: 300 + seed(bx + wx, wy + 9) * 800 });
    }
  }
  buildings.push({ x: bx, w: bw, h: bh, wins });
}

// --- Particle pools (Sakke: pre-allocated, no splice) ---
const MAX_SHRAPNEL = 40, MAX_EMBERS = 100, MAX_ASH = 50, MAX_DUST = 60, MAX_SPARKS = 30;
const pool = (n) => Array.from({length: n}, () => ({ alive: false }));
const shrapnel = pool(MAX_SHRAPNEL);
const embers = pool(MAX_EMBERS);
const ash = pool(MAX_ASH);
const dust = pool(MAX_DUST);
const sparks = pool(MAX_SPARKS);

function spawn(arr, props) {
  for (let p of arr) { if (!p.alive) { Object.assign(p, props, { alive: true }); return p; } }
}

// --- Shake ---
let shakeX = 0, shakeY = 0;

// --- Detonate ---
btn.onclick = () => {
  nukeOn = true;
  nukeT0 = performance.now();
  // Reset particles
  for (let arr of [shrapnel, embers, ash, dust, sparks]) arr.forEach(p => p.alive = false);
  // Shrapnel burst
  for (let i = 0; i < 35; i++) {
    const a = seed(i, 70) * Math.PI * 2;
    const sp = 3 + seed(i, 71) * 7;
    spawn(shrapnel, { x: GX, y: GY, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 2, life: 25 + seed(i, 72)*20, mx: 45 });
  }
  // Ground dust wave (Poekie: the human-scale horror)
  for (let i = 0; i < MAX_DUST; i++) {
    const dir = i < MAX_DUST / 2 ? -1 : 1;
    const delay = seed(i, 80) * 40;
    spawn(dust, {
      x: GX + (seed(i, 81) - 0.5) * 60, y: GY + seed(i, 82) * 8,
      vx: dir * (2 + seed(i, 83) * 4), vy: -0.3 - seed(i, 84) * 0.8,
      life: -delay, mx: 180 + seed(i, 85) * 120,  // negative life = delayed
      r: 3 + seed(i, 86) * 8
    });
  }
};

// --- Main frame ---
function frame(now) {
  requestAnimationFrame(frame);
  const ms = nukeOn ? now - nukeT0 : -1;
  if (nukeOn && ms > DUR) { nukeOn = false; timerEl.textContent = 'Complete'; }
  if (nukeOn) timerEl.textContent = (ms / 1000).toFixed(1) + 's / 11.0s';

  // Shake (Jonasty: layered — initial blast + aftershock + rumble)
  shakeX = 0; shakeY = 0;
  if (nukeOn) {
    let amp = 0;
    if (ms < 3000) amp += 14 * (1 - ms / 3000);        // initial blast
    if (ms > 1400 && ms < 2200) amp += 10 * smoothstep(2200, 1400, ms); // aftershock
    if (ms > 2500 && ms < 6000) amp += 2 * Math.sin(ms * 0.02) * smoothstep(6000, 2500, ms); // rumble
    shakeX = (Math.random() - 0.5) * 2 * Math.min(12, amp);
    shakeY = (Math.random() - 0.5) * 2 * Math.min(12, amp);
  }

  X.save();
  X.translate(shakeX, shakeY);

  // === SKY (Henske: three-phase sky colour — flash/fire/twilight) ===
  let skyR = 10, skyG = 10, skyB = 20;
  if (nukeOn) {
    const flash = ms < 300 ? 1 : 0;
    const fire = smoothstep(300, 1500, ms) * smoothstep(6000, 2000, ms);
    const twilight = smoothstep(4000, 8000, ms) * smoothstep(11000, 8000, ms);
    skyR = lerp(10, 255, flash) + fire * 60 + twilight * 5;
    skyG = lerp(10, 245, flash) + fire * 25;
    skyB = lerp(20, 200, flash) + fire * 10 + twilight * 15;
  }
  X.fillStyle = `rgb(${Math.round(clamp01(skyR/255)*255)},${Math.round(clamp01(skyG/255)*255)},${Math.round(clamp01(skyB/255)*255)})`;
  X.fillRect(-20, -20, W + 40, H + 40);

  // Stars (dim during blast)
  const starA = nukeOn ? Math.max(0, 1 - smoothstep(0, 200, ms) * 4) * smoothstep(7000, 10000, ms) : 1;
  if (starA > 0.01) {
    stars.forEach(s => {
      const tw = 0.5 + 0.5 * Math.sin(now * 0.001 * s.sp + s.ph);
      X.globalAlpha = starA * tw * 0.8;
      X.fillStyle = '#fff';
      X.beginPath(); X.arc(s.x, s.y, s.r, 0, Math.PI * 2); X.fill();
    });
    X.globalAlpha = 1;
  }

  // Clouds (lit orange underside)
  clouds.forEach(c => {
    X.globalAlpha = 0.1;
    X.fillStyle = '#556';
    X.beginPath(); X.ellipse(c.x, c.y, c.w / 2, c.h / 2, 0, 0, Math.PI * 2); X.fill();
    if (nukeOn && ms < 7000) {
      const lit = smoothstep(0, 500, ms) * smoothstep(7000, 4000, ms) * 0.55;
      if (lit > 0.01) {
        X.globalAlpha = lit;
        X.fillStyle = 'rgba(255,170,50,0.7)';
        X.beginPath(); X.ellipse(c.x, c.y + c.h * 0.25, c.w / 2, c.h / 2, 0, 0, Math.PI * 2); X.fill();
      }
    }
    X.globalAlpha = 1;
  });

  // ===============================
  // === TSAR BOMBA MUSHROOM CLOUD
  // ===============================
  if (nukeOn && ms > 80) {
    const ct = clamp01((ms - 80) / 3000);
    const fadeT = ms > 8500 ? clamp01((ms - 8500) / 2500) : 0;
    const dk = ms > 2000 ? clamp01((ms - 2000) / 2800) : 0;
    const odK = ms > 3500 ? clamp01((ms - 3500) / 2500) : 0; // outer delayed dark
    const al = (1 - fadeT) * 0.92;
    if (al < 0.01) { /* skip */ }
    else {
      X.globalAlpha = al;
      const rise = ease3(clamp01(ct * 1.5));
      const drift = clamp01(ms / DUR) * H * 0.06;
      const cY = GY - rise * (H * 0.44) - drift;
      const grow = clamp01(ct * 2);
      const capR = 52 + grow * 85;
      const capRx = capR * 1.65;
      const sTW = 22 + grow * 20, sBW = 42 + grow * 50;
      const hS = dk * 20, lD = dk * 38;
      const ohS = odK * 20, olD = odK * 38;

      // --- Ground debris cloud (Poekie: expanding dust base) ---
      const debR = sBW * 2 * grow;
      const debA = al * Math.max(0, 1 - dk * 0.5);
      if (debA > 0.01 && debR > 5) {
        const dg = X.createRadialGradient(GX, GY, 0, GX, GY, debR);
        dg.addColorStop(0, `hsla(25,80%,${Math.max(8, 35 - lD)}%,${debA * 0.65})`);
        dg.addColorStop(0.5, `hsla(18,60%,${Math.max(5, 20 - lD)}%,${debA * 0.3})`);
        dg.addColorStop(1, 'hsla(15,50%,15%,0)');
        X.fillStyle = dg;
        X.beginPath(); X.ellipse(GX, GY, debR, debR * 0.22, 0, 0, Math.PI * 2); X.fill();
      }

      // --- Base glow ---
      const bgR = capRx * 2.5;
      const bgA = al * Math.max(0, 1 - dk * 0.6);
      const bg = X.createRadialGradient(GX, GY, 0, GX, GY, bgR);
      bg.addColorStop(0, `hsla(38,100%,75%,${bgA * 0.9})`);
      bg.addColorStop(0.12, `hsla(30,100%,55%,${bgA * 0.5})`);
      bg.addColorStop(0.35, `hsla(22,100%,35%,${bgA * 0.12})`);
      bg.addColorStop(1, 'hsla(15,100%,20%,0)');
      X.fillStyle = bg;
      X.beginPath(); X.arc(GX, GY, bgR, 0, Math.PI * 2); X.fill();

      // --- Thermal pillar (Henske: vertical light column) ---
      if (ms < 5000) {
        const pillarA = al * smoothstep(100, 400, ms) * smoothstep(5000, 2500, ms) * 0.25;
        const pg = X.createLinearGradient(GX, cY - capR * 0.5, GX, 0);
        pg.addColorStop(0, `hsla(35,100%,60%,${pillarA})`);
        pg.addColorStop(0.5, `hsla(28,100%,45%,${pillarA * 0.3})`);
        pg.addColorStop(1, 'hsla(20,100%,30%,0)');
        X.fillStyle = pg;
        X.fillRect(GX - 15 * grow, 0, 30 * grow, cY - capR * 0.3);
      }

      // --- Stem with turbulence ---
      const stemTop = cY + capR * 0.28;
      const stemG = X.createLinearGradient(GX, stemTop, GX, GY);
      stemG.addColorStop(0, `hsla(${25 - hS},92%,${Math.max(10, 48 - lD)}%,${al})`);
      stemG.addColorStop(0.4, `hsla(${20 - hS},85%,${Math.max(8, 36 - lD)}%,${al})`);
      stemG.addColorStop(1, `hsla(${15 - hS},70%,${Math.max(5, 25 - lD)}%,${al})`);
      X.fillStyle = stemG;
      X.beginPath();
      const seg = 24;
      X.moveTo(GX - sTW / 2, stemTop);
      for (let s = 0; s <= seg; s++) {
        const t = s / seg;
        const y = stemTop + (GY - stemTop) * t;
        const w = sTW / 2 + (sBW / 2 - sTW / 2) * t;
        const turb = Math.sin(t * 13 + ms * 0.003) * 3.5 + Math.sin(t * 8 + ms * 0.005) * 2.5;
        X.lineTo(GX - w - turb, y);
      }
      for (let s = seg; s >= 0; s--) {
        const t = s / seg;
        const y = stemTop + (GY - stemTop) * t;
        const w = sTW / 2 + (sBW / 2 - sTW / 2) * t;
        const turb = Math.sin(t * 13 + ms * 0.003 + 3) * 3.5 + Math.sin(t * 8 + ms * 0.005 + 2) * 2.5;
        X.lineTo(GX + w + turb, y);
      }
      X.closePath(); X.fill();

      // Stem core glow
      const scA = al * Math.max(0, 0.45 - dk * 0.35);
      if (scA > 0.01) {
        const sc = X.createLinearGradient(GX, stemTop, GX, GY);
        sc.addColorStop(0, `hsla(38,100%,65%,${scA})`);
        sc.addColorStop(1, `hsla(22,100%,40%,${scA * 0.25})`);
        X.fillStyle = sc;
        X.beginPath();
        X.moveTo(GX - sTW * 0.18, stemTop);
        X.lineTo(GX - sBW * 0.12, GY);
        X.lineTo(GX + sBW * 0.12, GY);
        X.lineTo(GX + sTW * 0.18, stemTop);
        X.closePath(); X.fill();
      }

      // --- Cap glow halo ---
      const gR = capRx * 3;
      const gg = X.createRadialGradient(GX, cY, capR * 0.15, GX, cY, gR);
      gg.addColorStop(0, `hsla(32,100%,${Math.max(18, 68 - lD * 2)}%,${al * 0.55})`);
      gg.addColorStop(0.3, `hsla(26,100%,${Math.max(12, 52 - lD * 2)}%,${al * 0.28})`);
      gg.addColorStop(0.6, `hsla(20,100%,${Math.max(8, 36 - lD * 2)}%,${al * 0.08})`);
      gg.addColorStop(1, 'hsla(15,100%,25%,0)');
      X.fillStyle = gg;
      X.beginPath(); X.arc(GX, cY, gR, 0, Math.PI * 2); X.fill();

      // --- Cap layers (5) ---
      X.fillStyle = `hsla(${12 - ohS},60%,${Math.max(5, 30 - olD)}%,${al})`;
      X.beginPath(); X.ellipse(GX, cY, capRx * 1.15, capR * 1.0, 0, 0, Math.PI * 2); X.fill();

      X.fillStyle = `hsla(${16 - ohS},72%,${Math.max(8, 38 - olD)}%,${al})`;
      X.beginPath(); X.ellipse(GX, cY - capR * 0.03, capRx * 0.95, capR * 0.85, 0, 0, Math.PI * 2); X.fill();

      X.fillStyle = `hsla(${22 - hS},88%,${Math.max(10, 48 - lD)}%,${al})`;
      X.beginPath(); X.ellipse(GX, cY - capR * 0.06, capRx * 0.75, capR * 0.7, 0, 0, Math.PI * 2); X.fill();

      X.fillStyle = `hsla(${30 - hS},100%,${Math.max(15, 58 - lD)}%,${al})`;
      X.beginPath(); X.ellipse(GX, cY - capR * 0.08, capRx * 0.52, capR * 0.52, 0, 0, Math.PI * 2); X.fill();

      // Hot core — delayed dark
      const coreDk = ms > 6000 ? clamp01((ms - 6000) / 2500) : 0;
      const coreA = al * Math.max(0.1, 1 - coreDk);
      X.fillStyle = `hsla(42,100%,${Math.max(22, 78 - lD * 1.5)}%,${coreA})`;
      X.beginPath(); X.ellipse(GX, cY - capR * 0.1, capRx * 0.3, capR * 0.3, 0, 0, Math.PI * 2); X.fill();

      // White-hot double fireball (Tsar Bomba signature)
      if (ms < 3500) {
        const wa = clamp01(1 - Math.max(0, ms - 500) / 3000) * al;
        X.fillStyle = `rgba(255,255,230,${wa * 0.85})`;
        X.beginPath(); X.ellipse(GX, cY - capR * 0.05, capRx * 0.18, capR * 0.18, 0, 0, Math.PI * 2); X.fill();
        if (ms < 1200) {
          X.fillStyle = `rgba(255,255,255,${(1 - ms / 1200) * al})`;
          X.beginPath(); X.ellipse(GX, cY - capR * 0.05, capRx * 0.1, capR * 0.1, 0, 0, Math.PI * 2); X.fill();
        }
      }

      // --- Base ring / skirt ---
      X.fillStyle = `hsla(${15 - hS},72%,${Math.max(5, 30 - lD)}%,${al * 0.7})`;
      X.beginPath(); X.ellipse(GX, cY + capR * 0.55, capRx * 1.25, capR * 0.24, 0, 0, Math.PI * 2); X.fill();

      // (rolling side clouds removed — Tom's call)

      // --- Cloud bands (6) ---
      const bNow = ms / 1000;
      for (let i = 0; i < 6; i++) {
        const entry = 0.12 + i * 0.12;
        if (ct < entry) continue;
        const bAge = clamp01((ct - entry) / 0.35);
        const t01 = i / 5;
        const finalY = cY - capR * (0.6 - t01 * 1.1);
        const startY = cY + capR * 0.5;
        const bY = lerp(startY, finalY, bAge) + Math.sin(bNow * (0.4 + i * 0.2) + i * 2.3) * capR * 0.025;
        const bW = capRx * (0.5 + t01 * 0.9) * bAge;
        const fade = (0.6 + t01 * 0.4) * bAge;
        const pulse = 0.3 + 0.1 * Math.sin(bNow * (1.2 + i * 0.4) + i * 1.7);
        const bA = al * pulse * fade;
        const bL = Math.max(8, (42 - i * 3) - lD);
        const bH = 22 - hS + i * 3;
        const sag1 = capR * 0.04 * Math.sin(bNow * (0.6 + i * 0.3) + i);
        const sag2 = capR * 0.03 * Math.sin(bNow * (0.5 + i * 0.2) + i + 1.5);
        X.strokeStyle = `hsla(${bH},78%,${bL}%,${bA})`;
        X.lineWidth = (3.5 + t01 * 2.5) * bAge;
        X.lineCap = 'round';
        X.beginPath();
        X.moveTo(GX - bW, bY);
        X.quadraticCurveTo(GX - bW * 0.35, bY + sag1, GX, bY + sag2);
        X.quadraticCurveTo(GX + bW * 0.35, bY - sag1, GX + bW, bY);
        X.stroke();
      }

      X.globalAlpha = 1;
    }
  }

  // === Shockwave ring (double ring — Jonasty) ===
  if (nukeOn && ms > 180 && ms < 2200) {
    const st = (ms - 180) / 2020;
    const r1 = st * Math.max(W, H) * 0.9;
    X.globalAlpha = (1 - st) * 0.35;
    X.strokeStyle = 'rgba(255,200,100,0.6)';
    X.lineWidth = 3 + (1 - st) * 10;
    X.beginPath(); X.arc(GX, GY, r1, 0, Math.PI * 2); X.stroke();
    // Inner ring
    if (st > 0.05) {
      const r2 = (st - 0.05) * Math.max(W, H) * 0.85;
      X.globalAlpha = (1 - st) * 0.2;
      X.lineWidth = 2 + (1 - st) * 5;
      X.beginPath(); X.arc(GX, GY, r2, 0, Math.PI * 2); X.stroke();
    }
    X.globalAlpha = 1;
  }

  // === City silhouette (Poekie: EMP blackout) ===
  X.fillStyle = '#0a0a18';
  X.fillRect(0, GY, W, H - GY);
  buildings.forEach(b => {
    const by = GY - b.h;
    X.fillStyle = '#0c0c1a';
    X.fillRect(b.x, by, b.w, b.h);
    // Windows — EMP kills them
    b.wins.forEach(w => {
      let on = w.on;
      if (nukeOn && ms > w.dieAt) on = false;   // EMP blackout
      if (nukeOn && ms > w.dieAt && ms < w.dieAt + 100 && Math.random() > 0.5) on = true; // flicker
      X.fillStyle = on ? 'rgba(255,200,60,0.5)' : 'rgba(255,200,60,0.03)';
      X.fillRect(b.x + w.dx, by + w.dy, 4, 5);
    });
  });

  // Building rim light
  if (nukeOn && ms < 7000) {
    const rimA = smoothstep(0, 500, ms) * smoothstep(7000, 5000, ms) * 0.55;
    if (rimA > 0.01) {
      X.strokeStyle = `rgba(255,160,40,${rimA})`;
      X.lineWidth = 1.2;
      buildings.forEach(b => {
        X.beginPath(); X.moveTo(b.x, GY - b.h); X.lineTo(b.x + b.w, GY - b.h); X.stroke();
      });
    }
  }

  // === Particles ===
  // Spawn embers
  if (nukeOn && ms > 600 && ms < 6000) {
    const ct2 = clamp01((ms - 80) / 3000);
    const rise2 = ease3(clamp01(ct2 * 1.5));
    const drift2 = clamp01(ms / DUR) * H * 0.06;
    const cY2 = GY - rise2 * (H * 0.44) - drift2;
    const grow2 = clamp01(ct2 * 2);
    const eR = (52 + grow2 * 85) * 1.65 * 1.25;
    const eY = cY2 + (52 + grow2 * 85) * 0.55;
    for (let i = 0; i < 2; i++) {
      spawn(embers, {
        x: GX + (Math.random() - 0.5) * 2 * eR, y: eY + Math.random() * 8,
        vx: (Math.random() - 0.5) * 0.8, vy: 0.3 + Math.random() * 0.6,
        life: 120 + Math.random() * 180, mx: 300, r: 1 + Math.random() * 2.5, hue: 15 + Math.random() * 30
      });
    }
  }

  // Spawn sparks (Henske: bright pinpoint embers rising)
  if (nukeOn && ms > 200 && ms < 4000) {
    if (Math.random() < 0.3) {
      spawn(sparks, {
        x: GX + (Math.random() - 0.5) * 80, y: GY - Math.random() * 40,
        vx: (Math.random() - 0.5) * 2, vy: -2 - Math.random() * 4,
        life: 40 + Math.random() * 60, mx: 100, r: 0.5 + Math.random() * 1.5
      });
    }
  }

  // Spawn ash
  if (nukeOn && ms > 3000 && ms < 8500) {
    if (Math.random() < 0.12) {
      spawn(ash, {
        x: Math.random() * W, y: -10,
        vx: (Math.random() - 0.5) * 0.5, vy: 0.3 + Math.random() * 0.8,
        life: 200 + Math.random() * 200, mx: 400, r: 0.5 + Math.random() * 1.5
      });
    }
  }

  // Draw shrapnel
  shrapnel.forEach(p => {
    if (!p.alive) return;
    p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
    if (p.life <= 0) { p.alive = false; return; }
    const a = p.life / p.mx;
    X.globalAlpha = a;
    X.strokeStyle = `rgba(255,180,60,${a})`;
    X.lineWidth = 1.5;
    X.beginPath(); X.moveTo(p.x, p.y); X.lineTo(p.x - p.vx * 2, p.y - p.vy * 2); X.stroke();
  });

  // Draw embers
  embers.forEach(p => {
    if (!p.alive) return;
    p.x += p.vx + Math.sin(p.life * 0.02 + p.x * 0.01) * 0.15;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) { p.alive = false; return; }
    const a = p.life / p.mx * 0.8;
    X.globalAlpha = a;
    X.fillStyle = `hsl(${p.hue},100%,${50 + a * 25}%)`;
    X.shadowColor = `hsl(${p.hue},100%,50%)`; X.shadowBlur = 6;
    X.beginPath(); X.arc(p.x, p.y, p.r * (0.5 + (p.life / p.mx) * 0.5), 0, Math.PI * 2); X.fill();
    X.shadowBlur = 0;
  });

  // Draw sparks (Henske: bright rising embers)
  sparks.forEach(p => {
    if (!p.alive) return;
    p.x += p.vx; p.y += p.vy; p.vy += 0.01; p.vx *= 0.99; p.life--;
    if (p.life <= 0) { p.alive = false; return; }
    const a = p.life / p.mx;
    X.globalAlpha = a;
    X.fillStyle = `rgba(255,${200 + Math.round(a * 55)},${100 + Math.round(a * 100)},${a})`;
    X.shadowColor = 'rgba(255,200,80,0.8)'; X.shadowBlur = 4;
    X.beginPath(); X.arc(p.x, p.y, p.r * a, 0, Math.PI * 2); X.fill();
    X.shadowBlur = 0;
  });

  // Draw ash
  ash.forEach(p => {
    if (!p.alive) return;
    p.x += p.vx + Math.sin(p.life * 0.02) * 0.3; p.y += p.vy; p.life--;
    if (p.life <= 0) { p.alive = false; return; }
    X.globalAlpha = clamp01(p.life / p.mx) * 0.35;
    X.fillStyle = '#888';
    X.beginPath(); X.arc(p.x, p.y, p.r, 0, Math.PI * 2); X.fill();
  });

  // Draw dust wave (Poekie: ground-level expanding debris)
  dust.forEach(p => {
    if (!p.alive) return;
    p.life++;
    if (p.life < 0) return; // still delayed
    if (p.life > p.mx) { p.alive = false; return; }
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.985; p.vy *= 0.98;
    const a = (1 - p.life / p.mx) * 0.45;
    const expand = 1 + p.life / p.mx * 2;
    X.globalAlpha = a;
    X.fillStyle = `hsla(25,30%,25%,${a})`;
    X.beginPath(); X.arc(p.x, p.y, p.r * expand, 0, Math.PI * 2); X.fill();
  });
  X.globalAlpha = 1;

  // === Overlays ===
  // White flash
  if (nukeOn && ms < 300) {
    X.globalAlpha = (1 - (ms / 300) ** 2) * 0.95;
    X.fillStyle = '#fff';
    X.fillRect(-20, -20, W + 40, H + 40);
    X.globalAlpha = 1;
  }

  // Warm radial overlay
  if (nukeOn && ms < 8000) {
    const ct2 = clamp01((ms - 80) / 3000);
    const rise2 = ease3(clamp01(ct2 * 1.5));
    const drift2 = clamp01(ms / DUR) * H * 0.06;
    const cY2 = GY - rise2 * (H * 0.44) - drift2;
    const oi = (1 - (ms / 8000) ** 2) * 0.55;
    const rad = Math.max(W, H) * 1.4;
    const rg = X.createRadialGradient(GX, cY2, 0, GX, cY2, rad);
    rg.addColorStop(0, `hsla(38,100%,70%,${oi})`);
    rg.addColorStop(0.25, `hsla(28,100%,50%,${oi * 0.55})`);
    rg.addColorStop(0.6, `hsla(20,95%,30%,${oi * 0.18})`);
    rg.addColorStop(1, 'hsla(15,80%,15%,0)');
    X.fillStyle = rg;
    X.fillRect(0, 0, W, H);
  }

  // Aftershock brightness pulse
  if (nukeOn && ms > 1400 && ms < 2200) {
    X.globalAlpha = smoothstep(2200, 1400, ms) * 0.15;
    X.fillStyle = '#fff';
    X.fillRect(0, 0, W, H);
    X.globalAlpha = 1;
  }

  // Vignette
  const vg = X.createRadialGradient(W / 2, H / 2, H * 0.35, W / 2, H / 2, H * 0.75);
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.4)');
  X.fillStyle = vg; X.fillRect(0, 0, W, H);

  X.restore();
}

requestAnimationFrame(frame);
</script>
</body>
