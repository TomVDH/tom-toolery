<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Preview 29 — DRONE! Countdown V2</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #05050f; color: #ccc; font-family: 'SF Mono', 'Menlo', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 16px; }
  h1 { font-size: 14px; color: #445; letter-spacing: 3px; text-transform: uppercase; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  .proto { position: relative; }
  .proto canvas { border: 2px solid #1a1a3a; border-radius: 10px; cursor: pointer; }
  .proto .label { text-align: center; font-size: 10px; color: #556; margin-top: 5px; letter-spacing: 1px; }
  .hint { font-size: 10px; color: #334; margin-top: 4px; }
  .fav { color: #00d4ff; }
</style>
</head>
<body>
<h1>DRONE! Countdown — V2 Prototypes</h1>
<p class="hint">Click any canvas to replay. <span class="fav">★ = shortlisted from V1</span></p>

<div class="row">
  <div class="proto"><canvas id="c1" width="280" height="280"></canvas><div class="label"><span class="fav">★</span> A — Milestone Slam</div></div>
  <div class="proto"><canvas id="c2" width="280" height="280"></canvas><div class="label"><span class="fav">★</span> B — Typewriter Burn-In</div></div>
  <div class="proto"><canvas id="c3" width="280" height="280"></canvas><div class="label"><span class="fav">★</span> D — Shockwave Slam</div></div>
</div>
<div class="row">
  <div class="proto"><canvas id="c4" width="280" height="280"></canvas><div class="label">E — Neon Flicker</div></div>
  <div class="proto"><canvas id="c5" width="280" height="280"></canvas><div class="label">F — Radar Sweep</div></div>
  <div class="proto"><canvas id="c6" width="280" height="280"></canvas><div class="label">G — Particle Assemble</div></div>
  <div class="proto"><canvas id="c7" width="280" height="280"></canvas><div class="label">H — Split Converge</div></div>
</div>

<script>
const W = 280, H = 280;
const ids = ['c1','c2','c3','c4','c5','c6','c7'];
const canvases = ids.map(id => ({ canvas: document.getElementById(id), ctx: document.getElementById(id).getContext('2d'), startTime: 0 }));
canvases.forEach((c, i) => c.canvas.addEventListener('click', () => { c.startTime = performance.now(); }));

function drawBg(ctx) {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#080815'); g.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  for (let i = 0; i < 10; i++) {
    ctx.fillStyle = '#0c0c1e';
    ctx.fillRect(i * 30 + (i * 7) % 10, H - 35 - 20 - Math.sin(i * 2.3) * 18, 18, 20 + Math.sin(i * 2.3) * 18);
  }
  ctx.fillStyle = '#0a0a18'; ctx.fillRect(0, H - 35, W, 35);
}

const cx = W / 2, cy = H / 2 - 20;
const text = 'DRONE!';

// ★ A — Milestone Slam (from V1)
function drawA(ctx, t) {
  drawBg(ctx); if (t < 0) return;
  const phase = Math.min(1, t / 1.8);
  let scale, alpha;
  if (phase < 0.15) {
    const p = phase / 0.15;
    const ease = p < 0.7 ? p / 0.7 : 1 + (1 - (p - 0.7) / 0.3) * 0.15;
    scale = 2.0 - ease; alpha = Math.min(1, p * 2);
  } else if (phase < 0.7) {
    scale = 1 + Math.sin((phase - 0.15) * 12) * 0.02; alpha = 1;
  } else {
    const rt = (phase - 0.7) / 0.3; scale = 1 + rt * rt * 1.2; alpha = Math.max(0, 1 - rt * rt * 1.5);
  }
  ctx.save(); ctx.translate(cx, cy); ctx.scale(scale, scale); ctx.globalAlpha = alpha;
  ctx.font = '700 34px "Segoe UI", system-ui, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 30;
  ctx.fillText(text, 0, 0); ctx.shadowBlur = 12; ctx.fillText(text, 0, 0);
  ctx.shadowBlur = 0; ctx.shadowColor = 'transparent'; ctx.globalAlpha = 1; ctx.restore();
}

// ★ B — Typewriter Burn-In (from V1)
function drawB(ctx, t) {
  drawBg(ctx); if (t < 0) return;
  const charTime = 0.12, totalType = 6 * charTime, holdTime = 0.8, fadeTime = 0.4;
  ctx.font = '700 36px "Courier New", monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const charW = ctx.measureText('D').width;
  const totalW = ctx.measureText(text).width;
  const startX = cx - totalW / 2;

  if (t < totalType) {
    const charsVisible = Math.floor(t / charTime);
    const charPhase = (t % charTime) / charTime;
    for (let i = 0; i <= charsVisible && i < 6; i++) {
      const isNew = (i === charsVisible);
      const cX = startX + ctx.measureText(text.substring(0, i)).width + charW / 2;
      ctx.save();
      if (isNew) {
        ctx.globalAlpha = 0.3 + charPhase * 0.7; ctx.fillStyle = '#00d4ff';
        ctx.shadowColor = '#fff'; ctx.shadowBlur = 20 + (1 - charPhase) * 30;
        ctx.fillText(text[i], cX, cy);
        if (1 - charPhase > 0.5) { ctx.globalAlpha = (1 - charPhase) * 0.5; ctx.fillStyle = '#fff'; ctx.shadowBlur = 40; ctx.fillText(text[i], cX, cy); }
      } else {
        ctx.globalAlpha = 1; ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 8; ctx.fillText(text[i], cX, cy);
      }
      ctx.restore();
    }
    const curX = startX + ctx.measureText(text.substring(0, Math.min(Math.floor(t / charTime) + 1, 6))).width + 4;
    if (Math.sin(t * 20) > 0) { ctx.fillStyle = '#00d4ff'; ctx.globalAlpha = 0.6; ctx.fillRect(curX, cy - 16, 2, 32); ctx.globalAlpha = 1; }
  } else if (t < totalType + holdTime) {
    const pulse = 1 + Math.sin((t - totalType) / holdTime * Math.PI * 4) * 0.03;
    ctx.save(); ctx.translate(cx, cy); ctx.scale(pulse, pulse);
    ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 15; ctx.fillText(text, 0, 0);
    ctx.shadowBlur = 0; ctx.shadowColor = 'transparent'; ctx.restore();
  } else {
    const f = (t - totalType - holdTime) / fadeTime;
    ctx.save(); ctx.globalAlpha = Math.max(0, 1 - f); ctx.translate(cx, cy); ctx.scale(1 + f * 0.3, 1 + f * 0.3);
    ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 10 + f * 20; ctx.fillText(text, 0, 0); ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// ★ D — Shockwave Slam (from V1)
function drawD(ctx, t) {
  drawBg(ctx); if (t < 0) return;
  const phase = Math.min(1, t / 2.0);
  ctx.font = '700 36px "Segoe UI", system-ui, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  if (phase < 0.15) {
    const dropT = phase / 0.15; const easeIn = dropT * dropT * dropT;
    const y = -30 + (cy + 30) * easeIn;
    ctx.save(); ctx.globalAlpha = Math.min(1, dropT * 2); ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 20;
    ctx.fillText(text, cx, y); ctx.restore();
  } else if (phase < 0.2) {
    const impT = (phase - 0.15) / 0.05; const flash = Math.max(0, 1 - impT);
    ctx.save(); ctx.globalAlpha = flash * 0.4; ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H); ctx.restore();
    const shake = (1 - impT) * 4;
    ctx.save(); ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 25;
    ctx.fillText(text, cx, cy); ctx.shadowBlur = 10; ctx.fillText(text, cx, cy); ctx.restore();
  } else if (phase < 0.7) {
    const hp = (phase - 0.2) / 0.5;
    const rr = 20 + hp * 160; const ra = Math.max(0, 0.4 - hp * 0.5);
    ctx.save(); ctx.strokeStyle = 'rgba(0,212,255,' + ra + ')'; ctx.lineWidth = 2 - hp * 1.5; ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(cx, cy, rr, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
    if (hp > 0.15) { const r2p = (hp - 0.15) / 0.85; const r2r = 15 + r2p * 130; const r2a = Math.max(0, 0.25 - r2p * 0.35);
      ctx.save(); ctx.strokeStyle = 'rgba(0,212,255,' + r2a + ')'; ctx.lineWidth = 1.5 - r2p; ctx.beginPath(); ctx.arc(cx, cy, r2r, 0, Math.PI * 2); ctx.stroke(); ctx.restore(); }
    const breathe = 1 + Math.sin(hp * Math.PI * 6) * 0.015;
    ctx.save(); ctx.translate(cx, cy); ctx.scale(breathe, breathe); ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 12;
    ctx.fillText(text, 0, 0); ctx.shadowBlur = 0; ctx.shadowColor = 'transparent'; ctx.restore();
  } else {
    const ft = (phase - 0.7) / 0.3;
    ctx.save(); ctx.translate(cx, cy); ctx.scale(1 + ft * 0.4, 1 + ft * 0.4); ctx.globalAlpha = Math.max(0, 1 - ft * 1.3);
    ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = ft * 25; ctx.fillText(text, 0, 0); ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════
// E — Neon Flicker
// Text appears like a neon sign being powered on — flickers,
// buzzes to full brightness, holds, then dies out with a pop.
// ═══════════════════════════════════════════════
function drawE(ctx, t) {
  drawBg(ctx); if (t < 0) return;
  const dur = 2.4;
  ctx.font = '700 36px "Courier New", monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  if (t < 0.6) {
    // Flicker on — random on/off with increasing probability
    const onProb = t / 0.6;
    const isOn = Math.random() < (onProb * onProb);
    if (isOn) {
      const brightness = 0.3 + onProb * 0.7;
      ctx.save(); ctx.globalAlpha = brightness;
      ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff';
      ctx.shadowBlur = 4 + brightness * 20;
      ctx.fillText(text, cx, cy);
      // Neon tube glow halo
      ctx.shadowBlur = brightness * 40;
      ctx.strokeStyle = 'rgba(0, 212, 255, ' + (brightness * 0.2) + ')';
      ctx.lineWidth = 3;
      ctx.strokeText(text, cx, cy);
      ctx.restore();
    }
    // Ambient buzz — faint ghost text always visible
    ctx.save(); ctx.globalAlpha = 0.06 + Math.random() * 0.04;
    ctx.fillStyle = '#00d4ff'; ctx.fillText(text, cx + (Math.random() - 0.5) * 2, cy);
    ctx.restore();

  } else if (t < 1.8) {
    // Full on — stable with subtle hum vibration
    const humPhase = (t - 0.6) / 1.2;
    const hum = Math.sin(t * 120) * 0.3; // 60Hz hum
    ctx.save();
    ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff';
    ctx.shadowBlur = 18 + hum * 4;
    ctx.fillText(text, cx, cy + hum * 0.3);
    // Outer glow
    ctx.shadowBlur = 35 + hum * 6;
    ctx.strokeStyle = 'rgba(0, 212, 255, 0.15)';
    ctx.lineWidth = 4;
    ctx.strokeText(text, cx, cy + hum * 0.3);
    ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
    ctx.restore();

    // Reflection on ground
    ctx.save(); ctx.globalAlpha = 0.06;
    ctx.fillStyle = '#00d4ff';
    ctx.fillText(text, cx, H - 35 + 8);
    ctx.restore();

  } else {
    // Die out — flicker off rapidly then pop
    const dieT = (t - 1.8) / (dur - 1.8);
    const isOn = Math.random() < (1 - dieT * dieT);
    if (isOn && dieT < 0.8) {
      const fade = 1 - dieT;
      ctx.save(); ctx.globalAlpha = fade;
      ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = fade * 15;
      ctx.fillText(text, cx + (Math.random() - 0.5) * dieT * 6, cy);
      ctx.restore();
    }
    // Final pop flash
    if (dieT > 0.75 && dieT < 0.85) {
      ctx.save(); ctx.globalAlpha = (0.85 - dieT) * 8;
      ctx.fillStyle = '#fff'; ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 50;
      ctx.fillText(text, cx, cy);
      ctx.restore();
    }
  }
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════
// F — Radar Sweep
// Text revealed by a rotating radar line sweep,
// chars light up as the beam passes over them.
// ═══════════════════════════════════════════════
function drawF(ctx, t) {
  drawBg(ctx); if (t < 0) return;
  const dur = 2.5;
  ctx.font = '700 36px "Courier New", monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  // Radar ring
  const sweepAngle = (t / 0.8) * Math.PI * 2; // full rotation in 0.8s
  const sweepAlpha = t < 1.2 ? Math.min(0.4, t * 0.8) : Math.max(0, 0.4 - (t - 1.2) * 0.4);

  if (sweepAlpha > 0.01) {
    ctx.save();
    // Sweep line
    ctx.strokeStyle = 'rgba(0, 212, 255, ' + sweepAlpha + ')';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(sweepAngle) * 160, cy + Math.sin(sweepAngle) * 160);
    ctx.stroke();
    // Sweep trail (fading arc)
    for (let i = 1; i < 8; i++) {
      const trailAngle = sweepAngle - i * 0.12;
      const trailAlpha = sweepAlpha * (1 - i / 8) * 0.3;
      ctx.strokeStyle = 'rgba(0, 212, 255, ' + trailAlpha + ')';
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(trailAngle) * 140, cy + Math.sin(trailAngle) * 140);
      ctx.stroke();
    }
    // Ring
    ctx.strokeStyle = 'rgba(0, 212, 255, ' + (sweepAlpha * 0.3) + ')';
    ctx.beginPath(); ctx.arc(cx, cy, 80, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, 40, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }

  // Text reveal — each char lights up based on sweep position
  const totalW = ctx.measureText(text).width;
  const startX = cx - totalW / 2;
  const charW = ctx.measureText('D').width;

  for (let i = 0; i < 6; i++) {
    const charCX = startX + ctx.measureText(text.substring(0, i)).width + charW / 2;
    const charAngle = Math.atan2(cy - cy, charCX - cx); // all at same y, angle = 0 or PI
    const revealTime = 0.15 + i * 0.13; // stagger reveal

    if (t < revealTime) continue;

    const charAge = t - revealTime;
    let charAlpha;
    if (charAge < 0.15) {
      charAlpha = charAge / 0.15; // fade in
    } else if (t < dur - 0.4) {
      charAlpha = 1;
    } else {
      charAlpha = Math.max(0, 1 - (t - (dur - 0.4)) / 0.4);
    }

    ctx.save();
    ctx.globalAlpha = charAlpha;
    ctx.fillStyle = '#00d4ff';
    ctx.shadowColor = '#00d4ff';
    ctx.shadowBlur = charAge < 0.3 ? 20 : 8; // bright on reveal
    ctx.fillText(text[i], charCX, cy);

    // Ping dot on reveal
    if (charAge < 0.3) {
      const pingR = charAge / 0.3 * 15;
      const pingA = (1 - charAge / 0.3) * 0.4;
      ctx.strokeStyle = 'rgba(0, 212, 255, ' + pingA + ')';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(charCX, cy, pingR, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════
// G — Particle Assemble
// Letters form from scattered particles that converge
// into position, crystallise, then shatter apart.
// ═══════════════════════════════════════════════

// Pre-generate particle positions for each letter
const particleSets = [];
for (let c = 0; c < 6; c++) {
  const set = [];
  for (let p = 0; p < 12; p++) {
    set.push({
      startX: (Math.random() - 0.5) * W * 1.5,
      startY: (Math.random() - 0.5) * H * 1.5,
      endOff: { x: (Math.random() - 0.5) * 14, y: (Math.random() - 0.5) * 14 },
      size: 1 + Math.random() * 2.5,
      speed: 0.7 + Math.random() * 0.5,
      exitAngle: Math.random() * Math.PI * 2,
      exitSpeed: 2 + Math.random() * 4
    });
  }
  particleSets.push(set);
}

function drawG(ctx, t) {
  drawBg(ctx); if (t < 0) return;
  const dur = 2.5;
  ctx.font = '700 36px "Courier New", monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const totalW = ctx.measureText(text).width;
  const startX = cx - totalW / 2;
  const charW = ctx.measureText('D').width;

  for (let c = 0; c < 6; c++) {
    const charCX = startX + ctx.measureText(text.substring(0, c)).width + charW / 2;
    const charDelay = c * 0.06;
    const localT = t - charDelay;
    if (localT < 0) continue;

    if (localT < 0.6) {
      // Converge phase — particles fly toward letter position
      const convT = localT / 0.6;
      const ease = 1 - Math.pow(1 - convT, 3); // ease-out
      particleSets[c].forEach(p => {
        const px = p.startX + (charCX + p.endOff.x - p.startX) * ease * p.speed;
        const py = p.startY + (cy + p.endOff.y - p.startY) * ease * p.speed;
        ctx.save();
        ctx.globalAlpha = Math.min(1, convT * 2);
        ctx.fillStyle = '#00d4ff';
        ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 4;
        ctx.beginPath(); ctx.arc(px, py, p.size * (1 - ease * 0.5), 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      });
    } else if (localT < 0.75) {
      // Crystallise — particles snap to letter, letter fades in
      const crystT = (localT - 0.6) / 0.15;
      ctx.save(); ctx.globalAlpha = crystT;
      ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff';
      ctx.shadowBlur = (1 - crystT) * 20 + 8;
      ctx.fillText(text[c], charCX, cy);
      ctx.restore();
      // Residual particles fading
      particleSets[c].forEach(p => {
        ctx.save(); ctx.globalAlpha = (1 - crystT) * 0.5;
        ctx.fillStyle = '#00d4ff';
        ctx.beginPath(); ctx.arc(charCX + p.endOff.x, cy + p.endOff.y, p.size * 0.5, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      });
    } else if (localT < dur - 0.5 - charDelay) {
      // Stable hold
      ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 8;
      ctx.fillText(text[c], charCX, cy);
      ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
    } else {
      // Shatter — letter breaks into particles flying outward
      const shatterT = (localT - (dur - 0.5 - charDelay)) / 0.5;
      if (shatterT < 0.1) {
        // Brief flash of full letter
        ctx.save(); ctx.globalAlpha = 1 - shatterT * 10;
        ctx.fillStyle = '#00d4ff'; ctx.fillText(text[c], charCX, cy);
        ctx.restore();
      }
      particleSets[c].forEach(p => {
        const ease = shatterT * shatterT;
        const px = charCX + p.endOff.x + Math.cos(p.exitAngle) * p.exitSpeed * ease * 80;
        const py = cy + p.endOff.y + Math.sin(p.exitAngle) * p.exitSpeed * ease * 80;
        ctx.save(); ctx.globalAlpha = Math.max(0, 1 - ease * 1.3);
        ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 3;
        ctx.beginPath(); ctx.arc(px, py, p.size * (1 - ease * 0.5), 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      });
    }
  }
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════
// H — Split Converge
// "DRO" comes from left, "NE!" from right, they slam
// together in the centre with a flash and particles.
// ═══════════════════════════════════════════════
function drawH(ctx, t) {
  drawBg(ctx); if (t < 0) return;
  const dur = 2.0;
  ctx.font = '700 36px "Segoe UI", system-ui, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const left = 'DRO', right = 'NE!';

  if (t < 0.3) {
    // Converge — halves slide in from edges
    const slideT = t / 0.3;
    const ease = 1 - Math.pow(1 - slideT, 3);
    const leftX = -60 + (cx - 42) * ease;   // "DRO" → left of centre
    const rightX = W + 60 - (W + 60 - cx - 12) * ease; // "NE!" → right of centre
    const alpha = Math.min(1, slideT * 2);

    ctx.save(); ctx.globalAlpha = alpha;
    ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 15;
    ctx.textAlign = 'right'; ctx.fillText(left, leftX + 40, cy);
    ctx.textAlign = 'left'; ctx.fillText(right, rightX - 40, cy);
    ctx.restore();

  } else if (t < 0.35) {
    // Impact — flash
    const impT = (t - 0.3) / 0.05;
    ctx.save(); ctx.globalAlpha = (1 - impT) * 0.5; ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H); ctx.restore();
    const shake = (1 - impT) * 5;
    ctx.save(); ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 25 + (1 - impT) * 15;
    ctx.fillText(text, cx, cy); ctx.restore();

  } else if (t < 1.5) {
    // Hold with impact ring
    const holdT = (t - 0.35) / 1.15;

    // Impact ring
    if (holdT < 0.5) {
      const ringR = holdT * 2 * 120;
      const ringA = Math.max(0, 0.35 - holdT * 0.7);
      ctx.save(); ctx.strokeStyle = 'rgba(0,212,255,' + ringA + ')'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cx, cy, ringR, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
    }

    ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 12;
    ctx.fillText(text, cx, cy);
    ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';

  } else {
    // Split apart and fade — reverse of entry
    const exitT = (t - 1.5) / 0.5;
    const ease = exitT * exitT;
    const leftX = cx - 42 - ease * 100;
    const rightX = cx - 12 + ease * 100;
    const alpha = Math.max(0, 1 - ease * 1.5);

    ctx.save(); ctx.globalAlpha = alpha;
    ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = ease * 15;
    ctx.textAlign = 'right'; ctx.fillText(left, leftX + 40, cy);
    ctx.textAlign = 'left'; ctx.fillText(right, rightX - 40, cy);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════
// Loop
// ═══════════════════════════════════════════════
const drawFns = [drawA, drawB, drawD, drawE, drawF, drawG, drawH];
const durs = [1.8, 2.2, 2.0, 2.4, 2.5, 2.5, 2.0];

function loop() {
  const now = performance.now();
  canvases.forEach((c, i) => {
    const elapsed = (now - c.startTime) / 1000;
    const loopDur = durs[i] + 1.2;
    const t = elapsed % loopDur;
    drawFns[i](c.ctx, t < durs[i] ? t : -1);
  });
  requestAnimationFrame(loop);
}

canvases.forEach((c, i) => { c.startTime = performance.now() - i * 300; });
loop();
</script>
