<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nuke Trilogy — Three Original Concepts</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050510; color: #ccc; font-family: 'SF Mono', 'Menlo', 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 14px 6px; min-height: 100vh; }
  h1 { color: #fff; font-size: 17px; letter-spacing: 3px; margin-bottom: 2px; }
  .sub { color: #555; font-size: 10px; margin-bottom: 12px; letter-spacing: 1px; }
  .stage { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .panel { display: flex; flex-direction: column; align-items: center; }
  .panel canvas { border: 1px solid #1a1a2e; border-radius: 10px; cursor: crosshair; }
  .label { font-size: 11px; letter-spacing: 2px; margin-top: 8px; margin-bottom: 2px; }
  .l1 { color: #f0a050; } .l2 { color: #8060e0; } .l3 { color: #40d090; }
  .tag { font-size: 9px; color: #444; margin-bottom: 5px; }
  .controls { margin-top: 12px; display: flex; gap: 7px; align-items: center; flex-wrap: wrap; justify-content: center; }
  button { background: #0c0c18; border: 1px solid #2a2a3e; color: #999; padding: 7px 16px; font-size: 11px; font-family: inherit; cursor: pointer; border-radius: 4px; transition: all .2s; letter-spacing: 1px; }
  button:hover { background: #151528; color: #eee; }
  .ba { border-color: #c33; color: #f66; } .b1 { border-color: #805020; color: #f0a050; }
  .b2 { border-color: #503080; color: #8060e0; } .b3 { border-color: #208050; color: #40d090; }
  .timer { font-size: 10px; color: #444; margin-top: 7px; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<h1>NUKE TRILOGY</h1>
<p class="sub">THREE ORIGINAL DETONATION CONCEPTS</p>

<div class="stage">
  <div class="panel">
    <div class="label l1">I &mdash; BLOOM</div>
    <div class="tag">Organic Radial Petal Detonation</div>
    <canvas id="c1" width="390" height="490"></canvas>
  </div>
  <div class="panel">
    <div class="label l2">II &mdash; SINGULARITY</div>
    <div class="tag">Gravitational Implosion &rarr; Annihilation</div>
    <canvas id="c2" width="390" height="490"></canvas>
  </div>
  <div class="panel">
    <div class="label l3">III &mdash; AURORA</div>
    <div class="tag">High-Altitude EMP &middot; Ionosphere Cascade</div>
    <canvas id="c3" width="390" height="490"></canvas>
  </div>
</div>

<div class="controls">
  <button class="ba" id="btnAll">DETONATE ALL</button>
  <button class="b1" id="btn1">I: Bloom</button>
  <button class="b2" id="btn2">II: Singularity</button>
  <button class="b3" id="btn3">III: Aurora</button>
  <button id="btnR">Reset</button>
</div>
<div class="timer" id="tmr">Ready</div>

<script>
'use strict';

const W = 390, H = 490, DUR = 11;
const clamp = (v, lo=0, hi=1) => Math.max(lo, Math.min(hi, v));
const lerp = (a, b, t) => a + (b - a) * clamp(t);
const ss = (lo, hi, x) => { const t = clamp((x - lo) / (hi - lo)); return t * t * (3 - 2 * t); };
const ease3 = t => 1 - (1 - clamp(t)) ** 3;
const ease2 = t => 1 - (1 - clamp(t)) ** 2;
const hash = (x, y) => { let s = Math.sin(x * 127.1 + y * 311.7) * 43758.5453; return s - Math.floor(s); };

// Shared stars
const STARS = Array.from({length: 40}, (_, i) => ({
  x: hash(i, 0) * W, y: hash(i, 1) * H * 0.5,
  r: 0.35 + hash(i, 2) * 1.1, ph: hash(i, 3) * 6.28, sp: 0.4 + hash(i, 4) * 1.8
}));

function drawStarfield(X, now, dim = 1) {
  STARS.forEach(s => {
    const tw = 0.45 + 0.55 * Math.sin(now * 0.001 * s.sp + s.ph);
    X.globalAlpha = tw * 0.65 * dim;
    X.fillStyle = '#dde';
    X.beginPath(); X.arc(s.x, s.y, s.r, 0, Math.PI * 2); X.fill();
  });
  X.globalAlpha = 1;
}

// Shared city builder
function mkCity(off) {
  const b = [];
  for (let bx = 0; bx < W; bx += 10 + hash(bx + off, 50) * 14) {
    const bw = 9 + hash(bx + off, 51) * 17;
    const bh = 22 + hash(bx + off, 52) * 85;
    const wins = [];
    for (let wy = 4; wy < bh - 5; wy += 9)
      for (let wx = 2; wx < bw - 4; wx += 6)
        wins.push({ dx: wx, dy: wy, on: hash(bx + wx + off, wy) > 0.38, die: 200 + hash(bx + wx + off, wy + 9) * 600 });
    b.push({ x: bx, w: bw, h: bh, wins });
  }
  return b;
}

function drawCity(X, blds, GY, tMs, nukeOn) {
  X.fillStyle = '#0a0a14';
  X.fillRect(0, GY, W, H - GY);
  blds.forEach(b => {
    X.fillStyle = '#0d0d1a';
    X.fillRect(b.x, GY - b.h, b.w, b.h);
    b.wins.forEach(w => {
      let on = w.on;
      if (nukeOn && tMs > w.die) on = false;
      if (nukeOn && tMs > w.die && tMs < w.die + 80 && Math.random() > 0.5) on = true;
      X.fillStyle = on ? 'rgba(255,200,55,0.4)' : 'rgba(255,200,55,0.02)';
      X.fillRect(b.x + w.dx, GY - b.h + w.dy, 3, 4);
    });
  });
}

// Pool utility
const pool = n => Array.from({length: n}, () => ({ alive: false }));
function spawn(arr, props) {
  for (const p of arr) if (!p.alive) { Object.assign(p, props, { alive: true }); return p; }
}

// ===============================================================
// I — BLOOM
// Organic explosion that unfurls in concentric petal rings.
// No mushroom. The blast is a living flower of fire.
// ===============================================================
const BLOOM = (() => {
  const cvs = document.getElementById('c1');
  const X = cvs.getContext('2d');
  const GY = H * 0.72;
  const GX = W / 2;
  const blds = mkCity(0);
  let on = false, t0 = 0;

  // Petal ring data — each ring is a tier of the bloom
  const RINGS = 5;
  const petals = []; // { ring, angle, span, hue, delay }
  for (let r = 0; r < RINGS; r++) {
    const count = 8 + r * 4;
    const baseHue = 30 - r * 6; // outer rings cooler
    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2 + hash(r, i) * 0.3;
      petals.push({
        ring: r,
        angle,
        span: (Math.PI * 2 / count) * (0.6 + hash(r + i, 7) * 0.5),
        hue: baseHue + hash(r, i + 3) * 15,
        delay: r * 0.35 + hash(r, i + 1) * 0.2,
        wobble: hash(r + 5, i) * 4,
        drift: (hash(r, i + 8) - 0.5) * 0.08
      });
    }
  }

  // Ember particles
  const embers = pool(150);
  const cinders = pool(60);

  function detonate(now) {
    on = true; t0 = now;
    embers.forEach(p => p.alive = false);
    cinders.forEach(p => p.alive = false);
  }

  function frame(now) {
    const t = on ? (now - t0) / 1000 : -1;
    const tMs = t * 1000;
    if (on && t > DUR) on = false;

    // Shake — organic rumble
    let shX = 0, shY = 0;
    if (on && t > 0) {
      const amp = t < 2 ? 8 * (1 - t / 2) : t < 4 ? 2 * Math.sin(t * 6) * ss(4, 2, t) : 0;
      shX = (Math.random() - 0.5) * amp;
      shY = (Math.random() - 0.5) * amp;
    }

    X.save();
    X.translate(shX, shY);

    // Sky — warm amber wash during blast
    let skyR = 8, skyG = 7, skyB = 16;
    if (on) {
      const warm = ss(0.2, 1.5, t) * ss(7, 3, t);
      skyR += warm * 55; skyG += warm * 18; skyB += warm * 5;
    }
    X.fillStyle = `rgb(${skyR|0},${skyG|0},${skyB|0})`;
    X.fillRect(-20, -20, W + 40, H + 40);

    const starDim = on ? Math.max(0, 1 - ss(0, 0.3, t) * 5) * ss(7, 10, t) : 1;
    drawStarfield(X, now, starDim);

    // === THE BLOOM ===
    if (on && t > 0.05) {
      // White flash — sharp, fast
      if (t < 0.25) {
        X.globalAlpha = (1 - (t / 0.25) ** 1.5) * 0.9;
        X.fillStyle = '#fffae8';
        X.fillRect(-20, -20, W + 40, H + 40);
        X.globalAlpha = 1;
      }

      // Central core — pulsing heartbeat
      const coreLife = ss(0.1, 0.6, t) * ss(8, 5, t);
      if (coreLife > 0.01) {
        const pulse = 1 + Math.sin(t * 8) * 0.12 * ss(4, 1, t);
        const coreR = (15 + ease3(t / 2) * 40) * pulse;
        const cg = X.createRadialGradient(GX, GY, 0, GX, GY, coreR);
        cg.addColorStop(0, `hsla(45,100%,95%,${coreLife * 0.95})`);
        cg.addColorStop(0.25, `hsla(38,100%,75%,${coreLife * 0.7})`);
        cg.addColorStop(0.6, `hsla(25,100%,50%,${coreLife * 0.35})`);
        cg.addColorStop(1, `hsla(12,100%,25%,0)`);
        X.fillStyle = cg;
        X.beginPath(); X.arc(GX, GY, coreR, 0, Math.PI * 2); X.fill();
      }

      // Draw petal rings — the bloom unfurls outward
      petals.forEach(p => {
        const age = t - p.delay;
        if (age < 0) return;
        const life = clamp(age / (DUR - p.delay - 2));
        const open = ease2(clamp(age / 1.5));  // how far the petal has opened
        const fade = age > 6 ? clamp((age - 6) / 3) : 0;
        const alpha = (1 - fade) * (0.6 + p.ring * 0.05);
        if (alpha < 0.01) return;

        const ringR = (30 + p.ring * 38) * open;
        const dark = clamp(age / 5);

        // Petal shape — arc segment radiating from center
        const cx = GX + Math.cos(p.angle + p.drift * age) * ringR;
        const cy = GY + Math.sin(p.angle + p.drift * age) * ringR * 0.55; // vertically compressed
        const petalW = (12 + p.ring * 7) * open;
        const petalH = (8 + p.ring * 5) * open;

        // Wobble — organic breathing
        const wb = Math.sin(age * (2 + p.wobble) + p.angle * 3) * 3 * open;

        X.save();
        X.translate(cx + wb * 0.5, cy + wb * 0.3);
        X.rotate(p.angle + Math.sin(age * 1.5 + p.ring) * 0.15);

        // Petal glow halo
        const lum = Math.max(12, 55 - dark * 40);
        const sat = Math.max(30, 95 - dark * 50);
        const pg = X.createRadialGradient(0, 0, 0, 0, 0, petalW * 1.5);
        pg.addColorStop(0, `hsla(${p.hue - dark * 15},${sat}%,${lum + 15}%,${alpha * 0.6})`);
        pg.addColorStop(0.5, `hsla(${p.hue - dark * 15},${sat}%,${lum}%,${alpha * 0.25})`);
        pg.addColorStop(1, `hsla(${p.hue - dark * 15},${sat - 20}%,${lum - 8}%,0)`);
        X.fillStyle = pg;
        X.beginPath(); X.ellipse(0, 0, petalW * 1.5, petalH * 1.2, 0, 0, Math.PI * 2); X.fill();

        // Petal body — elliptical
        X.globalAlpha = alpha;
        X.fillStyle = `hsl(${p.hue - dark * 15},${sat}%,${lum}%)`;
        X.beginPath(); X.ellipse(0, 0, petalW, petalH, 0, 0, Math.PI * 2); X.fill();

        // Hot inner edge
        if (dark < 0.6) {
          X.fillStyle = `hsla(42,100%,${70 - dark * 30}%,${(1 - dark) * alpha * 0.7})`;
          X.beginPath(); X.ellipse(0, 0, petalW * 0.4, petalH * 0.4, 0, 0, Math.PI * 2); X.fill();
        }

        X.restore();
        X.globalAlpha = 1;
      });

      // Concentric shockwave rings — one per ring tier
      for (let r = 0; r < RINGS; r++) {
        const age = t - r * 0.35;
        if (age < 0.1 || age > 3) continue;
        const prog = clamp(age / 2.5);
        const ringR = prog * (80 + r * 55);
        const alpha = (1 - prog) * 0.25;
        X.globalAlpha = alpha;
        X.strokeStyle = `hsla(${35 - r * 5},80%,55%,${alpha})`;
        X.lineWidth = 1.5 + (1 - prog) * 3;
        X.beginPath();
        X.ellipse(GX, GY, ringR, ringR * 0.45, 0, 0, Math.PI * 2);
        X.stroke();
      }
      X.globalAlpha = 1;

      // Spawn embers — spiral outward from bloom
      if (t > 0.3 && t < 6) {
        for (let i = 0; i < 3; i++) {
          const a = Math.random() * Math.PI * 2;
          const sp = 0.8 + Math.random() * 2.5;
          spawn(embers, {
            x: GX + Math.cos(a) * 20, y: GY + Math.sin(a) * 10,
            vx: Math.cos(a) * sp + (Math.random() - 0.5) * 0.5,
            vy: Math.sin(a) * sp * 0.5 - 0.5 - Math.random() * 1.5,
            life: 60 + Math.random() * 120, mx: 180,
            r: 0.6 + Math.random() * 2, hue: 20 + Math.random() * 30
          });
        }
      }
      // Cinders — falling ash
      if (t > 3 && t < 9 && Math.random() < 0.15) {
        spawn(cinders, {
          x: GX + (Math.random() - 0.5) * W * 0.8, y: -5,
          vx: (Math.random() - 0.5) * 0.3, vy: 0.2 + Math.random() * 0.5,
          life: 150 + Math.random() * 150, mx: 300, r: 0.3 + Math.random() * 1
        });
      }
    }

    // Draw city (behind bloom center, in front of lower petals)
    drawCity(X, blds, GY, on ? (now - t0) : -1, on);

    // Rim light on buildings
    if (on && t > 0 && t < 5) {
      const ri = ss(0, 0.4, t) * ss(5, 3, t) * 0.45;
      X.strokeStyle = `rgba(240,160,60,${ri})`; X.lineWidth = 1;
      blds.forEach(b => { X.beginPath(); X.moveTo(b.x, GY - b.h); X.lineTo(b.x + b.w, GY - b.h); X.stroke(); });
    }

    // Draw particles
    embers.forEach(p => {
      if (!p.alive) return;
      p.x += p.vx; p.y += p.vy; p.vy += 0.01; p.vx *= 0.997; p.life--;
      // Spiral drift
      p.vx += Math.sin(p.life * 0.05) * 0.03;
      if (p.life <= 0 || p.y > GY) { p.alive = false; return; }
      const a = p.life / p.mx;
      X.globalAlpha = a * 0.8;
      X.fillStyle = `hsl(${p.hue},100%,${45 + a * 30}%)`;
      X.shadowColor = `hsl(${p.hue},100%,50%)`; X.shadowBlur = 4;
      X.beginPath(); X.arc(p.x, p.y, p.r * (0.3 + a * 0.7), 0, Math.PI * 2); X.fill();
      X.shadowBlur = 0;
    });
    cinders.forEach(p => {
      if (!p.alive) return;
      p.x += p.vx + Math.sin(p.life * 0.012) * 0.2; p.y += p.vy; p.life--;
      if (p.life <= 0) { p.alive = false; return; }
      X.globalAlpha = clamp(p.life / p.mx) * 0.25;
      X.fillStyle = '#888';
      X.beginPath(); X.arc(p.x, p.y, p.r, 0, Math.PI * 2); X.fill();
    });
    X.globalAlpha = 1;

    // Warm overlay
    if (on && t > 0 && t < 7) {
      const oi = ss(0, 1, t) * ss(7, 3.5, t) * 0.35;
      const rg = X.createRadialGradient(GX, GY, 0, GX, GY, W);
      rg.addColorStop(0, `hsla(35,100%,65%,${oi})`);
      rg.addColorStop(0.4, `hsla(22,90%,40%,${oi * 0.3})`);
      rg.addColorStop(1, 'hsla(10,80%,15%,0)');
      X.fillStyle = rg; X.fillRect(0, 0, W, H);
    }

    // Vignette
    const vg = X.createRadialGradient(W / 2, H / 2, H * 0.28, W / 2, H / 2, H * 0.68);
    vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.35)');
    X.fillStyle = vg; X.fillRect(0, 0, W, H);

    X.restore();
  }

  return { frame, detonate, reset() { on = false; embers.forEach(p => p.alive = false); cinders.forEach(p => p.alive = false); }, isOn: () => on, t: (now) => on ? (now - t0) / 1000 : -1 };
})();

// ===============================================================
// II — SINGULARITY
// Implosion → silence → annihilation sphere.
// Everything gets sucked inward first, then explodes outward.
// Space warps. Gravitational lensing. Accretion debris.
// ===============================================================
const SINGULARITY = (() => {
  const cvs = document.getElementById('c2');
  const gl = cvs.getContext('webgl2', { antialias: false, alpha: false });
  if (!gl) { cvs.getContext('2d').fillText('WebGL 2 required', 40, H/2); return { frame(){}, detonate(){}, reset(){}, isOn:()=>false, t:()=>-1 }; }

  let on = false, t0 = 0, gStart = performance.now();

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

  function mkS(type, src) {
    const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { console.error(gl.getShaderInfoLog(s)); return null; }
    return s;
  }
  function mkP(vs, fs) {
    const p = gl.createProgram();
    gl.attachShader(p, mkS(gl.VERTEX_SHADER, vs));
    gl.attachShader(p, mkS(gl.FRAGMENT_SHADER, fs));
    gl.linkProgram(p);
    return p;
  }

  const VS = `#version 300 es
in vec2 a; out vec2 uv;
void main(){ uv=a*.5+.5; gl_Position=vec4(a,0,1); }`;

  const FS = `#version 300 es
precision highp float;
in vec2 uv; out vec4 O;
uniform float T, NT;
uniform vec2 R;

float h21(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
float nse(vec2 p){
  vec2 i=floor(p),f=fract(p); f=f*f*(3.-2.*f);
  return mix(mix(h21(i),h21(i+vec2(1,0)),f.x),mix(h21(i+vec2(0,1)),h21(i+vec2(1,1)),f.x),f.y);
}
float fbm(vec2 p){
  float v=0.,a=.5; mat2 m=mat2(.8,.6,-.6,.8);
  for(int i=0;i<5;i++){v+=a*nse(p);p=m*p*2.;a*=.5;} return v;
}

void main(){
  vec2 p = uv;
  float t = NT;
  float gnd = .06;
  vec2 ctr = vec2(.5, .35);

  // === PHASES ===
  // 0-1.5s: IMPLOSION (suck inward)
  // 1.5-2.0s: SILENCE (compressed point)
  // 2.0-4.5s: ANNIHILATION (sphere expands)
  // 4.5-11s: DECAY (sphere fades, debris orbits)

  float impPhase = smoothstep(0.,1.5,t);
  float silence  = smoothstep(1.5,1.8,t) * smoothstep(2.2,1.9,t);
  float annPhase = smoothstep(2.0,4.0,t);
  float decay    = smoothstep(5.,11.,t);

  // === SKY ===
  vec3 c = mix(vec3(.012,.01,.03), vec3(.025,.02,.055), p.y);

  // Stars
  vec2 sg = floor(p * 300.);
  float sv = h21(sg);
  if(sv > .996){
    float tw = sin(T*2.+sv*60.)*.3+.7;
    float dim = t > 0. ? max(0., 1.-impPhase*3.) * smoothstep(7.,10.,t) : 1.;
    c += vec3(.55,.58,.75) * tw * smoothstep(.3,1.,p.y) * .6 * dim;
  }

  // === GRAVITATIONAL LENSING ===
  // Warp UV coordinates around the singularity
  if(t > 0.){
    vec2 d = p - ctr;
    float dist = length(d);
    // Implosion: warp space inward
    float warpStr = 0.;
    if(t < 2.){
      warpStr = impPhase * .08;
    } else {
      // Post-blast: reverse warp (space pushed outward)
      float sphR = (annPhase - decay * .7) * .4;
      warpStr = -smoothstep(sphR+.2, sphR, dist) * .04 * (1.-decay);
    }
    if(dist > .01){
      vec2 dir = d / dist;
      float bend = warpStr / (dist + .05);
      p -= dir * bend;
    }
  }

  // Re-derive sky with warped coords for lensing effect
  if(t > 0.3){
    vec3 warpedSky = mix(vec3(.015,.012,.04), vec3(.03,.025,.08), p.y);
    vec2 wsg = floor(p * 300.);
    float wsv = h21(wsg);
    if(wsv > .996){
      float wtw = sin(T*2.+wsv*60.)*.3+.7;
      warpedSky += vec3(.55,.58,.75) * wtw * smoothstep(.3,1.,p.y) * .6;
    }
    c = mix(c, warpedSky, smoothstep(0.,.8,t) * .7);
  }

  // === IMPLOSION VORTEX (0-1.5s) ===
  if(t > 0. && t < 2.2){
    vec2 d = uv - ctr;
    float dist = length(d);
    float angle = atan(d.y, d.x);
    // Spiral inflow lines
    float spiral = sin(angle * 6. - dist * 15. + T * 8.) * .5 + .5;
    spiral *= smoothstep(.5,.1,dist) * impPhase * (1.-silence);
    spiral *= smoothstep(.02,.06,dist); // not at exact center
    c += vec3(.5,.3,.8) * spiral * .4;

    // Compression point
    float pt = exp(-dist * 60.) * silence;
    c += vec3(.9,.85,1.) * pt * 2.;
  }

  // === ANNIHILATION SPHERE (2.0s+) ===
  if(t > 1.8){
    vec2 d = uv - ctr;
    float dist = length(d);
    float sphR = (annPhase - decay * .65) * .38;
    sphR = max(0., sphR);

    // Sphere body — deep violet-black with bright violet-white edge
    if(sphR > .01){
      float inSphere = smoothstep(sphR, sphR - .03, dist);
      float edge = smoothstep(sphR + .015, sphR, dist) * smoothstep(sphR - .025, sphR, dist);

      // Inside: dark void with noise
      vec3 voidCol = vec3(.02,.01,.04);
      float vn = fbm(d * 8. + T * .5);
      voidCol += vec3(.1,.05,.2) * vn * (1.-decay);
      c = mix(c, voidCol, inSphere * (1.-decay * .5));

      // Edge: bright violet-white corona
      float edgeGlow = edge * (1.-decay * .8);
      vec3 corona = mix(vec3(.7,.5,1.), vec3(1.,.95,1.), edge);
      c += corona * edgeGlow * 2.5;

      // Outer halo — diffuse purple
      float halo = exp(-max(0.,dist-sphR) * 8.) * (1.-decay * .7);
      c += vec3(.35,.2,.65) * halo * .8;
    }

    // Accretion ring — debris orbiting the sphere
    if(sphR > .02 && decay < .9){
      float angle = atan(d.y * 2.5, d.x); // squashed to ellipse
      float ringDist = length(vec2(d.x, d.y * 2.5));
      float ringMask = smoothstep(sphR + .08, sphR + .04, ringDist) *
                        smoothstep(sphR - .01, sphR + .02, ringDist);
      float ringNoise = fbm(vec2(angle * 3. + T * 2., ringDist * 20.));
      float ring = ringMask * ringNoise * (1. - decay);

      // Color: hot orange to violet
      vec3 ringCol = mix(vec3(1.,.5,.1), vec3(.6,.3,.9), ringNoise);
      c += ringCol * ring * 1.2;
    }

    // Ejected energy tendrils — radial streaks
    if(t > 2.2 && t < 7.){
      float tendrilT = smoothstep(2.2,3.,t) * smoothstep(7.,5.,t);
      float angle = atan(d.y, d.x);
      for(int i = 0; i < 8; i++){
        float ta = float(i) * .785 + T * .3;
        float diff = abs(mod(angle - ta + 3.14159, 6.28318) - 3.14159);
        float beam = exp(-diff * 12.) * smoothstep(sphR-.01, sphR+.02, dist) * exp(-(dist-sphR)*5.);
        float hue = h21(vec2(float(i), 5.));
        vec3 beamCol = mix(vec3(.8,.4,1.), vec3(.4,.7,1.), hue);
        c += beamCol * beam * tendrilT * .6;
      }
    }
  }

  // === CITY ===
  float fh = .06*nse(vec2(p.x*7.,50.)) + .03*nse(vec2(p.x*15.,55.)) + .015*nse(vec2(p.x*30.,60.));
  float tall = nse(vec2(floor(p.x*18.),70.));
  if(tall>.73) fh += .05*(tall-.73)*3.5;
  if(p.y < gnd+fh) c = vec3(.04,.035,.08);

  // City rim glow
  if(t > 1.8 && t < 8.){
    float ri = smoothstep(2.,3.,t) * smoothstep(8.,6.,t);
    float fe = smoothstep(gnd+fh+.004,gnd+fh-.004,p.y)*step(gnd+fh-.008,p.y);
    c += vec3(.5,.3,.8)*fe*ri*.5;
  }

  if(p.y < gnd) c = vec3(.02,.018,.04);

  // Vignette
  float v = 1.-smoothstep(.35,.82,length(uv-.5));
  c *= .55+v*.45;

  // Tonemap
  c = c*(2.51*c+.03)/(c*(2.43*c+.59)+.14);
  c = pow(clamp(c,vec3(0.),vec3(1.)), vec3(1./2.2));

  O = vec4(c,1.);
}`;

  const prog = mkP(VS, FS);
  const aL = gl.getAttribLocation(prog, 'a');
  const uT = gl.getUniformLocation(prog, 'T');
  const uNT = gl.getUniformLocation(prog, 'NT');
  const uR = gl.getUniformLocation(prog, 'R');
  gl.useProgram(prog); gl.uniform2f(uR, W, H);

  function detonate(now) { on = true; t0 = now; }

  function frame(now) {
    const gt = (now - gStart) / 1000;
    const nt = on ? (now - t0) / 1000 : -1;
    if (on && nt > DUR) on = false;

    gl.uniform1f(uT, gt);
    gl.uniform1f(uNT, nt > DUR ? -1 : nt);

    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.enableVertexAttribArray(aL);
    gl.vertexAttribPointer(aL, 2, gl.FLOAT, false, 0, 0);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }

  return { frame, detonate, reset() { on = false; }, isOn: () => on, t: (now) => on ? (now - t0) / 1000 : -1 };
})();

// ===============================================================
// III — AURORA
// High-altitude detonation. No mushroom cloud.
// The sky itself becomes the explosion — cascading curtains of
// light, EMP rings, ionized atmosphere, aurora borealis effect.
// ===============================================================
const AURORA = (() => {
  const cvs = document.getElementById('c3');
  const X = cvs.getContext('2d');
  const GY = H * 0.82;
  const blds = mkCity(200);
  let on = false, t0 = 0;

  // Aurora curtain data
  const CURTAINS = 7;
  const curtains = Array.from({length: CURTAINS}, (_, i) => ({
    baseY: 40 + i * 42,
    amplitude: 15 + hash(i, 20) * 25,
    freq: 1.5 + hash(i, 21) * 2,
    speed: 0.8 + hash(i, 22) * 1.5,
    hue: [140, 160, 280, 300, 120, 180, 260][i],
    delay: i * 0.4 + hash(i, 23) * 0.3,
    phase: hash(i, 24) * 6.28,
    thickness: 18 + hash(i, 25) * 20
  }));

  // EMP ring particles
  const rings = pool(8);
  const sparkles = pool(200);
  const ionTrails = pool(80);

  function detonate(now) {
    on = true; t0 = now;
    [rings, sparkles, ionTrails].forEach(a => a.forEach(p => p.alive = false));
    // Spawn EMP rings at staggered intervals
    for (let i = 0; i < 6; i++) {
      spawn(rings, {
        x: W * 0.5, y: H * 0.15,
        r: 0, maxR: Math.max(W, H) * 1.2,
        speed: 3 + i * 0.8, delay: i * 0.25,
        life: 0, mx: 180, hue: [160, 280, 140, 300, 180, 120][i],
        thickness: 2 + hash(i, 30) * 3
      });
    }
  }

  function frame(now) {
    const t = on ? (now - t0) / 1000 : -1;
    const tMs = t * 1000;
    if (on && t > DUR) on = false;

    X.save();

    // Sky — deep midnight blue, ionized green/purple during blast
    X.fillStyle = '#060812';
    X.fillRect(0, 0, W, H);

    // Ionized sky gradient during event
    if (on && t > 0.5) {
      const ionize = ss(0.5, 2, t) * ss(9, 6, t);
      if (ionize > 0.01) {
        const sg = X.createLinearGradient(0, 0, 0, GY);
        sg.addColorStop(0, `hsla(160,60%,12%,${ionize * 0.5})`);
        sg.addColorStop(0.3, `hsla(270,50%,10%,${ionize * 0.35})`);
        sg.addColorStop(0.6, `hsla(140,40%,8%,${ionize * 0.2})`);
        sg.addColorStop(1, 'hsla(200,30%,5%,0)');
        X.fillStyle = sg; X.fillRect(0, 0, W, GY);
      }
    }

    const starDim = on ? Math.max(0.1, 1 - ss(0, 0.5, t) * 3) * (0.3 + ss(5, 10, t) * 0.7) : 1;
    drawStarfield(X, now, starDim);

    // === HIGH-ALTITUDE FLASH ===
    if (on && t < 0.5) {
      const flashR = 30 + ease2(t / 0.5) * 120;
      const flashA = (1 - (t / 0.5) ** 1.5) * 0.85;
      const fg = X.createRadialGradient(W * 0.5, H * 0.15, 0, W * 0.5, H * 0.15, flashR);
      fg.addColorStop(0, `rgba(255,255,240,${flashA})`);
      fg.addColorStop(0.3, `rgba(200,255,200,${flashA * 0.6})`);
      fg.addColorStop(0.7, `rgba(100,200,255,${flashA * 0.2})`);
      fg.addColorStop(1, 'rgba(80,120,255,0)');
      X.fillStyle = fg;
      X.beginPath(); X.arc(W * 0.5, H * 0.15, flashR, 0, Math.PI * 2); X.fill();
    }

    // === Source point glow ===
    if (on && t > 0 && t < 8) {
      const gA = ss(0, 0.3, t) * ss(8, 4, t) * 0.4;
      const gR = 20 + ease3(clamp(t / 3)) * 40;
      const gg = X.createRadialGradient(W * 0.5, H * 0.15, 0, W * 0.5, H * 0.15, gR);
      gg.addColorStop(0, `hsla(180,80%,80%,${gA})`);
      gg.addColorStop(0.4, `hsla(260,60%,50%,${gA * 0.4})`);
      gg.addColorStop(1, 'hsla(200,50%,30%,0)');
      X.fillStyle = gg;
      X.beginPath(); X.arc(W * 0.5, H * 0.15, gR, 0, Math.PI * 2); X.fill();
    }

    // === AURORA CURTAINS ===
    if (on) {
      curtains.forEach(cur => {
        const age = t - cur.delay;
        if (age < 0) return;
        const intensity = ss(0, 1.5, age) * ss(DUR - 1, DUR - 3, t);
        if (intensity < 0.01) return;

        // Draw curtain as a series of vertical gradient strips
        const strips = 60;
        for (let i = 0; i < strips; i++) {
          const x = (i / strips) * W;
          const xn = x / W;
          // Wave shape
          const wave = Math.sin(xn * cur.freq * Math.PI * 2 + now * 0.001 * cur.speed + cur.phase) * cur.amplitude;
          const wave2 = Math.sin(xn * cur.freq * 1.7 * Math.PI * 2 + now * 0.0007 * cur.speed + cur.phase + 2) * cur.amplitude * 0.4;
          const y = cur.baseY + wave + wave2;
          const h = cur.thickness * (0.6 + 0.4 * Math.sin(xn * 8 + now * 0.002 + cur.phase));

          // Brightness varies along curtain
          const bright = 0.5 + 0.5 * Math.sin(xn * 12 + now * 0.003 * cur.speed + cur.phase * 2);

          const stripW = W / strips + 1;
          const sg = X.createLinearGradient(x, y - h, x, y + h * 2.5);
          const hueShift = Math.sin(xn * 4 + now * 0.001) * 20;
          const a = intensity * bright * 0.35;

          sg.addColorStop(0, `hsla(${cur.hue + hueShift},70%,65%,0)`);
          sg.addColorStop(0.2, `hsla(${cur.hue + hueShift},75%,55%,${a * 0.3})`);
          sg.addColorStop(0.4, `hsla(${cur.hue + hueShift},80%,45%,${a})`);
          sg.addColorStop(0.6, `hsla(${cur.hue + hueShift + 20},70%,35%,${a * 0.7})`);
          sg.addColorStop(1, `hsla(${cur.hue + hueShift},60%,20%,0)`);

          X.fillStyle = sg;
          X.fillRect(x, y - h, stripW, h * 3.5);
        }
      });
    }

    // === EMP RINGS — expanding circles from detonation point ===
    rings.forEach(p => {
      if (!p.alive) return;
      if (on && t > p.delay) {
        p.life++;
        p.r += p.speed;
        if (p.r > p.maxR) { p.alive = false; return; }
        const prog = p.r / p.maxR;
        const a = (1 - prog) * 0.35;
        X.globalAlpha = a;
        X.strokeStyle = `hsla(${p.hue},70%,60%,${a})`;
        X.lineWidth = p.thickness * (1 - prog * 0.5);
        X.beginPath();
        X.ellipse(p.x, H * 0.15, p.r, p.r * 0.3, 0, 0, Math.PI * 2);
        X.stroke();
      }
    });
    X.globalAlpha = 1;

    // Spawn ionization sparkles
    if (on && t > 0.8 && t < 7) {
      for (let i = 0; i < 2; i++) {
        spawn(sparkles, {
          x: Math.random() * W, y: Math.random() * GY * 0.8,
          vx: (Math.random() - 0.5) * 0.3, vy: 0.1 + Math.random() * 0.3,
          life: 30 + Math.random() * 60, mx: 90,
          r: 0.3 + Math.random() * 1.5, hue: [140, 160, 260, 280, 180][Math.random() * 5 | 0]
        });
      }
    }

    // Spawn ion trails — vertical streaks falling from aurora
    if (on && t > 1.5 && t < 8 && Math.random() < 0.2) {
      const cur = curtains[Math.random() * CURTAINS | 0];
      const age = t - cur.delay;
      if (age > 0) {
        spawn(ionTrails, {
          x: Math.random() * W, y: cur.baseY + Math.random() * 30,
          vx: (Math.random() - 0.5) * 0.15, vy: 0.8 + Math.random() * 1.5,
          life: 50 + Math.random() * 80, mx: 130,
          hue: cur.hue + Math.random() * 20, len: 8 + Math.random() * 15
        });
      }
    }

    // Draw sparkles
    sparkles.forEach(p => {
      if (!p.alive) return;
      p.x += p.vx; p.y += p.vy; p.life--;
      if (p.life <= 0) { p.alive = false; return; }
      const a = (p.life / p.mx) * 0.7;
      X.globalAlpha = a;
      X.fillStyle = `hsla(${p.hue},80%,70%,${a})`;
      X.shadowColor = `hsla(${p.hue},80%,60%,0.5)`; X.shadowBlur = 3;
      X.beginPath(); X.arc(p.x, p.y, p.r * a, 0, Math.PI * 2); X.fill();
      X.shadowBlur = 0;
    });

    // Draw ion trails — vertical glowing streaks
    ionTrails.forEach(p => {
      if (!p.alive) return;
      p.x += p.vx; p.y += p.vy; p.vy *= 0.995; p.life--;
      if (p.life <= 0 || p.y > GY) { p.alive = false; return; }
      const a = (p.life / p.mx) * 0.5;
      X.globalAlpha = a;
      X.strokeStyle = `hsla(${p.hue},70%,55%,${a})`;
      X.lineWidth = 1.2;
      X.beginPath(); X.moveTo(p.x, p.y); X.lineTo(p.x - p.vx * 2, p.y - p.len); X.stroke();
    });
    X.globalAlpha = 1;

    // City
    drawCity(X, blds, GY, on ? (now - t0) : -1, on);

    // City lit from above by aurora — colored rim light
    if (on && t > 1 && t < 9) {
      const ri = ss(1, 2, t) * ss(9, 7, t);
      const hue = 140 + Math.sin(t * 0.8) * 60;
      X.strokeStyle = `hsla(${hue},60%,45%,${ri * 0.35})`;
      X.lineWidth = 1;
      blds.forEach(b => { X.beginPath(); X.moveTo(b.x, GY - b.h); X.lineTo(b.x + b.w, GY - b.h); X.stroke(); });
    }

    // Subtle green/purple overlay wash
    if (on && t > 0.5 && t < 9) {
      const oi = ss(0.5, 2, t) * ss(9, 5, t) * 0.12;
      X.globalAlpha = oi;
      X.fillStyle = `hsl(${160 + Math.sin(t) * 40},50%,30%)`;
      X.fillRect(0, 0, W, GY);
      X.globalAlpha = 1;
    }

    // Vignette
    const vg = X.createRadialGradient(W / 2, H / 2, H * 0.28, W / 2, H / 2, H * 0.68);
    vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.4)');
    X.fillStyle = vg; X.fillRect(0, 0, W, H);

    X.restore();
  }

  return { frame, detonate, reset() { on = false; [rings, sparkles, ionTrails].forEach(a => a.forEach(p => p.alive = false)); }, isOn: () => on, t: (now) => on ? (now - t0) / 1000 : -1 };
})();

// ===============================================================
// MAIN LOOP
// ===============================================================
const ALL = [BLOOM, SINGULARITY, AURORA];

function loop(now) {
  ALL.forEach(n => n.frame(now));
  const ts = ALL.map(n => n.t(now)).filter(t => t > 0);
  if (ts.length > 0) document.getElementById('tmr').textContent = Math.max(...ts).toFixed(1) + 's / 11.0s';
  requestAnimationFrame(loop);
}

document.getElementById('btnAll').onclick = () => { const n = performance.now(); ALL.forEach(x => x.detonate(n)); };
document.getElementById('btn1').onclick = () => BLOOM.detonate(performance.now());
document.getElementById('btn2').onclick = () => SINGULARITY.detonate(performance.now());
document.getElementById('btn3').onclick = () => AURORA.detonate(performance.now());
document.getElementById('btnR').onclick = () => { ALL.forEach(x => x.reset()); document.getElementById('tmr').textContent = 'Ready'; };

requestAnimationFrame(loop);
</script>
</body>
