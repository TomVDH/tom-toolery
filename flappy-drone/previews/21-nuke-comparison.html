<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a18; color: #e0e0e0; font-family: 'SF Mono', 'Menlo', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
  h1 { color: #fff; font-size: 20px; margin-bottom: 4px; }
  .sub { color: #888; font-size: 12px; margin-bottom: 20px; }
  .row { display: flex; gap: 20px; align-items: flex-start; }
  .panel { display: flex; flex-direction: column; align-items: center; }
  .panel h2 { font-size: 13px; letter-spacing: 2px; margin-bottom: 8px; }
  .panel.current h2 { color: #00c8f0; }
  .panel.tsar h2 { color: #ff4400; }
  canvas { border: 2px solid #1a1a3a; border-radius: 14px; box-shadow: 0 0 80px #00d4ff08, 0 8px 40px #00000090; }
  .controls { margin-top: 12px; display: flex; gap: 8px; }
  button { background: #151528; border: 1px solid #ff4400; color: #ff8844; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: inherit; }
  button:hover { background: #1a0800; }
  .timer { color: #666; font-size: 11px; margin-top: 6px; min-height: 16px; }
  .both { margin-top: 16px; }
  .both button { border-color: #ffaa00; color: #ffcc44; font-size: 14px; padding: 10px 28px; }
</style>
</head>
<body>

<h1>Nuke Comparison — Side by Side</h1>
<p class="sub">Current in-game Classic vs Tsar Bomba. Both 11s, same timeline.</p>

<div class="both">
  <button onclick="detonateBoth()">☢ DETONATE BOTH</button>
</div>

<div class="row" style="margin-top:16px;">
  <div class="panel current">
    <h2>CLASSIC (IN-GAME)</h2>
    <canvas id="cA" width="400" height="420"></canvas>
    <div class="controls">
      <button onclick="triggerA()">Detonate</button>
    </div>
    <div class="timer" id="tA">Ready</div>
  </div>
  <div class="panel tsar">
    <h2>TSAR BOMBA</h2>
    <canvas id="cB" width="400" height="420"></canvas>
    <div class="controls">
      <button onclick="triggerB()">Detonate</button>
    </div>
    <div class="timer" id="tB">Ready</div>
  </div>
</div>

<script>
// Shared utilities
function lerp(a,b,t){ return a+(b-a)*t; }
function clamp(v,mn,mx){ return Math.max(mn,Math.min(mx,v)); }
function easeOut(t){ return 1-Math.pow(1-t,3); }

const TOTAL = 11000;

// Stars, clouds, city — shared data for both
function makeStars(W,H){ const s=[]; for(let i=0;i<30;i++) s.push({x:Math.random()*W, y:Math.random()*H*0.5, r:0.4+Math.random()*1.2, tw:Math.random()*6.28, sp:0.5+Math.random()*2}); return s; }
function makeClouds(W){ const c=[]; for(let i=0;i<4;i++) c.push({x:30+Math.random()*(W-60), y:50+Math.random()*80, w:40+Math.random()*60, h:6+Math.random()*8}); return c; }
function makeCity(W){ const b=[]; for(let x=0;x<W;x+=12+Math.random()*10) b.push({x, w:10+Math.random()*14, h:30+Math.random()*65}); return b; }

// ============ CLASSIC NUKE (current in-game) ============
const cA = document.getElementById('cA'), ctxA = cA.getContext('2d');
const WA=400, HA=420, GYA=HA*0.78;
let nukeA=false, startA=0;
const starsA=makeStars(WA,HA), cloudsA=makeClouds(WA), cityA=makeCity(WA);

function triggerA(){ nukeA=true; startA=performance.now(); }

function drawClassic(now){
  const el = nukeA ? now-startA : -1;
  if(nukeA && el>TOTAL){ nukeA=false; document.getElementById('tA').textContent='Complete'; }
  if(nukeA) document.getElementById('tA').textContent=(el/1000).toFixed(1)+'s';

  const ctx=ctxA;
  // Sky
  let sb=0;
  if(nukeA){ if(el<300) sb=1; else if(el<1500) sb=0.7*(1-(el-300)/1200); else if(el<5000) sb=0.15*(1-(el-1500)/3500); }
  ctx.fillStyle=`rgb(${10+sb*245|0},${10+sb*230|0},${20+sb*180|0})`;
  ctx.fillRect(0,0,WA,HA);

  // Stars
  const sa=clamp(1-sb*4,0,1);
  if(sa>0.01) starsA.forEach(s=>{ ctx.globalAlpha=sa*(0.5+0.5*Math.sin(now*0.001*s.sp+s.tw))*0.8; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); });
  ctx.globalAlpha=1;

  // Clouds
  cloudsA.forEach(c=>{ ctx.globalAlpha=0.12; ctx.fillStyle='#556'; ctx.beginPath(); ctx.ellipse(c.x,c.y,c.w/2,c.h/2,0,0,Math.PI*2); ctx.fill();
    if(nukeA&&el<6000){ const lt=el<500?el/500:(el<4000?1:1-(el-4000)/2000); const la=clamp(lt,0,1)*0.4; if(la>0.01){ ctx.globalAlpha=la; ctx.fillStyle='rgba(255,180,60,0.5)'; ctx.beginPath(); ctx.ellipse(c.x,c.y+c.h*0.2,c.w/2,c.h/2,0,0,Math.PI*2); ctx.fill(); }} ctx.globalAlpha=1; });

  // Mushroom — CLASSIC SIZE (same as effects.js)
  const gx=WA/2;
  if(nukeA&&el>100){
    const cT=Math.min(1,(el-100)/3000), fT=el>9000?Math.min(1,(el-9000)/2000):0, dT=el>3000?Math.min(1,(el-3000)/3500):0;
    const alpha=(1-fT)*0.85;
    if(alpha>0.01){
      ctx.globalAlpha=alpha;
      const rise=easeOut(Math.min(1,cT*1.5)), drift=Math.min(1,el/TOTAL)*HA*0.07;
      const cy=GYA-rise*(HA*0.45)-drift;
      const cg=Math.min(1,cT*2), capR=40+cg*55, capRx=capR*1.4;
      const stW=18+cg*12, sbW=30+cg*25;
      const hS=dT*15, lD=dT*30;

      // Base glow
      const bgR=capRx*1.8, bgA=alpha*Math.max(0,1-dT*0.7);
      const bg=ctx.createRadialGradient(gx,GYA,0,gx,GYA,bgR);
      bg.addColorStop(0,`hsla(35,100%,70%,${bgA*0.7})`); bg.addColorStop(0.15,`hsla(28,100%,50%,${bgA*0.35})`); bg.addColorStop(0.4,`hsla(20,100%,30%,${bgA*0.08})`); bg.addColorStop(1,'hsla(15,100%,20%,0)');
      ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(gx,GYA,bgR,0,Math.PI*2); ctx.fill();

      // Stem
      const sg=ctx.createLinearGradient(gx,cy+capR*0.3,gx,GYA);
      sg.addColorStop(0,`hsla(${25-hS},90%,${Math.max(10,45-lD)}%,${alpha})`); sg.addColorStop(0.4,`hsla(${20-hS},85%,${Math.max(8,35-lD)}%,${alpha})`); sg.addColorStop(1,`hsla(${15-hS},70%,${Math.max(5,25-lD)}%,${alpha})`);
      ctx.fillStyle=sg; ctx.beginPath();
      ctx.moveTo(gx-stW/2,cy+capR*0.3); ctx.quadraticCurveTo(gx-stW*0.6,(cy+GYA)/2,gx-sbW/2,GYA);
      ctx.lineTo(gx+sbW/2,GYA); ctx.quadraticCurveTo(gx+stW*0.6,(cy+GYA)/2,gx+stW/2,cy+capR*0.3);
      ctx.closePath(); ctx.fill();

      // Glow
      const glR=capRx*2.5, gg=ctx.createRadialGradient(gx,cy,capR*0.2,gx,cy,glR);
      gg.addColorStop(0,`hsla(30,100%,${Math.max(15,60-lD*2)}%,${alpha*0.35})`); gg.addColorStop(0.4,`hsla(25,100%,${Math.max(10,45-lD*2)}%,${alpha*0.15})`); gg.addColorStop(1,'hsla(15,100%,30%,0)');
      ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(gx,cy,glR,0,Math.PI*2); ctx.fill();

      // Cap layers (3)
      ctx.fillStyle=`hsla(${12-hS},60%,${Math.max(5,22-lD)}%,${alpha})`; ctx.beginPath(); ctx.ellipse(gx,cy,capRx*1.1,capR*0.95,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=`hsla(${18-hS},80%,${Math.max(8,32-lD)}%,${alpha})`; ctx.beginPath(); ctx.ellipse(gx,cy-capR*0.05,capRx*0.9,capR*0.8,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=`hsla(${25-hS},90%,${Math.max(10,42-lD)}%,${alpha})`; ctx.beginPath(); ctx.ellipse(gx,cy-capR*0.08,capRx*0.65,capR*0.6,0,0,Math.PI*2); ctx.fill();

      // Core
      const cdD=el>5500?Math.min(1,(el-5500)/2500):0, cA2=alpha*Math.max(0.1,1-cdD);
      ctx.fillStyle=`hsla(40,100%,${Math.max(20,70-lD*2)}%,${cA2})`; ctx.beginPath(); ctx.ellipse(gx,cy-capR*0.1,capRx*0.35,capR*0.35,0,0,Math.PI*2); ctx.fill();
      if(cT<0.4){ const wa=(1-cT/0.4)*alpha; ctx.fillStyle=`rgba(255,255,220,${wa})`; ctx.beginPath(); ctx.ellipse(gx,cy,capRx*0.2,capR*0.2,0,0,Math.PI*2); ctx.fill(); }

      // Base ring
      ctx.fillStyle=`hsla(${15-hS},70%,${Math.max(5,28-lD)}%,${alpha*0.7})`; ctx.beginPath(); ctx.ellipse(gx,cy+capR*0.5,capRx*1.15,capR*0.25,0,0,Math.PI*2); ctx.fill();

      // 3 cloud bands
      const bn=el/1000;
      for(let i=0;i<3;i++){ const eT=0.15+i*0.15; if(cT<eT) continue; const bA=Math.min(1,(cT-eT)/0.35), t01=i/2;
        const fY=cy-capR*(0.55-t01*1.0), sY=cy+capR*0.5, bY=sY+(fY-sY)*bA+Math.sin(bn*(0.4+i*0.25)+i*2.3)*capR*0.03;
        const wY=capRx*(0.6+t01*0.8)*bA, fd=(0.7+t01*0.3)*bA, pl=0.3+0.1*Math.sin(bn*(1.2+i*0.4)+i*1.7);
        ctx.strokeStyle=`hsla(${24-hS+i*3},75%,${Math.max(10,(44-i*4)-lD)}%,${alpha*pl*fd})`; ctx.lineWidth=(4+t01*2)*bA; ctx.lineCap='round';
        const s1=capR*0.05*Math.sin(bn*(0.6+i*0.3)+i), s2=capR*0.04*Math.sin(bn*(0.5+i*0.2)+i+1.5);
        ctx.beginPath(); ctx.moveTo(gx-wY,bY); ctx.quadraticCurveTo(gx-wY*0.35,bY+s1,gx,bY+s2); ctx.quadraticCurveTo(gx+wY*0.35,bY-s1,gx+wY,bY); ctx.stroke();
      }
      ctx.globalAlpha=1;
    }
  }

  // Shockwave
  if(nukeA&&el>200&&el<2000){ const st=(el-200)/1800, r=st*Math.max(WA,HA)*0.8; ctx.globalAlpha=(1-st)*0.3; ctx.strokeStyle='rgba(255,200,100,0.6)'; ctx.lineWidth=3+(1-st)*8; ctx.beginPath(); ctx.arc(gx,GYA,r,0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1; }

  // City
  ctx.fillStyle='#0a0a18'; ctx.fillRect(0,GYA,WA,HA-GYA);
  cityA.forEach(b=>{ ctx.fillStyle='#0c0c1a'; ctx.fillRect(b.x,GYA-b.h,b.w,b.h);
    for(let wy=GYA-b.h+5;wy<GYA-6;wy+=10) for(let wx=b.x+2;wx<b.x+b.w-4;wx+=6){ const on=Math.sin(b.x*3.7+wy*2.1+wx)>0.2; ctx.fillStyle=on?'rgba(255,200,60,0.5)':'rgba(255,200,60,0.04)'; ctx.fillRect(wx,wy,3,4); }
  });
  // Rim
  if(nukeA&&el<7000){ const rt=el<500?el/500:(el<5000?1:1-(el-5000)/2000), ra=clamp(rt,0,1)*0.5; if(ra>0.01){ ctx.strokeStyle=`rgba(255,160,40,${ra})`; ctx.lineWidth=1; cityA.forEach(b=>{ ctx.beginPath(); ctx.moveTo(b.x,GYA-b.h); ctx.lineTo(b.x+b.w,GYA-b.h); ctx.stroke(); }); }}

  // Flash
  if(nukeA&&el<300){ ctx.globalAlpha=(1-(el/300)**2)*0.95; ctx.fillStyle='#fff'; ctx.fillRect(0,0,WA,HA); ctx.globalAlpha=1; }
  // Glow overlay
  if(nukeA&&el<7000){ const lt=el/7000, int=(1-lt*lt)*0.45; const cT2=Math.min(1,(el-100)/3000), re2=easeOut(Math.min(1,cT2*1.5)), dr2=Math.min(1,el/TOTAL)*HA*0.07, ccy=GYA-re2*(HA*0.45)-dr2;
    const rg=ctx.createRadialGradient(gx,ccy,0,gx,ccy,Math.max(WA,HA)*1.2); rg.addColorStop(0,`hsla(35,100%,65%,${int})`); rg.addColorStop(0.3,`hsla(25,100%,45%,${int*0.5})`); rg.addColorStop(0.7,`hsla(20,90%,25%,${int*0.15})`); rg.addColorStop(1,'hsla(15,80%,15%,0)'); ctx.fillStyle=rg; ctx.fillRect(0,0,WA,HA); }
}

// ============ TSAR BOMBA ============
const cB = document.getElementById('cB'), ctxB = cB.getContext('2d');
const WB=400, HB=420, GYB=HB*0.78;
let nukeB=false, startB=0;
const starsB=makeStars(WB,HB), cloudsB=makeClouds(WB), cityB=makeCity(WB);

function triggerB(){ nukeB=true; startB=performance.now(); }

function drawTsar(now){
  const el = nukeB ? now-startB : -1;
  if(nukeB && el>TOTAL){ nukeB=false; document.getElementById('tB').textContent='Complete'; }
  if(nukeB) document.getElementById('tB').textContent=(el/1000).toFixed(1)+'s';

  const ctx=ctxB, gx=WB/2;
  // Sky
  let sb=0;
  if(nukeB){ if(el<300) sb=1; else if(el<1500) sb=0.8*(1-(el-300)/1200); else if(el<5000) sb=0.2*(1-(el-1500)/3500); }
  ctx.fillStyle=`rgb(${10+sb*245|0},${10+sb*230|0},${20+sb*180|0})`;
  ctx.fillRect(0,0,WB,HB);

  // Stars
  const sa=clamp(1-sb*4,0,1);
  if(sa>0.01) starsB.forEach(s=>{ ctx.globalAlpha=sa*(0.5+0.5*Math.sin(now*0.001*s.sp+s.tw))*0.8; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); });
  ctx.globalAlpha=1;

  // Clouds
  cloudsB.forEach(c=>{ ctx.globalAlpha=0.12; ctx.fillStyle='#556'; ctx.beginPath(); ctx.ellipse(c.x,c.y,c.w/2,c.h/2,0,0,Math.PI*2); ctx.fill();
    if(nukeB&&el<6000){ const lt=el<500?el/500:(el<4000?1:1-(el-4000)/2000); const la=clamp(lt,0,1)*0.5; if(la>0.01){ ctx.globalAlpha=la; ctx.fillStyle='rgba(255,180,60,0.6)'; ctx.beginPath(); ctx.ellipse(c.x,c.y+c.h*0.2,c.w/2,c.h/2,0,0,Math.PI*2); ctx.fill(); }} ctx.globalAlpha=1; });

  // TSAR BOMBA — 80% width, 5 layers, double fireball, turbulent stem, 6 bands
  if(nukeB&&el>100){
    const cT=Math.min(1,(el-100)/3000), fT=el>9000?Math.min(1,(el-9000)/2000):0, dT=el>2000?Math.min(1,(el-2000)/2500):0;
    const alpha=(1-fT)*0.9;
    if(alpha>0.01){
      ctx.globalAlpha=alpha;
      const rise=easeOut(Math.min(1,cT*1.5)), drift=Math.min(1,el/TOTAL)*HB*0.06;
      const cy=GYB-rise*(HB*0.42)-drift;
      const cg=Math.min(1,cT*2);
      // TSAR scale
      const capR=35+cg*60, capRx=capR*1.7;
      const stW=16+cg*14, sbW=30+cg*35;
      const hS=dT*18, lD=dT*35;

      // Ground debris
      const debR=sbW*1.8*cg, debA=alpha*Math.max(0,1-dT*0.5);
      if(debA>0.01){ const dg=ctx.createRadialGradient(gx,GYB,0,gx,GYB,debR); dg.addColorStop(0,`hsla(25,80%,${Math.max(8,35-lD)}%,${debA*0.6})`); dg.addColorStop(0.5,`hsla(18,60%,${Math.max(5,20-lD)}%,${debA*0.3})`); dg.addColorStop(1,'hsla(15,50%,15%,0)'); ctx.fillStyle=dg; ctx.beginPath(); ctx.ellipse(gx,GYB,debR,debR*0.25,0,0,Math.PI*2); ctx.fill(); }

      // Base glow
      const bgR=capRx*2, bgA=alpha*Math.max(0,1-dT*0.7);
      const bg=ctx.createRadialGradient(gx,GYB,0,gx,GYB,bgR); bg.addColorStop(0,`hsla(35,100%,70%,${bgA*0.7})`); bg.addColorStop(0.15,`hsla(28,100%,50%,${bgA*0.35})`); bg.addColorStop(0.4,`hsla(20,100%,30%,${bgA*0.08})`); bg.addColorStop(1,'hsla(15,100%,20%,0)');
      ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(gx,GYB,bgR,0,Math.PI*2); ctx.fill();

      // Turbulent stem
      const stemGrad=ctx.createLinearGradient(gx,cy+capR*0.3,gx,GYB);
      stemGrad.addColorStop(0,`hsla(${25-hS},90%,${Math.max(10,45-lD)}%,${alpha})`); stemGrad.addColorStop(0.4,`hsla(${20-hS},85%,${Math.max(8,35-lD)}%,${alpha})`); stemGrad.addColorStop(1,`hsla(${15-hS},70%,${Math.max(5,25-lD)}%,${alpha})`);
      ctx.fillStyle=stemGrad; ctx.beginPath();
      const stemTop=cy+capR*0.3, segs=16;
      ctx.moveTo(gx-stW/2,stemTop);
      for(let s=0;s<=segs;s++){ const t=s/segs, y=stemTop+(GYB-stemTop)*t, bw=stW/2+(sbW/2-stW/2)*t; ctx.lineTo(gx-bw-Math.sin(t*12+el*0.003)*2.5-Math.sin(t*7+el*0.005)*1.5, y); }
      for(let s=segs;s>=0;s--){ const t=s/segs, y=stemTop+(GYB-stemTop)*t, bw=stW/2+(sbW/2-stW/2)*t; ctx.lineTo(gx+bw+Math.sin(t*12+el*0.003+3)*2.5+Math.sin(t*7+el*0.005+2)*1.5, y); }
      ctx.closePath(); ctx.fill();

      // Hot stem center
      const scA=alpha*Math.max(0,0.4-dT*0.3);
      if(scA>0.01){ const sc=ctx.createLinearGradient(gx,stemTop,gx,GYB); sc.addColorStop(0,`hsla(35,100%,60%,${scA})`); sc.addColorStop(1,`hsla(20,100%,40%,${scA*0.3})`); ctx.fillStyle=sc; ctx.beginPath(); ctx.moveTo(gx-stW*0.15,stemTop); ctx.lineTo(gx-sbW*0.1,GYB); ctx.lineTo(gx+sbW*0.1,GYB); ctx.lineTo(gx+stW*0.15,stemTop); ctx.closePath(); ctx.fill(); }

      // Cap glow
      const glR=capRx*2.5, gg=ctx.createRadialGradient(gx,cy,capR*0.2,gx,cy,glR); gg.addColorStop(0,`hsla(30,100%,${Math.max(15,60-lD*2)}%,${alpha*0.4})`); gg.addColorStop(0.4,`hsla(25,100%,${Math.max(10,45-lD*2)}%,${alpha*0.15})`); gg.addColorStop(1,'hsla(15,100%,30%,0)'); ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(gx,cy,glR,0,Math.PI*2); ctx.fill();

      // 5 cap layers
      ctx.fillStyle=`hsla(${10-hS},55%,${Math.max(4,18-lD)}%,${alpha})`; ctx.beginPath(); ctx.ellipse(gx,cy,capRx*1.15,capR*1.0,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=`hsla(${14-hS},65%,${Math.max(6,25-lD)}%,${alpha})`; ctx.beginPath(); ctx.ellipse(gx,cy-capR*0.03,capRx*0.95,capR*0.85,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=`hsla(${20-hS},80%,${Math.max(8,34-lD)}%,${alpha})`; ctx.beginPath(); ctx.ellipse(gx,cy-capR*0.06,capRx*0.75,capR*0.7,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=`hsla(${28-hS},95%,${Math.max(12,46-lD)}%,${alpha})`; ctx.beginPath(); ctx.ellipse(gx,cy-capR*0.08,capRx*0.52,capR*0.52,0,0,Math.PI*2); ctx.fill();
      // Hot core
      const cdD=el>5500?Math.min(1,(el-5500)/2500):0, cA2=alpha*Math.max(0.1,1-cdD);
      ctx.fillStyle=`hsla(40,100%,${Math.max(20,70-lD*2)}%,${cA2})`; ctx.beginPath(); ctx.ellipse(gx,cy-capR*0.1,capRx*0.3,capR*0.3,0,0,Math.PI*2); ctx.fill();

      // Double fireball white core
      if(el<3500){ const wa=Math.min(1,(1-Math.max(0,el-500)/3000))*alpha; ctx.fillStyle=`rgba(255,255,230,${wa*0.8})`; ctx.beginPath(); ctx.ellipse(gx,cy-capR*0.05,capRx*0.18,capR*0.18,0,0,Math.PI*2); ctx.fill();
        if(el<1200){ const iwa=(1-el/1200)*alpha; ctx.fillStyle=`rgba(255,255,255,${iwa})`; ctx.beginPath(); ctx.ellipse(gx,cy-capR*0.05,capRx*0.1,capR*0.1,0,0,Math.PI*2); ctx.fill(); }}

      // Base ring
      ctx.fillStyle=`hsla(${15-hS},70%,${Math.max(5,28-lD)}%,${alpha*0.7})`; ctx.beginPath(); ctx.ellipse(gx,cy+capR*0.55,capRx*1.2,capR*0.22,0,0,Math.PI*2); ctx.fill();

      // 6 cloud bands
      const bn=el/1000;
      for(let i=0;i<6;i++){ const eT=0.12+i*0.12; if(cT<eT) continue; const bA=Math.min(1,(cT-eT)/0.35), t01=i/5;
        const fY=cy-capR*(0.6-t01*1.1), sY=cy+capR*0.5, bY=sY+(fY-sY)*bA+Math.sin(bn*(0.4+i*0.2)+i*2.3)*capR*0.025;
        const wY=capRx*(0.5+t01*0.9)*bA, fd=(0.6+t01*0.4)*bA, pl=0.3+0.1*Math.sin(bn*(1.2+i*0.4)+i*1.7);
        ctx.strokeStyle=`hsla(${22-hS+i*3},75%,${Math.max(8,(40-i*3)-lD)}%,${alpha*pl*fd})`; ctx.lineWidth=(2.5+t01*2)*bA; ctx.lineCap='round';
        const s1=capR*0.04*Math.sin(bn*(0.6+i*0.3)+i), s2=capR*0.03*Math.sin(bn*(0.5+i*0.2)+i+1.5);
        ctx.beginPath(); ctx.moveTo(gx-wY,bY); ctx.quadraticCurveTo(gx-wY*0.35,bY+s1,gx,bY+s2); ctx.quadraticCurveTo(gx+wY*0.35,bY-s1,gx+wY,bY); ctx.stroke();
      }
      ctx.globalAlpha=1;
    }
  }

  // Shockwave
  if(nukeB&&el>200&&el<2000){ const st=(el-200)/1800, r=st*Math.max(WB,HB)*0.9; ctx.globalAlpha=(1-st)*0.35; ctx.strokeStyle='rgba(255,200,100,0.6)'; ctx.lineWidth=3+(1-st)*10; ctx.beginPath(); ctx.arc(gx,GYB,r,0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1; }

  // City
  ctx.fillStyle='#0a0a18'; ctx.fillRect(0,GYB,WB,HB-GYB);
  cityB.forEach(b=>{ ctx.fillStyle='#0c0c1a'; ctx.fillRect(b.x,GYB-b.h,b.w,b.h);
    for(let wy=GYB-b.h+5;wy<GYB-6;wy+=10) for(let wx=b.x+2;wx<b.x+b.w-4;wx+=6){ const on=Math.sin(b.x*3.7+wy*2.1+wx)>0.2; ctx.fillStyle=on?'rgba(255,200,60,0.5)':'rgba(255,200,60,0.04)'; ctx.fillRect(wx,wy,3,4); }
  });
  if(nukeB&&el<7000){ const rt=el<500?el/500:(el<5000?1:1-(el-5000)/2000), ra=clamp(rt,0,1)*0.5; if(ra>0.01){ ctx.strokeStyle=`rgba(255,160,40,${ra})`; ctx.lineWidth=1; cityB.forEach(b=>{ ctx.beginPath(); ctx.moveTo(b.x,GYB-b.h); ctx.lineTo(b.x+b.w,GYB-b.h); ctx.stroke(); }); }}

  // Flash
  if(nukeB&&el<300){ ctx.globalAlpha=(1-(el/300)**2)*0.95; ctx.fillStyle='#fff'; ctx.fillRect(0,0,WB,HB); ctx.globalAlpha=1; }
  // Glow overlay
  if(nukeB&&el<7000){ const lt=el/7000, int=(1-lt*lt)*0.5; const cT2=Math.min(1,(el-100)/3000), re2=easeOut(Math.min(1,cT2*1.5)), dr2=Math.min(1,el/TOTAL)*HB*0.06, ccy=GYB-re2*(HB*0.42)-dr2;
    const rg=ctx.createRadialGradient(gx,ccy,0,gx,ccy,Math.max(WB,HB)*1.3); rg.addColorStop(0,`hsla(35,100%,65%,${int})`); rg.addColorStop(0.3,`hsla(25,100%,45%,${int*0.5})`); rg.addColorStop(0.7,`hsla(20,90%,25%,${int*0.12})`); rg.addColorStop(1,'hsla(15,80%,15%,0)'); ctx.fillStyle=rg; ctx.fillRect(0,0,WB,HB); }
}

function detonateBoth(){ triggerA(); triggerB(); }

function loop(now){
  drawClassic(now);
  drawTsar(now);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
