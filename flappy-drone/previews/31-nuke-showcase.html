<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nuke Showcase — Flappy Drone</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060610;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
    color: #aaa;
    padding: 20px 10px 24px;
  }

  .header { text-align: center; margin-bottom: 14px; }
  h1 {
    color: #fff;
    font-size: 18px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .subtitle {
    font-size: 10px;
    color: #555;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  #canvas-wrap {
    position: relative;
    display: inline-block;
    border: 1px solid #1c1c2e;
    border-radius: 2px;
    transition: box-shadow 0.15s ease;
  }
  #canvas-wrap.detonating {
    box-shadow: 0 0 32px 6px rgba(255, 120, 30, 0.35), 0 0 8px 2px rgba(255, 80, 10, 0.5);
  }
  canvas {
    display: block;
    border-radius: 2px;
  }

  /* Variant selector */
  .variant-row {
    margin-top: 10px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }
  .variant-label {
    font-size: 9px;
    color: #444;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-right: 4px;
  }
  .variant-btn {
    background: #0a0a1a;
    border: 1px solid #2a2a40;
    color: #666;
    padding: 5px 14px;
    font-size: 10px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.18s;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .variant-btn:hover { background: #111128; color: #bbb; border-color: #444; }
  .variant-btn.active {
    background: #12121f;
    border-color: #c84;
    color: #f0a050;
    box-shadow: 0 0 8px rgba(255, 150, 50, 0.15);
  }

  /* Control row */
  .controls {
    margin-top: 10px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn-detonate {
    background: transparent;
    border: 2px solid #c33;
    color: #f55;
    padding: 9px 32px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 3px;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.18s;
    font-weight: bold;
  }
  .btn-detonate:hover {
    background: rgba(200, 30, 30, 0.12);
    border-color: #f44;
    color: #f77;
    box-shadow: 0 0 12px rgba(220, 40, 40, 0.25);
  }
  .btn-detonate:active { transform: scale(0.97); }

  .btn-reset {
    background: #0a0a1a;
    border: 1px solid #2a2a40;
    color: #555;
    padding: 9px 20px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 3px;
    letter-spacing: 1px;
    transition: all 0.18s;
  }
  .btn-reset:hover { background: #111128; color: #888; border-color: #383850; }

  #timer {
    font-size: 12px;
    color: #555;
    letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
    min-width: 100px;
    text-align: center;
  }

  .credits {
    margin-top: 16px;
    font-size: 9px;
    color: #2a2a3a;
    letter-spacing: 1.5px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Nuke Showcase</h1>
  <div class="subtitle">Historical Variants &mdash; Flappy Drone</div>
</div>

<div id="canvas-wrap">
  <canvas id="c" width="620" height="640"></canvas>
</div>

<div class="variant-row">
  <span class="variant-label">Variant:</span>
  <div id="variant-btns"></div>
</div>

<div class="controls">
  <button class="btn-detonate" id="btn-detonate">DETONATE</button>
  <button class="btn-reset" id="btn-reset">RESET</button>
  <button class="btn-reset" id="btn-city" style="min-width:90px">City: ON</button>
  <span id="timer">Ready</span>
</div>


<script>
'use strict';

// ================================================================
// NUKE SHOWCASE — 31-nuke-showcase.html
// Running historical catalogue of Flappy Drone nuke variants.
//
// Architecture:
//   VARIANTS array  — data-driven, each entry has {id, name, drawFn}
//   drawFn(ctx, elapsed, W, H, gx, gy) — receives scene context
//   Selector buttons auto-generated from VARIANTS array
//
// Scene layers (shared across all variants):
//   Sky gradient -> Stars -> Moon -> Mountains -> City -> NUKE ->
//   EMP blackout -> Building rim-light -> Ground bar -> Overlays
//
// Henske    : nuke cloud, colour ramp, overlays, scene atmosphere
// Thieuke   : architecture, easing, variant selector system
// Jonasty   : timing curves, shockwave, interpolation quality
// Sakke     : particle pools, no GC thrashing
// Poekie    : city silhouette, EMP blackout, Z-Tower
// Bostrol   : version tracking, marker discipline
// Kevijntje : scope — 11s, 620x640, no frameworks
// ================================================================

const C = document.getElementById('c');
const X = C.getContext('2d');
const W = 620, H = 640;
const DUR = 11000;
const GX = W / 2, GY = Math.round(H * 0.78);

const btnDetonate = document.getElementById('btn-detonate');
const btnReset    = document.getElementById('btn-reset');
const btnCity     = document.getElementById('btn-city');
const timerEl     = document.getElementById('timer');
const canvasWrap  = document.getElementById('canvas-wrap');
const variantBtns = document.getElementById('variant-btns');
let showCity = true;
btnCity.onclick = () => {
  showCity = !showCity;
  btnCity.textContent = 'City: ' + (showCity ? 'ON' : 'OFF');
};

// ----------------------------------------------------------------
// Utility
// ----------------------------------------------------------------
const clamp01 = t => Math.max(0, Math.min(1, t));
const lerp    = (a, b, t) => a + (b - a) * clamp01(t);
const ease3   = t => 1 - Math.pow(1 - clamp01(t), 3);
const ss      = (lo, hi, x) => {
  const t = clamp01((x - lo) / (hi - lo));
  return t * t * (3 - 2 * t);
};
const hash = (x, y) => {
  let s = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
  return s - Math.floor(s);
};

// ----------------------------------------------------------------
// Scene state
// ----------------------------------------------------------------
let nukeOn = false, nukeT0 = 0, activeVariant = 0;
let dustTriggered = false;

// --- Phase 2 Polish Toggles ---
const ENABLE_ASH = true;
const ENABLE_DUST = true;
const ENABLE_VIGNETTE_CRUSH = true;
// ------------------------------

// ----------------------------------------------------------------
// Stars
// ----------------------------------------------------------------
const STARS = Array.from({ length: 55 }, (_, i) => ({
  x: hash(i, 0) * W,
  y: hash(i, 1) * H * 0.48,
  r: 0.4 + hash(i, 2) * 1.4,
  ph: hash(i, 3) * 6.2832,
  sp: 0.4 + hash(i, 4) * 2.2
}));

// ----------------------------------------------------------------
// City  (two-depth parallax layers)
// ----------------------------------------------------------------
function mkBuildings(offset, countMul) {
  const b = [];
  for (let bx = 0; bx < W; bx += (10 + hash(bx + offset, 50) * 16) * (1 / countMul)) {
    const bw = 11 + hash(bx + offset, 51) * 20;
    const bh = 28 + hash(bx + offset, 52) * 100;
    const wins = [];
    for (let wy = 5; wy < bh - 7; wy += 10)
      for (let wx = 3; wx < bw - 4; wx += 7)
        wins.push({
          dx: wx, dy: wy,
          on: hash(bx + wx + offset, wy) > 0.33,
          dieAt:  200 + hash(bx + wx + offset, wy + 9) * 600,   // EMP kill time
          relitAt: 8500 + hash(bx + wx + offset, wy + 7) * 2000  // relight time
        });
    b.push({ x: bx, w: bw, h: bh, wins });
  }
  return b;
}

// Layer 1 — foreground (taller, darker)
const CITY_FG = mkBuildings(0, 1);
// Layer 2 — background (shorter, slightly transparent)
const CITY_BG = mkBuildings(777, 0.7);

// Z-Tower position
const ZTOWER_X = Math.round(W * 0.72);
const ZTOWER_H = 180;
const ZTOWER_W = 22;

// ----------------------------------------------------------------
// Mountains (2 rows)
// ----------------------------------------------------------------
function mkMountains(seed_, count, minH, maxH, spread) {
  return Array.from({ length: count }, (_, i) => {
    const x = (i / (count - 1)) * (W + spread * 2) - spread;
    const h = minH + hash(seed_ + i, 3) * maxH;
    const w = 70 + hash(seed_ + i, 4) * 90;
    return { x, h, w };
  });
}
const MTNS_BACK  = mkMountains(10, 9, 45, 80, 40);
const MTNS_FRONT = mkMountains(20, 7, 30, 55, 20);

// ----------------------------------------------------------------
// Particle system — same as game's FD.particles / FD.drawParticles
// ----------------------------------------------------------------
let particles = [];
function updateParticles(ms) {
  const t = ms / 1000 || 0;
  const flashes = [];
  particles.forEach(p => {
    // 3D Depth Shift: Pop to the foreground mid-flight!
    if (p.switchZ && p.life < p.maxLife * 0.65) {
      p.fg = true;
    }

    // Mid-air burn-up / surface hit flashes
    if (p.fg && p.y > GY - 10 && p.life > 15 && Math.random() < 0.02) {
      p.life = 0; // Kill current chunk
      flashes.push({
        x: p.x, y: p.y, vx: 0, vy: -0.2, // slight upward pop
        life: 8, maxLife: 8, r: 25 + Math.random() * 20,
        hue: 35, sat: 100, lum: 90, glow: true, fg: true
      });
    }

    if (p.hasTrail) {
      if (!p.trailList) p.trailList = [];
      p.trailList.push({x: p.x, y: p.y});
      if (p.trailList.length > 20) p.trailList.shift();
    }
    p.x += p.vx; p.y += p.vy;
    p.vx *= (p.damping || 0.98);
    p.vy *= (p.damping || 0.98);
    p.vy += (p.gravity || 0.02);
    p.life--;
  });
  particles = particles.filter(p => p.life > 0);
  flashes.forEach(f => particles.push(f));
}
function drawParticles(isFg = false) {
  particles.forEach(p => {
    if (!!p.fg !== isFg) return;
    const t = p.life / p.maxLife;

    // Faint Trails (fade in after ~1.5s)
    if (p.hasTrail && p.trailList && p.trailList.length > 1) {
      const age = p.maxLife - p.life;
      const trailAlpha = age < 90 ? (age / 90) * 0.6 : t * 0.6;
      X.globalAlpha = trailAlpha;
      X.strokeStyle = `hsla(${p.hue}, ${p.sat !== undefined ? p.sat : 100}%, ${p.lum !== undefined ? p.lum : 55}%, 1)`;
      X.lineWidth = p.r * t * 0.8;
      X.lineCap = 'round';
      X.lineJoin = 'round';
      X.beginPath();
      p.trailList.forEach((pt, i) => {
        if (i === 0) X.moveTo(pt.x, pt.y); else X.lineTo(pt.x, pt.y);
      });
      X.stroke();
      X.globalAlpha = 1;
    }

    if (p.glow) {
      const grad = X.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * t);
      grad.addColorStop(0, `hsla(${p.hue}, ${p.sat !== undefined ? p.sat : 100}%, ${p.lum !== undefined ? p.lum : 55}%, ${t * 0.8})`);
      grad.addColorStop(0.25, `hsla(${p.hue}, ${p.sat !== undefined ? p.sat : 100}%, ${(p.lum !== undefined ? p.lum : 55) - 10}%, ${t * 0.4})`);
      grad.addColorStop(0.6, `hsla(${p.hue}, ${p.sat !== undefined ? p.sat : 100}%, ${(p.lum !== undefined ? p.lum : 55) - 25}%, ${t * 0.1})`);
      grad.addColorStop(1, `hsla(${p.hue}, ${p.sat !== undefined ? p.sat : 100}%, ${(p.lum !== undefined ? p.lum : 55) - 30}%, 0)`);
      X.fillStyle = grad;
      X.beginPath(); X.arc(p.x, p.y, p.r * t, 0, Math.PI * 2); X.fill();
    } else if (p.streak) {
      X.globalAlpha = t * 0.7;
      X.strokeStyle = `hsl(${p.hue}, ${p.sat !== undefined ? p.sat : 100}%, ${(p.lum !== undefined ? p.lum : 55) + (1 - t) * 20}%)`;
      X.lineWidth = p.r * t * 0.8;
      X.beginPath();
      X.moveTo(p.x - p.vx * 3, p.y - p.vy * 3);
      X.lineTo(p.x, p.y);
      X.stroke();
      X.fillStyle = `hsl(${p.hue}, ${p.sat !== undefined ? p.sat : 100}%, ${(p.lum !== undefined ? p.lum : 55) + (1 - t) * 25}%)`;
      X.beginPath(); X.arc(p.x, p.y, p.r * t * 0.6, 0, Math.PI * 2); X.fill();
    } else {
      X.globalAlpha = t * 0.75;
      X.fillStyle = `hsl(${p.hue}, ${p.sat !== undefined ? p.sat : 90}%, ${(p.lum !== undefined ? p.lum : 55) + (1 - t) * 20}%)`;
      X.beginPath(); X.arc(p.x, p.y, p.r * t, 0, Math.PI * 2); X.fill();
    }
  });
  X.globalAlpha = 1;
}
function resetBloom() { particles = []; }

// ----------------------------------------------------------------
// Screen shake
// ----------------------------------------------------------------
let shakeX = 0, shakeY = 0;

// ----------------------------------------------------------------
// ==  VARIANTS  ==================================================
// ----------------------------------------------------------------
// Each variant is { id, name, drawFn }.
// drawFn(ctx, elapsed, W, H, gx, gy) — draw the nuke cloud only.
// Scene (sky, city, overlays) is handled by the shared renderer.
//
// === ADD NEW VARIANTS HERE ===
//
// Example:
//   VARIANTS.push({
//     id:   'fury',
//     name: 'FURY MK-II',
//     drawFn: function(ctx, elapsed, W, H, gx, gy) { ... }
//   });
//
// Then refresh — the selector button appears automatically.
// ----------------------------------------------------------------

const VARIANTS = [];

// ----------------------------------------------------------------
// VARIANT 0: CLASSIC OG
// Faithful reproduction of FD.drawNukeCloud() from effects.js.
// Reference: /flappy-drone/js/effects.js  (FD.drawNukeCloud)
// ----------------------------------------------------------------
VARIANTS.push({
  id:   'classic-og',
  name: 'CLASSIC OG',
  drawFn: function drawClassicOG(ctx, elapsed, W, H, gx, gy) {
    // --- Shockwave ring (200-2000ms) ---
    if (elapsed > 200 && elapsed < 2000) {
      const st = (elapsed - 200) / 1800;
      const radius = st * Math.max(W, H) * 0.8;
      ctx.globalAlpha = (1 - st) * 0.3;
      ctx.strokeStyle = 'rgba(255, 200, 100, 0.6)';
      ctx.lineWidth = 3 + (1 - st) * 8;
      ctx.beginPath(); ctx.arc(gx, gy, radius, 0, Math.PI * 2); ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // --- Mushroom cloud (100ms onward) ---
    if (elapsed <= 100) return;

    const cloudT   = Math.min(1, (elapsed - 100) / 3000);
    const fadeT    = elapsed > 9000 ? Math.min(1, (elapsed - 9000) / 2000) : 0;
    const darkT    = elapsed > 3000 ? Math.min(1, (elapsed - 3000) / 3500) : 0;
    const alpha    = (1 - fadeT) * 0.85;

    if (alpha < 0.01) return;

    ctx.globalAlpha = alpha;

    const riseEase    = 1 - Math.pow(1 - Math.min(1, cloudT * 1.5), 3);
    const slowDrift   = Math.min(1, elapsed / DUR) * H * 0.07;
    const cloudCenterY = gy - riseEase * (H * 0.45) - slowDrift;
    const capGrow     = Math.min(1, cloudT * 2);
    const capR        = 40 + capGrow * 55;
    const capRx       = capR * 1.4;
    const stemTopW    = 18 + capGrow * 12;
    const stemBaseW   = 30 + capGrow * 25;

    // Colour darkening over time
    const hShift = darkT * 15;
    const lDrop  = darkT * 30;

    // --- Intense base glow ---
    const baseGlowR   = capRx * 1.8;
    const baseGlowAlpha = alpha * Math.max(0, 1 - darkT * 0.7);
    const baseGlow = ctx.createRadialGradient(gx, gy, 0, gx, gy, baseGlowR);
    baseGlow.addColorStop(0,    `hsla(35, 100%, 70%, ${baseGlowAlpha * 0.7})`);
    baseGlow.addColorStop(0.15, `hsla(28, 100%, 50%, ${baseGlowAlpha * 0.35})`);
    baseGlow.addColorStop(0.4,  `hsla(20, 100%, 30%, ${baseGlowAlpha * 0.08})`);
    baseGlow.addColorStop(1,    'hsla(15, 100%, 20%, 0)');
    ctx.fillStyle = baseGlow;
    ctx.beginPath(); ctx.arc(gx, gy, baseGlowR, 0, Math.PI * 2); ctx.fill();

    // --- Stem (quadratic curves, gradient) ---
    const stemGrad = ctx.createLinearGradient(gx, cloudCenterY + capR * 0.3, gx, gy);
    stemGrad.addColorStop(0, `hsla(${25 - hShift}, 90%, ${Math.max(10, 45 - lDrop)}%, ${alpha})`);
    stemGrad.addColorStop(0.4, `hsla(${20 - hShift}, 85%, ${Math.max(8, 35 - lDrop)}%, ${alpha})`);
    stemGrad.addColorStop(1, `hsla(${15 - hShift}, 70%, ${Math.max(5, 25 - lDrop)}%, ${alpha})`);
    ctx.fillStyle = stemGrad;
    ctx.beginPath();
    ctx.moveTo(gx - stemTopW / 2, cloudCenterY + capR * 0.3);
    ctx.quadraticCurveTo(
      gx - stemTopW * 0.6, (cloudCenterY + gy) / 2,
      gx - stemBaseW / 2,  gy
    );
    ctx.lineTo(gx + stemBaseW / 2, gy);
    ctx.quadraticCurveTo(
      gx + stemTopW * 0.6, (cloudCenterY + gy) / 2,
      gx + stemTopW / 2,   cloudCenterY + capR * 0.3
    );
    ctx.closePath(); ctx.fill();

    // --- Cap glow (soft radial) ---
    const glowRadius = capRx * 2.5;
    const glowGrad = ctx.createRadialGradient(gx, cloudCenterY, capR * 0.2, gx, cloudCenterY, glowRadius);
    glowGrad.addColorStop(0, `hsla(30, 100%, ${Math.max(15, 60 - lDrop * 2)}%, ${alpha * 0.35})`);
    glowGrad.addColorStop(0.4, `hsla(25, 100%, ${Math.max(10, 45 - lDrop * 2)}%, ${alpha * 0.15})`);
    glowGrad.addColorStop(1, 'hsla(15, 100%, 30%, 0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath(); ctx.arc(gx, cloudCenterY, glowRadius, 0, Math.PI * 2); ctx.fill();

    // --- Cap layers (3 concentric ellipses, darkening over time) ---
    ctx.fillStyle = `hsla(${12 - hShift}, 60%, ${Math.max(5, 22 - lDrop)}%, ${alpha})`;
    ctx.beginPath(); ctx.ellipse(gx, cloudCenterY, capRx * 1.1, capR * 0.95, 0, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = `hsla(${18 - hShift}, 80%, ${Math.max(8, 32 - lDrop)}%, ${alpha})`;
    ctx.beginPath(); ctx.ellipse(gx, cloudCenterY - capR * 0.05, capRx * 0.9, capR * 0.8, 0, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = `hsla(${25 - hShift}, 90%, ${Math.max(10, 42 - lDrop)}%, ${alpha})`;
    ctx.beginPath(); ctx.ellipse(gx, cloudCenterY - capR * 0.08, capRx * 0.65, capR * 0.6, 0, 0, Math.PI * 2); ctx.fill();

    // --- Hot core (delayed darkening at 5.5s) ---
    const coreDarkDelay = elapsed > 5500 ? Math.min(1, (elapsed - 5500) / 2500) : 0;
    const coreAlpha     = alpha * Math.max(0.1, 1 - coreDarkDelay);
    ctx.fillStyle = `hsla(40, 100%, ${Math.max(20, 70 - lDrop * 2)}%, ${coreAlpha})`;
    ctx.beginPath(); ctx.ellipse(gx, cloudCenterY - capR * 0.1, capRx * 0.35, capR * 0.35, 0, 0, Math.PI * 2); ctx.fill();

    // --- White-hot center (first 40% of cloud rise) ---
    if (cloudT < 0.4) {
      const wa = (1 - cloudT / 0.4) * alpha;
      ctx.fillStyle = `rgba(255, 255, 220, ${wa})`;
      ctx.beginPath(); ctx.ellipse(gx, cloudCenterY, capRx * 0.2, capR * 0.2, 0, 0, Math.PI * 2); ctx.fill();
    }

    // --- Base ring / skirt ---
    ctx.fillStyle = `hsla(${15 - hShift}, 70%, ${Math.max(5, 28 - lDrop)}%, ${alpha * 0.7})`;
    ctx.beginPath(); ctx.ellipse(gx, cloudCenterY + capR * 0.5, capRx * 1.15, capR * 0.25, 0, 0, Math.PI * 2); ctx.fill();

    // --- 3 concentric cloud bands with sag/pulse ---
    {
      const now = elapsed / 1000;
      for (let i = 0; i < 3; i++) {
        const entryT = 0.15 + i * 0.15;
        if (cloudT < entryT) continue;
        const bandAge  = Math.min(1, (cloudT - entryT) / 0.35);
        const t01      = i / 2;
        const finalY   = cloudCenterY - capR * (0.55 - t01 * 1.0) - 35;
        const startY   = cloudCenterY + capR * 0.5;
        const bandY    = startY + (finalY - startY) * bandAge
                         + Math.sin(now * (0.4 + i * 0.25) + i * 2.3) * capR * 0.03;
        const widthAtY = capRx * (0.6 + t01 * 0.8) * bandAge;
        const fade     = (0.7 + t01 * 0.3) * bandAge;
        const pulse    = 0.3 + 0.1 * Math.sin(now * (1.2 + i * 0.4) + i * 1.7);
        const bandAlpha = alpha * pulse * fade;
        const bandL    = Math.max(10, (44 - i * 4) - lDrop);
        const bandH    = 24 - hShift + i * 3;
        const sag1     = capR * 0.05 * Math.sin(now * (0.6 + i * 0.3) + i);
        const sag2     = capR * 0.04 * Math.sin(now * (0.5 + i * 0.2) + i + 1.5);
        ctx.strokeStyle = `hsla(${bandH}, 75%, ${bandL}%, ${bandAlpha})`;
        ctx.lineWidth   = (4 + t01 * 2) * bandAge;
        ctx.lineCap     = 'round';
        ctx.beginPath();
        ctx.moveTo(gx - widthAtY, bandY);
        ctx.quadraticCurveTo(gx - widthAtY * 0.35, bandY + sag1, gx, bandY + sag2);
        ctx.quadraticCurveTo(gx + widthAtY * 0.35, bandY - sag1, gx + widthAtY, bandY);
        ctx.stroke();
      }
    }

    ctx.globalAlpha = 1;
  }
});

// ----------------------------------------------------------------
// VARIANT 2: BLOOM — Classic mushroom + organic petal debris
// ----------------------------------------------------------------
// Pre-compute petal ring data
const BLOOM_RINGS = 5;
const bloomPetals = [];
for (let r = 0; r < BLOOM_RINGS; r++) {
  const count = 6 + r * 3;
  const baseHue = 32 - r * 5;
  for (let i = 0; i < count; i++) {
    bloomPetals.push({
      ring: r,
      angle: (i / count) * Math.PI * 2 + hash(r, i) * 0.3,
      hue: baseHue + hash(r, i + 3) * 15,
      delay: r * 0.3 + hash(r, i + 1) * 0.15,
      wobble: hash(r + 5, i) * 3,
      drift: (hash(r, i + 8) - 0.5) * 0.06
    });
  }
}

VARIANTS.push({
  id: 'bloom',
  name: 'BLOOM',
  drawFn: function drawBloom(ctx, elapsed, W, H, gx, gy) {
    const t = elapsed / 1000;

      }
    }

    ctx.globalAlpha = 1;
  }

          const pvx = dir * (0.25 + Math.random() * 0.35); // push outwards
          const pvy = -0.1 - Math.random() * 0.2;
          const plife = 600 + Math.random() * 500;
          const isFg = Math.random() < 0.45;
          
          particles.push({
            x: px, y: py, vx: pvx, vy: pvy,
            life: plife, maxLife: 1200, r: 1 + Math.random() * 1.5,
            hue: 25 + Math.random() * 10, sat: 80, lum: 65, // Fainter streak
            damping: 0.9992, gravity: 0.0015,
            streak: true, hasTrail: true, fg: false, switchZ: isFg
          });
          
          particles.push({
            x: px, y: py, vx: pvx, vy: pvy,
            life: plife, maxLife: 1200, r: 8 + Math.random() * 10,
            hue: 15 + Math.random() * 10, sat: 90, lum: 50, // Fainter glow
            damping: 0.9992, gravity: 0.0015,
            glow: true, fg: false, switchZ: isFg
          });
        }
      }
    }
    
    // --- Scale-giving Base Fire ---
    if (elapsed > 800 && elapsed < 4000 && Math.random() < 0.3) {
      if (particles.length < 250) {
        const dir = Math.random() < 0.5 ? -1 : 1;
        particles.push({
          x: gx + (Math.random() - 0.5) * stemBaseW * 1.5,
          y: gy - Math.random() * 10,
          vx: dir * (0.04 + Math.random() * 0.1),
          vy: -0.015 - Math.random() * 0.03,
          life: 800 + Math.random() * 600, maxLife: 1400,
          r: 20 + Math.random() * 40, // massive soft rolling fire
          hue: 15 + Math.random() * 5, sat: 80, lum: 40,
          damping: 0.9998,
          gravity: -0.0003, // floats up slightly
          glow: true
        });
      }
    }
    
    // --- Phase 2: Nuclear Winter Ash ---
    if (ENABLE_ASH && elapsed > 6500) {
      if (Math.random() < 0.3 && particles.length < 500) {
        particles.push({
          x: Math.random() * W, 
          y: Math.random() * (H * 0.6), // Spawns in upper atmosphere
          vx: (Math.random() - 0.5) * 0.5,
          vy: 0.1 + Math.random() * 0.2, // slow fall
          life: 1500 + Math.random() * 1000, maxLife: 2500,
          r: 1 + Math.random() * 2,
          hue: 25, sat: 100, lum: 45 + Math.random() * 25, // glowing orange fallout pips
          damping: 0.99, gravity: 0.0005,
          streak: true, fg: true, switchZ: false // always in front
        });
      }
    }

    // --- Phase 2: Building Dust Kick-up ---
    if (ENABLE_DUST && elapsed > 2000 && !dustTriggered) {
      dustTriggered = true;
      CITY_FG.forEach(b => {
        const roofY = GY - b.h;
        const numDust = Math.floor(b.w / 15) + 1;
        for(let i=0; i<numDust; i++) {
          particles.push({
            x: b.x + Math.random() * b.w, y: roofY,
            vx: (Math.random() - 0.5) * 1.5,
            vy: -0.5 - Math.random() * 1.5, // kick up
            life: 200 + Math.random() * 300, maxLife: 500,
            r: 2 + Math.random() * 3,
            hue: 30, sat: 20, lum: 30, // dark brown/grey dust
            damping: 0.93, gravity: 0.02,
            streak: true, fg: true, switchZ: false
          });
        }
      });
    }


    ctx.globalAlpha = 1;
  }
});
// ----------------------------------------------------------------


// ================================================================
// Variant selector UI — auto-generated from VARIANTS array
// ================================================================
(function buildVariantUI() {
  variantBtns.innerHTML = '';
  variantBtns.style.display = 'flex';
  variantBtns.style.gap = '8px';
  variantBtns.style.flexWrap = 'wrap';
  VARIANTS.forEach((v, i) => {
    const btn = document.createElement('button');
    btn.className = 'variant-btn' + (i === activeVariant ? ' active' : '');
    btn.textContent = v.name;
    btn.dataset.idx = i;
    btn.onclick = () => {
      if (nukeOn) return; // don't switch mid-detonation
      activeVariant = i;
      document.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    variantBtns.appendChild(btn);
  });
})();

// ================================================================
// Controls
// ================================================================
btnDetonate.onclick = () => {
  nukeOn = true;
  nukeT0 = performance.now();
  dustTriggered = false; // Reset burst limit
  resetBloom();
};

btnReset.onclick = () => {
  nukeOn = false;
  timerEl.textContent = 'Ready';
  canvasWrap.classList.remove('detonating');
};

// ================================================================
// Draw helpers
// ================================================================

function drawSky(ms) {
  let r = 6, g = 6, b = 16;
  if (nukeOn) {
    const flash    = ms < 300 ? 1 : 0;
    const fire     = ss(300, 1500, ms) * ss(6000, 2000, ms);
    const twilight = ss(4000, 8000, ms) * ss(11000, 8000, ms);
    r = lerp(6,  255, flash) + fire * 55 + twilight * 4;
    g = lerp(6,  245, flash) + fire * 22;
    b = lerp(16, 200, flash) + fire * 8  + twilight * 12;
  }
  const skyGrad = X.createLinearGradient(0, 0, 0, H * 0.8);
  const rc = n => Math.round(Math.min(255, Math.max(0, n)));
  const top = `rgb(${rc(r * 0.4)},${rc(g * 0.4)},${rc(b * 0.6)})`;
  const bot = `rgb(${rc(r)},${rc(g)},${rc(b)})`;
  skyGrad.addColorStop(0, top);
  skyGrad.addColorStop(1, bot);
  X.fillStyle = skyGrad;
  X.fillRect(0, 0, W, H);
}

function drawMoon(ms) {
  const mx = W * 0.82, my = H * 0.1;
  // Glow
  const moonGlowAlpha = nukeOn ? Math.max(0, 1 - ss(0, 500, ms)) * 0.18 : 0.18;
  if (moonGlowAlpha > 0.005) {
    const mg = X.createRadialGradient(mx, my, 0, mx, my, 40);
    mg.addColorStop(0,   `rgba(220, 220, 180, ${moonGlowAlpha})`);
    mg.addColorStop(0.4, `rgba(180, 180, 140, ${moonGlowAlpha * 0.4})`);
    mg.addColorStop(1,   'rgba(120, 120, 100, 0)');
    X.fillStyle = mg;
    X.beginPath(); X.arc(mx, my, 40, 0, Math.PI * 2); X.fill();
  }
  // Moon disc
  X.globalAlpha = nukeOn ? Math.max(0, 1 - ss(0, 600, ms)) : 1;
  X.fillStyle = '#ccc8a8';
  X.beginPath(); X.arc(mx, my, 11, 0, Math.PI * 2); X.fill();
  // Crescent bite
  X.fillStyle = '#060610';
  X.beginPath(); X.arc(mx + 5, my - 2, 9, 0, Math.PI * 2); X.fill();
  X.globalAlpha = 1;
}

function drawStars(ms, now) {
  const starA = nukeOn
    ? Math.max(0, 1 - ss(0, 200, ms) * 4) * ss(7000, 10000, ms)
    : 1;
  if (starA < 0.01) return;
  STARS.forEach(s => {
    const tw = 0.5 + 0.5 * Math.sin(now * 0.001 * s.sp + s.ph);
    X.globalAlpha = starA * tw * 0.75;
    X.fillStyle = '#dde';
    X.beginPath(); X.arc(s.x, s.y, s.r, 0, Math.PI * 2); X.fill();
  });
  X.globalAlpha = 1;
}

function drawMountains(ms) {
  const mtnAlpha = 0.25 * (nukeOn ? Math.max(0.05, 1 - ss(0, 600, ms) * 0.6) : 1);
  // Back range
  X.globalAlpha = mtnAlpha * 0.55;
  X.fillStyle = '#1a1a2e';
  MTNS_BACK.forEach(m => {
    X.beginPath();
    X.moveTo(m.x - m.w, GY);
    X.quadraticCurveTo(m.x, GY - m.h, m.x + m.w, GY);
    X.fill();
  });
  // Front range
  X.globalAlpha = mtnAlpha;
  X.fillStyle = '#141420';
  MTNS_FRONT.forEach(m => {
    X.beginPath();
    X.moveTo(m.x - m.w * 0.8, GY);
    X.quadraticCurveTo(m.x, GY - m.h, m.x + m.w * 0.8, GY);
    X.fill();
  });
  X.globalAlpha = 1;
}

function drawCity(ms) {
  // Background layer (parallax — slightly smaller, higher)
  const bgOff = nukeOn ? -ss(0, 3000, ms) * 2 : 0; // subtle parallax nudge
  X.globalAlpha = 0.55;
  CITY_BG.forEach(b => {
    const by = GY - b.h * 0.72 + bgOff;
    X.fillStyle = '#0c0c1a';
    X.fillRect(b.x, by, b.w * 0.85, b.h * 0.72);
  });
  X.globalAlpha = 1;

  // Foreground layer
  CITY_FG.forEach(b => {
    const by = GY - b.h;
    X.fillStyle = '#0d0d1c';
    X.fillRect(b.x, by, b.w, b.h);
    // Windows with EMP blackout and relight
    b.wins.forEach(w => {
      let on = w.on;
      if (nukeOn && ms > w.dieAt && ms < w.relitAt) {
        on = false;
        // Brief flicker at moment of EMP death
        if (ms < w.dieAt + 80 && Math.random() > 0.5) on = true;
      }
      X.fillStyle = on ? 'rgba(255, 200, 60, 0.45)' : 'rgba(255, 200, 60, 0.025)';
      X.fillRect(b.x + w.dx, by + w.dy, 4, 5);
    });
  });
}

function drawZTower(ms) {
  const tx   = ZTOWER_X;
  const ty   = GY - ZTOWER_H;
  const tw   = ZTOWER_W;
  const base = GY;

  // Tower body (tapered trapezoid)
  X.fillStyle = '#0f0f20';
  X.beginPath();
  X.moveTo(tx - tw / 2 - 3, base);
  X.lineTo(tx - tw / 2 + 2, ty + 30);
  X.lineTo(tx - tw / 2 + 5, ty);
  X.lineTo(tx + tw / 2 - 5, ty);
  X.lineTo(tx + tw / 2 - 2, ty + 30);
  X.lineTo(tx + tw / 2 + 3, base);
  X.closePath(); X.fill();

  // Purple windows
  const empA = nukeOn ? (ms > 300 && ms < 9200 ? 0 : 1) : 1;
  if (empA > 0) {
    X.fillStyle = `rgba(140, 60, 220, ${empA * 0.55})`;
    for (let wy = ty + 18; wy < base - 20; wy += 16) {
      X.fillRect(tx - 3, wy, 6, 8);
    }
  }

  // White "Z" logo on top section
  const zA = nukeOn ? (ms > 300 && ms < 9200 ? 0 : 1) : 1;
  if (zA > 0) {
    X.globalAlpha = zA * 0.9;
    X.fillStyle = '#fff';
    X.font = 'bold 11px monospace';
    X.textAlign = 'center';
    X.textBaseline = 'middle';
    X.fillText('Z', tx, ty + 15);
    X.globalAlpha = 1;
  }

  // Red antenna blinking
  const antBlink = Math.floor(performance.now() / 800) % 2 === 0;
  const antOn = nukeOn ? (ms > 300 && ms < 9200 ? false : antBlink) : antBlink;
  X.strokeStyle = antOn ? 'rgba(255, 40, 40, 0.9)' : 'rgba(80, 10, 10, 0.4)';
  X.lineWidth = 1.5;
  X.beginPath();
  X.moveTo(tx, ty);
  X.lineTo(tx, ty - 18);
  X.stroke();
  if (antOn) {
    X.fillStyle = 'rgba(255, 60, 60, 0.85)';
    X.beginPath(); X.arc(tx, ty - 18, 2.5, 0, Math.PI * 2); X.fill();
  }
}

function drawBuildingRimLight(ms) {
  if (!nukeOn || ms > 7000) return;
  const rimA = ss(0, 500, ms) * ss(7000, 5000, ms) * 0.5;
  if (rimA < 0.01) return;
  X.strokeStyle = `rgba(255, 155, 40, ${rimA})`;
  X.lineWidth = 1;
  CITY_FG.forEach(b => {
    X.beginPath();
    X.moveTo(b.x, GY - b.h);
    X.lineTo(b.x + b.w, GY - b.h);
    X.stroke();
  });
}

function drawGround() {
  X.fillStyle = '#080814';
  X.fillRect(0, GY, W, H - GY);
  // Ground edge line
  X.strokeStyle = '#111122';
  X.lineWidth = 1;
  X.beginPath(); X.moveTo(0, GY); X.lineTo(W, GY); X.stroke();
}

function drawOverlays(ms) {
  if (!nukeOn) return;

  // --- Lens Flare & Flash (0-2000ms) ---
  if (ms < 2000) {
    const flt = ms / 2000;
    const flAlpha = (1 - flt * flt) * 1.5;
    
    // Core bleach (super intense, longer fade)
    X.globalAlpha = Math.min(1, flAlpha);
    X.fillStyle = '#fff';
    if (ms < 200) X.fillRect(0, 0, W, H);
    else if (ms < 400) { X.globalAlpha = Math.min(1, flAlpha) * 0.6; X.fillRect(0, 0, W, H); }
    
    // Anamorphic horizontal flare (screen blend for extreme glow)
    /* --- TEMPORARILY DISABLED ---
    X.save();
    X.globalCompositeOperation = 'screen';
    X.globalAlpha = Math.min(1, flAlpha);
    const flareW = W * 3 * (1 - flt); // Wider
    const flareH = 30 * (1 - flt);    // Taller core
    const flareY = GY - 20;
    const fg = X.createRadialGradient(GX, flareY, 0, GX, flareY, flareW / 2);
    fg.addColorStop(0, `rgba(255, 255, 255, 1)`);
    fg.addColorStop(0.1, `rgba(255, 220, 180, 0.9)`);
    fg.addColorStop(0.3, `rgba(255, 120, 30, 0.6)`);
    fg.addColorStop(1, 'rgba(200, 30, 10, 0)');
    
    X.fillStyle = fg;
    X.beginPath();
    X.ellipse(GX, flareY, flareW / 2, flareH, 0, 0, Math.PI * 2);
    X.fill();
    X.restore();
    */ // --- END DISABLED ---
    X.globalAlpha = 1;
  }

  // --- Warm radial glow overlay (0-7s) ---
  if (ms < 7000) {
    const cloudT = Math.min(1, Math.max(0, ms - 100) / 3000);
    const riseEase   = 1 - Math.pow(1 - Math.min(1, cloudT * 1.5), 3);
    const slowDrift  = Math.min(1, ms / DUR) * H * 0.07;
    const cY         = GY - riseEase * (H * 0.45) - slowDrift;
    const intensity  = (1 - (ms / 7000) ** 2) * 0.45;
    const rad        = Math.max(W, H) * 1.2;
    const rg = X.createRadialGradient(GX, cY, 0, GX, cY, rad);
    rg.addColorStop(0,   `hsla(35, 100%, 65%, ${intensity})`);
    rg.addColorStop(0.3, `hsla(25, 100%, 45%, ${intensity * 0.5})`);
    rg.addColorStop(0.7, `hsla(20, 90%, 25%, ${intensity * 0.15})`);
    rg.addColorStop(1,   'hsla(15, 80%, 15%, 0)');
    X.fillStyle = rg;
    X.fillRect(0, 0, W, H);
  }
}

// No particles — Classic OG nuke is purely gradient-based

function drawVignette(ms) {
  let crush = 0;
  let darken = 0;
  if (nukeOn && ENABLE_VIGNETTE_CRUSH) {
     if (ms > 200 && ms < 3000) {
       const crushT = ms < 500 ? (ms - 200) / 300 : 1 - (ms - 500) / 2500;
       crush = Math.pow(Math.max(0, crushT), 2) * 0.45; // Push vignette inward
       darken = crushT * 0.4; // Darken edges
     }
  }
  const maxR = H * (0.78 - crush);
  const minR = H * Math.max(0.05, 0.32 - crush);
  const vg = X.createRadialGradient(W / 2, H / 2, minR, W / 2, H / 2, maxR);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, `rgba(0,0,0,${0.42 + darken})`);
  X.fillStyle = vg; X.fillRect(0, 0, W, H);
}

// ================================================================
// Main render loop
// ================================================================
function frame(now) {
  requestAnimationFrame(frame);

  const ms = nukeOn ? now - nukeT0 : -1;

  // End of sequence
  if (nukeOn && ms > DUR) {
    nukeOn = false;
    timerEl.textContent = 'Complete';
    canvasWrap.classList.remove('detonating');
  }
  if (nukeOn) {
    timerEl.textContent = (ms / 1000).toFixed(2) + 's / 11.0s';
    if (ms > 100 && ms < 9500) {
      canvasWrap.classList.add('detonating');
    } else {
      canvasWrap.classList.remove('detonating');
    }
  }

  // --- Screen shake ---
  shakeX = 0; shakeY = 0;
  if (nukeOn) {
    let amp = 0;
    if (ms > 0 && ms < 1500) amp = 60 * Math.pow(1 - ms / 1500, 2);
    // Secondary ground shockwave for NOVA around 4.5s
    if (activeVariant === VARIANTS.findIndex(v => v.id === 'nova') && ms > 4500 && ms < 6000) {
      let st = (ms - 4500) / 1500;
      amp += 30 * Math.sin(st * Math.PI) * (1 - st);
    }
    shakeX = (Math.random() - 0.5) * 2 * Math.min(25, amp);
    shakeY = (Math.random() - 0.5) * 2 * Math.min(25, amp);
  }

  X.save();
  X.translate(shakeX, shakeY);

  // Layer 1: Sky
  drawSky(ms);

  // Layer 2: Stars, Moon
  drawStars(ms, now);
  drawMoon(ms);

  // Layer 3: Mountains
  drawMountains(ms);

  // Layer 4: NUKE CLOUD (behind city)
  if (nukeOn && ms > 0) {
    VARIANTS[activeVariant].drawFn(X, ms, W, H, GX, GY);
  }

  // Layer 5: Particles (behind city — buildings overlap debris)
  updateParticles(ms);
  drawParticles(false);

  // Layer 6: Ground + City
  if (showCity) {
    drawGround();
    drawCity(ms);
    drawZTower(ms);
    drawBuildingRimLight(ms);
  }

  // Layer 7: Particles (foreground — falling in front of buildings)
  drawParticles(true);

  // Layer 7: Overlays (flash, warm glow)
  drawOverlays(ms);

  // Layer 8: Vignette
  drawVignette(ms);

  X.restore();
}

requestAnimationFrame(frame);
</script>
