<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tsar Bomba — Full Fidelity Nuclear Explosion</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080810; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Courier New', monospace; color: #aaa; }
  canvas { display: block; border: 1px solid #222; }
  .controls { margin-top: 12px; display: flex; gap: 16px; align-items: center; }
  button { background: #c33; color: #fff; border: none; padding: 8px 24px; font-size: 14px; cursor: pointer; font-family: inherit; border-radius: 3px; }
  button:hover { background: #e44; }
  #timer { font-size: 14px; color: #888; min-width: 120px; }
  h3 { color: #c44; margin-bottom: 8px; font-size: 13px; letter-spacing: 2px; }
</style>
</head>
<body>
<h3>TSAR BOMBA — FULL FIDELITY</h3>
<canvas id="c" width="620" height="640"></canvas>
<div class="controls">
  <button id="btn">Detonate</button>
  <span id="timer">Ready</span>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 620, H = 640;
const btn = document.getElementById('btn');
const timerEl = document.getElementById('timer');

let nukeActive = false, nukeStart = 0;
const TOTAL_MS = 11000;
const GX = W / 2, GY = H * 0.78;

// Stars
const stars = [];
for (let i = 0; i < 40; i++) stars.push({ x: Math.random()*W, y: Math.random()*H*0.5, r: 0.5+Math.random()*1.5, tw: Math.random()*6.28, sp: 0.5+Math.random()*2 });

// Clouds
const clouds = [];
for (let i = 0; i < 5; i++) clouds.push({ x: 60+Math.random()*(W-120), y: 80+Math.random()*120, w: 60+Math.random()*80, h: 8+Math.random()*10 });

// City silhouette
const cityBuildings = [];
for (let bx = 0; bx < W; bx += 18 + Math.random()*14) {
  cityBuildings.push({ x: bx, w: 14+Math.random()*18, h: 40+Math.random()*90 });
}

// Shake
let shakeX = 0, shakeY = 0;

// Embers
const embers = [];
const shrapnel = [];
const ash = [];

btn.onclick = () => {
  nukeActive = true;
  nukeStart = performance.now();
  embers.length = 0; shrapnel.length = 0; ash.length = 0;
  // Spawn shrapnel immediately
  for (let i = 0; i < 35; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 3 + Math.random() * 6;
    shrapnel.push({ x: GX, y: GY, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 2, life: 20+Math.random()*20, maxLife: 40 });
  }
};

function frame(now) {
  requestAnimationFrame(frame);
  const elapsed = nukeActive ? now - nukeStart : -1;
  if (nukeActive && elapsed > TOTAL_MS) { nukeActive = false; timerEl.textContent = 'Complete'; }
  if (nukeActive) timerEl.textContent = (elapsed/1000).toFixed(1) + 's / 11.0s';

  // Shake
  shakeX = 0; shakeY = 0;
  if (nukeActive) {
    let amp = 0;
    if (elapsed < 3000) amp = 12 * (1 - elapsed/3000);
    if (elapsed > 1500 && elapsed < 2200) amp += 8 * (1 - (elapsed-1500)/700);
    shakeX = (Math.random()-0.5)*2*Math.min(10, amp);
    shakeY = (Math.random()-0.5)*2*Math.min(10, amp);
  }

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // === SKY ===
  let skyBright = 0;
  if (nukeActive) {
    if (elapsed < 300) skyBright = 1;
    else if (elapsed < 1500) skyBright = 0.7 * (1 - (elapsed-300)/1200);
    else if (elapsed < 2000) skyBright = 0.85 * (1 - (elapsed-300)/1700);
    else if (elapsed < 6000) skyBright = 0.2 * (1 - (elapsed-2000)/4000);
  }
  const sr = Math.round(10 + skyBright * 245);
  const sg = Math.round(10 + skyBright * 230);
  const sb = Math.round(20 + skyBright * 180);
  ctx.fillStyle = `rgb(${sr},${sg},${sb})`;
  ctx.fillRect(-20, -20, W+40, H+40);

  // Stars
  const starA = Math.max(0, 1 - skyBright * 4);
  if (starA > 0.01) {
    stars.forEach(s => {
      const tw = 0.5 + 0.5*Math.sin(now*0.001*s.sp + s.tw);
      ctx.globalAlpha = starA * tw * 0.8;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  // Clouds (lit underside during blast)
  clouds.forEach(c => {
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = '#556';
    ctx.beginPath(); ctx.ellipse(c.x, c.y, c.w/2, c.h/2, 0, 0, Math.PI*2); ctx.fill();
    if (nukeActive && elapsed < 6000) {
      const lt = elapsed < 500 ? elapsed/500 : (elapsed < 4000 ? 1 : 1-(elapsed-4000)/2000);
      const la = Math.max(0, Math.min(1, lt)) * 0.5;
      if (la > 0.01) {
        ctx.globalAlpha = la;
        ctx.fillStyle = 'rgba(255,180,60,0.6)';
        ctx.beginPath(); ctx.ellipse(c.x, c.y+c.h*0.2, c.w/2, c.h/2, 0, 0, Math.PI*2); ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  });

  // ==============================
  // === TSAR BOMBA MUSHROOM CLOUD
  // ==============================
  // Based on the proven effects.js drawNukeCloud, scaled to 80% canvas width
  if (nukeActive && elapsed > 100) {
    const cloudT = Math.min(1, (elapsed - 100) / 3000);
    const fadeT = elapsed > 9000 ? Math.min(1, (elapsed-9000)/2000) : 0;
    const darkT = elapsed > 2000 ? Math.min(1, (elapsed-2000)/2500) : 0;
    const alpha = (1 - fadeT) * 0.9;

    if (alpha > 0.01) {
      ctx.globalAlpha = alpha;
      const riseEase = 1 - Math.pow(1 - Math.min(1, cloudT*1.5), 3);
      const slowDrift = Math.min(1, elapsed/TOTAL_MS) * H * 0.06;
      const cloudCenterY = GY - riseEase * (H * 0.42) - slowDrift;
      const stemBaseY = GY;
      const capGrow = Math.min(1, cloudT * 2);

      // TSAR BOMBA SCALE: 80% canvas width
      const capR = 50 + capGrow * 80;         // much bigger
      const capRx = capR * 1.6;               // wider ellipse
      const stemTopW = 22 + capGrow * 18;
      const stemBaseW = 40 + capGrow * 45;

      const hShift = darkT * 18;
      const lDrop = darkT * 35;
      // Delayed darkening for outer cap layers (1.5s later)
      const outerDarkT = elapsed > 3500 ? Math.min(1, (elapsed-3500)/2500) : 0;
      const outerHS = outerDarkT * 18, outerLD = outerDarkT * 35;

      // === Ground debris cloud ===
      const debrisR = stemBaseW * 1.8 * capGrow;
      const debrisAlpha = alpha * Math.max(0, 1 - darkT*0.5);
      if (debrisAlpha > 0.01) {
        const dg = ctx.createRadialGradient(GX, stemBaseY, 0, GX, stemBaseY, debrisR);
        dg.addColorStop(0, `hsla(25, 80%, ${Math.max(8, 35-lDrop)}%, ${debrisAlpha*0.6})`);
        dg.addColorStop(0.5, `hsla(18, 60%, ${Math.max(5, 20-lDrop)}%, ${debrisAlpha*0.3})`);
        dg.addColorStop(1, 'hsla(15,50%,15%,0)');
        ctx.fillStyle = dg;
        ctx.beginPath(); ctx.ellipse(GX, stemBaseY, debrisR, debrisR*0.25, 0, 0, Math.PI*2); ctx.fill();
      }

      // === Intense base glow — warm like the classic ===
      const baseGlowR = capRx * 2.5;
      const baseGlowA = alpha * Math.max(0, 1 - darkT*0.6);
      const bg = ctx.createRadialGradient(GX, stemBaseY, 0, GX, stemBaseY, baseGlowR);
      bg.addColorStop(0, `hsla(38,100%,75%, ${baseGlowA*0.85})`);
      bg.addColorStop(0.12, `hsla(30,100%,55%, ${baseGlowA*0.45})`);
      bg.addColorStop(0.35, `hsla(22,100%,35%, ${baseGlowA*0.12})`);
      bg.addColorStop(1, 'hsla(15,100%,20%,0)');
      ctx.fillStyle = bg;
      ctx.beginPath(); ctx.arc(GX, stemBaseY, baseGlowR, 0, Math.PI*2); ctx.fill();

      // === Stem with turbulent edges ===
      const stemGrad = ctx.createLinearGradient(GX, cloudCenterY + capR*0.3, GX, stemBaseY);
      stemGrad.addColorStop(0, `hsla(${25-hShift},90%,${Math.max(10,45-lDrop)}%,${alpha})`);
      stemGrad.addColorStop(0.4, `hsla(${20-hShift},85%,${Math.max(8,35-lDrop)}%,${alpha})`);
      stemGrad.addColorStop(1, `hsla(${15-hShift},70%,${Math.max(5,25-lDrop)}%,${alpha})`);
      ctx.fillStyle = stemGrad;
      ctx.beginPath();
      // Left edge with turbulence
      const segments = 20;
      const stemTop = cloudCenterY + capR * 0.3;
      ctx.moveTo(GX - stemTopW/2, stemTop);
      for (let s = 0; s <= segments; s++) {
        const t = s / segments;
        const y = stemTop + (stemBaseY - stemTop) * t;
        const baseW = stemTopW/2 + (stemBaseW/2 - stemTopW/2) * t;
        const turb = Math.sin(t*12 + elapsed*0.003) * 3 + Math.sin(t*7 + elapsed*0.005) * 2;
        ctx.lineTo(GX - baseW - turb, y);
      }
      // Right edge back up
      for (let s = segments; s >= 0; s--) {
        const t = s / segments;
        const y = stemTop + (stemBaseY - stemTop) * t;
        const baseW = stemTopW/2 + (stemBaseW/2 - stemTopW/2) * t;
        const turb = Math.sin(t*12 + elapsed*0.003 + 3) * 3 + Math.sin(t*7 + elapsed*0.005 + 2) * 2;
        ctx.lineTo(GX + baseW + turb, y);
      }
      ctx.closePath(); ctx.fill();

      // Hot stem center line
      const stemCenterA = alpha * Math.max(0, 0.4 - darkT*0.3);
      if (stemCenterA > 0.01) {
        const sc = ctx.createLinearGradient(GX, stemTop, GX, stemBaseY);
        sc.addColorStop(0, `hsla(35,100%,60%,${stemCenterA})`);
        sc.addColorStop(1, `hsla(20,100%,40%,${stemCenterA*0.3})`);
        ctx.fillStyle = sc;
        ctx.beginPath();
        ctx.moveTo(GX - stemTopW*0.2, stemTop);
        ctx.lineTo(GX - stemBaseW*0.15, stemBaseY);
        ctx.lineTo(GX + stemBaseW*0.15, stemBaseY);
        ctx.lineTo(GX + stemTopW*0.2, stemTop);
        ctx.closePath(); ctx.fill();
      }

      // === Cap glow — warm halo ===
      const glowR = capRx * 3;
      const gg = ctx.createRadialGradient(GX, cloudCenterY, capR*0.15, GX, cloudCenterY, glowR);
      gg.addColorStop(0, `hsla(32,100%,${Math.max(18,65-lDrop*2)}%,${alpha*0.5})`);
      gg.addColorStop(0.3, `hsla(26,100%,${Math.max(12,50-lDrop*2)}%,${alpha*0.25})`);
      gg.addColorStop(0.6, `hsla(20,100%,${Math.max(8,35-lDrop*2)}%,${alpha*0.08})`);
      gg.addColorStop(1, 'hsla(15,100%,25%,0)');
      ctx.fillStyle = gg;
      ctx.beginPath(); ctx.arc(GX, cloudCenterY, glowR, 0, Math.PI*2); ctx.fill();

      // === Cap layers — ALL fiery bright, near-opaque apocalypse ===
      const capAlpha = Math.min(1, alpha * 1.1);
      // Outermost — delayed darkening
      ctx.fillStyle = `hsla(${15-outerHS},90%,${Math.max(15,42-outerLD*0.6)}%,${capAlpha})`;
      ctx.beginPath(); ctx.ellipse(GX, cloudCenterY, capRx*1.15, capR*1.0, 0, 0, Math.PI*2); ctx.fill();
      // Layer 2
      ctx.fillStyle = `hsla(${20-outerHS},95%,${Math.max(18,48-outerLD*0.6)}%,${capAlpha})`;
      ctx.beginPath(); ctx.ellipse(GX, cloudCenterY-capR*0.03, capRx*0.95, capR*0.85, 0, 0, Math.PI*2); ctx.fill();
      // Layer 3
      ctx.fillStyle = `hsla(${26-hShift},100%,${Math.max(22,54-lDrop*0.5)}%,${capAlpha})`;
      ctx.beginPath(); ctx.ellipse(GX, cloudCenterY-capR*0.06, capRx*0.75, capR*0.7, 0, 0, Math.PI*2); ctx.fill();
      // Layer 4
      ctx.fillStyle = `hsla(${32-hShift},100%,${Math.max(28,62-lDrop*0.4)}%,${capAlpha})`;
      ctx.beginPath(); ctx.ellipse(GX, cloudCenterY-capR*0.08, capRx*0.52, capR*0.52, 0, 0, Math.PI*2); ctx.fill();
      // Hot core — stays blazing
      const coreDarkDelay = elapsed > 6500 ? Math.min(1, (elapsed-6500)/2500) : 0;
      const coreAlpha = capAlpha * Math.max(0.15, 1 - coreDarkDelay);
      ctx.fillStyle = `hsla(42,100%,${Math.max(30,78-lDrop)}%,${coreAlpha})`;
      ctx.beginPath(); ctx.ellipse(GX, cloudCenterY-capR*0.1, capRx*0.3, capR*0.3, 0, 0, Math.PI*2); ctx.fill();

      // === Double fireball — white-hot inner core ===
      if (elapsed < 3500) {
        const wa = Math.min(1, (1 - Math.max(0, elapsed-500)/3000)) * capAlpha;
        ctx.fillStyle = `rgba(255,255,230,${wa*0.8})`;
        ctx.beginPath(); ctx.ellipse(GX, cloudCenterY-capR*0.05, capRx*0.18, capR*0.18, 0, 0, Math.PI*2); ctx.fill();
        // Inner white flash
        if (elapsed < 1200) {
          const iwa = (1 - elapsed/1200) * alpha;
          ctx.fillStyle = `rgba(255,255,255,${iwa})`;
          ctx.beginPath(); ctx.ellipse(GX, cloudCenterY-capR*0.05, capRx*0.1, capR*0.1, 0, 0, Math.PI*2); ctx.fill();
        }
      }

      // === Base ring disc — OVER the cap ===
      ctx.fillStyle = `hsla(${20-hShift},80%,${Math.max(8,35-lDrop)}%,${alpha*0.7})`;
      ctx.beginPath(); ctx.ellipse(GX, cloudCenterY+capR*0.55, capRx*1.2, capR*0.22, 0, 0, Math.PI*2); ctx.fill();

      // === Rolling side clouds — over cap, close to stem ===
      if (capGrow > 0.2) {
        const rollT = Math.min(1, (capGrow-0.2)/0.8);
        const rollR = capR * 0.3 * rollT;
        const rollBaseY = cloudCenterY + capR * 0.45;
        const rollSpread = stemTopW * 0.8 + rollR * 0.6;
        const rollDH = hShift, rollDL = lDrop * 0.7;
        for (let side = -1; side <= 1; side += 2) {
          const rx = GX + side * rollSpread;
          const ry = rollBaseY + rollR * 0.2;
          ctx.fillStyle = `hsla(${20-rollDH},75%,${Math.max(8,30-rollDL)}%,${alpha*0.55})`;
          ctx.beginPath(); ctx.ellipse(rx, ry, rollR*1.1, rollR*0.7, 0, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = `hsla(${26-rollDH},90%,${Math.max(12,40-rollDL)}%,${alpha*0.4})`;
          ctx.beginPath(); ctx.ellipse(rx, ry-rollR*0.1, rollR*0.65, rollR*0.45, 0, 0, Math.PI*2); ctx.fill();
        }
      }

      // === Concentric cloud bands (6 for Tsar Bomba) ===
      const bandNow = elapsed / 1000;
      for (let i = 0; i < 6; i++) {
        const entryT = 0.12 + i * 0.12;
        if (cloudT < entryT) continue;
        const bandAge = Math.min(1, (cloudT - entryT) / 0.35);
        const t01 = i / 5;
        const finalY = cloudCenterY - capR*(0.6 - t01*1.1);
        const startY = cloudCenterY + capR*0.5;
        const bandY = startY + (finalY-startY)*bandAge + Math.sin(bandNow*(0.4+i*0.2)+i*2.3)*capR*0.025;
        const widthAtY = capRx * (0.85 + t01*0.5) * bandAge;
        const fade = (0.6 + t01*0.4) * bandAge;
        const pulse = 0.3 + 0.1*Math.sin(bandNow*(1.2+i*0.4)+i*1.7);
        const bandAlpha = alpha * pulse * fade;
        const bandL = Math.max(8, (40-i*3) - lDrop);
        const bandH = 22 - hShift + i*3;
        const sag1 = capR*0.04*Math.sin(bandNow*(0.6+i*0.3)+i);
        const sag2 = capR*0.03*Math.sin(bandNow*(0.5+i*0.2)+i+1.5);
        ctx.strokeStyle = `hsla(${bandH},75%,${bandL}%,${bandAlpha})`;
        ctx.lineWidth = (3 + t01*2.5) * bandAge;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(GX-widthAtY, bandY);
        ctx.quadraticCurveTo(GX-widthAtY*0.35, bandY+sag1, GX, bandY+sag2);
        ctx.quadraticCurveTo(GX+widthAtY*0.35, bandY-sag1, GX+widthAtY, bandY);
        ctx.stroke();
      }

      ctx.globalAlpha = 1;
    }
  }

  // === Shockwave ring ===
  if (nukeActive && elapsed > 200 && elapsed < 2000) {
    const st = (elapsed-200)/1800;
    const radius = st * Math.max(W,H) * 0.9;
    ctx.globalAlpha = (1-st)*0.35;
    ctx.strokeStyle = 'rgba(255,200,100,0.6)';
    ctx.lineWidth = 3 + (1-st)*10;
    ctx.beginPath(); ctx.arc(GX, GY, radius, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // === City silhouette ===
  const groundY = H * 0.78;
  ctx.fillStyle = '#0a0a18';
  ctx.fillRect(0, groundY, W, H-groundY);
  cityBuildings.forEach(b => {
    const by = groundY - b.h;
    ctx.fillStyle = '#0c0c1a';
    ctx.fillRect(b.x, by, b.w, b.h);
    // Windows
    for (let wy = by+6; wy < groundY-8; wy += 12) {
      for (let wx = b.x+3; wx < b.x+b.w-5; wx += 8) {
        const on = Math.sin(b.x*3.7 + wy*2.1 + wx) > 0.2;
        ctx.fillStyle = on ? 'rgba(255,200,60,0.5)' : 'rgba(255,200,60,0.04)';
        ctx.fillRect(wx, wy, 4, 5);
      }
    }
  });

  // Rim light on buildings during nuke
  if (nukeActive && elapsed < 7000) {
    const rimT = elapsed < 500 ? elapsed/500 : (elapsed < 5000 ? 1 : 1-(elapsed-5000)/2000);
    const rimA = Math.max(0, Math.min(1, rimT)) * 0.5;
    if (rimA > 0.01) {
      ctx.strokeStyle = `rgba(255,160,40,${rimA})`;
      ctx.lineWidth = 1;
      cityBuildings.forEach(b => {
        const by = groundY - b.h;
        ctx.beginPath();
        ctx.moveTo(b.x, by); ctx.lineTo(b.x+b.w, by);
        ctx.stroke();
      });
    }
  }

  // === Particles ===
  // Spawn embers from under the base ring of the mushroom cap
  if (nukeActive && elapsed > 600 && elapsed < 6000 && embers.length < 80) {
    // Recalculate cloud position for spawn point
    const eCloudT = Math.min(1, (elapsed-100)/3000);
    const eRiseEase = 1 - Math.pow(1-Math.min(1, eCloudT*1.5), 3);
    const eDrift = Math.min(1, elapsed/TOTAL_MS)*H*0.06;
    const eCenterY = GY - eRiseEase*(H*0.42) - eDrift;
    const eCapGrow = Math.min(1, eCloudT*2);
    const eCapR = 50 + eCapGrow*80;
    const eCapRx = eCapR * 1.6;
    // Base ring Y and width
    const eBaseRingY = eCenterY + eCapR * 0.55;
    const eBaseRingW = eCapRx * 1.2;
    for (let i = 0; i < 2; i++) {
      const spawnX = GX + (Math.random()-0.5)*2 * eBaseRingW;
      embers.push({
        x: spawnX, y: eBaseRingY + Math.random()*8,
        vx: (Math.random()-0.5)*0.8,
        vy: 0.3 + Math.random()*0.6,        // gentle downward drift
        life: 120+Math.random()*180, maxLife: 300,
        r: 1+Math.random()*2, hue: 15+Math.random()*30
      });
    }
  }
  // Spawn ash after 3s
  if (nukeActive && elapsed > 3000 && elapsed < 8000 && ash.length < 40) {
    if (Math.random() < 0.15) {
      ash.push({
        x: Math.random()*W, y: -10,
        vx: (Math.random()-0.5)*0.5, vy: 0.3+Math.random()*0.8,
        life: 200+Math.random()*200, maxLife: 400,
        r: 0.5+Math.random()*1.5
      });
    }
  }

  // Draw & update shrapnel
  shrapnel.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
    if (p.life > 0) {
      const a = p.life/p.maxLife;
      ctx.globalAlpha = a;
      ctx.strokeStyle = `rgba(255,180,60,${a})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x-p.vx*2, p.y-p.vy*2); ctx.stroke();
    }
  });
  // Draw & update embers — gentle drift down with wind sway
  embers.forEach(p => {
    p.x += p.vx + Math.sin(p.life * 0.02 + p.x * 0.01) * 0.15; // gentle sway
    p.y += p.vy;
    // No gravity — they just drift at spawn speed
    p.life--;
    if (p.life > 0) {
      const a = (p.life/p.maxLife);
      const fadeA = a * 0.8; // slightly transparent overall
      ctx.globalAlpha = fadeA;
      ctx.fillStyle = `hsl(${p.hue},100%,${50 + a*20}%)`;
      ctx.shadowColor = `hsl(${p.hue},100%,50%)`;
      ctx.shadowBlur = 6;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (0.5 + a*0.5), 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }
  });
  // Draw & update ash
  ash.forEach(p => {
    p.x += p.vx + Math.sin(p.life*0.02)*0.3; p.y += p.vy; p.life--;
    if (p.life > 0) {
      const a = Math.min(1, p.life/p.maxLife) * 0.4;
      ctx.globalAlpha = a;
      ctx.fillStyle = '#888';
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    }
  });
  ctx.globalAlpha = 1;

  // Cleanup dead particles
  for (let arr of [shrapnel, embers, ash]) {
    for (let i = arr.length-1; i >= 0; i--) { if (arr[i].life <= 0) arr.splice(i, 1); }
  }

  // === Overlays ===
  // White flash
  if (nukeActive && elapsed < 300) {
    const ft = elapsed / 300;
    ctx.globalAlpha = (1 - ft*ft) * 0.95;
    ctx.fillStyle = '#fff';
    ctx.fillRect(-20, -20, W+40, H+40);
    ctx.globalAlpha = 1;
  }

  // Warm radial glow overlay — lingering warmth
  if (nukeActive && elapsed < 8000) {
    const lt = elapsed/8000;
    const intensity = (1-lt*lt)*0.55;
    const cloudT2 = Math.min(1, (elapsed-100)/3000);
    const riseEase2 = 1 - Math.pow(1-Math.min(1, cloudT2*1.5), 3);
    const driftOv = Math.min(1, elapsed/TOTAL_MS)*H*0.06;
    const ccy = GY - riseEase2*(H*0.42) - driftOv;
    const rad = Math.max(W,H)*1.4;
    const rg = ctx.createRadialGradient(GX, ccy, 0, GX, ccy, rad);
    rg.addColorStop(0, `hsla(38,100%,70%,${intensity})`);
    rg.addColorStop(0.25, `hsla(28,100%,50%,${intensity*0.55})`);
    rg.addColorStop(0.6, `hsla(20,95%,30%,${intensity*0.18})`);
    rg.addColorStop(1, 'hsla(15,80%,15%,0)');
    ctx.fillStyle = rg;
    ctx.fillRect(0, 0, W, H);
  }

  // Shockwave hit brightness pulse
  if (nukeActive && elapsed > 1500 && elapsed < 2200) {
    const st = (elapsed-1500)/700;
    ctx.globalAlpha = (1-st)*0.15;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  // Vignette
  const vg = ctx.createRadialGradient(W/2, H/2, H*0.35, W/2, H/2, H*0.75);
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);

  ctx.restore();
}

requestAnimationFrame(frame);
</script>
