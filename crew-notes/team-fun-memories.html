<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crew Scrapbook — The Cabinet of IMD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Dark mode colours */
      --bg: #0c1018;
      --bg-app: #111820;
      --bg-header: #151c26;
      --bg-card: #151c26;
      --bg-card-hover: #1a2230;
      --border: #1c2430;
      --border-card: #1c2430;
      --text: #94a0b4;
      --text-msg: #7888a0;
      --text-heading: #c0c8d8;
      --text-muted: #384858;
      --text-answer: #c0c8d8;

      /* Member colours (dark mode) */
      --who-thieuke: #88b0b8;
      --who-sakke: #d88070;
      --who-jonasty: #90a898;
      --who-pitr: #707888;
      --who-kevijntje: #d0a840;
      --who-poekie: #7898a8;
      --who-bostrol: #a0a090;
      --who-henske: #a888c0;
      --who-tom: #c0c8d8;

      /* Card accent colours (dark mode) */
      --accent-question: #c0a040;
      --accent-question-bg: rgba(192, 160, 64, 0.08);
      --accent-memory: #5888a0;
      --accent-memory-bg: rgba(88, 136, 160, 0.08);
      --accent-achievement: #608870;
      --accent-achievement-bg: rgba(96, 136, 112, 0.08);
      --accent-lore: #9078b0;
      --accent-lore-bg: rgba(144, 120, 176, 0.08);
    }

    body.light {
      --bg: #eceae4;
      --bg-app: #f4f2ee;
      --bg-header: #e6e4de;
      --bg-card: #eceae4;
      --bg-card-hover: #e6e4de;
      --border: #d0cec8;
      --border-card: #d0cec8;
      --text: #4a4840;
      --text-msg: #5a5850;
      --text-heading: #2a2828;
      --text-muted: #a0a098;
      --text-answer: #2a2828;

      /* Member colours (light mode) */
      --who-thieuke: #4a7078;
      --who-sakke: #a05040;
      --who-jonasty: #506858;
      --who-pitr: #484e58;
      --who-kevijntje: #8a7020;
      --who-poekie: #486070;
      --who-bostrol: #686058;
      --who-henske: #6a4888;
      --who-tom: #2a2828;

      /* Card accent colours (light mode) */
      --accent-question: #8a7020;
      --accent-question-bg: rgba(138, 112, 32, 0.08);
      --accent-memory: #38687a;
      --accent-memory-bg: rgba(56, 104, 122, 0.08);
      --accent-achievement: #406048;
      --accent-achievement-bg: rgba(64, 96, 72, 0.08);
      --accent-lore: #604880;
      --accent-lore-bg: rgba(96, 72, 128, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      transition: background-color 0.3s ease, color 0.3s ease;
      line-height: 1.6;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--border-card);
    }

    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: var(--bg-app);
    }

    .header {
      background-color: var(--bg-header);
      border-bottom: 1px solid var(--border);
      padding: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 2rem;
    }

    .title-block {
      flex: 1;
    }

    .title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-heading);
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: var(--text-msg);
      font-weight: 400;
    }

    .theme-toggle {
      width: 44px;
      height: 44px;
      border: 1px solid var(--border);
      background-color: var(--bg-card);
      color: var(--text-heading);
      border-radius: 6px;
      cursor: pointer;
      font-size: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s ease, border-color 0.2s ease;
      flex-shrink: 0;
    }

    .theme-toggle:hover {
      background-color: var(--bg-card-hover);
      border-color: var(--border-card);
    }

    .theme-toggle::before {
      content: '☀️';
    }

    body.light .theme-toggle::before {
      content: '🌙';
    }

    .cards {
      flex: 1;
      padding: 2rem;
      max-width: 740px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 8px;
      padding: 1.5rem;
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }

    .card:hover {
      background-color: var(--bg-card-hover);
      border-color: var(--border-card);
    }

    .card.question {
      border-left: 4px solid var(--accent-question);
      background: linear-gradient(to right, var(--accent-question-bg), transparent);
    }

    .card.memory {
      border-left: 4px solid var(--accent-memory);
      background: linear-gradient(to right, var(--accent-memory-bg), transparent);
    }

    .card.achievement {
      border-left: 4px solid var(--accent-achievement);
      background: linear-gradient(to right, var(--accent-achievement-bg), transparent);
    }

    .card.lore {
      border-left: 4px solid var(--accent-lore);
      background: linear-gradient(to right, var(--accent-lore-bg), transparent);
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .card-badge {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.35rem 0.6rem;
      border-radius: 4px;
      background-color: var(--bg-card-hover);
      border: 1px solid var(--border-card);
      color: var(--text-muted);
    }

    .card.question .card-badge {
      background-color: var(--accent-question-bg);
      color: var(--accent-question);
      border-color: var(--accent-question);
    }

    .card.memory .card-badge {
      background-color: var(--accent-memory-bg);
      color: var(--accent-memory);
      border-color: var(--accent-memory);
    }

    .card.achievement .card-badge {
      background-color: var(--accent-achievement-bg);
      color: var(--accent-achievement);
      border-color: var(--accent-achievement);
    }

    .card.lore .card-badge {
      background-color: var(--accent-lore-bg);
      color: var(--accent-lore);
      border-color: var(--accent-lore);
    }

    .card-who {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-heading);
    }

    .who-thieuke {
      color: var(--who-thieuke);
    }

    .who-sakke {
      color: var(--who-sakke);
    }

    .who-jonasty {
      color: var(--who-jonasty);
    }

    .who-pitr {
      color: var(--who-pitr);
    }

    .who-kevijntje {
      color: var(--who-kevijntje);
    }

    .who-poekie {
      color: var(--who-poekie);
    }

    .who-bostrol {
      color: var(--who-bostrol);
    }

    .who-henske {
      color: var(--who-henske);
    }

    .who-tom {
      color: var(--who-tom);
    }

    .card-date {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-left: auto;
    }

    .card-body {
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .card-question {
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border-card);
      color: var(--text);
      font-style: italic;
    }

    .card-answer {
      margin-bottom: 1rem;
      padding: 0.75rem;
      background-color: var(--bg-card-hover);
      border-left: 3px solid var(--accent-question);
      color: var(--text-answer);
      font-size: 0.9rem;
    }

    .card-reactions {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border-card);
    }

    .reaction {
      font-size: 0.85rem;
      color: var(--text-msg);
      display: flex;
      gap: 0.5rem;
    }

    .reaction-name {
      font-weight: 600;
      flex-shrink: 0;
    }

    .name-thieuke {
      color: var(--who-thieuke);
    }

    .name-sakke {
      color: var(--who-sakke);
    }

    .name-jonasty {
      color: var(--who-jonasty);
    }

    .name-pitr {
      color: var(--who-pitr);
    }

    .name-kevijntje {
      color: var(--who-kevijntje);
    }

    .name-poekie {
      color: var(--who-poekie);
    }

    .name-bostrol {
      color: var(--who-bostrol);
    }

    .name-henske {
      color: var(--who-henske);
    }

    .name-tom {
      color: var(--who-tom);
    }

    @media (max-width: 600px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }

      .theme-toggle {
        align-self: flex-end;
      }

      .title {
        font-size: 1.5rem;
      }

      .subtitle {
        font-size: 0.8rem;
      }

      .cards {
        padding: 1rem;
        gap: 1rem;
      }

      .card {
        padding: 1rem;
      }

      .card-top {
        gap: 0.5rem;
      }

      .card-date {
        width: 100%;
        margin-left: 0;
        text-align: right;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="title-block">
        <div class="title">Crew Scrapbook</div>
        <div class="subtitle">The Cabinet of IMD — things worth remembering</div>
      </div>
      <button class="theme-toggle" onclick="document.body.classList.toggle('light')" aria-label="Toggle theme"></button>
    </div>
    <div class="cards">
    </div><!-- END CARDS -->
  </div>
</body>
</html>
